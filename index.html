in a virtual world."},{"t":"Adobe Express (Video)","d":"Students create a short public service announcement explaining citizens' rights and responsibilities, using scenarios from class discussions about consequences when rules and laws are not met, and connecting to the concept that all citizens need to abide by rules for the safety and wellbeing of the community."},{"t":"Scratch","d":"Students design and code a Scratch game where the player takes on the role of a community law enforcement officer responding to different scenarios — a shopkeeper reports stolen goods, a neighbour complains about loud noise, a cyclist rides without a helmet. For each scenario, the player must choose the correct response (warning, fine, referral to court) based on whether the situation involves a broken rule or a broken law, earning points for correct decisions and receiving feedback explaining the consequences when rules and laws are not met."},{"t":"Kahoot","d":"Students collaboratively create quiz questions about rules vs laws, rights vs responsibilities, and the role of different people in enforcing them — used as a review tool connecting to the Principled Learner Profile focus on accepting consequences of actions."},{"t":"Freeform","d":"Students use Freeform to collaboratively map how rules and laws work as interconnected systems — plotting the differences between rules and laws, who enforces them, and how rights and responsibilities connect, building a visual concept map throughout the unit."}]},{"ca":"Elsternwick","yl":"Year 3","th":"Sharing the Planet","ci":"Adaptation and sustainability ensure the survival of living things in changing environments.","lo":"Adaptations and structural features of living things; Roles of living things in an ecosystem; Actions that benefit or harm ecosystems","s":[{"t":"Microsoft Forms + Padlet","d":"Students conduct a school ecosystem impact audit — using Microsoft Forms to tally lunchbox waste by category (plastic, glass, paper, organic, metal) across multiple classes. The auto-generated Forms charts make visible which human actions — packaging choices, single-use plastics, food waste — are creating the most ecosystem harm. Students post their charts to a shared Padlet, compare results across classes, and connect the data directly to the unit's third line of inquiry: actions that benefit or harm ecosystems. The audit transforms an abstract ecological concept into student-generated evidence, and the reduction proposal becomes a genuine act of environmental stewardship.","docKey":"doc_rubbish_audit","ref":[{"label":"DT Hub: Rubbish Recording & Reduction lesson plan","url":"https://www.digitaltechnologieshub.edu.au/teach-and-assess/classroom-resources/lesson-ideas/rubbish-recording-and-reduction-part-1/"}]},{"t":"Adobe Express (Podcast)","d":"Students produce a 'Planet Protectors' podcast episode discussing actions that benefit or harm ecosystems, featuring their research on animal adaptations and sustainability, and proposing actions their school community could take to protect local ecosystems."},{"t":"Book Creator","d":"Students create an animal adaptation research book documenting the species they investigated, explaining physical and behavioural adaptations, the animal's role in its ecosystem, and connecting to observations from the Melbourne Aquarium excursion about how living things are adapted to their environments."},{"t":"Sphero","d":"Students program Spheros to navigate obstacle courses representing different ecosystems, simulating how animals must adapt their movement to survive in changing environments, connecting coding challenges to the adaptation research documented in their animal investigation books."},{"t":"iMovie/Green Screen","d":"Students film themselves 'reporting live' from an ecosystem (using green screen), presenting their research on how adaptations ensure survival, incorporating findings from the Melbourne Aquarium excursion and class discussions about the positive and negative impact humans have on habitats."}]},{"ca":"Elsternwick","yl":"Year 4","th":"Who We Are","ci":"Leaders shape communities.","lo":"Roles and responsibilities of effective leadership; The purpose of leadership in communities; Qualities of influential leaders","s":[{"t":"Scratch","d":"Students code an interactive 'Leadership in Action' simulation in Scratch where players face community challenges and must choose different leadership approaches — each choice triggers animated consequences showing how leadership qualities like communication, empathy and decision-making shape community outcomes, connecting to the Learner Profile exploration."},{"t":"Delightex (CoSpaces)","d":"Students build an interactive 3D 'Leadership Hall of Fame' in CoSpaces where visitors walk through exhibit rooms for each leader studied during library sessions, clicking on portrait objects to trigger research findings about their leadership qualities, impact, and how form (recognisable structure) enhances understanding — creating a virtual museum they can share."},{"t":"Adobe Express (Video)","d":"Students create a short documentary about their chosen leader's impact, incorporating research from guided reading (including Maro Molina questions), their painted portrait, and analysis of the common roles and responsibilities all leaders share."},{"t":"Freeform","d":"Students use Freeform collaboratively to build a class leadership web — placing their chosen leader at the centre and mapping the qualities, responsibilities and community impacts that radiate outward. When multiple students map different leaders on the same Freeform canvas, patterns emerge: which leadership qualities appear across all their examples, and which are unique to specific contexts. The shared mapping becomes a class-generated framework for understanding what leadership means across different communities and time periods."},{"t":"Padlet + Seesaw","d":"Students post their leader research findings including key facts, leadership qualities, and impact evidence, creating a collaborative class gallery that shows the diversity of leadership explored through library research sessions and Seesaw documentation."}]},{"ca":"Elsternwick","yl":"Year 4","th":"How We Express Ourselves","ci":"Technology transforms how we create and share ideas.","lo":"How technology expands creative possibilities; The evolution of communication tools; The impact of technology on expression","s":[{"t":"Scratch","d":"Students code an interactive 'Communication Timeline' in Scratch where visitors click on era sprites (ancient, industrial, digital) to see animated demonstrations of how communication tools evolved — each era reveals how technology transformed creative expression, connecting to the KWL chart journey and family interviews about technology changes."},{"t":"Adobe Express (Website)","d":"Students create a digital portfolio website showcasing how technology has transformed creative expression, featuring their KWL chart journey, family interview findings about how technology/communication has changed, and examples of their own technology-enhanced creations from the unit."},{"t":"Canva Video","d":"Students produce a 'Then and Now' documentary comparing historical communication tools with modern technology, incorporating family interview responses about technological change and their personal 'top wonder' about technology's future impact on creative expression."},{"t":"Green Screen + iMovie","d":"Students use green screen to film themselves presenting from inside a historical setting, demonstrating the contrast between old and new communication tools explored in their 'Then and Now' documentary, showing firsthand how technology has transformed creative expression."},{"t":"Lego Spike","d":"Students build and code a Lego Spike automated message delivery system, demonstrating how technology has transformed communication from manual to automated processes, connecting their engineering prototype to the evolution of communication tools mapped in their timeline infographic."}]},{"ca":"Elsternwick","yl":"Year 4","th":"How the World Works","ci":"Changes to the Earth impact environment and communities.","lo":"The causes of geological change over time; How extreme environments cause natural disasters; The impact of natural events on communities","s":[{"t":"Adobe Express (Video) + Seesaw","d":"Students create an explanation video about geological changes and natural disasters, using the explanation text type practised during English (Seesaw Explanation Text activities) and incorporating research from digital and print text comparisons about environmental impacts on communities."},{"t":"Tinkercad","d":"Students design a 3D model in Tinkercad of an earthquake-resistant structure — applying the engineering principles they researched about base isolation, shear walls and cross-bracing. They test their design logic against the Lego Spike seismic simulation, comparing how their Tinkercad specifications translate (or fail to translate) into real structural behaviour. The iterative design-test-redesign loop connects the unit's central idea about design processes directly to the specific geological forces they've been studying."},{"t":"Delightex (CoSpaces)","d":"Students build an interactive 3D 'Natural Disaster Museum' in CoSpaces — creating immersive rooms for each disaster type studied (earthquake, tsunami, volcanic eruption, flood) with clickable exhibits showing causes, environmental impacts and community responses. Visitors can walk through each room and access the student-curated evidence about how geological and weather events reshape environments and communities. The museum format gives the unit's research a genuine public audience, and the spatial design challenge deepens students' understanding of how different disaster types operate."},{"t":"Lego Spike + Tinkercad","d":"Students build a Lego Spike earthquake-resistant structure incorporating sensors and motors, testing whether their design withstands shaking to connect engineering solutions to their Tinkercad emergency shelter prototype and natural disaster research."},{"t":"Micro:bit","d":"Students program micro:bit accelerometers to simulate seismograph readings during their natural disaster research, shaking the sensor at different intensities to model earthquake measurements, connecting the data to their explanation texts about geological changes and community impacts."}]},{"ca":"Elsternwick","yl":"Year 4","th":"How We Organise Ourselves","ci":"Systems connect us.","lo":"Human systems; The interconnections that exist within and across systems; The influence of systems on communities","s":[{"t":"Tinkercad + Scratch","d":"Students design a 3D model in Tinkercad of an innovative system component that solves a real school community problem (automated lunch ordering, smart timetable display, resource sharing station), with labelled parts showing how interconnections within the system enable it to function — presenting their design alongside their Scratch simulation."},{"t":"Lego Spike","d":"Students build a Lego Spike automated sorting or delivery system demonstrating how interconnected components work together, programming sensors and motors to show what happens when one part of the system fails, connecting to their investigation of how human systems function and PE body systems research."},{"t":"Adobe Express (Video)","d":"Students produce a short documentary exploring how a human system functions, connecting to PE investigations of team-based sports (basketball, netball, European handball) where they experienced how systems work through roles, rules, and interconnections."},{"t":"Mentimeter","d":"Students use Mentimeter to map the human systems that connect their school community — posting on a shared board all the systems they can identify (timetabling, food service, transport, communication, wellbeing). The class then votes on which systems they depend on most, and which would cause the greatest disruption if they broke down. The real-time collaborative mapping reveals that systems are invisible until they fail, directly supporting the unit's central idea that interconnected systems connect communities and that understanding them matters."},{"t":"Microsoft Forms","d":"Students complete a quick class survey about their experience with human systems — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry."}]},{"ca":"Elsternwick","yl":"Year 4","th":"Sharing the Planet","ci":"Country, language and community are significant to the lives of First Nations people.","lo":"The diversity of First Nations people; The importance of community, family and kinship; The importance of Country to First Nations people","s":[{"t":"Adobe Express (Podcast) + Padlet","d":"Students produce a respectful audio documentary exploring the importance of Country, language and community to First Nations people, incorporating stories shared through class provocations, research from Padlet reflections, and connections between First Nations perspectives and the concept of sharing the planet."},{"t":"Scratch","d":"Students code an interactive map of Australia in Scratch where clicking on different regions reveals the language group, key Country features, and cultural practices of the First Nations peoples of that area. Building the map requires genuine research — students must locate accurate information about specific groups, not generic 'Aboriginal culture' content — and the code forces them to represent that knowledge in a structured, navigable form. The interactive map demonstrates respect through specificity: each nation's Country is distinct, named, and accurately represented."},{"t":"Delightex (CoSpaces)","d":"Students build a 3D virtual 'Songlines Experience' in CoSpaces representing the First Nations Country they researched — creating walkable environments where clickable objects reveal the significance of land features, the meaning of place names in the relevant language group, and the custodial responsibilities that connect people to Country. The interactive exhibition is shared with another class, giving the unit's respectful inquiry into diversity of First Nations peoples a genuine audience and emphasising that knowledge of Country is not static history but living culture."},{"t":"DJI Drone (teacher-operated)","d":"DLP captures aerial footage of the local Elsternwick area and surrounding green spaces, providing a bird's-eye perspective of the land that students compare with First Nations understandings of Country, language groups, and connections to place explored throughout the unit."},{"t":"Mentimeter","d":"Students respond to a series of true/false provocations about the importance of country to first nations people using Mentimeter live polls — the class sees results in real time, debates surprising answers, and identifies misconceptions to investigate during the unit."}]},{"ca":"Elsternwick","yl":"Year 5","th":"Who We Are","ci":"People's choices are influenced by their beliefs and values and can impact others.","lo":"How values and beliefs impact choices; How people's choices and actions impact others; Responsible decision-making","s":[{"t":"Scratch + Freeform","d":"Students code an interactive 'Values Dilemma Simulator' in Scratch where players face ethical scenarios and must choose actions based on different belief systems — each choice triggers animated consequences showing how values and beliefs influence decisions and impact others, connecting to PE team outcome reflections and the Freeform concept map exploration."},{"t":"Adobe Express (Video)","d":"Students produce a short documentary exploring how values and beliefs influence decision-making, featuring personal reflections from PE lessons where they experienced how responsible choices in team activities affected others, and connecting to music lessons about how personal actions impact group performance."},{"t":"Delightex (CoSpaces)","d":"Students build an interactive 3D 'Perspectives Gallery' in CoSpaces where visitors walk through rooms representing different scenarios where values and beliefs led to different decisions, clicking on character objects to hear recorded analyses of causes, impacts and responsible decision-making approaches — creating a virtual ethical reasoning exhibition."},{"t":"Mentimeter","d":"Students use Mentimeter word clouds and live polling to gather anonymous class responses about values dilemmas and belief scenarios, building real-time data on how perspectives differ across the group and using the visualisations as evidence in their analytical posters mapping beliefs to choices and impacts."},{"t":"Adobe Express (Podcast)","d":"Students produce a podcast episode exploring a real ethical dilemma from the unit — a situation where personal beliefs and values led to a decision that impacted others. They research different perspectives on the dilemma, interview a classmate who holds a different view, and present their own position with reasoning. The podcast format requires students to hold an opinion under scrutiny and explain it clearly, building the communication and ethical reasoning skills at the heart of the unit's central idea that our choices and values can make a positive or harmful difference in the world."}]},{"ca":"Elsternwick","yl":"Year 5","th":"Where We Are in Place and Time","ci":"Colonisation has shaped society.","lo":"The impact of colonisation; Colonisation stories; The effects of colonisation — past, present and future","s":[{"t":"Adobe Express (Website)","d":"Students create a research website examining the impact of colonisation on a specific region, incorporating perspectives from the 'Unsettled' resource (exploring 'How do we read the signs around us?'), Chinese language geography vocabulary, and analysis of how colonisation's effects continue into the present and future."},{"t":"Scratch","d":"Students code an interactive 'Colonisation: Past, Present, Future' timeline in Scratch where clicking on era sprites triggers animated sequences showing the impact on specific communities — incorporating primary and secondary sources from their research and perspectives from the 'Unsettled' exhibition and carved spotted gum investigation."},{"t":"Green Screen + iMovie","d":"Students film first-person historical accounts using green screen with period-appropriate backgrounds, performing as characters from colonisation eras to bring primary sources to life, incorporating the footage into their iMovie documentary alongside research from the carved canoe investigation and Colonisation: Past, Present, Future book."},{"t":"Canva Video","d":"Students produce a documentary exploring colonisation stories, featuring primary sources, the carved spotted gum from bushfire-ravaged Country (from the Australian Museum 'Signal Fires' resource), and multiple perspectives on how colonisation has shaped modern Australian society."},{"t":"Google Earth","d":"Students use Google Earth to map the geographic spread of colonisation studied during the unit — tracing the routes of European colonisers from their home countries to the territories they claimed, dropping pins at key sites of first contact, resistance, and lasting impact. Navigating the true distances and geographic barriers involved reveals the scale of what colonisation meant physically, and the satellite perspective on present-day land use connects historical dispossession to contemporary reality in ways that text descriptions cannot."}]},{"ca":"Elsternwick","yl":"Year 5","th":"How We Express Ourselves","ci":"People can create or manipulate messages to target specific audiences.","lo":"The devices used to target audiences; Critical evaluation of messages; How we know we have been influenced","s":[{"t":"Scratch + Green Screen + GarageBand","d":"Students code an interactive 'Ad Deconstructor' in Scratch where users drag persuasive devices (colour manipulation, emotional music, celebrity endorsement, urgency language) onto an advertisement template and watch in real time how each device changes the message's impact — demonstrating firsthand how media creators manipulate audiences, connecting to their GarageBand jingle composition and green screen ad production."},{"t":"Adobe Express (Video)","d":"Students create a persuasive advertisement targeting a specific audience, demonstrating the media manipulation techniques explored during the unit, and then create a companion 'behind-the-scenes' analysis video explaining the persuasive devices used — connecting to the Lume Museum visit exploring Van Gogh's visual storytelling techniques."},{"t":"Canva Video","d":"Students produce a short film demonstrating how messages can be manipulated to influence audiences, featuring before/after versions of the same content presented differently — connected to the unit's focus on understanding media representations and modes of presentation."},{"t":"Adobe Express (Podcast)","d":"Students produce a media literacy podcast episode critically evaluating a message aimed at their age group, applying the persuasive analysis skills practised through class activities and connecting to the ethical use of media/information focus."},{"t":"Green Screen + iMovie","d":"Students use green screen to produce their persuasive advertisement, demonstrating firsthand how media creators manipulate settings, backgrounds, and visual context to target specific audiences, connecting the production experience to their critical analysis of media manipulation techniques."}]},{"ca":"Elsternwick","yl":"Year 5","th":"How the World Works","ci":"Design processes enable people to respond creatively to challenges in the natural world.","lo":"The nature and impact of natural hazards (Causation); How design processes are used to generate and test solutions (Function); The ethical and practical considerations in human responses to natural challenges (Responsibility)","s":[{"t":"Delightex (CoSpaces)","d":"Students build an interactive 3D disaster response scenario in CoSpaces showing their Operation Earth Action design solution in situ — visitors walk through the Lismore flood environment and interact with the earthquake-resistant structure, experiencing the ethical and practical considerations from multiple stakeholder perspectives explored during the empathic design interviews."},{"t":"Tinkercad","d":"Students design a 3D prototype of an earthquake-resistant structure meeting the design constraints (36cm tall, must hold specific weight), applying the full design thinking cycle introduced through the UNICEF Workshop and iterating based on shake-table testing during Prototyping Week."},{"t":"Adobe Express (Video)","d":"Students produce a persuasive pitch presentation explaining their Operation Earth Action design solution, using the persuasive pitch structure to communicate their process, purpose, and design decisions — connected to the school showcase and pitch presentations culminating activity."},{"t":"Lego Spike","d":"Students build a Lego Spike seismic alert system with sensors that detect vibrations and trigger a motor-driven warning mechanism, connecting engineering design to their earthquake research and the Lismore flood case study about community response to natural hazards."},{"t":"Micro:bit","d":"Students use micro:bit accelerometers and sensors to test their earthquake-resistant structure prototypes during the Week 8 prototyping phase, collecting data on structural movement and stability to evaluate their designs against criteria like usability, empathy, and effectiveness."}]},{"ca":"Elsternwick","yl":"Year 5","th":"How We Organise Ourselves","ci":"Entrepreneurs have a responsibility to develop, market and sell sustainable products and services.","lo":"The power of giving back; How our environment is impacted by the products we create; Sustainable business practices","s":[{"t":"Adobe Express (Website)","d":"Students build a website for their sustainable product business, including product information, sustainability credentials, marketing materials, and data collected about community needs — connecting to the market stall activity where they developed, marketed and sold products."},{"t":"Canva Video","d":"Students produce a professional advertisement for their sustainable product, applying marketing and persuasive techniques while demonstrating responsible entrepreneurship — connecting to Dance & Drama exploration of myth's role in various cultures and storytelling for marketing."},{"t":"Lego Spike + Microsoft Excel","d":"Students build a Lego Spike prototype or automated production line for their sustainable product business, programming motors and sensors to demonstrate how their product could be manufactured responsibly, connecting engineering to their market research data tracked in Microsoft Excel."},{"t":"Canva Presentation","d":"Students design a business pitch presentation for their sustainable product, incorporating market research data (collected and interpreted during Maths connections), sustainability analysis of environmental impact, and a 'giving back' component showing their product's community benefit."},{"t":"Mentimeter","d":"Students use Mentimeter to pitch their sustainable product to the class in a live investor panel format — presenting their key sustainability claim, then facing real-time audience voting on whether they'd invest, whether the environmental claim is credible, and what the product's biggest weakness is. The instant visual feedback from the Mentimeter results creates a genuine accountability moment: students must respond to the data in real time, adjusting their pitch or defending their position, connecting responsible entrepreneurship to honest market feedback."}]},{"ca":"Elsternwick","yl":"Year 5","th":"Sharing the Planet","ci":"Finding peaceful solutions to conflict can make a difference in the world.","lo":"Types of conflict; Causes and impacts of conflict; Conflict resolution","s":[{"t":"Tinkercad","d":"Students design a 3D model in Tinkercad of a 'Peace Hub' — a community space designed to facilitate peaceful conflict resolution, with specific architectural features that reflect the conflict resolution principles they've studied (open sight lines for transparency, separate entry points for de-escalation, shared gathering spaces for dialogue). The design challenge requires students to translate abstract peacebuilding principles into physical form, arguing how their spatial decisions support the unit's inquiry into what makes conflict resolution actually work."},{"t":"Adobe Express (Video)","d":"Students create a conflict resolution documentary exploring a real-world conflict, analysing its causes and impacts, and proposing peaceful solutions — incorporating improvisation skills from Drama (exploring perspective and connection through collaborative creative work)."},{"t":"Scratch","d":"Students code an interactive 'Choose Your Own Adventure' conflict resolution simulation, where users navigate a conflict scenario making decisions that lead to peaceful or escalated outcomes — connecting to the concepts of perspective and connection explored through Drama improvisation."},{"t":"CoDrone EDU","d":"Students investigate how drone technology is used in humanitarian aid and conflict zones (delivering medical supplies, mapping disaster areas), programming CoDrone EDU flight paths to simulate aid delivery routes and debating the ethical considerations, connecting to their research on peaceful solutions to real-world conflicts."},{"t":"Freeform","d":"Students use Freeform to build a collaborative conflict analysis map connecting types of conflict to their causes, impacts and potential peaceful resolutions explored during the unit — plotting how humanitarian drone technology, peacekeeping strategies and community action interconnect."}]},{"ca":"Elsternwick","yl":"Year 6","th":"Who We Are","ci":"Personal changes and influences contribute to our evolving sense of self.","lo":"Physical, social, emotional and intellectual changes that occur throughout life; Influences that shape our identity; Developing a sense of self","s":[{"t":"Scratch","d":"Students code an interactive 'Personal Identity Timeline' in Scratch where visitors click through a character's life stages — childhood, adolescence, adulthood — seeing how physical, social, emotional and intellectual changes interact with cultural influences, relationships and personal choices to shape identity over time. Building the simulation requires students to model the unit's central idea — that personal changes and influences contribute to an evolving sense of self — as a system with real cause-and-effect logic, deepening understanding by encoding it into code."},{"t":"Adobe Express (Video)","d":"Students create a personal documentary exploring how physical, social, emotional and intellectual changes have shaped their identity, incorporating reflections from music IMP instrumental groups about how personal actions affect relationships, and the owl symbol they designed to represent their learning and growth at Wesley."},{"t":"Book Creator","d":"Students create a reflective identity journal documenting their personal growth journey through Year 6, featuring their owl self-portrait design, genre exploration from Literature/Library provocation about selecting texts that are a 'good fit', and analysis of how changes and influences contributed to their evolving sense of self."},{"t":"Freeform","d":"Students use Freeform to create a personal 'Identity Timeline' board — mapping the physical, emotional, social and intellectual changes they've experienced or anticipate, the influences that have shaped their sense of self (family, culture, media, peers), and their current values and aspirations. The board externalises the unit's abstract inquiry into personal identity, making it discussable and revisable as new learning challenges earlier assumptions throughout the unit."},{"t":"Mentimeter","d":"Students use Mentimeter live polling and word clouds to anonymously share perspectives on identity influences, personal changes, and growth milestones, generating class-wide data visualisations that feed into their 'Sense of Self' analytical posters and personal documentary reflections."}]},{"ca":"Elsternwick","yl":"Year 6","th":"Where We Are in Place and Time","ci":"Significant events shape a place","lo":"What is a significant event; Why these events occurred; Impact of significant events","s":[{"t":"⏳ Planner Needed","d":"Planner content not yet uploaded — specific suggestions pending. Please send the UOI planner for this unit to Nathan Benn on Teams to generate tailored technology integration suggestions.","c":"end"}]},{"ca":"Elsternwick","yl":"Year 6","th":"How the World Works","ci":"Energy may be converted, transformed, and used to support human progress.","lo":"Different forms of energy and how they are used; The impact of different energy sources on the planet; Sustainable energy practices","s":[{"t":"Tinkercad + Micro:bit","d":"Students design a 3D model in Tinkercad of their Solar Buddy light incorporating a custom housing that optimises solar energy capture, with labelled components showing how energy converts from solar to electrical to light — presenting their digital design alongside their working Solar Buddy device and micro:bit voltage data to demonstrate energy transformation in both virtual and physical form."},{"t":"Adobe Express (Video)","d":"Students produce a science documentary explaining energy conversion and transformation, incorporating footage of their Solar Buddy light construction, electrical circuit experiments, and the Rube Goldberg machine chain reaction analysis — using the science experiment report writing skills developed during English."},{"t":"Lego Spike","d":"Students build and code a renewable energy model (wind turbine with motor or solar tracker) that demonstrates energy conversion from one form to another, collecting data on output and connecting their findings to the unit's investigation of sustainable energy practices and individual responsibilities for promoting them."},{"t":"CoDrone EDU","d":"Students explore how drones convert battery energy into kinetic energy for flight, programming CoDrone EDU to perform controlled manoeuvres while discussing energy transformation chains (chemical → electrical → kinetic), connecting the hands-on experience to their broader research on how energy supports human progress."},{"t":"Book Creator","d":"Students create an 'Energy Transformation' investigation journal documenting their experiments with electrical circuits, dynamos (connecting William Kamkwamba's bicycle headlight dynamo story to modern generators), and Solar Buddy lights — including procedural writing, labelled diagrams, and evidence-based conclusions about sustainable energy practices."}]},{"ca":"Elsternwick","yl":"Year 6","th":"Sharing the Planet","ci":"Communities interact with the environment in different ways.","lo":"How community values shape the management of the natural environment; The need for sustainable practices; Taking action for environmental stewardship","s":[{"t":"Scratch","d":"Students code an interactive 'Environmental Stewardship Dashboard' in Scratch where visitors click on community action sprites to see animated data visualisations of environmental impact — tracking metrics from their action project (green space percentages, water usage, biodiversity counts) with clickable graphs and progress indicators that demonstrate how community values translate into measurable environmental change."},{"t":"Insta360 Cam","d":"DLP captures 360° footage of local Elsternwick environmental sites — the foreshore, local parks, community gardens and development boundaries — creating immersive reference material students revisit in class. Using the 360° footage as their evidence base, students identify specific examples of how community values shape environmental management: where has the community chosen to protect green space? Where has development won? The immersive footage gives students the observational richness of being on-site without leaving the classroom, and forms the visual backbone of their action project websites."},{"t":"Adobe Express (Website)","d":"Students create an environmental stewardship project website presenting their action project (developed during the 'Finalize and share action projects' culminating activity), featuring their KWL chart journey from provocation images through to their final proposals for promoting environmental responsibility."},{"t":"Canva Video","d":"Students produce a documentary presenting their environmental stewardship project to peers or younger grades (as planned in the unit), incorporating research about how different communities interact with the environment, personal definitions of the central idea recorded at the start, and evidence of their action-taking."},{"t":"Micro:bit","d":"Students prototype an animal movement tracker using the micro:bit's accelerometer and radio features — programming one micro:bit to detect and transmit movement patterns and a second to receive and display them. They simulate conservation scientists tracking how wildlife is affected by habitat loss, then reflect on how this data could inform local environmental management decisions. The project connects directly to the unit's taking-action focus: students propose how real tracking data could be used by their community to protect local species and drive the environmental stewardship they've researched throughout the unit.","ref":[{"label":"micro:bit: Animal Tracker project","url":"https://microbit.org/projects/make-it-code-it/animaltracker"}]}]},{"ca":"St Kilda","yl":"Prep","th":"Who We Are","ci":"To be healthy, people’s basic needs must be met.","lo":"How our brain is growing and changing; How our emotions, behaviours and actions promote relationships; How we care for our bodies","s":[{"t":"GarageBand","d":"Students create a 'Brain Break' audio toolkit in GarageBand — each student records a guided breathing exercise or calm-down strategy over soothing background music (balloon breathing with gentle chimes, wall push with steady drums, calm counting with soft piano). The class compiles them into a playlist that the teacher plays during actual brain breaks, making the students' work a real classroom resource used every day — not just an assignment to be marked."},{"t":"Green Screen","d":"Students perform their 'Healthy Choices' demonstration in front of the green screen — one student is transported inside a kitchen demonstrating healthy food choices, another is placed on a sports field showing active play, another is in a bedroom demonstrating sleep routines. Each performance demonstrates one of the seven Healthy Lifestyle Jigsaw elements in a real-world setting they couldn't physically visit during class."},{"t":"Scratch Jr","d":"Students code a 'Healthy Day' animation in Scratch Jr showing a character's routine from waking up to bedtime — eating brain food at recess (not sometimes foods), choosing active play at lunch, using a Zones of Regulation strategy when feeling frustrated, going to bed on time. The animation demonstrates the connection between daily choices and wellbeing, playing automatically when the green flag is pressed."},{"t":"Indi Robot","d":"Students build a ‘Healthy Choices’ colour-tile path where each colour represents one of the seven healthy lifestyle elements from the Jigsaw (green = exercise, blue = sleep, yellow = healthy food, purple = mind health), programming Indi to follow the path while explaining how each element meets a basic need for staying healthy."},{"t":"Seesaw","d":"Students photograph their brain food recess choices and use drawing tools to sort foods into ‘always’ and ‘sometimes’ categories, recording voice explanations about why some foods fill our batteries and others could make them overflow — building on the Nude Foods vs Processed Foods sorting activity and the Cyber Safety lesson ‘Keeping the Balance’."}]},{"ca":"St Kilda","yl":"Prep","th":"How We Express Ourselves","ci":"People recognise important events through celebrations and traditions.","lo":"The traditions of our families and communities; How and why people celebrate; The similarities and differences between celebrations","s":[{"t":"Canva Video","d":"Students produce a 'Celebrations Around the World' TV show — each group films a segment about a different celebration explored during the unit (Chinese New Year Lion Dancing, Hanukkah, Diwali, Mid-Autumn Festival), dressing in costumes, demonstrating the dances learned in class, and showing the cultural artefacts and food they explored. The segments are compiled into a class TV show with student hosts introducing each celebration."},{"t":"GarageBand","d":"Students create a 'Celebration Sounds' composition in GarageBand that layers music and sounds from different cultural celebrations explored during the unit — drums for Chinese New Year, Simi Yadech rhythms, Mexican Hat Dance beats, Chimes of Dunkirk melody. The composition builds as each culture's sounds are added, demonstrating that celebrations share common elements (music, rhythm, joy) even when they sound different — a musical Venn diagram the class can hear."},{"t":"Scratch Jr","d":"Students code a 'Dance Around the World' interactive animation in Scratch Jr where a character travels to different countries and performs a cultural dance at each stop — moving to the Simi Yadech steps in one scene, the Mexican Hat Dance in another, the Chimes of Dunkirk in a third. Each scene has a different backdrop and the character's movements match the dance, creating a coded world tour of celebrations that plays automatically."},{"t":"Cubetto","d":"Students program Cubetto to visit stations on a ‘Dance Around the World’ floor mat, stopping at each country to explain the cultural dance they learned — Simi Yadech, The Chimes of Dunkirk, Mexican Hat Dance — connecting coding sequences to the dance steps performed and added to their classroom ‘Dance Around the World’ board."},{"t":"Google Maps","d":"Students use Google Maps Street View to virtually visit the locations where celebrations from the unit take place — exploring the streets of China during New Year decorations, finding Diwali lights in an Indian neighbourhood, or spotting NAIDOC banners around Australia. The Street View journey puts students at ground level inside the cultural context of each celebration, building geographic and cultural awareness that supports the unit's inquiry into why celebrations matter to different communities around the world."}]},{"ca":"St Kilda","yl":"Prep","th":"How We Organise Ourselves","ci":"We all have roles and responsibilities in the community","lo":"Roles people play; Responsibilities in the community; How working together helps everyone","s":[{"t":"Canva Video","d":"Students produce a 'Thank You Heroes' video — each student films a short message to a school community member whose role they investigated, explaining what they learned about that person's responsibilities and why their role matters. The teacher compiles the messages into a video that is actually delivered to the staff members, giving the students' work real purpose and demonstrating that understanding roles leads to appreciation and action."},{"t":"Green Screen","d":"Students dress up in costumes representing different community roles (firefighter, librarian, doctor, teacher) and film themselves in front of the green screen placed in the relevant setting — a library, a fire station, a hospital, a classroom. Each student explains their responsibilities and why working together helps everyone, connecting to the Essential Agreement they created and the Firefighters' visit discussion."},{"t":"Scratch Jr","d":"Students code a 'Busy Community' animation in Scratch Jr showing different community helpers performing their roles in sequence — the teacher opens the classroom, the librarian shelves books, the crossing guard stops traffic, the gardener waters plants. When all helpers have performed, the school 'comes alive' with movement everywhere, demonstrating visually that a community only works when everyone plays their part."},{"t":"GarageBand","d":"Students record a 'Community Helpers' audio story in GarageBand — narrating a day in the life of the school from the perspective of a staff member they interviewed (the librarian's morning, the grounds crew's lunchtime routine, the office manager's afternoon). They add sound effects for each setting (books shelving, lawn mowers, phone ringing), creating an audio tour of the school's hidden systems that couldn't exist without layered audio production."},{"t":"Beebots","d":"Students program Beebots to navigate a school map visiting different staff members’ locations (classroom, library, office, playground), explaining each person’s role at every stop — building on the Year 4 buddy discussions about staff roles and the books about starting school (Starting School by Jane Godwin, Possum Goes to School, First Day by Andrew Daddo)."}]},{"ca":"St Kilda","yl":"Prep","th":"Sharing the Planet","ci":"Human actions change the environment.","lo":"How people interact with different environments; The effect people have on the environment; Ways in which people can take action and care for the environment","s":[{"t":"Green Screen","d":"Students film a 'Save Our Oceans' news report using green screen — one reporter is 'underwater' at the Great Barrier Reef (healthy coral backdrop) explaining how the reef looks when it's cared for, then the background switches to bleached coral and the reporter explains what happens when humans don't take action. Students play both the reporters AND the sea creatures (with costumes from their Visual Arts marine animal project), creating a documentary that transports them inside the environment."},{"t":"Scratch Jr","d":"Students code a two-scene 'Before and After' animation in Scratch Jr — Scene 1 shows a healthy environment (animals moving, plants growing, sun shining), Scene 2 shows the same environment after harmful human actions (animals disappearing, plants wilting, rubbish appearing). A third scene shows the student's proposed action to fix it. The animation becomes a digital version of the 'before-and-after' thinking used throughout the unit, but one that moves, sounds and performs itself."},{"t":"iMovie","d":"Students produce a 'Three Sea Creature Facts' video (connecting to their Student Led Conference preparation) but elevated — each student films their presentation with their ceramic/painted marine animal artwork as a prop, the teacher adds underwater footage and sound effects in iMovie, and slow-motion captures of the Prep Tunnel underwater exhibition bring the display to life on screen. The finished video becomes the actual SLC presentation resource parents watch."},{"t":"Indi Robot","d":"Students build an ‘Environment Path’ using colour tiles representing different natural environments (blue = marine, yellow = desert, green = bushland), programming Indi to travel through each environment while explaining the living things found there and one human action that could help or harm it — connecting to the environment provocation bottles (sand/water, leaves/sticks)."},{"t":"Seesaw","d":"Students photograph their collaborative Prep Tunnel underwater exhibition and the ceramic, painted and drawn marine animals they created in Visual Arts, recording voice explanations about each sea creature’s features and why caring for the ocean environment matters — connecting to picture books Commotion in the Ocean and Ella’s Adventures in the Barrier Reef."}]},{"ca":"St Kilda","yl":"Year 1","th":"Who We Are","ci":"We learn about ourselves through the games we play.","lo":"How to identify and manage emotions; How players' choices affect relationships; Our responsibilities when playing games","s":[{"t":"Scratch Jr","d":"Students code a simple game they designed in Scratch Jr — building in the rules, turns and scoring that demonstrate their understanding of fair play and responsibility. When a player breaks a rule, the game shows a consequence on screen (lose a point, go back to start). Comparing different students' games reveals that everyone designed different rules based on what they value — the games ARE reflections of who they are."},{"t":"iMovie","d":"Students produce a 'Team Identity Reveal' video — each group films the unveiling of their sports team identity (mascot, colours, body language signals, scoring system, song) created during PE, presenting why each element was chosen and what it expresses about their team's values. Slow-motion captures of the team performing their song and signals create a cinematic reveal moment that celebrates identity and belonging."},{"t":"GarageBand","d":"Students compose their team song in GarageBand — selecting instruments, tempo and lyrics that express their team's personality and values. The song is performed live alongside the team identity reveal video, creating a multi-tool culmination where the GarageBand composition IS the team's anthem, played at sports carnivals and team events throughout the year."},{"t":"Lego Spike","d":"Students build a Lego Spike 'Team Challenge' device where groups must cooperate to program the motor sequence correctly — if one person changes their part without telling the team, the machine fails, demonstrating how teamwork, communication and agreed rules make groups function effectively."},{"t":"Seesaw","d":"Students photograph their Essential Agreement display and record voice explanations about how the agreed rules help games be fair and fun, connecting to the Kimochi stories about emotions and the Cyber Safety lessons about positive online interactions when playing games."}]},{"ca":"St Kilda","yl":"Year 1","th":"Where We Are in Place and Time","ci":"History and culture connect the past, present and future.","lo":"How technology has changed over time; The purpose and significance of artefacts; How the past connects to the present and future","s":[{"t":"Green Screen","d":"Students film themselves 'time travelling' using the green screen — standing in a 1950s kitchen with a record player, then jumping to a modern bedroom with wireless speakers, then leaping to a futuristic room they designed on paper. At each stop they narrate how technology changed, connecting past to present to their prediction about the future of mobile devices. The impossible journey across three eras — made real only by the green screen — turns the unit's technology timeline into a lived, first-person performance."},{"t":"iMovie","d":"Students produce a 'Then and Now' documentary — filming themselves demonstrating how an old technology artefact from the incursion works (winding up a music box, dialling a rotary phone, loading a cassette) alongside its modern equivalent (playing Spotify, tapping a smartphone, streaming music). Slow-motion and side-by-side editing reveal the transformation, and students narrate the reasons for the change."},{"t":"Canva Video","d":"Students create a short 'Then and Now' video comparing an old technology artefact with its modern equivalent, incorporating the Dance and Drama exploration where they compared dances from different decades and created a timeline of dance that stayed on the classroom wall all term."},{"t":"Seesaw","d":"Students complete the final activity designing a future mobile device with any features they choose, making a sensible prediction based on the technology evolution traced throughout the unit — from rotary phone to mobile phone to Walkman to Discman to iPhone (Steve Jobs announcement video). They sketch the device, label its features, and record a Seesaw voice note explaining their reasoning. The design prediction is the unit's summative thinking task: applying historical pattern recognition to an imagined future."},{"t":"Scratch Jr","d":"Students code an animated timeline in Scratch Jr showing the same technology transforming across generations — a rotary phone ringing, morphing into a mobile phone, changing into a smartphone — with a character pressing each device and triggering a different response. Programming each transformation step by step helps students understand that technology evolves through deliberate human design decisions, not by accident. The act of coding the sequence mirrors the unit's central idea that history connects past, present and future in a chain of cause and effect."}]},{"ca":"St Kilda","yl":"Year 1","th":"How We Express Ourselves","ci":"People express their emotions through the way they communicate.","lo":"Different ways to communicate emotions; How art, music and movement express feelings; Understanding others' expressions through body language and facial cues","s":[{"t":"Canva Video","d":"Students produce a short video showcasing their Emotion Exhibition (where they sculpted partners into emotion poses), adding narration explaining which emotions are being communicated through body language and facial expressions — with their Grow and Glow digital portfolio reflection."},{"t":"Book Creator","d":"Students create an 'Expressing Emotions' portfolio featuring their Frida Kahlo portrait (recreating her nonchalant expression), their Emotion Exhibition photographs (sculpting partners to show emotions through body language and facial expression), and their sports team jumper design showing how colour, patterns and mascots communicate identity."},{"t":"Seesaw","d":"Students complete the 'Thinking Thoughts and Feeling Feelings' assessment task from the We Thinkers! series, demonstrating their ability to recognise social cues and reframe situations to avoid uncomfortable feelings — building on the Kimochi Emotions vocabulary sheet and the Mona Lisa facial expression activity."},{"t":"GarageBand","d":"Students create a soundscape representing different weather-inspired emotions, connecting to the music listening activities where they analysed how composers use tempo, dynamics and instruments to communicate feelings (exploring works and reflecting on what feelings the music evoked)."},{"t":"Padlet","d":"Students contribute to a class 'Emotion Exhibition' Padlet — posting a photo of their Frida Kahlo-inspired self-portrait alongside a voice note explaining which emotion they chose to express, which artistic elements (colour, line, expression) they used to show it, and how the artwork compares to communicating the same emotion through music or movement. The Padlet becomes the digital version of the physical exhibition the unit builds toward, extending the audience beyond the classroom and inviting parents to engage with the students' learning."}]},{"ca":"St Kilda","yl":"Year 1","th":"How the World Works","ci":"Weather affects our lives in different ways.","lo":"Types of weather conditions; How weather impacts our lives (clothing, activities, food, feelings); Why weather changes (seasons, patterns)","s":[{"t":"Canva Video","d":"Students produce a professional weather forecast video — each group reports on a different season (including Kulin Nation seasons), using the daily weather graph data they collected as evidence, displaying their findings on a classroom weather map, and delivering forecasts with dramatic weather footage filmed around the school. The format transforms their data collection into a broadcast that uses scientific vocabulary and Chinese weather characters learned in class."},{"t":"Green Screen","d":"Students perform their frozen tableaux representing seasonal activities in front of the green screen — placed in weather-appropriate environments (a snowfield for winter activities, a beach for summer, an autumn forest, a rainy day). Each group narrates how the weather affects clothing, food, activities and feelings in that season, creating an immersive seasonal experience that brings the tableau performance to life in ways costumes alone couldn't achieve."},{"t":"Scratch Jr","d":"Students code a 'Weather Wardrobe' game in Scratch Jr — a character wakes up and checks the weather (sun, rain, snow, wind), then the player must drag the right clothing and accessories onto the character before they go outside. Wrong choices lead to animated consequences (shivering in rain without a coat, sweating in snow gear on a sunny day), teaching weather-life connections through an interactive game the student coded themselves."},{"t":"Micro:bit","d":"Students use micro:bit temperature and light sensors to collect daily weather data, building on the daily weather graph activity and connecting digital data collection to the Bureau of Meteorology research they conducted on iPads."},{"t":"Seesaw","d":"Students use Seesaw to document their season observation journals over the term — photographing and annotating evidence of each season as it changes (bare trees, blossoms, leaf colours, rain vs sunshine), building a longitudinal record that spans the whole unit. The final entry compares all four seasons: students record a voice explanation identifying which weather patterns they observed, how each season affected what they wore and did, and what they predict will come next. The portfolio becomes the unit's summative evidence of sustained scientific observation."}]},{"ca":"St Kilda","yl":"Year 1","th":"How We Organise Ourselves","ci":"Systems are involved in preparing products for consumers.","lo":"Where products come from; The systems products go through; How people choose their products","s":[{"t":"iMovie","d":"Students produce a 'From Farm to Fork' documentary using stop-motion animation — filming the transformation of a raw material into a finished product using real food items and toy props (a toy cow, flour, bread dough, a finished sandwich). Each step of the system is captured frame by frame, creating a visual production line that shows the entire journey from raw material to consumer product."},{"t":"Scratch Jr","d":"Students code a 'Product Journey' animation in Scratch Jr showing the system a product goes through — from farm to factory to truck to shop to home. Characters and backdrops change at each stage, the product transforms (wheat becomes flour becomes bread), and the student narrates the sequencing vocabulary (consume, process, transportation, storage) built throughout the unit. The system plays automatically, demonstrating the whole chain."},{"t":"Green Screen","d":"Students film themselves as 'product reporters' transported via green screen to each stage of a product's journey — standing in a wheat field, inside a factory, on a delivery truck, at a supermarket shelf. They explain what happens at each stage using the vocabulary built throughout the unit, creating a news-style report that takes the audience on a journey through places they couldn't physically visit in one lesson."},{"t":"Google Earth","d":"Students use Google Earth to follow the journey of a t-shirt — zooming from a cotton farm in Queensland to a factory in China to a shop on Chapel Street. At each stop they screenshot the location and the teacher asks: 'What happens to the product here?' — building geographic understanding of the system that connects raw materials to the clothes they're wearing, before the class reads clothing labels to discover where their own clothes come from."},{"t":"Seesaw","d":"Students photograph clothing labels to identify where products come from and the materials they're made of, recording voice explanations about the travel involved in production and distribution — connecting to the George the Farmer cotton video and the Clickview 'War on Waste' and 'Farm to Table' series."}]},{"ca":"St Kilda","yl":"Year 1","th":"Sharing the Planet","ci":"Living things have structures that allow them to survive in different environments.","lo":"The physical structure of plants and bees; How features support survival in different environments; Human impact on living things","s":[{"t":"iMovie","d":"Students produce a 'Garden Investigators' documentary — filming close-up footage of the broad bean experiment at each growth stage (comparing beans grown in light, dark and varied water), the bee sculptures alongside their scientific mirror-image drawings, and the plants observed at the Royal Botanic Gardens. Slow-motion captures pollination in the school garden, and student narrators explain how structural features enable survival."},{"t":"Green Screen","d":"Students film themselves 'shrunk to the size of a bee' using green screen — transported inside a giant flower where they can see pollen up close, then flying through the school garden at bee-level. They report on what a bee's day looks like, explaining pollination, the roles bees play within their community, and why flowers and plants support a healthy planet — an impossible perspective made possible by the tech."},{"t":"Scratch Jr","d":"Students code a 'Bee's Journey' animation in Scratch Jr showing a bee visiting three flowers, collecting pollen at each stop, then returning to the hive. The animation demonstrates pollination as a system — without the bee's journey, the flowers can't reproduce. Each scene shows the bee interacting with a different plant, connecting the coded sequence to the real pollination process observed during the unit's garden investigations."},{"t":"Micro:bit","d":"Students use micro:bit light and moisture sensors to measure conditions in different parts of the school garden — comparing sunny spots with shady spots, dry soil with damp soil. They record readings on a class chart and connect the data to where they found the most living things, discovering that plants and insects thrive in specific conditions — science data collection that couldn't happen without the sensors."},{"t":"Book Creator","d":"Students create a 'Bee Scientist' page in Book Creator featuring a photo of their clay bee sculpture alongside their scientific mirror-image drawing, with labels identifying the body parts (3 sections, 6 legs, wings, antennae) and a voice recording explaining the roles bees play within their community — building the observation and documentation skills practised throughout the unit."}]},{"ca":"St Kilda","yl":"Year 2","th":"Who We Are","ci":"The way we interact with others is influenced by who we are","lo":"Personal identity and strengths; How self-regulation supports learning; Building resilience through knowledge of ourselves","s":[{"t":"Scratch Jr","d":"Students code an interactive 'Calm Palm Toolkit' in Scratch Jr where tapping different strategy sprites (deep breathing, counting, walking away, talking to someone) triggers animated demonstrations of each self-regulation technique from their Calm Palm template — creating a digital wellbeing resource they can share with younger students."},{"t":"Canva Video","d":"Students produce an Canva Video 'Letter to my Year 3 Teacher' video combining their All About Me Selfie, self-portrait, Frames of Strength reflections and Mind Monsters drawings with narration about who they are, their strengths, and how UR STRONG Friendship Fires and Growth Mindset lessons built their resilience — a personalised documentary impossible without film production tools."},{"t":"GarageBand","d":"Students compose a personal 'Strengths Soundtrack' in GarageBand where each instrument layer represents a different strength from their Frames of Strength activity — combining the tracks into a composition that expresses their identity through sound, then presenting why they chose each instrument to represent each strength and how the Essential Agreement connects them."},{"t":"Book Creator","d":"Students create a 'Strengths and Strategies' page in Book Creator — drawing a self-portrait, writing three personal strengths they've identified through the unit's activities (the All About Me Self-Portrait, the BOB strategy exploration, the Calm Palm toolkit), and recording a voice note explaining which self-regulation strategy they found most useful and why. The multimodal self-portrait becomes a reflective artefact capturing who the student is at this point in their learning, directly connecting to the unit's central idea that how we interact with others is influenced by who we are."},{"t":"Seesaw","d":"Students photograph their Calm Palm template and Mind Monsters drawings, recording voice explanations about which strategies help them self-regulate in different situations — building their 'ready to learn' toolkit throughout the year."}]},{"ca":"St Kilda","yl":"Year 2","th":"Where We Are in Place and Time","ci":"Journeys can lead to challenges and new understandings.","lo":"Types of journeys (physical, learning, cultural); Challenges encountered on journeys; New understandings gained through journeys","s":[{"t":"Canva Video","d":"Students produce an Canva Video 'Family Journey Documentary' combining their home learning interview footage (using WWWWH question syntax), family photos, the wave template showing challenges, opportunities and growth, and connections to picture storybooks like 'I Am Sangoel' and 'The Snail and the Whale' — narrating their family's significant journey with titles, transitions and a soundtrack."},{"t":"Green Screen","d":"Students film a green screen broadcast where they 'travel' to the locations from their family's journey story, reporting from each place about the challenges encountered and growth that resulted — transporting themselves into the settings of picture storybooks (Little Chelone's ocean, Sangoel's Sudan) to make physical, learning and cultural journeys visible."},{"t":"Scratch Jr","d":"Students code an animated journey map in Scratch Jr where a character sprite travels between location backdrops from the picture storybooks explored in the unit (The Snail & the Whale, Little Chelone, I Am Sangoel, Alfred's War), with recorded voice narrating what challenges and growth happened at each stop — connecting CSPACE summary skills to interactive storytelling."},{"t":"Google Earth","d":"Students explore the actual locations from the picture storybooks using Google Earth — sailing the Atlantic from The Snail and the Whale, locating Sudan from I Am Sangoel, tracing the Pacific from Little Chelone, finding Australia from Alfred's War. Navigating between locations on the satellite globe helps students visualise the true scale of physical journeys and understand why migration challenges are real and significant. The geographic grounding builds empathy before students research their own family's significant journey."},{"t":"Seesaw","d":"Students complete the Challenges, Opportunities and Growth reflection comparing their own learning journey through the unit to the family journey they researched, using the wave template format to show how journeys are not always smooth."}]},{"ca":"St Kilda","yl":"Year 2","th":"How We Express Ourselves","ci":"Artefacts provide a window into the beliefs and values of cultures.","lo":"Beliefs and values contribute to a culture; The importance of rituals and traditions; How artefacts capture history and cultural expression","s":[{"t":"Scratch","d":"Students code an interactive 'Cultural Artefact Museum' in Scratch where clicking on artefact sprites triggers animations, recorded voice explanations from their SPO and WWWWH research, and cultural music samples from the Amanecer Andino Bolivian instruments exploration — visitors navigate between museum rooms to discover how artefacts provide windows into the beliefs and values of different cultures, connecting to Kaylea Fern's cultural artefact visit."},{"t":"Canva Video","d":"Students produce a short cultural documentary featuring their celebration dance (created during Dance expert groups where they researched cultural dances and shared findings with the class), connecting to the 'Why Do People Dance?' YouTube quiz provocation and the exploration of Bolivian music Amanecer Andino."},{"t":"Lego Spike","d":"Students build a Lego Spike 'Artefact Display Turntable' that rotates their physical cultural artefact while the distance sensor detects when a visitor approaches and triggers the motor — presenting their Save the Last Word thinking routine responses alongside the automated display, connecting the Affirmation Beads values activity to an engineering showcase of how technology can preserve and present cultural stories."},{"t":"GarageBand","d":"Students create a musical response inspired by the cultural music exploration (Amanecer Andino Bolivian instruments, Shenanigans Bush Dances, Bunjil Our Creator), comparing instrument choices and rhythms from different cultures to express cultural stories and traditions."},{"t":"Padlet","d":"Students contribute a post to a class 'Artefact Speaks' Padlet — recording a voice note in the voice of one cultural artefact they researched (a didgeridoo, a Māori tā moko, a Chinese jade piece, a Greek amphora), explaining its cultural significance and what beliefs it reveals about the community that created it. Listening to the full Padlet, the class builds a shared understanding of how artefacts from different cultures provide windows into values and beliefs — directly constructing the evidence base for the unit's central idea."}]},{"ca":"St Kilda","yl":"Year 2","th":"How the World Works","ci":"People and the planet are reliant on different energy sources.","lo":"Energy types (electricity, fossil fuels, solar); Energy helps us in daily life; Energy transformation; Responsibility to conserve energy and find sustainable sources","s":[{"t":"Scratch","d":"Students code an interactive 'Energy Sources Explorer' in Scratch where clicking on energy source sprites (solar panel, wind turbine, coal plant, battery) triggers animated demonstrations of how each transforms energy, with a dashboard showing sustainability ratings — connecting the bouncing ball, light switch, candle and paper airplane provocation to an interactive simulation visitors can explore and compare."},{"t":"Lego Spike","d":"Students build a Lego Spike motorised circuit demonstration where the motor powers a fan, light or buzzer through a programmable sequence — deliberately breaking the circuit to show what happens when energy flow stops, then presenting their working model alongside their gist statements using the BUT conjunction about fossil fuels vs sustainable energy."},{"t":"Green Screen","d":"Students film a green screen 'Energy Debate Show' where two teams transport themselves to fossil fuel and renewable energy locations, presenting both sides of the Tug of War provocation ('We need fossil fuels to power our lives') — incorporating their pros and cons reflections and delivering their final gist statement positions as broadcast debaters."},{"t":"Micro:bit","d":"Students use micro:bit light sensors to collect data comparing solar energy levels at different times of day, connecting to the solar energy writing exemplar ('Explain how solar energy works and why it is important') and the unit's investigation into sustainable energy alternatives."},{"t":"Seesaw","d":"Students photograph each step of their circuit building experiment and use drawing tools to label the energy source, wires, switch and bulb, building scientific vocabulary about energy transfer within a closed circuit."}]},{"ca":"St Kilda","yl":"Year 2","th":"How We Organise Ourselves","ci":"Technology can influence the way ecosystems can survive.","lo":"An ecosystem has animals, plants and microorganisms; Technology can cause ecosystems to adapt and evolve; Technology can help or hinder ecosystems","s":[{"t":"Scratch","d":"Students code an interactive ecosystem simulation in Scratch where players add or remove technology (satellites, robots, screens, farming equipment) and watch animated consequences on the animals, plants and microorganisms — connecting to The Wild Robot class novel where different character perspectives revealed technology's complex ethical impacts, and building on the 'Should robots replace teachers?' writing task."},{"t":"iMovie","d":"Students produce an iMovie 'Technology on Trial' documentary presenting evidence for and against technology's impact on ecosystems, incorporating footage of their Robot Fact File research, the Screens & Satellites investigation (evolution of TV, before and after the internet), and their developing arguments — using split-screen to show ecosystems with and without technological intervention."},{"t":"Micro:bit","d":"Students build a micro:bit 'Ecosystem Monitor' that uses the light and temperature sensors to track environmental conditions in the school garden, displaying a happy plant icon when conditions are good and a warning when they're not — presenting their working device as evidence of how technology can help ecosystems survive, connecting to their summative persuasive writing about ethical dilemmas."},{"t":"Seesaw","d":"Students create a comic strip in Seesaw (building on the Evolution of TV comic strip activity) showing Before Technology vs After Technology in an ecosystem, using the T-chart and Because/But/So sentence structures practised during the Screens & Satellites investigation."},{"t":"Google Earth","d":"Students use Google Earth satellite view to explore visible ecosystems from above — coral reefs, rainforests, farms, urban parks — taking screenshots and recording what animals, plants and human-made technology they can spot interacting in each system, building curiosity about how technology can help or hinder ecosystems."}]},{"ca":"St Kilda","yl":"Year 2","th":"Sharing the Planet","ci":"To sustain life, people and environments depend on one another.","lo":"Interdependence of people and environments; How people's wants and needs affect the land; Responsibility to use sustainable resources; Connection between fossil fuels and environmental impact","s":[{"t":"Beebots","d":"Students program Beebots to travel a floor map showing the journey from fossil fuel extraction to environmental impact — stopping at each stage (mine/drill, transport, factory, atmosphere, ecosystem) to discuss what happens there and who is affected. The programmed route makes the chain of cause and effect physical and sequential: students must plan every step before the Beebot moves, building a concrete understanding of how human energy choices travel through systems to affect the natural environments and communities that people depend on."},{"t":"Scratch","d":"Students code an interactive 'Sustainable Planet' simulation in Scratch where players manage resources by choosing between fossil fuel and renewable energy options — each choice visibly affects the environment sprite (green and healthy vs brown and damaged), connecting their informational writing on fossil fuels to evidence about how Indigenous people look after the land sustainably."},{"t":"Green Screen","d":"Students film a green screen 'Planet News' broadcast transporting themselves to environments explored during the unit (coral reefs, forests, solar farms, drought-affected areas), delivering informational segments about sustainable vs finite resources — demonstrating vocabulary built across both HTWW and STP units while connecting to their inquiry about whether everyday devices could be charged by the sun."},{"t":"GarageBand","d":"Students create a 'Sounds of the Seasons' composition connecting the Star Wars and Star Trek film music rhythm pattern activities to their Chinese language learning about seasons, exploring how music communicates ideas about nature and the planet across cultures."},{"t":"Google Earth","d":"Students use Google Earth to explore environments connected to energy and sustainability — navigating to coal mines in the Hunter Valley, offshore wind farms in Denmark, solar arrays in the Mojave Desert, and areas of deforestation in Brazil. They compare satellite imagery of energy landscapes under different management regimes, gathering visual evidence for the unit's inquiry into how people's choices about resources affect the environments and communities that depend on them. The aerial perspective makes the abstract concept of interdependence concrete and visible."}]},{"ca":"St Kilda","yl":"Year 3","th":"Who We Are","ci":"Health and wellbeing are impacted by the choices we make","lo":"How our body systems connect and function; How our choices affect physical, emotional and mental wellbeing; Strategies to measure and maintain the health of the human body","s":[{"t":"Delightex (CoSpaces)","d":"Students build an interactive 3D 'Body Systems Explorer' in CoSpaces where visitors walk through a virtual human body, clicking on organs within their chosen body system (digestive, respiratory, circulatory, muscular, skeletal) to trigger explanations and animations showing how the system functions — presenting their virtual tour at a class health expo."},{"t":"Micro:bit","d":"Students build a micro:bit 'Fitness Dashboard' that uses the accelerometer to track physical activity and displays real-time data on the LED screen, programming custom icons for different fitness components — presenting their device alongside their PE fitness testing results to demonstrate how choices about exercise affect health and wellbeing."},{"t":"Adobe Express Podcasting","d":"Students produce a ‘Healthy Choices’ podcast episode discussing how choices affect physical and mental wellbeing, drawing on their PE fitness goal-setting (Term 1 baseline vs Term 4 retest to measure improvement), the Yoga Spin Game and Yoga Dice activities, and the Dance and Drama connection between movement and mental health — referencing the warm-up and cool-down routines students created and ran for the class."},{"t":"Kahoot","d":"Students collaboratively create a Kahoot quiz testing their peers on body systems knowledge — writing questions based on their chosen system research (digestive, respiratory, circulatory, muscular, skeletal) and connecting to PE fitness testing results and the components of fitness explored during the unit."},{"t":"Freeform","d":"Students use Freeform to build a class 'Body Systems Connection Map' — each group adding their assigned body system (digestive, circulatory, respiratory, nervous) and then drawing connections to every other system it interacts with. The completed board reveals that no system works in isolation: every choice students make (food, exercise, sleep, stress) ripples across multiple systems simultaneously. The map becomes the visual backbone for the unit's argument that health and wellbeing are interconnected, not separate."}]},{"ca":"St Kilda","yl":"Year 3","th":"Where We Are in Place and Time","ci":"Many factors shape the development of cities.","lo":"The essential features of a city; The function of a city; The development of cities through time","s":[{"t":"Delightex (CoSpaces)","d":"Students build a 3D virtual version of the class city they collaboratively created, coding interactive elements showing where buildings were strategically placed (hospital, school, green spaces) and incorporating natural disaster-resistant features learned from the STP unit — with labels in Chinese for city facilities and transport as explored in the Chinese Travel Project."},{"t":"GarageBand","d":"Students create a city soundscape inspired by Mussorgsky’s ‘Pictures at an Exhibition’, selecting instruments to represent different parts of their class city (traffic, markets, parks, construction) and connecting to the music listening activities where they described how composers are inspired by their surroundings to create works representing city scenes."},{"t":"Canva Presentation","d":"Students design a city comparison presentation featuring their Venn Diagram analysis of Mexico City vs Paris, research from the Mega Cities YouTube videos about Tokyo and New York, and insights from Mr Rory Hyde’s incursion (architect and University of Melbourne lecturer) about urban planning in Shepparton and flood-prone design — explaining how demographic, density and social factors shape city development."},{"t":"Book Creator","d":"Students create a ‘Cities of the World’ comic/graphic book using research from their partner-drafted comic pages about different world cities, including the sounds they recorded as QR codes to bring the city alive, and the clay house designs they built in Visual Art showing structural features like brick, weatherboard and colourbond textures."},{"t":"Google Maps","d":"Students use Google Earth to explore the cities they researched during the unit — Tokyo, New York, Paris, Mexico City — navigating from satellite view down to street level to identify essential features: transport hubs, civic buildings, parks, commercial districts, and residential areas. They compare the spatial organisation of different cities, identifying similarities that reveal universal urban functions and differences that reflect local culture and history. The virtual exploration grounds the unit's inquiry into what makes a city, what functions it serves, and how cities develop over time."}]},{"ca":"St Kilda","yl":"Year 3","th":"How We Express Ourselves","ci":"Methods of communication have different features which impact their effectiveness","lo":"The forms of verbal, non-verbal and visual communication; How the correct form enhances the effectiveness of a message; How people interpret messages and bring their own meaning to interactions","s":[{"t":"Scratch + GarageBand","d":"Students code an interactive 'Communication Through Time' game in Scratch where players must decode messages sent using different methods (smoke signals, morse code, telephone, text, emoji) — each level introduces a new form of communication and players discover how the correct form enhances the effectiveness of a message, connecting to their GarageBand dynamics exploration."},{"t":"Canva Video","d":"Students produce their silent movie (planned, rehearsed and filmed with their group — choosing location, characters and costumes), demonstrating how non-verbal c
