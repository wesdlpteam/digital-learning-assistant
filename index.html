erspectives exist before the inquiry deepens.", "c": "beginning"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of the recognisable features of safe and healthy interactions (form) • the connections between emotions, behaviour, learning, interactions and goals (connection) • the tools and skills to stay safe online and in person (safety) • the active role we play in achieving and maintaining our wellbeing (wellbeing) • the strategies to achieve and maintain positive relationships (relationships) and building on each other's thinking through comments and questions.", "c": "middle"}, {"t": "Freeform", "d": "Students use Freeform to create a collaborative concept map exploring connections between the recognisable features of safe and healthy interactions (form) • the connections between emotions, behaviour, learning, interactions and goals (connection) • the tools and skills to stay safe online and in person (safety) • the active role we play in achieving and maintaining our wellbeing (wellbeing) • the strategies to achieve and maintain positive relationships (relationships) and the recognisable features of safe and healthy interactions (form) • the connections between emotions, behaviour, learning, interactions and goals (connection) • the tools and skills to stay safe online and in person (safety) • the active role we play in achieving and maintaining our wellbeing (wellbeing) • the strategies to achieve and maintain positive relationships (relationships) — using sticky notes for ideas, drawings for personal connections, and arrows to show how concepts link together, making their thinking visible to the whole group.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 6", "th": "Where We Are in Place and Time", "ci": "Human migration is a response to challenges, risks and opportunities.", "lo": "The causes for and consequences of migration (Causation) • The changes in societies as a result of migration (Change) • The impact of migration on the individual, both positive and negative (Impact) • Migration results in a more diverse society (Diversity)", "s": [{"t": "Seesaw", "d": "Students document their ongoing learning through the push and pull factors task, KWL chart about refugees and migrants, notes from guest speakers Kathryn Hand and Alicia Meine sharing their personal migration stories, and reflections on the BTN Refugees and Migrants special, building toward their final Micro Lab presentation and conceptual post-assessment.", "c": "beginning"}, {"t": "Google Earth", "d": "Students use Google Earth to explore locations connected to the causes for and consequences of migration (causation) • the changes in societies as a result of migration (change) • the impact of migration on the individual, both positive and negative (impact) • migration results in a more diverse society (diversity), dropping pins and adding labels describing what they observe — building a visual map of existing knowledge before the class investigation begins.", "c": "beginning"}, {"t": "Canva", "d": "Students create a 'What I Think I Know' timeline or mind map about the causes for and consequences of migration (causation) • the changes in societies as a result of migration (change) • the impact of migration on the individual, both positive and negative (impact) • migration results in a more diverse society (diversity) in Canva, visually organising their existing knowledge and marking questions with a '?' — establishing a baseline the class can test through research.", "c": "beginning"}, {"t": "Google Earth", "d": "Students trace migration routes on interactive maps during the Boy Overboard geography research task, plotting the seven continents and journeys of Hamid, Ahn Do, Cuc Lam, and their own interviewee, annotating each route with push and pull factors and key historical migration events studied through the Australian Immigration History timeline.", "c": "middle"}, {"t": "Pico VR", "d": "Students use Pico VR to virtually visit countries and regions connected to the migration stories studied during the unit — the settings of Hamid's Story, Ahn Do's journey from Vietnam, and the homelands of their interview subjects — building empathy and geographic understanding before completing their This is Your Life Micro Lab presentations.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the causes for and consequences of migration (causation) • the changes in societies as a result of migration (change) • the impact of migration on the individual, both positive and negative (impact) • migration results in a more diverse society (diversity), building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Scratch", "d": "Students code an interactive 'Migration Stories' experience in Scratch where visitors click on character sprites representing the migrants and refugees they interviewed to hear recorded excerpts from the 'This is Your Life' biography, with animated push and pull factor diagrams and journey maps — creating a digital exhibition that brings human migration stories to life through interactivity.", "c": "end"}, {"t": "Canva Video", "d": "Students produce their Micro Lab migration story presentation as a video, combining their interview recording with visual elements including migration route maps, the push and pull factors graphic organiser, and connections drawn to Cuc Lam's Story, the Australian Immigration History infographic, and historical events such as the Gold Rush, World Wars, and government initiatives like the Ten Pound Pom and Snowy River schemes.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design their 'This is Your Life' migration presentation for the Micro Lab format, incorporating interview responses sorted into concept headings (Causation, Change, Impact, Diversity), the Define-Connect-Extend thinking routine from the tuning-in phase, and comparative analysis of similarities and differences identified when watching the Fariba and Fatima refugee video.", "c": "end"}, {"t": "CoDrone EDU", "d": "Students code a CoDrone EDU to navigate a floor map tracing the flight path from their researched country to Melbourne, calculating distance and direction — connecting geography, coding and spatial reasoning in a hands-on culminating task.", "c": "end"}]}, {"ca": "St Kilda", "yl": "Year 6", "th": "How We Express Ourselves", "ci": "Understanding global issues and using effective communication empowers us to raise awareness and inspire action.", "lo": "Global issues are caused by interconnected factors that require collective solutions (Causation) • Presentations in the media can reflect the perspective of the author rather than the truth (Perspective) • We must make responsible choices when responding to and creating media (Responsibility) • Messages can be expressed through a range of mediums and elements can be adjusted to enhance effectiveness (Communication) • Design choices contribute to the effectiveness of a message (Influence)", "s": [{"t": "Seesaw", "d": "Students maintain their Exhibition journal throughout the inquiry cycle, uploading Root Cause Analysis work, vision statements, central idea and lines of inquiry drafts, Compass Sustainability brainstorms, sorting-out slides colour-coded by line of inquiry (yellow, blue, green), bibliography entries, and fortnightly self and peer reflections assessed against their group Essential Agreement.", "c": "beginning"}, {"t": "Canva", "d": "Students create a quick visual poster in Canva responding to the provocation: 'How do you global issues are caused by interconnected factors that require collective solutions (causation) • presentations in the media can reflect the perspective of the author rather than the truth (perspective) • we must make responsible choices when responding to and creating media (responsibility) • messages can be expressed through a range of mediums and elements can be adjusted to enhance effectiveness (communication) • design choices contribute to the effectiveness of a message (influence)?' — using images, icons and text to express their current understanding before the inquiry deepens.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page experimenting with different ways to express global issues are caused by interconnected factors that require collective solutions (causation) • presentations in the media can reflect the perspective of the author rather than the truth (perspective) • we must make responsible choices when responding to and creating media (responsibility) • messages can be expressed through a range of mediums and elements can be adjusted to enhance effectiveness (communication) • design choices contribute to the effectiveness of a message (influence) — through images, text, drawing and recorded voice — reflecting on which medium communicates their idea most effectively.", "c": "beginning"}, {"t": "Delightex (CoSpaces)", "d": "Students build interactive 3D Exhibition displays in CoSpaces during the DLP upskilling sessions, creating virtual environments that present their global issue research and action plans using Canva AI vibe coding to generate interactive quizzes, games, or matching exercises that engage the Exhibition audience alongside their live performance component.", "c": "middle"}, {"t": "GarageBand", "d": "Students compose original backing tracks and sound effects in GarageBand for their Exhibition live performance scripts, selecting instruments and layering audio to match the tone of their campaign message, then transferring the music to their iMovie Green Screen films as practised during the production phase.", "c": "middle"}, {"t": "Insta360 Cam", "d": "DLC captures 360° footage of the PYP Exhibition displays and live performances using the Insta360 camera, creating an immersive virtual gallery that preserves each group's keynote presentation, logo, campaign materials, and Green Screen film for families and the school community to revisit after Exhibition day.", "c": "middle"}, {"t": "Padlet", "d": "Students contribute to a shared Padlet Map by pinning locations connected to global issues are caused by interconnected factors that require collective solutions (causation) • presentations in the media can reflect the perspective of the author rather than the truth (perspective) • we must make responsible choices when responding to and creating media (responsibility) • messages can be expressed through a range of mediums and elements can be adjusted to enhance effectiveness (communication) • design choices contribute to the effectiveness of a message (influence), adding images, research findings and questions — building a collaborative geographic resource the class can explore together.", "c": "middle"}, {"t": "Green Screen + iMovie", "d": "Students produce their PYP Exhibition media campaign film using green screen technology, combining scripted live performances with researched content about their chosen global issue, incorporating iMovie transitions and music transfers learned during production, and presenting alongside their keynote display on Exhibition sharing day.", "c": "end"}, {"t": "Canva", "d": "Students design their Exhibition campaign materials including a group logo informed by Visual Arts lessons on colour, line, and emphasis in effective logo design, persuasive posters featuring their campaign name and slogan, and a presentation summarising their Root Cause Analysis findings, Compass Sustainability Model connections, and Lotus diagram research organised by their student-created lines of inquiry.", "c": "end"}, {"t": "Adobe Express Podcasting", "d": "Students produce an Exhibition podcast episode investigating their chosen global issue, structured using the MISO research method, incorporating bibliography sources curated with Katherine from the library, and drawing on insights from guest speaker Ben Lilley's media campaign expertise and the DLP-led upskilling sessions on podcast audio editing.", "c": "end"}]}, {"ca": "St Kilda", "yl": "Year 6", "th": "How the World Works", "ci": "The relationships between the Earth, Moon and Sun create predictable patterns that shape life on our planet and are understood through both scientific and cultural perspectives.", "lo": "The movement of the Earth, Moon and Sun causes predictable patterns such as day/night, moon phases, tides and seasons (Causation) • Different cultures, including Indigenous knowledge systems, interpret the night sky in unique and meaningful ways (Perspective) • The Earth, Moon and Sun have specific structures, positions and relationships that can be represented through models and simulations (Form)", "s": [{"t": "Seesaw", "d": "Students record their See-Think-Wonder responses to the Earth from Space time-lapse provocation video, upload mind maps connecting key vocabulary (orbit, rotation, phase, tide), share annotated diagrams from the day/night rotation and moon phase modelling lessons, and reflect on cultural perspectives explored through the First Inventors Indigenous astronomy stories.", "c": "beginning"}, {"t": "Lego Spike", "d": "Students build a motorised Lego Spike orrery demonstrating how Earth's rotation causes day and night and how the Moon orbits Earth to produce the phases they recorded in their Moon Diary, programming the motor speeds to show relative orbital periods and presenting their working model during the Lesson 8 gallery walk showcase.", "c": "beginning"}, {"t": "Micro:bit", "d": "Students program micro:bit light sensors to collect data on light intensity changes during the globe and flashlight day/night simulation, graphing the results to demonstrate how Earth's rotation creates predictable patterns of light, and comparing their sensor data with the sunrise/sunset tracking activity.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore how Earth's axial tilt affects seasons in different hemispheres, compare Indigenous seasonal calendars with European climate descriptions studied during the BTN Indigenous Seasons lesson, and investigate tidal patterns at coastal locations connected to the BBC Bitesize tides animation, building geographic context for their space science inquiry.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the movement of the earth, moon and sun causes predictable patterns such as day/night, moon phases, tides and seasons (causation) • different cultures, including indigenous knowledge systems, interpret the night sky in unique and meaningful ways (perspective) • the earth, moon and sun have specific structures, positions and relationships that can be represented through models and simulations (form), building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of the movement of the earth, moon and sun causes predictable patterns such as day/night, moon phases, tides and seasons (causation) • different cultures, including indigenous knowledge systems, interpret the night sky in unique and meaningful ways (perspective) • the earth, moon and sun have specific structures, positions and relationships that can be represented through models and simulations (form) and building on each other's thinking through comments and questions.", "c": "middle"}, {"t": "Adobe Express Podcasting", "d": "Students produce a space science podcast selecting a topic from the free-choice board to research and investigate, modelling their episode on podcast features identified during the listening phase, covering concepts such as Earth's rotation causing day and night, the tilted axis creating seasons, Moon phases from their two-week Moon Diary, or Indigenous astronomy stories explored through the First Inventors resources.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive space simulation in Scratch modelling how Earth's rotation causes day and night, how the tilted axis creates seasons across hemispheres, or how the Moon's orbit produces the sequence of phases tracked in their Moon Diary, building on the hands-on globe and flashlight experiments and Oreo cookie modelling completed during class lessons.", "c": "end"}, {"t": "Tinkercad", "d": "Students design a 3D model in Tinkercad of their Moon phase tracking device incorporating a rotating display mechanism, with labelled sections showing each lunar phase from their Moon Diary observations — presenting their digital design alongside their micro:bit light sensor data and Lego Spike orrery to demonstrate how Earth, Moon and Sun relationships create predictable patterns.", "c": "end"}, {"t": "Pico VR", "d": "Students use Pico VR to explore immersive solar system environments, experiencing Earth's rotation, Moon phases tracked in their Moon Diary, and the scale of the Sun-Earth-Moon system up close, extending the hands-on globe and flashlight simulation into a 360° experience and connecting to the cultural astronomy perspectives from the First Inventors resources.", "c": "end"}]}, {"ca": "St Kilda", "yl": "Year 6", "th": "How We Organise Ourselves", "ci": "The way a country is governed impacts the lives of citizens.", "lo": "The key institutions and functions of Australia's democratic system of government (Function) • How government decisions impact citizens at federal, state and local levels (Causation) • The rights and responsibilities of Australian citizens and their obligations as global citizens (Equality/Citizenship)", "s": [{"t": "Microsoft Forms", "d": "Students design and conduct a class referendum on a current issue using the Australian Electoral Commission resources explored during the unit, collecting and analysing peer votes to understand how democratic processes function, connecting to the Quick Think brainstorm about who makes the rules and the Federation map activity tracing how Australia's capital was chosen.", "c": "beginning"}, {"t": "Seesaw", "d": "Students document their initial understanding of Australia's democratic system by photographing and annotating the Australian Electoral Commission resources explored during the unit launch, recording voice reflections about what they already know about how government decisions impact citizens at federal, state and local levels.", "c": "beginning"}, {"t": "Canva", "d": "Students map out their current understanding of the key institutions and functions of australia's democratic system of government (function) • how government decisions impact citizens at federal, state and local levels (causation) • the rights and responsibilities of australian citizens and their obligations as global citizens (equality/citizenship) as a simple flowchart or diagram in Canva, showing how they think the system works — the class then compares diagrams to identify gaps and assumptions to investigate.", "c": "beginning"}, {"t": "Google Maps", "d": "Students explore locations connected to the key institutions and functions of australia's democratic system of government (function) • how government decisions impact citizens at federal, state and local levels (causation) • the rights and responsibilities of australian citizens and their obligations as global citizens (equality/citizenship) using Google Maps Street View, navigating through real places in 360 degrees and recording what they discover about the geography and culture.", "c": "beginning"}, {"t": "Seesaw", "d": "Students complete ongoing reflection tasks including the Canberra Tour Seesaw reflection connecting trip experiences to the lines of inquiry, 'I used to think… and now I know…' responses after the Social Media Ban discussion, notes from the 3 Levels of Government BTN lesson, and the Local Government PowerPoint researching their own council's LGA, logo, services, and personal family connections.", "c": "middle"}, {"t": "CoDrone EDU", "d": "Students investigate Australian drone regulations as a real-world civics case study, researching which level of government (federal CASA rules vs local council restrictions vs state laws) controls airspace, then programming CoDrone EDU flight paths within permitted boundaries, connecting to their exploration of how the three levels of government divide responsibilities and their Bill to Parliament planning.", "c": "middle"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of the key institutions and functions of australia's democratic system of government (function) • how government decisions impact citizens at federal, state and local levels (causation) • the rights and responsibilities of australian citizens and their obligations as global citizens (equality/citizenship) and building on each other's thinking through comments and questions.", "c": "middle"}, {"t": "Canva Presentation", "d": "Students design a 'Bill to Parliament' presentation outlining their proposed law inspired by issues they are passionate about, following the parliamentary process studied through the BTN 'Passing a Bill' video, including research evidence gathered using the Bill to Parliament PowerPoint planning template, and arguments structured from the pros and cons analysis practised during the Under-16 Social Media Ban debate.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a Canberra Tour documentary combining footage and reflections from visits to Parliament House, the High Court, Australian War Memorial, Museum of Australian Democracy, National Capital Exhibition, and the Embassy Tour, narrating how each institution connects to the three levels of government, the 4 Roles of Parliament, and the lines of inquiry explored throughout the unit.", "c": "end"}, {"t": "Adobe Express Podcasting", "d": "Students produce a civics podcast episode debating a governance topic such as the Under-16 Social Media Ban, structured around the pros and cons brainstormed in table groups, incorporating vocabulary from the PEO 'What is Parliament?' video and the 4 Roles of Government lesson, and citizenship rights and responsibilities explored through the ClickView Australian Citizenship video and 'We Are Australian 2025' reading comprehension.", "c": "end"}]}, {"ca": "St Kilda", "yl": "Year 6", "th": "Sharing the Planet", "ci": "Peoples' actions affect the balance of nature.", "lo": "What the environment is comprised of and how ecosystems function (Form) • Our responsibility to care for and protect the natural world (Responsibility) • The interdependence between humans, animals and the environment (Interdependence) • The consequences of human actions on the balance of nature (Consequences)", "s": [{"t": "Insta360 Cam", "d": "DLC captures 360° footage inside Melbourne Zoo enclosures and at Camp Mallana using the Insta360 camera, creating immersive reference material that students incorporate into their STEM Design Project presentations during the gallery walk, showing the real habitats their conservation technology prototypes are designed to protect.", "c": "beginning"}, {"t": "Padlet", "d": "Students post an image, headline or question about what the environment is comprised of and how ecosystems function (form) • our responsibility to care for and protect the natural world (responsibility) • the interdependence between humans, animals and the environment (interdependence) • the consequences of human actions on the balance of nature (consequences) on a shared Padlet board, then read and comment on three classmates' posts — surfacing the range of perspectives and questions that will drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students design a 'What I Care About' poster in Canva showing their personal connection to what the environment is comprised of and how ecosystems function (form) • our responsibility to care for and protect the natural world (responsibility) • the interdependence between humans, animals and the environment (interdependence) • the consequences of human actions on the balance of nature (consequences) — including images, facts they already know, and questions they want answered during the unit.", "c": "beginning"}, {"t": "Seesaw", "d": "Students complete portfolio tasks throughout the unit including the Design Thinking reflection on their STEM prototype process using the design checklist, the Camp Mallana reflection using DeBono thinking hats to process environmental observations, and the Orange-bellied Parrot narrative writing task, building an ongoing portfolio record connecting the zoo excursion, camp, and STEM project inquiry journey.", "c": "middle"}, {"t": "Google Earth", "d": "Students use satellite imagery to trace the Borun and Tuk Dreamtime story locations across Gunaikurnai country using the Stories and Songlines resources, identify habitats of their chosen threatened species researched for the Zoo STEM Design Challenge, and map the Camp Mallana region near Bairnsdale to connect their field observations of local flora and fauna to broader environmental patterns across Victoria.", "c": "middle"}, {"t": "DJI Drone (teacher-operated)", "d": "DLC captures aerial footage of the Melbourne Zoo grounds and local conservation areas, providing a bird's-eye perspective of animal habitats and enclosures that students analyse alongside the Tracker Tech observations from their zoo excursion, adding spatial context to their STEM Design Project research on tracking and monitoring threatened species.", "c": "middle"}, {"t": "Canva Presentation", "d": "Students design their STEM Design Project presentation for the gallery walk, showcasing their conservation technology prototype for a threatened Australian species, including research from the Melbourne Zoo excursion Tracker Tech observations, benefits and limitations analysis of existing technologies, and the Empathise-Define-Ideate-Prototype-Test design thinking process documented throughout the Zoo Design Challenge.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Conservation Technology Showcase' in Scratch where visitors click on threatened species sprites to see animated demonstrations of how their STEM prototype addresses the threat — incorporating Dr Katherine Moseby's Plains Wanderer research data and the Borun and Tuk Dreamtime story connections to show how science and Indigenous knowledge work together for conservation.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a STEM Design Project documentary filming their prototype presentation and gallery walk, combining footage of their conservation technology model with narration explaining how the design addresses threats to their chosen species, referencing tracking and monitoring technologies observed at Melbourne Zoo and environmental observations from Camp Mallana and the Bairnsdale Keeping Place excursion.", "c": "end"}, {"t": "Lego Spike", "d": "Students build a Lego Spike prototype of their conservation tracking or monitoring device for the STEM Design Thinking Challenge, programming sensors and motors to simulate how their technology would detect and track their chosen threatened species, presenting the working model alongside their research PowerPoint during the gallery walk with 6A, 6B, and 6C.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Prep", "th": "Sharing the Planet", "ci": "Living things share our world and have an important role in nature", "lo": "The different living things around us; The roles living things play in nature; How humans and other living things share space", "s": [{"t": "⏳ Planner Needed", "d": "Planner content not yet uploaded — specific suggestions pending. Please send the UOI planner for this unit to Nathan Benn on Teams to generate tailored technology integration suggestions.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 3", "th": "Where We Are in Place and Time", "ci": "Exploration leads to new discoveries that can shape and change society.", "lo": "The factors that motivate exploration (Causation); How people reflect on discoveries from the past to inform change (Change); How exploration brings about change and new understandings for people, places and society (Change)", "s": [{"t": "Seesaw", "d": "Students document push and pull factors from the First Fleet BTN video provocation and their explorer research, photographing their work and recording reflections about what motivates people to explore — building vocabulary with the First Fleet glossary wall.", "c": "beginning"}, {"t": "Google Earth", "d": "Students use Google Earth to explore locations connected to the factors that motivate exploration (causation), dropping pins and adding labels describing what they observe — building a visual map of existing knowledge before the class investigation begins.", "c": "beginning"}, {"t": "Canva", "d": "Students create a 'What I Think I Know' timeline or mind map about how people reflect on discoveries from the past to inform change (change) in Canva, visually organising their existing knowledge and marking questions with a '?' — establishing a baseline the class can test through research.", "c": "beginning"}, {"t": "Padlet", "d": "Students build a collaborative Reconciliation Week exploration board, sharing reflections from the Welcome to Country video, Reconciliation Australia resources, and their reconciliation footprint artwork exploring the theme of how exploration and discovery have impacted First Nations peoples.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the factors that motivate exploration (causation), building a visual portfolio of evidence ons on their Essential Agreement creation, and discussion of their shared issue — building ICT media representation and critical evaluation skills.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students create feedback surveys for their PYPEX exhibition audience, collecting data on the effectiveness of their presentation and media campaign, then analysing results using Excel to reflect on their inquiry process.", "c": "middle"}, {"t": "Green Screen + iMovie", "d": "Students use green screen technology to film segments of their PYPEX documentary, placing themselves within contexts relevant to their unit of inquiry topic, combining the footage with their research presentations and interview recordings in the final exhibition showcase.", "c": "middle"}, {"t": "Delightex (CoSpaces)", "d": "Students build an interactive 3D exhibition space in CoSpaces for their PYPEX unit of inquiry, creating a virtual gallery that visitors can explore featuring research findings, data visualisations, and multimedia elements, complementing their physical exhibition display and website.", "c": "middle"}, {"t": "Adobe Express (Website)", "d": "Students build a professional exhibition website for their PYPEX unit of inquiry, featuring their research findings, transdisciplinary connections displayed using the unit outline template, and a Venn diagram comparing their research topic in Australia and China (or their home country).", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive PYPEX exhibition guide in Scratch where visitors navigate through their unit of inquiry — clicking on topic sprites to access research findings, transdisciplinary connections, and media elements — creating a digital companion experience to their physical exhibition that demonstrates research and presentation skills at their most ambitious.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a documentary showcasing their PYPEX inquiry journey from the Launch Day provocation through to their final presentation, demonstrating research and referencing skills, file management, and their ability to present findings to an audience of parents and community members.", "c": "end"}]}, {"ca": "Glen Waverley", "yl": "Year 6", "th": "How the World Works", "ci": "Scientists undertake experimentation to confirm, contest and create new theories.", "lo": "The scientific method; How experiments lead to new understandings; The relationship between planets and the Sun; Energy transfer and transformation in circuits", "s": [{"t": "Mentimeter", "d": "Students respond to 'What do you already know about the scientific method?' using a live word cloud, then the class discusses the most common responses — revealing existing understanding and misconceptions to shape the inquiry direction.", "c": "beginning"}, {"t": "Canva", "d": "Students create a hypothesis poster in Canva predicting how how experiments lead to new understandings works, including a labelled diagram and three questions they want to investigate — setting up the scientific inquiry process.", "c": "beginning"}, {"t": "Kahoot", "d": "Students play a diagnostic Kahoot quiz testing common assumptions about the relationship between planets and the sun — wrong answers reveal misconceptions the class will investigate, and the teacher uses results to differentiate inquiry groups.", "c": "beginning"}, {"t": "Micro:bit", "d": "Students use micro:bits to collect data during their electrical circuit investigations, measuring and recording how energy transfers through different circuit components and connecting sensor data to the scientific method of repeatable investigation.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build and code a motorised Lego Spike model demonstrating energy transformation (electrical to kinetic), connecting to the Visual Art fibre art circuit project and the unit's focus on how the transfer and transformation of energy works in electrical circuits.", "c": "middle"}, {"t": "Sphero", "d": "Students program Spheros with LED colour changes to demonstrate energy transformation concepts explored during their squishy circuits investigations, coding sequences where battery energy converts to light and motion, connecting the observable outputs to their scientific theories about reversible and irreversible changes.", "c": "middle"}, {"t": "Adobe Express (Video)", "d": "Students produce a science documentary explaining their squishy circuits investigation (testing which materials are conductors or insulators), electrical circuit experiments, and the connection between experimentation and building new understanding about energy transfer and transformation.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Squishy Circuits Lab' in Scratch where visitors build virtual circuits by dragging conductor and insulator sprites into a circuit diagram — the program tests whether the circuit is complete and demonstrates energy transfer with animated electron flow, connecting their hands-on playdough circuit investigations to a shareable digital simulation.", "c": "end"}, {"t": "Tinkercad", "d": "Students design a 3D scale model of the solar system in Tinkercad using data from their playdough planet-modelling activity, with accurate relative sizes and labelled orbital paths — presenting their digital design alongside their CoSpaces virtual solar system to demonstrate the relationship between planets and the Sun from both engineering and immersive perspectives.", "c": "end"}, {"t": "Delightex (CoSpaces)", "d": "Students build an interactive 3D solar system in CoSpaces using data from their playdough scale planet models, creating a virtual space that visitors can explore with accurate planet sizes and distances, extending their science poster and investigation journal into an immersive digital experience.", "c": "end"}]}, {"ca": "Glen Waverley", "yl": "Year 3", "th": "How We Organise Ourselves", "ci": "Needs can be met with digital systems.", "lo": "What are digital systems; Ideas and information can be organised and shared in safe online environments; Being a responsible digital citizen", "s": [{"t": "Microsoft Forms", "d": "Students complete a quick class survey about their experience with what are digital systems — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students map out their current understanding of ideas and information can be organised and shared in safe online environments as a simple flowchart or diagram in Canva, showing how they think the system works — the class then compares diagrams to identify gaps and assumptions to investigate.", "c": "beginning"}, {"t": "Kahoot", "d": "Students play a diagnostic Kahoot testing their assumptions about being a responsible digital citizen — the results reveal what the class already knows and where the biggest knowledge gaps are, helping the teacher shape the inquiry direction.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore different environments and habitats using Google Earth satellite and Street View, observing how landscapes connected to what are digital systems look from above and ground level — comparing biomes across the globe.", "c": "beginning"}, {"t": "Seesaw", "d": "Students document their exploration of digital systems by photographing and annotating how different school technologies work together (iPads, apps, networks), reflecting on responsible digital citizenship.", "c": "middle"}, {"t": "Kahoot", "d": "Students collaboratively create quiz questions about digital safety, digital footprints, and responsible online behaviour, testing classmates' understanding of being a responsible digital citizen.", "c": "middle"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of what are digital systems and building on each other's thinking through comments and questions.", "c": "middle"}, {"t": "Delightex (CoSpaces)", "d": "Students build an interactive 3D 'Digital Systems Tour' in CoSpaces where visitors walk through a virtual school and click on technology systems (library database, attendance system, communication tools) to see how digital systems meet community needs — presenting their virtual tour with narration explaining how ideas and information can be organised and shared in safe online environments.", "c": "end"}, {"t": "Scratch", "d": "Students build a Scratch simulation of a school library system where the player takes on the role of librarian — scanning books in using a barcode reader (clicking sprites), sorting them into the correct genre sections (dragging to shelves), and helping student characters find the right book by searching a catalogue. The game tracks how many books are correctly shelved and returned, with a timer adding pressure, demonstrating how digital systems use input, processing and output to meet real-world needs and what happens when parts of the system break down.", "c": "end"}, {"t": "Tinkercad", "d": "Students design a 3D model in Tinkercad of an innovative digital system that solves a school community need (automated book return, smart lunch ordering, digital lost-and-found), with labelled components showing how the system works — presenting their design alongside their research into how digital systems help meet community needs.", "c": "end"}]}, {"ca": "Glen Waverley", "yl": "Year 6", "th": "Where We Are in Place and Time", "ci": "Human needs drive the development of nations.", "lo": "How human needs drive national development; Role of migration in nation building; Impacts of development on Indigenous and colonial populations", "s": [{"t": "Google Earth", "d": "Students use Google Earth to explore locations connected to how human needs drive national development, dropping pins and adding labels describing what they observe — building a visual m function gA(t,d){const s=(t+" "+d).toLowerCase();if(/video|film|imovie|record|360|insta/.test(s))return"Students practise speaking, presenting and telling stories using video tools.";if(/book creator|story|narrat/.test(s))return"Students combine writing, images and voice recording to create rich digital books.";if(/data|graph|survey|chart|excel/.test(s))return"Students learn to collect, organise and make sense of real data.";if(/scratch|code|robot|beebot|sphero|spike|codrone|cubetto|indi/.test(s))return"Students learn to think logically, solve problems and create through coding.";if(/collaborat|padlet|shared/.test(s))return"Students work together, share ideas and build on each other's thinking online.";if(/podcast|garageband|audio/.test(s))return"Students develop confidence in speaking and learn to produce audio content.";if(/website/.test(s))return"Students learn to design and share information online.";if(/canva.*present|poster|infograph|design/.test(s))return"Students learn to communicate ideas visually through posters, infographics and presentations.";if(/reflect|journal|seesaw|wellbeing/.test(s))return"Students reflect on their own learning and track how their thinking grows over time.";if(/google earth/.test(s))return"Students explore real places around the world and connect geography to their learning.";if(/green screen|stop motion/.test(s))return"Students combine creative storytelling with video production techniques.";if(/tinkercad|3d print/.test(s))return"Students design, test and improve 3D models — learning through trial and error.";if(/micro.bit|makey/.test(s))return"Students connect coding to the physical world using sensors and electronics.";if(/vr|merge|cospaces|delightex|pico/.test(s))return"Students step inside their learning through virtual and augmented reality experiences.";if(/freeform/.test(s))return"Students make their thinking visible by mapping ideas, connections and questions on a shared canvas.";if(/character animat|animat/.test(s))return"Students bring stories to life through digital animation.";if(/drone|dji/.test(s))return"Students see their environment from above, connecting aerial views to their inquiry.";if(/mentimeter|kahoot/.test(s))return"Students share their thinking in real time and see how the class responds instantly.";if(/microsoft forms/.test(s))return"Students design surveys, collect responses and analyse what the class thinks.";return"Students use technology with purpose to deepen and demonstrate their learning."}

function gHow(t,d){var s=(t+" "+d).toLowerCase(),steps=[],tip="";
if(t==="Seesaw"){steps=["Open Seesaw and navigate to your class.","Tap the green '+' button to create a new post.","Choose your tool — camera, drawing, voice recording, or upload.","Students complete the activity, adding labels, drawings or narration.","Tap the green tick to submit to their journal.","Review responses in the class feed or student journals."];tip="Tip: Use Seesaw Activities to set up a template with instructions so students know exactly what to do.";}
else if(t==="Book Creator"){steps=["Open Book Creator (bookcreator.com) and create a new book or open an existing one.","Choose a blank page or template layout.","Students add content — text, images, drawings, audio recordings, or video.","Use the '+' button to add new pages as the work develops.","Students can read back their book using the play button.","Share the finished book via link, or export as ePub/PDF."];tip="Tip: Create a class library so students can read each other's books.";}
else if(t==="Canva"){steps=["Open Canva (canva.com) and select a template — poster, presentation, infographic or video.","Students customise using drag-and-drop — add images, text, icons and shapes.","Use the Elements tab to search for relevant graphics and photos.","Encourage students to keep text minimal and let visuals tell the story.","Download as PNG/PDF or share via link.","For presentations, use Present mode to display full screen."];tip="Tip: Canva for Education gives students access to premium content for free — sign up with your school email.";}
else if(t==="Scratch"){steps=["Open Scratch (scratch.mit.edu) and click 'Create' to start a new project.","Plan the project first — storyboard the screens, characters and interactions on paper.","Add sprites (characters) and backdrops from the library or draw custom ones.","Build the code using drag-and-drop blocks — start with 'Events' (when green flag clicked).","Test frequently by clicking the green flag — debug when things go wrong.","Save the project and share via the project link."];tip="Tip: Start with a working example students can remix rather than building from scratch.";}
else if(t==="Scratch Jr"){steps=["Open the Scratch Jr app on the iPad.","Tap '+' to start a new project.","Add characters from the library or draw your own.","Drag code blocks together to make characters move, speak and change.","Add new pages by tapping the '+' on the right side.","Tap the green flag to play the story from the beginning."];tip="Tip: Keep projects to 4-5 pages maximum for younger students.";}
else if(t==="Padlet"){steps=["Open Padlet (padlet.com) and create a new board — choose Wall, Map, Timeline or Canvas layout.","Set the board title and customise the background.","Share the join link with students or display the QR code.","Students tap '+' to add a post — they can include text, images, links, audio or video.","Encourage students to read and comment on classmates' posts.","Export or screenshot the finished board for documentation."];tip="Tip: For Map layout, students drop pins on real locations — great for geography and cultural units.";}
else if(t==="Google Earth"){steps=["Open Google Earth (earth.google.com) in Chrome.","Click Projects → New Project to start a guided tour.","Search for a location and click 'Add to project' to pin it.","For each pin, add a title, description, images and voice narration.","Drag pins to reorder the tour sequence.","Click 'Present' to fly between locations with narration at each stop."];tip="Tip: Use Street View (drag the person icon) to explore locations at ground level in 360 degrees.";}
else if(t==="iMovie"){steps=["Open iMovie on iPad or Mac and create a new Movie project.","Import video clips, photos and audio from the camera roll.","Drag clips onto the timeline in the order you want.","Add titles, transitions and background music from the built-in library.","Record a voiceover by tapping the microphone icon while the video plays.","Export the finished movie and share via AirDrop, Google Drive or Seesaw."];tip="Tip: Film in landscape mode and keep clips under 15 seconds each for easier editing.";}
else if(t==="GarageBand"){steps=["Open GarageBand on iPad or Mac.","Choose Live Loops for experimenting with beats, or Tracks for recording.","Students can tap instruments on screen or record real audio using the microphone.","Layer multiple tracks to build a full composition.","Use the mixing controls to adjust volume and balance between tracks.","Export as an audio file to share via Seesaw, Google Drive or embed in Book Creator."];tip="Tip: Start with the Smart Instruments — they sound great even for beginners.";}
else if(t==="Mentimeter"){steps=["Open Mentimeter (mentimeter.com) and create a new presentation.","Add slides — choose Word Cloud, Multiple Choice, Scales, Open Ended or Q&A.","Share the join code (menti.com) with students or display on screen.","Students respond on their devices — results appear live on the teacher's screen.","Discuss the results as a class, highlighting patterns and surprises.","Download results as a PDF or screenshot for documentation."];tip="Tip: Word Clouds are great for tuning in — Open Ended questions work well for deeper provocations.";}
else if(t==="Microsoft Forms"){steps=["Open Microsoft Forms (forms.office.com) and create a new form or quiz.","Add questions — choose from Choice, Text, Rating, Likert or Ranking.","Share the form link with students via Teams, email or QR code.","Students complete the form on any device.","View responses in the Responses tab — Forms auto-generates charts and summaries.","Export to Excel for deeper analysis or class discussion."];tip="Tip: Use the Branching feature to create different question paths based on student answers.";}
else if(t==="Kahoot"){steps=["Open Kahoot (kahoot.com) and create a new kahoot.","Add questions with multiple choice answers — set a time limit for each.","Launch the kahoot and share the game PIN with students.","Students join on their devices at kahoot.it and answer in real time.","Review results after each question — discuss why answers are right or wrong.","Download the results spreadsheet to identify knowledge gaps."];tip="Tip: Use it as a diagnostic at the start of a unit to reveal what students already know and where misconceptions lie.";}
else if(t==="Adobe Express"||t==="Adobe Express Video"){steps=["Open Adobe Express (adobe.com/express) and choose a template — video, poster, flyer or social post.","Students remix the template using drag-and-drop — add images, text, icons and brand colours.","For video, add clips, record voiceover and choose background music from the free library.","Use the AI tools to resize content for different formats.","Download or share via link.","For presentations, use the slideshow feature with transitions."];tip="Tip: Adobe Express is free with a school Google or Microsoft account.";}
else if(t==="Micro:bit"){steps=["Open MakeCode (makecode.microbit.org) in a browser.","Create a new project and build code using drag-and-drop blocks.","Use the simulator on screen to test before downloading to the physical device.","Connect the micro:bit via USB and click 'Download' to flash the code.","Students test, observe and iterate — changing variables and sensors.","Share the project via the MakeCode link."];tip="Tip: Start with the LED display and buttons before moving to sensors — it builds confidence.";}
else if(t.indexOf("Sphero")!==-1){steps=["Open the Sphero Edu app on iPad and connect to a Sphero robot via Bluetooth.","Choose Block programming mode (or Draw/Text for different levels).","Students build their program using drag-and-drop blocks — movement, lights, sounds and sensors.","Tap Start to run the program and watch the Sphero execute on the floor.","Iterate — adjust speeds, angles and timing based on what happened.","Use a floor map or tape course to give the coding a real-world context."];tip="Tip: Masking tape on the floor creates instant courses. Have students calculate distances and angles first.";}
else if(t==="Beebots"){steps=["Place the Beebot on the floor mat or custom map.","Students plan their route first — counting squares and turns on paper.","Press the Clear button to reset any previous commands.","Enter the sequence — Forward, Back, Left Turn, Right Turn buttons.","Press Go and watch the Beebot follow the programmed path.","Debug if it goes wrong — which step needs changing?"];tip="Tip: Create custom floor mats with laminated A3 paper to match your unit topic.";}
else if(t==="Cubetto"){steps=["Place Cubetto on the floor mat.","Students select coding blocks — green (forward), red (right), yellow (left), blue (function).","Place the blocks on the coding board in sequence.","Press the blue button to run the sequence.","Watch Cubetto follow the path — discuss what happened.","Iterate by changing blocks and re-running."];tip="Tip: The function block teaches subroutines — great for introducing the idea of reusable code.";}
else if(t==="Indi Robot"){steps=["Set up colour tiles on the table or floor to create a path.","Each colour tells Indi what to do — green means go, red means stop, purple means turn.","Students arrange tiles to guide Indi from start to finish.","Place Indi at the start and press the button to begin.","Observe and adjust — swap tiles to change behaviour.","Challenge students to find the shortest or most creative path."];tip="Tip: Have students predict what will happen before pressing start — builds computational thinking.";}
else if(t==="Lego Spike"){steps=["Open the LEGO Education SPIKE app and choose a unit or free build.","Build the model following instructions or create a custom design.","Connect to the hub via Bluetooth and open the coding canvas.","Build the program using drag-and-drop word blocks.","Run the program and observe the model's behaviour.","Iterate on both the build and the code to improve performance."];tip="Tip: Start with the guided tutorials to learn the motor and sensor blocks before free building.";}
else if(t==="CoDrone EDU"){steps=["Open the CoDrone EDU app or Robolink Basecamp on a laptop.","Connect the CoDrone controller via USB.","Write the flight program using block coding or Python.","Always test in the simulator first before real flight.","Find a clear indoor space — use a drone landing pad.","The teacher operates the safety override at all times."];tip="Tip: CoDrone is teacher-operated for safety. Students write the code, teacher handles the controller.";}
else if(t==="Green Screen"){steps=["Set up the green screen backdrop and ensure even lighting with no shadows.","Position the iPad on a tripod facing the green screen.","Open Do Ink (or a green screen app) and import a background image or video.","Students stand in front of the green screen and perform/present.","Record the video — the app replaces the green with the background in real time.","Export and share via Seesaw, Google Drive or embed in other projects."];tip="Tip: Students should avoid wearing green clothing. Consistent lighting is the key to a clean effect.";}
else if(t==="Tinkercad"){steps=["Open Tinkercad (tinkercad.com) and log in with a class code.","Start a new 3D design on the workplane.","Drag basic shapes from the panel and combine them to build a model.","Use the ruler, align and group tools to refine the design.","Export as STL for 3D printing or take a screenshot for documentation.","Share designs with classmates using the Tinkercad Gallery."];tip="Tip: Start with the Tinkercad tutorials — they teach the tools through guided challenges.";}
else if(t==="Pico VR"||t.indexOf("Delightex")!==-1||t.indexOf("CoSpaces")!==-1){steps=["Open CoSpaces (cospaces.io) and create a new space.","Choose a 3D environment and add objects, characters and text from the library.","Use the CoBlocks coding tool to animate objects and add interactions.","Preview in the browser by clicking Play.","For VR, export to the Pico headset via the CoSpaces app.","Students explore each other's creations in VR."];tip="Tip: Start with a simple scene before adding coding — students can always add complexity later.";}
else if(t==="Insta360"||t.indexOf("360")!==-1){steps=["Mount the Insta360 camera on the selfie stick — keep fingers clear of both lenses.","Open the Insta360 app on iPad and connect via WiFi.","Tap record — the camera captures everything in 360 degrees.","After recording, use the app to edit — choose angles, add effects and trim.","Export as a regular video (reframed) or as a full 360 file.","Share via Google Drive, Seesaw or embed in a Book Creator page."];tip="Tip: Place the camera in the centre of the action and step back — it sees everything.";}
else if(t.indexOf("DJI")!==-1||t.indexOf("Drone")!==-1){steps=["DJI drones are teacher-operated only — students do not handle the drone.","Students plan the flight path and what footage they need beforehand.","Teacher flies the drone in an approved outdoor area following school policy.","Students review the aerial footage and select the best clips.","Import footage into iMovie or Canva for editing.","Students add narration, titles and context to the aerial footage."];tip="Tip: Pre-flight planning is the learning — have students storyboard exactly what shots they need and why.";}
else if(t==="Microsoft Excel"){steps=["Open Microsoft Excel and create a new workbook.","Set up column headers for the data categories.","Students enter data into rows — one record per row.","Select the data range and insert a chart (Insert → Chart).","Choose the right chart type — bar for comparison, line for change over time, pie for proportions.","Format the chart with titles, labels and colours to make it clear."];tip="Tip: Teach students to choose the chart type that tells the story of their data, not just the prettiest one.";}
else if(t==="Freeform"){steps=["Open the Freeform app on the iPad.","Tap '+' to create a new board.","Students add sticky notes, text boxes, shapes, drawings and images by tapping the toolbar.","To collaborate, tap the share icon and invite classmates via AirDrop or iCloud.","Students can draw connections between ideas using lines and arrows.","Export the board as a PDF or screenshot to share in Seesaw or Book Creator."];tip="Tip: Set up a board template with pre-placed headings or zones so students know where to put their thinking.";}
else{steps=["Open the app or website and log in with your school account.","Set up the activity — create a template or assignment for students.","Share the link, code or QR with students.","Students complete the activity on their device.","Review and discuss the results as a class.","Save or export the work for documentation."];tip="Tip: Contact the DLP team if you need help setting up this tool.";}
return{steps:steps,tip:tip};}
