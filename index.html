<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wesley Digital Learning Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#111111;--sf:#1A1A1A;--tx:#F2F2F2;--mt:#999;--bd:#2A2A2A;--ac:#CDEB45;--ac2:#7ED957;--hl:#222}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Space Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.hd{background:var(--bg);position:sticky;top:0;z-index:100;caret-color:transparent}
.hi{max-width:700px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:10px;user-select:none}
.logo{height:34px;width:auto;border-radius:4px;mix-blend-mode:lighten}
.bk{background:var(--hl);border:none;color:#fff;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s}
.bk:hover{background:#333}
.hd h1{color:#FFF;font-size:15px;font-weight:700;letter-spacing:-.3px}
.hd-sub{color:#999;font-size:11px;font-weight:500;margin-top:1px}

.wp{max-width:700px;margin:0 auto;padding:0 20px 80px}
.fd{animation:fu .3s ease both}@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
#app{min-height:100vh}
.tab-fade .fd{animation:tf .15s ease both}@keyframes tf{from{opacity:.6}to{opacity:1}}

.hero{margin:24px 0 36px}
.hero-title{font-size:clamp(36px,9vw,56px);font-weight:700;line-height:1.08;letter-spacing:-2px;color:#FFF}
.hero-accent{color:var(--ac)}
.hero-sub{font-size:15px;color:var(--mt);margin-top:16px;line-height:1.6;max-width:400px}

.tag{display:inline-block;font-size:12px;font-weight:700;padding:6px 14px;border-radius:99px;background:var(--hl);color:#FFF;letter-spacing:.2px}
.tag-t{display:inline-block;font-size:10px;font-weight:700;padding:4px 12px;border-radius:99px;background:rgba(0,0,0,.15);letter-spacing:.3px}
.tag-tool{display:inline-block;font-size:12px;font-weight:700;padding:6px 14px;border-radius:99px;letter-spacing:.2px}
.tag-meta{display:inline-block;font-size:12px;font-weight:700;padding:6px 14px;border-radius:99px;background:var(--hl);color:#BBB}

.cc{border-radius:20px;padding:28px;margin-bottom:12px;cursor:pointer;transition:transform .15s;position:relative;overflow:hidden}
.cc:hover{transform:scale(1.01)}
.cc-wm{position:absolute;right:-20px;bottom:-20px;font-size:110px;font-weight:800;opacity:.1;line-height:1;letter-spacing:-6px;pointer-events:none}
.cc-inner{position:relative;z-index:1}
.cc-name{font-size:26px;font-weight:700;letter-spacing:-.5px}
.cc-sub{font-size:14px;margin-top:4px;font-weight:500}

.sec-title{font-size:clamp(28px,7vw,36px);font-weight:700;margin-top:14px;letter-spacing:-1px;color:#FFF;line-height:1.15}

.yg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.yc{background:var(--sf);border-radius:16px;padding:22px 18px;cursor:pointer;transition:all .15s;border:2px solid var(--bd);position:relative;overflow:hidden}
.yc:hover{border-color:var(--ac);background:rgba(205,235,69,.05);transform:translateY(-3px)}
.yc-dot{width:14px;height:14px;border-radius:4px;margin-bottom:14px}
.yc h3{font-size:20px;font-weight:700;letter-spacing:-.3px}.yc .cn{font-size:12px;color:var(--mt);margin-top:4px}

.uc{border-radius:16px;padding:20px 22px;margin-bottom:10px;cursor:pointer;transition:transform .15s;position:relative;overflow:hidden}
.uc:hover{transform:scale(1.01)}
.uc-emoji{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:48px;opacity:.3;pointer-events:none}
.uc-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;opacity:.5;margin-bottom:4px}
.uc-name{font-size:20px;font-weight:700;letter-spacing:-.3px;max-width:80%;line-height:1.2;color:inherit}

.dh{border-radius:20px;padding:28px 26px;margin:16px 0 20px;position:relative;overflow:hidden}
.dh-wm{position:absolute;right:-10px;bottom:-10px;font-size:100px;opacity:.15;line-height:1;pointer-events:none}
.dh-title{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1.15}
.dh-ci{font-size:15px;opacity:.8;margin-top:10px;line-height:1.6;font-style:italic}

.loi-box{background:var(--sf);border-radius:16px;padding:20px 22px;margin-bottom:20px;border:2px solid var(--bd)}
.loi-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mt);margin-bottom:12px}
.loi-item{padding:10px 0;border-bottom:1px solid var(--bd);font-size:14px;line-height:1.55;color:#EEE}
.loi-item:last-child{border-bottom:none}
.loi-num{font-weight:700;margin-right:8px}

.tb{display:flex;gap:6px;margin-bottom:18px;background:var(--sf);border-radius:14px;padding:5px}
.tt{flex:1;padding:12px 8px;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--mt);transition:all .2s;letter-spacing:-.2px}
.tt.on{background:var(--ac);color:#111}
.tt-count{font-weight:600;opacity:.7;font-size:11px}

.sg{background:var(--sf);border:2px solid var(--bd);border-radius:16px;overflow:hidden;margin-bottom:14px;transition:border-color .15s}
.sg:hover{border-color:var(--ac)}
.sg-pending{background:transparent;border:2px dashed #333;border-radius:16px;padding:28px 24px;margin-bottom:14px;text-align:center}
.sg-pending-icon{font-size:40px;margin-bottom:12px}
.sg-pending-title{font-size:16px;font-weight:700;color:#F5A623;margin-bottom:8px}
.sg-pending-msg{font-size:14px;line-height:1.6;color:#888;max-width:400px;margin:0 auto}
.sg-pending-cta{display:inline-block;margin-top:16px;font-size:13px;font-weight:600;color:#CDEB45;background:#CDEB4515;padding:8px 18px;border-radius:99px;border:1px solid #CDEB4530;text-decoration:none;cursor:pointer;transition:all .15s}
.sg-pending-cta:hover{background:#CDEB4530;color:#FFF}
.sg-head{padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--bd)}
.sg-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sg-meta{flex:1}
.sg-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mt)}
.sg-tool{font-size:17px;font-weight:700;letter-spacing:-.3px;margin-top:2px}
.sg-body{padding:16px 20px 20px}
.sg-desc{font-size:14px;line-height:1.7;color:#F2F2F2}
.sg-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px}
.sg-section{margin-top:16px}
.sg-label{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--mt);margin-bottom:6px}
.sg-label svg{width:15px;height:15px;flex-shrink:0}
.vb{background:rgba(205,235,69,.08);border-left:3px solid var(--ac);padding:11px 15px;border-radius:0 10px 10px 0;font-size:13px;color:#CDEB45;line-height:1.55;font-style:italic}

.cur-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.cur-pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;border:2px solid var(--bd);background:var(--sf);color:var(--tx);transition:all .2s;user-select:none}
.cur-pill:hover{border-color:var(--ac);background:rgba(205,235,69,.05)}
.cur-pill.open{border-color:var(--ac);background:rgba(205,235,69,.08)}
.cur-pill svg{width:12px;height:12px;transition:transform .2s;flex-shrink:0}
.cur-pill.open svg{transform:rotate(180deg)}
.cur-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cur-detail{overflow:hidden;max-height:0;transition:max-height .2s ease-out,padding .2s ease-out;padding:0 14px;background:rgba(205,235,69,.06);border-left:3px solid var(--ac);border-radius:0 8px 8px 0;font-size:12.5px;color:#CDEB45;line-height:1.5;margin-top:0}
.cur-detail.open{max-height:300px;padding:10px 14px;margin-top:6px;transition:max-height .3s ease-in,padding .3s ease-in}
.cur-detail b{font-weight:700}
.cur-detail li{color:#DDD}

.bb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:var(--ac);color:#111;border:none;border-radius:16px;padding:18px 24px;font-family:inherit;font-size:17px;font-weight:700;text-decoration:none;cursor:pointer;width:100%;margin-top:24px;letter-spacing:-.3px;transition:transform .15s}
.bb:hover{transform:scale(1.01)}
.bb-sub{font-size:12px;font-weight:500;opacity:.6}

@media(max-width:480px){.hero-title{font-size:36px}.cc-name{font-size:22px}.cc-wm{font-size:80px}}

.atl-section{margin-top:16px}
.atl-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.atl-pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;border:2px solid var(--bd);background:var(--sf);color:var(--tx);transition:all .2s;user-select:none}
.atl-pill:hover{border-color:#F5A623;background:rgba(245,166,35,.05)}
.atl-pill.open{border-color:#F5A623;background:rgba(245,166,35,.08)}
.atl-pill svg{width:12px;height:12px;transition:transform .2s;flex-shrink:0}
.atl-pill.open svg{transform:rotate(180deg)}
.atl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.atl-detail{overflow:hidden;max-height:0;transition:max-height .2s ease-out,padding .2s ease-out;padding:0 14px;background:rgba(245,166,35,.06);border-left:3px solid #F5A623;border-radius:0 8px 8px 0;font-size:12.5px;color:#F5A623;line-height:1.5;margin-top:0}
.atl-detail.open{max-height:300px;padding:10px 14px;margin-top:6px;transition:max-height .3s ease-in,padding .3s ease-in}
.atl-detail b{font-weight:700}
.atl-detail li{color:#DDD;margin-bottom:4px}

.sg-tool a:hover{text-decoration-color:#FFF}

.sg-fb{display:flex;align-items:center;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--bd);flex-wrap:wrap}
.sg-fb-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:8px 18px;border-radius:99px;cursor:pointer;text-decoration:none;border:none;background:#333;color:#AAA;transition:all .15s;font-family:inherit}
.sg-fb-btn:hover{background:#444;color:#FFF}
.fb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.fb-overlay.open{opacity:1;pointer-events:all}
.fb-modal{background:#1A1A1A;border:2px solid #333;border-radius:20px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.fb-title{font-size:18px;font-weight:700;color:#FFF;margin-bottom:4px}
.fb-sub{font-size:12px;color:#888;margin-bottom:20px}
.fb-context{font-size:13px;color:#CDEB45;background:#CDEB4510;border:1px solid #CDEB4530;border-radius:10px;padding:10px 14px;margin-bottom:16px;line-height:1.5}
.fb-label{font-size:12px;font-weight:600;color:#AAA;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fb-textarea{width:100%;min-height:100px;background:#111;border:2px solid #333;border-radius:12px;color:#FFF;font-family:inherit;font-size:14px;padding:12px;resize:vertical;outline:none;transition:border-color .15s;box-sizing:border-box}
.fb-textarea:focus{border-color:#CDEB45}
.fb-textarea::placeholder{color:#555}
.fb-actions{display:flex;gap:10px;margin-top:16px}
.fb-submit{flex:1;padding:12px;border:none;border-radius:12px;background:#CDEB45;color:#111;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s}
.fb-submit:hover{background:#D8F050;transform:scale(1.01)}
.fb-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.fb-cancel{padding:12px 20px;border:2px solid #333;border-radius:12px;background:none;color:#888;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
.fb-cancel:hover{border-color:#555;color:#CCC}
.fb-success{text-align:center;padding:20px 0}
.fb-success-icon{font-size:48px;margin-bottom:12px}
.fb-success-msg{font-size:16px;font-weight:600;color:#CDEB45}
.fb-success-sub{font-size:13px;color:#888;margin-top:6px}

.sg-collapse{cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;padding:8px 0}
.sg-collapse:hover .sg-label{opacity:1}
.sg-collapse .sg-label{opacity:.7;transition:opacity .15s;margin:0}
.sg-collapse svg{width:14px;height:14px;color:#888;transition:transform .2s;flex-shrink:0}
.sg-collapse.open svg{transform:rotate(180deg)}
.sg-collapsible{overflow:hidden;max-height:0;transition:max-height .25s ease-out;padding:0}
.sg-collapsible.open{max-height:600px;padding:8px 0 0;transition:max-height .35s ease-in}

.sg-react{display:inline-flex;gap:8px;margin-left:auto}
.sg-react-btn{background:#FF6B6B20;border:none;border-radius:99px;padding:8px 14px;cursor:pointer;font-size:14px;transition:all .15s;color:#FF6B6B}
.sg-react-btn:hover{background:#FF6B6B35}
.sg-react-btn.voted{background:#FF6B6B;color:#111}
.sg-react-up{background:#22C55E20;color:#22C55E}
.sg-react-up:hover{background:#22C55E35}
.sg-react-up.voted{background:#22C55E;color:#111}

.planner-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.planner-overlay.open{opacity:1;pointer-events:all}
.planner-modal{background:#1A1A1A;border:2px solid #F5A623;border-radius:20px;padding:36px;width:100%;max-width:480px;text-align:center}
.planner-modal-icon{font-size:52px;margin-bottom:16px}
.planner-modal-title{font-size:20px;font-weight:700;color:#F5A623;margin-bottom:8px}
.planner-modal-sub{font-size:14px;line-height:1.6;color:#888;margin-bottom:20px}
.planner-modal-cta{display:inline-block;font-size:14px;font-weight:600;color:#CDEB45;background:#CDEB4515;padding:10px 22px;border-radius:99px;border:1px solid #CDEB4530;text-decoration:none;cursor:pointer;transition:all .15s;margin-bottom:10px;white-space:nowrap}
.planner-modal-cta:hover{background:#CDEB4530;color:#FFF}
.planner-modal-close{display:inline-block;font-size:13px;color:#666;cursor:pointer;padding:8px 16px;margin-top:8px;transition:color .15s}
.planner-modal-close:hover{color:#FFF}

.sg-howto{cursor:pointer;display:flex;align-items:center;gap:8px;padding:10px 0 4px;user-select:none;margin-top:8px;border-top:1px solid var(--bd)}
.sg-howto:hover .sg-howto-label{color:#CDEB45}
.sg-howto-label{font-size:12px;font-weight:600;color:#888;transition:color .15s;letter-spacing:.3px}
.sg-howto svg{width:13px;height:13px;color:#888;transition:transform .2s;flex-shrink:0}
.sg-howto.open svg{transform:rotate(180deg)}
.sg-howto-body{overflow:hidden;max-height:0;transition:max-height .25s ease-out;padding:0}
.sg-howto-body.open{max-height:800px;padding:10px 0 4px;transition:max-height .35s ease-in}
.sg-howto-steps{font-size:13px;color:#BBB;line-height:1.7;padding:8px 14px;background:rgba(205,235,69,.04);border-left:3px solid #CDEB4540;border-radius:0 8px 8px 0}
.sg-howto-steps ol{margin:0;padding:0 0 0 18px}
.sg-howto-steps li{margin-bottom:6px}
.sg-howto-steps li:last-child{margin-bottom:0}
.sg-howto-tip{font-size:12px;color:#F5A623;margin-top:8px;font-style:italic}

.sg-howto{margin-top:14px;border-top:1px solid var(--bd);padding-top:10px}
.sg-howto-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:#38BDF8;cursor:pointer;background:none;border:none;font-family:inherit;padding:4px 0;transition:opacity .15s}
.sg-howto-btn:hover{opacity:.8}
.sg-howto-btn svg{width:14px;height:14px;transition:transform .2s}
.sg-howto-btn.open svg{transform:rotate(180deg)}
.sg-howto-content{overflow:hidden;max-height:0;transition:max-height .25s ease-out;padding:0}
.sg-howto-content.open{max-height:800px;padding:12px 0 0;transition:max-height .35s ease-in}
.sg-howto-steps{font-size:13px;color:#BBB;line-height:1.7;padding:12px 16px;background:rgba(56,189,248,.05);border-left:3px solid #38BDF8;border-radius:0 10px 10px 0}
.sg-howto-steps ol{margin:0;padding:0 0 0 18px}
.sg-howto-steps li{margin-bottom:6px}
.sg-howto-steps li:last-child{margin-bottom:0}
.sg-howto-tip{margin-top:10px;font-size:12px;color:#F5A623;font-style:italic}

.howto-steps{list-style:none;padding:0;margin:8px 0 0;counter-reset:step}
.howto-steps li{position:relative;padding:6px 0 6px 32px;font-size:13px;color:#CCC;line-height:1.5;counter-increment:step}
.howto-steps li::before{content:counter(step);position:absolute;left:0;top:6px;width:22px;height:22px;background:#CDEB4520;color:#CDEB45;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}

.sg-extras{margin-top:16px;padding-top:14px;border-top:1px solid #333}

.sg-used{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:8px 18px;border-radius:99px;cursor:pointer;border:none;background:#22C55E;color:#111;transition:all .15s;font-family:inherit}
.sg-used:hover{background:#2AD264}
.sg-used.done{background:#22C55E;color:#111;cursor:default;opacity:.8}
.team-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.team-overlay.open{opacity:1;pointer-events:all}
.team-modal{background:#1A1A1A;border:2px solid #CDEB45;border-radius:20px;padding:32px;width:100%;max-width:400px;text-align:center}
.team-modal h2{font-size:18px;color:#CDEB45;margin:0 0 6px}
.team-modal p{font-size:13px;color:#888;margin:0 0 20px}
.team-select{width:100%;padding:12px;border-radius:12px;background:#111;border:2px solid #333;color:#FFF;font-size:14px;font-family:inherit;margin-bottom:12px;outline:none;cursor:pointer}
.team-select:focus{border-color:#CDEB45}
.team-go{width:100%;padding:12px;border:none;border-radius:12px;background:#CDEB45;color:#111;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .15s}
.team-go:hover{background:#D8F050}
.team-go:disabled{opacity:.4;cursor:not-allowed}
.lb-section{margin:60px 0 24px;padding-top:40px;border-top:1px solid #222}
.lb-campus{background:#1A1A1A;border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid #222}
.lb-campus-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.lb-row{display:flex;align-items:center;padding:8px 12px;border-radius:10px;margin-bottom:6px;font-size:13px}
.lb-row:nth-child(odd){background:#ffffff06}
.lb-rank{width:28px;font-weight:700;color:#888;flex-shrink:0}
.lb-rank.gold{color:#FFD700}
.lb-rank.silver{color:#C0C0C0}
.lb-rank.bronze{color:#CD7F32}
.lb-team{flex:1;font-weight:600;color:#EEE}
.lb-pts{font-weight:700;color:#CDEB45;font-size:14px}
.lb-streak{font-size:11px;color:#F5A623;margin-left:8px}
.lb-empty{color:#555;font-size:13px;font-style:italic;padding:8px 12px}
.lb-loading{color:#555;font-size:13px;text-align:center;padding:20px}

@keyframes confettiFall{0%{transform:translateY(-100px) rotate(0deg);opacity:1}100%{transform:translateY(400px) rotate(720deg);opacity:0}}
@keyframes pointPop{0%{transform:scale(0);opacity:0}40%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:1}}
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
.confetti{position:absolute;width:10px;height:10px;border-radius:2px;animation:confettiFall 1.5s ease-out forwards}
.point-popup{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);animation:pointPop .5s ease-out forwards}

.point-popup-btn{display:inline-block;margin-top:16px;padding:10px 24px;border:none;border-radius:99px;background:#CDEB45;color:#111;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .15s}
.point-popup-btn:hover{background:#D8F050}
.point-popup-inner{background:#111;border:3px solid #CDEB45;border-radius:24px;padding:24px 40px;text-align:center;box-shadow:0 0 60px rgba(205,235,69,.3)}
.point-popup-emoji{font-size:48px;margin-bottom:8px}
.point-popup-text{font-size:24px;font-weight:800;color:#CDEB45;font-family:"Space Grotesk",sans-serif}
.point-popup-sub{font-size:13px;color:#888;margin-top:4px}
</style></head><body><div id="app"></div>
<script>

const HT={
"Google Earth":"<ol><li>Open <b>earth.google.com</b> in Chrome.</li><li>Click <b>Projects → New Project</b>.</li><li>Search for locations and click <b>Add to project</b> to pin them.</li><li>For each pin, add a <b>title, description and images</b>.</li><li>Click the <b>microphone icon</b> to record voice narration at each stop.</li><li>Click <b>Present</b> to fly between locations with narration playing automatically.</li></ol><div class=\"sg-howto-tip\">Tip: Students can collaborate on a shared project by clicking the share icon.</div>",
"Scratch":"<ol><li>Open <b>scratch.mit.edu</b> and click <b>Create</b>.</li><li>Add <b>sprites</b> (characters) and <b>backdrops</b> (scenes) from the library or draw your own.</li><li>Use the <b>block-based code</b> to make sprites move, talk, sense and react.</li><li>Use <b>Events</b> blocks (green flag, key press, sprite click) to trigger actions.</li><li>Use <b>Control</b> blocks (if/then, repeat, wait) for game logic.</li><li>Click the <b>green flag</b> to test, then <b>Share</b> when ready.</li></ol><div class=\"sg-howto-tip\">Tip: Start with the Scratch tutorials (click Tutorials in the top bar) for step-by-step guided projects.</div>",
"Scratch Jr":"<ol><li>Open the <b>Scratch Jr app</b> on the iPad.</li><li>Tap <b>+</b> to start a new project.</li><li>Choose or draw <b>characters</b> and <b>backgrounds</b>.</li><li>Drag <b>coding blocks</b> together to make characters move, jump, grow, shrink and speak.</li><li>Tap the <b>green flag</b> to play the animation.</li><li>Add extra <b>pages</b> (like slides) to create a multi-scene story.</li></ol><div class=\"sg-howto-tip\">Tip: Use the paint editor to let students draw their own characters — great for younger learners.</div>",
"Seesaw":"<ol><li>Open <b>Seesaw</b> and go to the class journal.</li><li>Tap <b>Add</b> (+) to start a new post.</li><li>Choose the tool: <b>photo, video, drawing, voice recording, link or file</b>.</li><li>Students capture their work and <b>annotate</b> with labels, arrows and voice.</li><li>Tap the <b>green tick</b> to submit for teacher approval.</li></ol><div class=\"sg-howto-tip\">Tip: Create an Activity template with instructions so students know exactly what to do.</div>",
"Book Creator":"<ol><li>Open <b>bookcreator.com</b> and select your class library.</li><li>Click <b>New Book</b> and choose a template or blank page.</li><li>Add content: <b>text, images, drawings, audio recordings, videos and shapes</b>.</li><li>Use the <b>record button</b> for voice narration on any page.</li><li>Add more <b>pages</b> to build out the book.</li><li>Click <b>Publish</b> to share as a link or export as ePub/PDF.</li></ol><div class=\"sg-howto-tip\">Tip: Use the comic book template for visual storytelling or the blank template for information reports.</div>",
"Canva":"<ol><li>Open <b>canva.com</b> and click <b>Create a design</b>.</li><li>Choose a format: <b>poster, presentation, infographic, video</b> etc.</li><li>Use <b>templates</b> as a starting point or start from scratch.</li><li>Drag in <b>text, images, icons, shapes and charts</b> from the sidebar.</li><li>Upload your own <b>photos</b> using the Uploads tab.</li><li>Click <b>Share → Download</b> or <b>Share → Link</b> to publish.</li></ol><div class=\"sg-howto-tip\">Tip: Use Canva Education for free premium features and classroom integration.</div>",
"Padlet":"<ol><li>Open <b>padlet.com</b> and click <b>Make a padlet</b>.</li><li>Choose a format: <b>Wall, Canvas, Timeline, Map, Grid</b> or others.</li><li>Set a <b>title</b> and description.</li><li>Share the <b>link or QR code</b> with students.</li><li>Students tap <b>+</b> to add posts with <b>text, images, links, audio or video</b>.</li><li>Students can <b>comment and react</b> on each other's posts.</li></ol><div class=\"sg-howto-tip\">Tip: Use the Map format for geographic projects — students pin locations and add multimedia at each point.</div>",
"Mentimeter":"<ol><li>Open <b>mentimeter.com</b> and click <b>New presentation</b>.</li><li>Add a slide and choose the type: <b>word cloud, poll, quiz, scales, open-ended</b>.</li><li>Type your <b>question</b>.</li><li>Click <b>Present</b> and share the <b>join code</b> with students.</li><li>Students go to <b>menti.com</b>, enter the code and respond.</li><li>Results appear <b>live on screen</b> in real time.</li></ol><div class=\"sg-howto-tip\">Tip: Word clouds work brilliantly for tuning-in provocations — instant visual of the class's thinking.</div>",
"iMovie":"<ol><li>Open <b>iMovie</b> on iPad or Mac.</li><li>Tap <b>Create Project → Movie</b>.</li><li>Import <b>video clips and photos</b> from the camera roll.</li><li>Drag clips onto the <b>timeline</b> and trim them.</li><li>Add <b>titles, transitions and background music</b>.</li><li>Record a <b>voiceover</b> by tapping the microphone icon.</li><li>Tap <b>Share</b> to export the finished video.</li></ol><div class=\"sg-howto-tip\">Tip: Use the Trailer templates for polished-looking news reports and documentaries.</div>",
"GarageBand":"<ol><li>Open <b>GarageBand</b> on iPad or Mac.</li><li>Choose <b>Live Loops, Tracks or Drummer</b> to start.</li><li>Tap instruments to <b>play and record</b> — keyboard, guitar, drums, strings.</li><li>Use <b>Smart Instruments</b> for students who do not play an instrument.</li><li>Layer multiple <b>tracks</b> together to build a composition.</li><li>Tap <b>Share</b> to export as an audio file.</li></ol><div class=\"sg-howto-tip\">Tip: Use Live Loops for quick, fun music creation — students tap cells to build arrangements without needing to play notes.</div>",
"Microsoft Forms":"<ol><li>Open <b>forms.office.com</b> and click <b>New Form</b>.</li><li>Add questions: <b>choice, text, rating, date, ranking, Likert</b>.</li><li>Toggle <b>Required</b> for must-answer questions.</li><li>Click <b>Share</b> and copy the link or QR code.</li><li>Students open the link and submit responses.</li><li>Click <b>Responses</b> to see results in real time with auto-generated charts.</li></ol><div class=\"sg-howto-tip\">Tip: Use the Quiz mode for self-marking assessments with automatic scores and feedback.</div>",
"Kahoot":"<ol><li>Open <b>kahoot.com</b> and click <b>Create</b>.</li><li>Add <b>questions</b> with multiple choice answers and mark the correct one.</li><li>Set a <b>time limit</b> per question.</li><li>Click <b>Play</b> and choose <b>Classic</b> (individual) or <b>Team</b> mode.</li><li>Students join at <b>kahoot.it</b> with the game PIN.</li><li>Results show on the <b>leaderboard</b> after each question.</li></ol><div class=\"sg-howto-tip\">Tip: Use it as a diagnostic at the start of a unit to reveal what students already know and where misconceptions are.</div>",
"Adobe Express":"<ol><li>Open <b>express.adobe.com</b> and sign in with school account.</li><li>Click <b>Create new</b> and choose: <b>poster, video, webpage, social post</b>.</li><li>Use <b>templates</b> or start blank.</li><li>Add <b>text, images, icons, video clips and animations</b>.</li><li>Use <b>brand tools</b> to keep consistent colours and fonts.</li><li>Click <b>Download</b> or <b>Share link</b> to publish.</li></ol><div class=\"sg-howto-tip\">Tip: The video tool is great for animated explainer videos — students add voiceover and the visuals animate automatically.</div>",
"Micro:bit":"<ol><li>Open <b>makecode.microbit.org</b> and click <b>New Project</b>.</li><li>Drag <b>coding blocks</b> to program the micro:bit.</li><li>Use blocks for <b>LED display, buttons, sensors</b> (light, temperature, accelerometer, compass).</li><li>Click <b>Download</b> and drag the file onto the micro:bit (connected via USB).</li><li>The program runs on the <b>physical device</b> immediately.</li></ol><div class=\"sg-howto-tip\">Tip: Start with the LED display — students can show their name, an icon, or a scrolling message as their first program.</div>",
"Sphero":"<ol><li>Open the <b>Sphero Edu</b> app on iPad.</li><li>Connect to a <b>Sphero robot</b> via Bluetooth.</li><li>Choose <b>Draw, Block or Text</b> coding mode.</li><li>Draw a path or drag blocks to <b>control movement, lights, speed and sounds</b>.</li><li>Tap <b>Start</b> to run the program on the physical robot.</li><li>Iterate: observe, adjust code, try again.</li></ol><div class=\"sg-howto-tip\">Tip: Use Draw mode for younger students — they draw the path and the robot follows it.</div>",
"Beebots":"<ol><li>Place the <b>Beebot</b> on a mat or floor space.</li><li>Press the <b>arrow buttons</b> (forward, back, left turn, right turn) to enter a sequence.</li><li>Press <b>Go</b> and the Beebot follows the programmed path.</li><li>Press <b>X</b> (clear) to reset and try a new sequence.</li><li>Students <b>predict</b> where it will end up, then <b>test and adjust</b>.</li></ol><div class=\"sg-howto-tip\">Tip: Create custom mats using butcher paper — draw a grid of squares matching the Beebot step size (15cm).</div>",
"Cubetto":"<ol><li>Place <b>Cubetto</b> on a mat.</li><li>Slot the coloured <b>coding blocks</b> into the board (green=forward, red=right, yellow=left, blue=function).</li><li>Press the <b>blue button</b> to run the sequence.</li><li>Students watch Cubetto move and <b>debug</b> if it goes wrong.</li><li>Use the <b>function line</b> to create reusable sub-routines.</li></ol><div class=\"sg-howto-tip\">Tip: No screen needed — perfect for Prep and Year 1 as a tangible introduction to sequencing.</div>",
"Indi Robot":"<ol><li>Place <b>Indi</b> on a flat surface with the <b>colour tiles</b>.</li><li>Arrange tiles in a path — each <b>colour triggers a different action</b> (green=go, red=stop, purple=turn).</li><li>Press <b>Go</b> and Indi drives over the tiles, responding to each colour.</li><li>Students <b>rearrange tiles</b> to change the behaviour.</li><li>Challenge: create a path that solves a problem or tells a story.</li></ol><div class=\"sg-howto-tip\">Tip: Great for screen-free coding — students learn cause and effect through physical experimentation.</div>",
"CoDrone EDU":"<ol><li>Open the <b>Robolink Codrone</b> app or <b>Python IDE</b>.</li><li>Connect the <b>CoDrone EDU</b> via the smart controller.</li><li>Use <b>block coding</b> (Blockly) or <b>Python</b> to program flight paths.</li><li>Set <b>takeoff, movement, altitude, rotation and landing</b> commands.</li><li>Click <b>Run</b> and the drone executes the programmed flight.</li></ol><div class=\"sg-howto-tip\">Tip: Start with simple hover-and-land programs before progressing to flight paths. Always fly in a clear open space.</div>",
"Lego Spike":"<ol><li>Build a <b>Lego Spike</b> model using the instructions in the app.</li><li>Open the <b>Spike app</b> and connect the hub via Bluetooth.</li><li>Use <b>drag-and-drop blocks</b> to program motors, sensors and the LED matrix.</li><li>Test and <b>iterate</b> — adjust the build and the code together.</li><li>Use <b>sensors</b> (colour, distance, force) to make the robot respond to its environment.</li></ol><div class=\"sg-howto-tip\">Tip: The build-and-code cycle teaches computational thinking — students learn that hardware and software work together.</div>",
"Tinkercad":"<ol><li>Open <b>tinkercad.com</b> and sign in with class code.</li><li>Click <b>Create new design</b>.</li><li>Drag <b>3D shapes</b> onto the workplane — cubes, cylinders, spheres, text.</li><li>Use <b>resize, rotate, lift and group</b> to combine shapes.</li><li>Use <b>Hole</b> shapes to cut through other objects.</li><li>Export as <b>STL</b> for 3D printing or share the link.</li></ol><div class=\"sg-howto-tip\">Tip: Start with the built-in tutorials — the Starter lessons teach all the basic skills in 10 minutes.</div>",
"Pico VR":"<ol><li>Power on the <b>Pico VR headset</b> and put it on.</li><li>Use the <b>controller</b> to navigate menus.</li><li>Open pre-loaded <b>VR experiences</b> or launch a browser for web-based VR.</li><li>Students explore <b>360-degree environments</b> by looking around.</li><li>Use in <b>guided sessions</b> with teacher supervision.</li></ol><div class=\"sg-howto-tip\">Tip: Keep VR sessions to 10-15 minutes and have students seated. Pre-load the experiences before the lesson.</div>",
"Insta360":"<ol><li>Mount the <b>Insta360 camera</b> on a tripod or selfie stick.</li><li>Connect via the <b>Insta360 app</b> on a phone/iPad.</li><li>Tap <b>record</b> to capture 360-degree photos or video.</li><li>Use the app to <b>edit</b> — choose viewing angles, add effects, trim clips.</li><li>Export as a <b>standard video</b> or <b>interactive 360 file</b>.</li></ol><div class=\"sg-howto-tip\">Tip: Great for virtual tours — students film a location and classmates can look around in every direction.</div>",
"DJI Drone":"<ol><li><b>Teacher-operated only</b> — students direct but do not fly.</li><li>Open the <b>DJI app</b> and connect the drone.</li><li>Take off in a <b>clear, open outdoor space</b>.</li><li>Capture <b>aerial photos and video</b> of the school, local area or environment.</li><li>Students use the footage in their <b>projects, presentations and reports</b>.</li></ol><div class=\"sg-howto-tip\">Tip: Plan the flight path with students beforehand — they sketch what they want to capture and why.</div>",
"Delightex (CoSpaces)":"<ol><li>Open <b>cospaces.io</b> and click <b>Create new CoSpace</b>.</li><li>Choose a <b>3D or VR environment</b>.</li><li>Drag in <b>objects, characters and buildings</b> from the library.</li><li>Use <b>CoBlocks</b> (visual coding) to animate objects — movement, speech, triggers.</li><li>Click <b>Play</b> to test in 3D or <b>Share</b> for VR viewing.</li></ol><div class=\"sg-howto-tip\">Tip: Students can explore each others creations in VR using the Pico headsets for a fully immersive experience.</div>"
};
const D=[{"ca": "Glen Waverley", "yl": "Prep", "th": "Who We Are", "ci": "Schools are organised to help students learn and work together", "lo": "The organisation of the Junior School; Routines that allow developing independence; How to make the classroom and playground healthy and safe", "s": [{"t": "Canva Video", "d": "Students produce a 'Welcome to Our School' video tour — each small group films a section of the school (library, classroom, playground, office) with a student guide explaining the routines and rules that make that space work. The teacher edits the segments into one continuous tour with title cards and transitions, creating a real resource that could be shown to new Prep families at orientation — their work has genuine purpose beyond the classroom.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code a 'My School Day' animation in Scratch Jr showing the daily routine sequence — a character arrives at school, unpacks their bag, sits on the mat for morning circle, goes to the library, eats lunch, plays outside, packs up. Each scene demonstrates a routine that builds independence, and the animation plays automatically when the green flag is pressed — the student built a working model of their school day.", "c": "end"}, {"t": "Green Screen", "d": "Students dress up as different school helpers (teacher, librarian, crossing guard, principal) and film themselves in front of the green screen explaining their role — with the green screen placing them in the actual school location where that person works. The class watches all the performances together, connecting each role to the routines that help the school community function.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph and label examples of daily routines that help them learn independently, building a visual sequence of their school day from arrival to home time.", "c": "middle"}, {"t": "Cubetto", "d": "Students program Cubetto to navigate a floor map of the campus, visiting the library, classroom and playground in the correct daily routine sequence, explaining each stop's purpose.", "c": "middle"}, {"t": "Indi Robot", "d": "Students use colour-coded cards to program Indi Robot to follow the sequence of their daily school routines (pack bag → line up → enter classroom → morning circle), connecting the step-by-step coding to the independence skills and routines practised throughout the unit.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw themselves and record a voice note answering the question: 'What does the organisation of the junior school mean to you?' — creating a personal snapshot that the class can revisit at the end of the unit to see how thinking has changed.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create an 'All About Me' page featuring drawings and voice recordings about routines that allow developing independence, starting a personal book they will add to throughout the unit as their understanding of schools are organised to help students learn and work together grows.", "c": "beginning"}, {"t": "Padlet", "d": "Students post a photo of their favourite place in the school (library, playground, classroom, garden) to a shared Padlet wall with a voice recording explaining what happens there and who helps them. The class gathers around the screen, groups the places by purpose (learning, playing, eating), and discovers how the school is organised into systems that help everyone — the central idea made visible through 25 real perspectives at once.", "c": "beginning"}]}, {"ca": "Glen Waverley", "yl": "Prep", "th": "Where We Are in Place and Time", "ci": "Family histories shape who we are and what we value", "lo": "What makes a family; The people in your family; Your family history; What is important to your family", "s": [{"t": "Canva Video", "d": "Students produce a 'My Family' mini documentary — filming their family tree artwork (created with autumn leaf rubbings), the special family item they brought from home, and a to-camera interview where they explain where their family comes from and what traditions matter most. The teacher adds family photos (sent by parents) as cutaway images, creating a personal family history film that becomes a treasured keepsake — shared at Student Led Conference.", "c": "end"}, {"t": "Green Screen", "d": "Students film themselves in front of the green screen 'visiting' a place connected to their family history — their grandparents' country, the hospital where they were born, the first home their family lived in. They narrate the story of why this place matters to their family while the green screen transports them there, creating a personal family history documentary that brings distant places into the classroom.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code a 'My Family Timeline' animation in Scratch Jr showing key moments — grandparents' story, parents meeting, the student being born, starting school. Characters appear, backgrounds change between scenes, and the student records voice narration explaining each moment. The timeline plays automatically, creating a coded family story that the student built themselves — shared at Student Led Conference as proof of their learning.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph and narrate their family tree artwork (created with leaf rubbings and family member cut-outs), explaining who is in their family and the connections between generations.", "c": "middle"}, {"t": "Book Creator", "d": "Collaborative class book where each student contributes a page about something their family does together, inspired by 'Our Table' by Peter H. Reynolds and the homework activity where families photographed something they do together.", "c": "middle"}, {"t": "Google Maps", "d": "Students explore their own home location on Google Maps and take a screenshot, then use Seesaw to record what they notice about the place where they live — connecting to the unit's focus on what makes a family.", "c": "beginning"}, {"t": "Book Creator", "d": "Students start a 'Then and Now' book by drawing or photographing something from their life connected to the people in your family, adding voice recordings explaining what they think it looked like in the past.", "c": "beginning"}, {"t": "Padlet", "d": "Students post a family photo brought from home to a shared Padlet wall with a voice recording explaining who is in the photo and why it is special. The class sees all 25 family photos at once and begins to notice — some families are big, some small, some have grandparents nearby, some far away. The wall becomes a visual provocation that launches the inquiry into what makes a family and how family histories shape us.", "c": "beginning"}, {"t": "GarageBand", "d": "Students record a short 'family story' podcast in GarageBand — retelling a favourite family memory shared by a parent or grandparent, adding background music that matches the mood of the story. The recordings are played during circle time, creating an oral history archive that connects to the unit's focus on how family histories shape who we are — audio storytelling that couldn't exist without recording and layering tools.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Prep", "th": "How We Express Ourselves", "ci": "Emotions influence our wellbeing.", "lo": "How our feelings and emotions affect us; How feelings and emotions are interpreted; How our emotions and behaviour affect relationships", "s": [{"t": "Book Creator", "d": "Students create a personal 'Emotions Dictionary' connecting each emotion to the Colour Monster zones and Inside Out characters, with drawings showing how they recognise each feeling in themselves and photos of their Seesaw emotion-matching task.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code a 'Colour Monster' interactive story in Scratch Jr where the Colour Monster character changes colour based on different scenarios — moving to a new school (yellow/worried), making a friend (pink/happy), losing a toy (blue/sad). Each scene includes a voice recording of the student explaining the management strategy for that emotion, connecting to the Zones of Regulation framework explored throughout the unit.", "c": "end"}, {"t": "GarageBand", "d": "Students compose a 'Feelings Soundscape Suite' — four short GarageBand compositions, each representing one Zone of Regulation (blue=low energy, green=ready to learn, yellow=heightened, red=extremely heightened). They select instruments, tempo and volume to match each zone, then present the suite to the class who must guess which zone each piece represents — proving they understand how emotions can be expressed through music, not just words.", "c": "end"}, {"t": "Seesaw", "d": "Weekly emotion check-in where students select a Colour Monster zone, photograph themselves showing that emotion, and voice-record why they feel that way and what strategy they could use.", "c": "middle"}, {"t": "GarageBand", "d": "Students create short soundscapes representing different emotions (calm, excited, sad, angry), connecting to music lessons where they explored how composers portray feelings through changes in tempo and dynamics.", "c": "middle"}, {"t": "Seesaw", "d": "Students use the camera and drawing tools to create a 'Before I Knew' page showing what how our feelings and emotions affect us looks like to them right now — using pictures, labels and voice recording to capture their starting understanding.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page showing different ways they can express the idea of how feelings and emotions are interpreted — through drawing, voice, photos and text — exploring which method feels most natural to them.", "c": "beginning"}, {"t": "GarageBand", "d": "Students listen to four short GarageBand compositions the teacher pre-made — one fast and loud (angry), one slow and gentle (calm), one bouncy and bright (happy), one low and quiet (sad). Without being told which emotion each represents, students draw what they felt and share their drawings. The class discovers that music communicates emotions without words — connecting to how feelings and emotions are interpreted differently by different people.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about how our feelings and emotions affect us.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Prep", "th": "How the World Works", "ci": "The properties of materials influence how objects move and their use.", "lo": "Properties of materials; How objects move; How we use materials", "s": [{"t": "Sphero", "d": "Students build a 'Materials Testing Track' — constructing a course from different materials (carpet square, aluminium foil sheet, sandpaper strip, plastic wrap, fabric) and programming Sphero to roll across each surface at the same speed. They film each run in slow motion, measure how far Sphero travels on each material, and rank the materials from most to least friction — presenting their findings as a live demonstration at the class 'Materials Expo'.", "c": "end"}, {"t": "iMovie", "d": "Students produce a 'Materials Detectives' investigation video — filming themselves conducting the 'Design a Floater' challenge, capturing the moment their creation sinks or floats in slow motion, then explaining to camera which material properties made the difference. Each group tests a different material combination, and the videos are compiled into a class investigation reel showing the full range of results.", "c": "end"}, {"t": "Book Creator", "d": "Students create an interactive 'Materials Museum' book where each page features a different material explored during the unit — with a photo of the material, an embedded voice recording of the student describing its properties using scientific vocabulary (rough, smooth, hard, soft, transparent, opaque), and a video clip of the material being tested on the ramp or in the float/sink investigation. The museum book is shared with parents as a digital exhibition.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph each step of their ramp experiments (slide and roll tests) and use drawing tools to label which materials moved fastest and why, building vocabulary about material properties.", "c": "middle"}, {"t": "Beebots", "d": "Students program Beebots to move across different material surfaces (carpet, tile, cardboard) placed along the path, predicting and observing how the material properties affect movement — connecting to the slide-and-roll investigation findings.", "c": "beginning"}, {"t": "Indi Robot", "d": "Students place colour cards along a path representing different material properties (hard, soft, rough, smooth), programming Indi Robot to follow the trail and stop at each station where they describe the material, connecting colour-coded sorting to the material classification activities from the mystery bag provocation.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph or draw something from their environment connected to properties of materials and record a voice note explaining what they think is happening and why — capturing their scientific thinking before investigations begin.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about properties of materials.", "c": "middle"}, {"t": "Padlet", "d": "Students drop pins on a shared Padlet Map of the school showing where they found different materials during their investigations — metal on the playground equipment, wood on the garden beds, plastic in the classroom. Each pin includes a photo and voice recording describing the material's properties, building a collaborative 'Materials Map' that reveals patterns about which materials are used where and why.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Prep", "th": "How We Organise Ourselves", "ci": "The products people use go through a process of change.", "lo": "Where food comes from; How food can be changed for different purposes; An appreciation of food", "s": [{"t": "iMovie", "d": "Students produce a 'From Farm to Fork' mini documentary — each group films one food's journey using toy props and real food items as actors (a toy cow becomes milk, flour becomes bread, an egg becomes a cake). They use stop-motion for the transformation scenes and narrate the process using sequencing language (first, then, next, finally), creating a visual story of how products change that couldn't exist without video editing.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code a 'Food Journey' animation in Scratch Jr showing the step-by-step process of one food product changing from raw material to finished product — a wheat seed grows into a plant, gets harvested, ground into flour, mixed into dough, baked into bread, and eaten. Each stage is a new scene with characters that move and transform, building a coded model of the process of change that plays automatically.", "c": "end"}, {"t": "Green Screen", "d": "Students film themselves as 'food reporters' in front of the green screen, transporting themselves to the different stages of the food journey — standing in a wheat field, inside a flour mill, in a bakery kitchen, at a supermarket. They narrate each stage of the process, explaining how the food changed and why, creating a news-style report that takes the audience on a journey through places they couldn't physically visit in one lesson.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph each step of classroom cooking experiences and label the process, building procedural writing skills while documenting how food changes through preparation.", "c": "middle"}, {"t": "Insta360 Cam", "d": "DLC captures 360° footage at the Chesterfield Farm excursion, students explore the immersive video back in class to revisit the farm-to-food journey and describe what they observed about where food comes from.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw or photograph an example of where food comes from from their everyday life, then record a voice note explaining how it works — building a class collection of real-world connections before the inquiry begins.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph examples of how food can be changed for different purposes around the school or home and create a Book Creator page sorting them into categories, with voice recordings explaining their grouping — practising the classification skills they will develop in the unit.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore Chesterfield Farm on Google Earth satellite view before the excursion, spotting the paddocks, barns, and animal enclosures from above. They predict what food comes from which area of the farm, then compare their predictions with what they actually discover during the visit — building geographic awareness and connecting the 'bird's-eye view' to the real experience of where food comes from.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about where food comes from.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Year 1", "th": "Who We Are", "ci": "Emotions, values, and relationships guide how we connect and collaborate", "lo": "The function of different parts of the brain; Situations that cause pleasant and unpleasant feelings; Actions that support wellbeing", "s": [{"t": "Green Screen", "d": "Students perform role-plays in front of the green screen showing how their thoughts, feelings and actions determine relationship quality — placed in realistic settings (playground, classroom, home) via the green screen. Each group demonstrates a different scenario: one shows exclusion and repair, another shows cooperation during a challenge, another shows resolving a disagreement — creating a library of relationship strategies the class can rewatch.", "c": "end"}, {"t": "iMovie", "d": "Students produce a 'Wellbeing Warriors' documentary interviewing classmates about the States of Mind practices that help them most — filming on location at the places around school where they practise mindfulness, perseverance and emotional management. The documentary includes slow-motion footage of PE cooperative activities showing teamwork in action, with student narrators connecting the strategies to real moments.", "c": "end"}, {"t": "GarageBand", "d": "Students create a 'Feelings Playlist' in GarageBand — composing four short pieces, each representing a different emotional state explored through the unit. They select instruments, tempo and dynamics to communicate each feeling, then present the playlist to the class who must identify which emotion each piece represents. The playlist becomes a class resource played during transitions and calm-down time.", "c": "end"}, {"t": "Seesaw", "d": "Weekly wellbeing reflection where students use drawing and voice to describe situations that caused pleasant or unpleasant feelings, connecting to the Colour Monster emotion-naming activities and the library books about empathy and friendship (including 'Boy' by Phil Cummings).", "c": "middle"}, {"t": "Scratch Jr", "d": "Students code a simple two-scene Scratch Jr animation showing a relationship scenario — Scene 1: two characters are in conflict (not sharing, arguing), Scene 2: the characters use a strategy from the Colour Monster vocabulary (talk about feelings, take turns, walk away and breathe). The animation runs automatically, creating a visual model of how actions determine relationship quality.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw themselves and record a voice note answering the question: 'What does the function of different parts of the brain mean to you?' — creating a personal snapshot that the class can revisit at the end of the unit to see how thinking has changed.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create an 'All About Me' page featuring drawings and voice recordings about situations that cause pleasant and unpleasant feelings, starting a personal book they will add to throughout the unit as their understanding of emotions, values, and relationships guide how we connect and collaborate grows.", "c": "beginning"}, {"t": "Padlet", "d": "Students post a drawing of a time they felt a strong emotion at school (excited, frustrated, proud, worried) to a shared Padlet wall with a voice recording explaining what happened and what they did. The class sees all 25 emotion stories at once and the teacher groups them by type — revealing that everyone experiences similar feelings but responds differently, launching the inquiry into how emotions guide connections.", "c": "beginning"}, {"t": "Book Creator", "d": "Students add to their ongoing wellbeing book, documenting new strategies for managing emotions with drawings, photos of PE cooperative activities, and voice recordings explaining how their understanding of relationships has grown through the Boy by Phil Cummings discussions and States of Mind activities.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Year 1", "th": "Where We Are in Place and Time", "ci": "An understanding of history helps us to see how the past shapes the future.", "lo": "Ways in which children's lives have changed over time; Reasons for changes to children's lives over time", "s": [{"t": "iMovie", "d": "Students produce a 'Then and Now Museum' video — each group sets up a table display with a toy from the past (from the incursion) next to its modern equivalent, then films a museum-guide-style walkthrough explaining the differences, when the change happened, and why. Slow-motion close-ups highlight the details (clockwork mechanism vs electronic chip, wooden blocks vs plastic Lego), and student guides deliver the verdict: 'the biggest change was...'", "c": "end"}, {"t": "Green Screen", "d": "Students film themselves presenting as 'Time Travellers' — standing in front of a green screen that places them in a black-and-white Victorian classroom, then 'jumping' to a colourful modern classroom. They demonstrate what school was like then vs now (slate boards vs iPads, dunce caps vs growth mindsets), comparing the past with the present using the vocabulary of continuity and change built throughout the unit.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code a 'Toy Timeline' animation in Scratch Jr showing how a toy evolved through history — a wooden spinning top transforms into a wind-up toy, then into a battery-powered version, then into an iPad game. Each stage is a new scene with the toy changing shape and the background shifting from old-fashioned to modern, creating a coded model of change over time that plays automatically.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph old and new objects from the incursion and use drawing tools to annotate differences, building on the 'How old am I?' timeline sorting activity.", "c": "middle"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class timeline book, each featuring a memory they treasure (from the initial reflection sharing activity) alongside research about how that aspect of life has changed.", "c": "beginning"}, {"t": "Google Maps", "d": "Students explore their own home location on Google Maps and take a screenshot, then use Seesaw to record what they notice about the place where they live — connecting to the unit's focus on ways in which children's lives have changed over time.", "c": "beginning"}, {"t": "Padlet", "d": "Students post a photo of a treasured object from home (a toy, a blanket, a photo) to a shared Padlet wall with a voice recording explaining its story — where it came from, how old it is, why it matters. The class discovers that everyday objects carry history, launching the inquiry into how understanding the past helps us see the present.", "c": "beginning"}, {"t": "GarageBand", "d": "Students create 'Sounds of Then and Now' — recording pairs of sounds in GarageBand that represent past vs present versions of the same thing (a hand bell vs a phone ringtone, a music box vs a speaker playing Spotify, a typewriter clicking vs a keyboard tapping). The paired sounds become an audio provocation played during circle time, demonstrating change over time through a medium students can hear but not see.", "c": "middle"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class timeline book, each featuring a memory they treasure from the initial reflection sharing activity alongside research about how that aspect of life has changed — building a class record of continuity and change.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Year 1", "th": "How We Express Ourselves", "ci": "People use imagination and materials to express stories, ideas and culture through performance.", "lo": "Different materials to make puppets; Types and uses of puppets by different cultures; Features and purposes of puppet performances", "s": [{"t": "Canva Video", "d": "Students film their puppet performance using the puppets they constructed from various materials, adding titles and simple transitions to present their cultural story — building on vocabulary about features and purpose developed through watching puppet performances.", "c": "end"}, {"t": "Green Screen", "d": "Students film their puppet performance in front of the green screen, placing their handmade puppets (shadow puppets, popsicle stick puppets from French AIM Play, hand puppets) against culturally appropriate backdrops — a Balinese shadow puppet against a temple, a French puppet in a Parisian street, a sock puppet in a living room. The green screen transforms simple classroom puppets into world-travelling performers.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code a digital puppet show in Scratch Jr — programming puppet characters to walk on stage, speak dialogue, interact with each other and take a bow. Unlike the physical puppet performance filmed in iMovie, this version runs autonomously — the student wrote the script AND the stage directions in code. Comparing the live performance with the coded version teaches that the same story can be expressed through completely different mediums.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph their puppet-making process step-by-step, narrating their material choices (fabric, paper, sticks, socks) and design decisions — documenting how imagination and materials combine to create puppets for performance.", "c": "middle"}, {"t": "GarageBand", "d": "Students create a simple soundtrack or sound effects to accompany their puppet performance, exploring how music and sound enhance storytelling during performances.", "c": "middle"}, {"t": "Seesaw", "d": "Students use the camera and drawing tools to create a 'Before I Knew' page showing what different materials to make puppets looks like to them right now — using pictures, labels and voice recording to capture their starting understanding.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page showing different ways they can express the idea of types and uses of puppets by different cultures — through drawing, voice, photos and text — exploring which method feels most natural to them.", "c": "beginning"}, {"t": "GarageBand", "d": "Students create a 30-second 'puppet soundtrack' in GarageBand — choosing instruments and sounds that match the personality of a puppet character they imagine (drums for a brave puppet, gentle chimes for a shy puppet, fast piano for a funny puppet). They play their soundtrack to a partner who draws what they think the puppet looks like — discovering that sound is another way to express character before the class explores puppets from different cultures.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about different materials to make puppets.", "c": "middle"}, {"t": "Padlet", "d": "Students pin locations on a shared Padlet Map where different cultural practices or traditions connected to different materials to make puppets take place, adding images, descriptions and personal reflections — creating a visual map of cultural diversity.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Year 1", "th": "How the World Works", "ci": "Movement is dependent on different forces.", "lo": "Ways objects move; The influence different materials have on movement; How designs can be adapted and improved", "s": [{"t": "Sphero", "d": "Students design and build a 'Sphero Crash Test Lab' — constructing ramps from cardboard, fabric and foil, then programming Sphero to roll down each ramp at the same speed. They measure how far Sphero travels across carpet vs tiles vs grass, film the runs in slow motion on iPad, and present their ranked results explaining which material creates the most friction and why, adapting their ramp designs between rounds to improve performance.", "c": "end"}, {"t": "Lego Spike", "d": "Students build a Lego Spike catapult launcher that flings a ball across the room, then modify the launch angle, arm length and rubber band tension to change how far and how high the ball travels — recording each test with labelled slow-motion video, graphing their distances, and presenting their 'best design' alongside a poster explaining which force variables made the biggest difference.", "c": "end"}, {"t": "iMovie", "d": "Students produce a 'Mythbusters Junior' investigation video where they test a force-related claim from the unit (e.g., 'heavier objects always fall faster', 'smooth surfaces are always slippery'), filming their experiment with multiple camera angles, adding slow-motion replays of key moments, and delivering a verdict with evidence — connected to the ramp building and spinning tops that generated high engagement.", "c": "end"}, {"t": "Sphero", "d": "Students program Spheros to roll across different surfaces (carpet, tiles, grass) and measure distances to investigate how friction affects movement, comparing results to their hands-on ramp experiments.", "c": "middle"}, {"t": "Seesaw", "d": "Students use drawing tools to annotate photos of their ramp experiments, labelling the forces (push, pull, gravity, friction) and explaining how they adapted their designs after testing — practising the scientific communication skills from the unit.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph or draw something from their environment connected to ways objects move and record a voice note explaining what they think is happening and why — capturing their scientific thinking before investigations begin.", "c": "beginning"}, {"t": "Book Creator", "d": "Students draw their prediction of what will happen when they explore the influence different materials have on movement and record a voice note explaining their reasoning — creating a 'My Prediction' page to compare against results later.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore locations connected to the unit's focus using Google Earth satellite and street views, making initial observations and recording wonderings that will anchor their inquiry into ways objects move.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about ways objects move.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Year 1", "th": "How We Organise Ourselves", "ci": "Communities work together by creating systems to help people live and learn.", "lo": "The roles people play in a community; Systems and routines that help us stay organised; How communities work together to meet needs", "s": [{"t": "Lego Spike", "d": "Students build a Lego Spike community vehicle (postal van, fire truck, ambulance) with a working motor, then program it to follow a route on their class community map — stopping at locations where the service is needed. Each team presents their vehicle explaining what system it belongs to and what happens if it breaks down, connecting the engineering build to their investigation of how interdependent community systems help people.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a 'Day Without Systems' mockumentary — filming a comedy sketch showing what happens when one community system fails (the library has no borrowing rules so books disappear, the canteen has no queue system so lunch is chaos, the crossing has no guard so nobody can cross). The humour makes the learning memorable while demonstrating the central idea that communities need systems to function.", "c": "end"}, {"t": "Green Screen", "d": "Students film themselves as different community workers in front of the green screen — placed inside a hospital, fire station, post office, school office. Each student explains their role and demonstrates how their system connects to other community systems ('I'm the librarian — I organise books so teachers can find resources for lessons'), creating an interconnected web of community roles visible in one video compilation.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph examples of community systems in action around the school and annotate with labels explaining how each role and routine helps the community function.", "c": "middle"}, {"t": "Cubetto", "d": "Students program Cubetto to deliver 'mail' around a class-built community map, following a sequence of stops that demonstrates how community systems connect people and services.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build a simple Lego Spike community vehicle (postal van, fire truck, ambulance) with a motor, programming it to move along a route on their class community map, connecting the engineering build to their investigation of how community workers use systems to help people.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw or photograph an example of the roles people play in a community from their everyday life, then record a voice note explaining how it works — building a class collection of real-world connections before the inquiry begins.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph examples of systems and routines that help us stay organised around the school or home and create a Book Creator page sorting them into categories, with voice recordings explaining their grouping — practising the classification skills they will develop in the unit.", "c": "beginning"}, {"t": "Google Maps", "d": "Students explore the streets around Glen Waverley on Google Maps Street View, spotting community systems in action — the traffic lights controlling cars, the library building where books are shared, the fire station where help comes from. They screenshot three systems they find and the class discusses what would happen if each one disappeared — launching the inquiry into how communities work together.", "c": "beginning"}, {"t": "Padlet", "d": "Students pin significant locations on a shared Padlet Map connected to the roles people play in a community, adding photos, descriptions and personal connections — creating a collaborative class map that makes geographic learning visible.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Year 1", "th": "Sharing the Planet", "ci": "Invertebrates are essential to living things and the environment.", "lo": "The characteristics of invertebrates; The interdependence of invertebrates and their environment; Life cycles of invertebrates", "s": [{"t": "iMovie", "d": "Students produce an 'Invertebrate Investigators' documentary — each group films their chosen invertebrate (if found in the school garden) or uses close-up photos and drawings as visual evidence, adding slow-motion footage of insects moving and narrating key facts about structural features, habitat and life cycle. The documentary uses the scientific vocabulary built throughout the unit and includes the 'key learning' that invertebrates have no backbone.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code a life cycle animation in Scratch Jr showing their chosen invertebrate transforming through each stage — egg to larva to pupa to adult for butterflies, or egg to nymph to adult for grasshoppers. Characters change shape, grow, and move to new backgrounds between scenes, creating a coded model of the life cycle that plays automatically and can be compared with the physical life cycle models built during science.", "c": "end"}, {"t": "Green Screen", "d": "Students film themselves as 'garden reporters' in front of the green screen, transported inside the school garden ecosystem at macro scale — standing among giant leaves and towering flowers as if they were the size of an invertebrate. They report on the invertebrate they studied, explaining how its structural features help it survive in this environment, connecting the library focus on underwater invertebrates to the school garden investigations.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph invertebrates discovered in the school garden and use drawing tools to label body parts and structural features, connecting to the Visual Art printmaking inspired by invertebrate shapes, colours and patterns.", "c": "middle"}, {"t": "Insta360 Cam", "d": "DLC captures 360° footage of the school garden ecosystem, students explore the immersive video to spot invertebrates in their natural habitat and document observations about where plants and animals live.", "c": "middle"}, {"t": "Micro:bit", "d": "Students use micro:bit light and moisture sensors to collect data about conditions in the school garden where they observed invertebrates, comparing readings from different microhabitats to understand why certain invertebrates thrive in specific areas of the garden ecosystem.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw what the characteristics of invertebrates means to them and record a voice note explaining their thinking — creating a 'Before' snapshot that will be compared with their 'After' understanding at the end of the unit.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph or draw something from nature connected to the interdependence of invertebrates and their environment and create a Book Creator page with labels and a voice note explaining why it matters — starting a personal inquiry book.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore locations connected to the unit's focus using Google Earth satellite and street views, making initial observations and recording wonderings that will anchor their inquiry into the characteristics of invertebrates.", "c": "beginning"}, {"t": "Padlet", "d": "Students drop pins on a shared Padlet Map marking locations connected to the characteristics of invertebrates, adding photos, facts and reflections at each pin — building a collaborative geographic record of the class's environmental research.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Year 2", "th": "Who We Are", "ci": "Humans have a responsibility in their relationships to value the rights of others", "lo": "The difference between needs and wants; Everybody has rights and responsibilities; What is a respectful relationship", "s": [{"t": "Scratch Jr", "d": "Students code an interactive 'Choose Your Response' scenario in Scratch Jr where a character faces a friendship dilemma (based on the Rainbow Fish discussion and role-play scenario cards), and the viewer taps to choose a respectful or disrespectful response — each choice triggers a different animated consequence showing how rights are upheld or broken.", "c": "end"}, {"t": "Lego Spike", "d": "Students build a Lego Spike 'Needs vs Wants Sorting Machine' that uses the colour sensor to detect items placed in front of it and motor-drives them down two different paths (need or want), then present their programmed machine to the class explaining how the sorting rules connect to the brainstorm activity about rights, needs and wants.", "c": "end"}, {"t": "Green Screen", "d": "Students film a green screen news broadcast where they role-play reporters visiting different communities to investigate how rights are being upheld, transporting themselves to locations like schools, playgrounds and homes — connecting the scenario card role-plays to a professional broadcast format that couldn't exist without the technology.", "c": "end"}, {"t": "Padlet", "d": "Students post examples of respectful and disrespectful scenarios from class discussions, building a shared reference wall connecting friendship, conflict resolution and inclusion to the concept of valuing others' rights.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw and record weekly reflections about how their actions in music ensemble playing (learning their part, trying their best, working together) connect to responsibilities in relationships.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw themselves and record a voice note answering the question: 'What does the difference between needs and wants mean to you?' — creating a personal snapshot that the class can revisit at the end of the unit to see how thinking has changed.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create an 'All About Me' page featuring drawings and voice recordings about everybody has rights and responsibilities, starting a personal book they will add to throughout the unit as their understanding of humans have a responsibility in their relationships to value the rights of others grows.", "c": "beginning"}, {"t": "Padlet", "d": "Students respond to the provocation 'What does a respectful relationship look like?' by posting drawings and voice notes on a class Padlet board, sorting responses into 'rights' and 'responsibilities' columns — the teacher uses emerging themes to form inquiry groups.", "c": "beginning"}, {"t": "Book Creator", "d": "Students add to their ongoing inquiry book, documenting new learning about the difference between needs and wants with labelled diagrams, photographs and written reflections showing how their thinking is developing.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Year 2", "th": "Where We Are in Place and Time", "ci": "Exploring the past helps us to understand the present.", "lo": "Evidence and its significance in a place; Connections between the past and present within a place; Personal history shapes the present", "s": [{"t": "iMovie", "d": "Students produce an 'iMovie History Detectives' documentary combining footage from the Wonder Walk around Wesley Glen Waverley campus (plaques, statues, memorials, buildings) with photos from the Como House excursion, narrating what each piece of evidence reveals about the past — using slow-motion, zoom, and split-screen effects impossible without film production tools.", "c": "end"}, {"t": "Green Screen", "d": "Students film a green screen time-travel report where they 'visit' the Wesley campus in the past using the Old Wesley Picture Provocation as their backdrop, then switch to the present-day campus — performing as history reporters who compare what changed and what stayed the same, bringing the before-and-after evidence to life.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code an animated 'Then and Now' timeline in Scratch Jr where tapping a landmark sprite transforms it from its historical version to its present-day appearance, narrating the changes with recorded voice — connecting their family tree exploration from Prep to a digital interactive that shows how personal histories shape the present.", "c": "end"}, {"t": "Google Earth", "d": "Students explore the Glen Waverley area and Como House virtually, comparing satellite views with historical photos to analyse how the local community has changed while preserving significant places.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph historical evidence during the campus Wonder Walk excursion and annotate each image with the drawing tool, explaining what the evidence reveals about the past and how it connects to the present.", "c": "beginning"}, {"t": "Google Maps", "d": "Students explore their own home location on Google Maps and take a screenshot, then use Seesaw to record what they notice about the place where they live — connecting to the unit's focus on evidence and its significance in a place.", "c": "beginning"}, {"t": "Book Creator", "d": "Students start a 'Then and Now' book by drawing or photographing something from their life connected to connections between the past and present within a place, adding voice recordings explaining what they think it looked like in the past.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate evidence and its significance in a place, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Book Creator", "d": "Students add to their ongoing inquiry book, documenting new learning about evidence and its significance in a place with labelled diagrams, photographs and written reflections showing how their thinking is developing.", "c": "middle"}, {"t": "Padlet", "d": "Students trace routes on a shared Padlet Map showing journeys connected to evidence and its significance in a place, adding key events, dates and reflections at each stop — visualising how movement and exploration connect places and people.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Year 2", "th": "How We Express Ourselves", "ci": "Storytellers use different methods to convey meaning.", "lo": "Mediums and techniques artists use; Connections between story and illustrations; How ideas and information are communicated", "s": [{"t": "Book Creator",
