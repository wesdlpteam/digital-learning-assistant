<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wesley Digital Learning Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#111111;--sf:#1A1A1A;--tx:#F2F2F2;--mt:#999;--bd:#2A2A2A;--ac:#CDEB45;--ac2:#7ED957;--hl:#222}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Space Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.hd{background:var(--bg);position:sticky;top:0;z-index:100;caret-color:transparent}
.hi{max-width:700px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:10px;user-select:none}
.logo{height:34px;width:auto;border-radius:4px;mix-blend-mode:lighten}
.bk{background:var(--hl);border:none;color:#fff;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s}
.bk:hover{background:#333}
.hd h1{color:#FFF;font-size:15px;font-weight:700;letter-spacing:-.3px}
.hd-sub{color:#999;font-size:11px;font-weight:500;margin-top:1px}

.wp{max-width:700px;margin:0 auto;padding:0 20px 80px}
.fd{animation:fu .3s ease both}@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
#app{min-height:100vh}
.tab-fade .fd{animation:tf .15s ease both}@keyframes tf{from{opacity:.6}to{opacity:1}}

.hero{margin:24px 0 36px}
.hero-title{font-size:clamp(36px,9vw,56px);font-weight:700;line-height:1.08;letter-spacing:-2px;color:#FFF}
.hero-accent{color:var(--ac)}
.hero-sub{font-size:15px;color:var(--mt);margin-top:16px;line-height:1.6;max-width:400px}

.tag{display:inline-block;font-size:12px;font-weight:700;padding:6px 14px;border-radius:99px;background:var(--hl);color:#FFF;letter-spacing:.2px}
.tag-t{display:inline-block;font-size:10px;font-weight:700;padding:4px 12px;border-radius:99px;background:rgba(0,0,0,.15);letter-spacing:.3px}
.tag-tool{display:inline-block;font-size:12px;font-weight:700;padding:6px 14px;border-radius:99px;letter-spacing:.2px}
.tag-meta{display:inline-block;font-size:12px;font-weight:700;padding:6px 14px;border-radius:99px;background:var(--hl);color:#BBB}

.cc{border-radius:20px;padding:28px;margin-bottom:12px;cursor:pointer;transition:transform .15s;position:relative;overflow:hidden}
.cc:hover{transform:scale(1.01)}
.cc-wm{position:absolute;right:-20px;bottom:-20px;font-size:110px;font-weight:800;opacity:.1;line-height:1;letter-spacing:-6px;pointer-events:none}
.cc-inner{position:relative;z-index:1}
.cc-name{font-size:26px;font-weight:700;letter-spacing:-.5px}
.cc-sub{font-size:14px;margin-top:4px;font-weight:500}

.sec-title{font-size:clamp(28px,7vw,36px);font-weight:700;margin-top:14px;letter-spacing:-1px;color:#FFF;line-height:1.15}

.yg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.yc{background:var(--sf);border-radius:16px;padding:22px 18px;cursor:pointer;transition:all .15s;border:2px solid var(--bd);position:relative;overflow:hidden}
.yc:hover{border-color:var(--ac);background:rgba(205,235,69,.05);transform:translateY(-3px)}
.yc-dot{width:14px;height:14px;border-radius:4px;margin-bottom:14px}
.yc h3{font-size:20px;font-weight:700;letter-spacing:-.3px}.yc .cn{font-size:12px;color:var(--mt);margin-top:4px}

.uc{border-radius:16px;padding:20px 22px;margin-bottom:10px;cursor:pointer;transition:transform .15s;position:relative;overflow:hidden}
.uc:hover{transform:scale(1.01)}
.uc-emoji{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:48px;opacity:.3;pointer-events:none}
.uc-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;opacity:.5;margin-bottom:4px}
.uc-name{font-size:20px;font-weight:700;letter-spacing:-.3px;max-width:80%;line-height:1.2;color:inherit}

.dh{border-radius:20px;padding:28px 26px;margin:16px 0 20px;position:relative;overflow:hidden}
.dh-wm{position:absolute;right:-10px;bottom:-10px;font-size:100px;opacity:.15;line-height:1;pointer-events:none}
.dh-title{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1.15}
.dh-ci{font-size:15px;opacity:.8;margin-top:10px;line-height:1.6;font-style:italic}

.loi-box{background:var(--sf);border-radius:16px;padding:20px 22px;margin-bottom:20px;border:2px solid var(--bd)}
.loi-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mt);margin-bottom:12px}
.loi-item{padding:10px 0;border-bottom:1px solid var(--bd);font-size:14px;line-height:1.55;color:#EEE}
.loi-item:last-child{border-bottom:none}
.loi-num{font-weight:700;margin-right:8px}

.tb{display:flex;gap:6px;margin-bottom:18px;background:var(--sf);border-radius:14px;padding:5px}
.tt{flex:1;padding:12px 8px;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--mt);transition:all .2s;letter-spacing:-.2px}
.tt.on{background:var(--ac);color:#111}
.tt-count{font-weight:600;opacity:.7;font-size:11px}

.sg{background:var(--sf);border:2px solid var(--bd);border-radius:16px;overflow:hidden;margin-bottom:14px;transition:border-color .15s}
.sg:hover{border-color:var(--ac)}
.sg-pending{background:transparent;border:2px dashed #333;border-radius:16px;padding:28px 24px;margin-bottom:14px;text-align:center}
.sg-pending-icon{font-size:40px;margin-bottom:12px}
.sg-pending-title{font-size:16px;font-weight:700;color:#F5A623;margin-bottom:8px}
.sg-pending-msg{font-size:14px;line-height:1.6;color:#888;max-width:400px;margin:0 auto}
.sg-pending-cta{display:inline-block;margin-top:16px;font-size:13px;font-weight:600;color:#CDEB45;background:#CDEB4515;padding:8px 18px;border-radius:99px;border:1px solid #CDEB4530;text-decoration:none;cursor:pointer;transition:all .15s}
.sg-pending-cta:hover{background:#CDEB4530;color:#FFF}
.sg-head{padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--bd)}
.sg-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sg-meta{flex:1}
.sg-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mt)}
.sg-tool{font-size:17px;font-weight:700;letter-spacing:-.3px;margin-top:2px}
.sg-body{padding:16px 20px 20px}
.sg-desc{font-size:14px;line-height:1.7;color:#F2F2F2}
.sg-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px}
.sg-section{margin-top:16px}
.sg-refs{margin-top:14px}
.sg-ref-link{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--ac);text-decoration:none;padding:8px 12px;background:rgba(205,235,69,.08);border-radius:8px;margin-bottom:5px;border:1px solid rgba(205,235,69,.15);transition:background .15s}
.sg-ref-link:hover{background:rgba(205,235,69,.18);color:#fff}
.sg-ref-doc{background:rgba(126,217,87,.1);border-color:rgba(126,217,87,.2);color:var(--ac2)}
.sg-ref-doc:hover{background:rgba(126,217,87,.22);color:#fff}
.sg-label{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--mt);margin-bottom:6px}
.sg-label svg{width:15px;height:15px;flex-shrink:0}
.vb{background:rgba(205,235,69,.08);border-left:3px solid var(--ac);padding:11px 15px;border-radius:0 10px 10px 0;font-size:13px;color:#CDEB45;line-height:1.55;font-style:italic}

.cur-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.cur-pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;border:2px solid var(--bd);background:var(--sf);color:var(--tx);transition:all .2s;user-select:none}
.cur-pill:hover{border-color:var(--ac);background:rgba(205,235,69,.05)}
.cur-pill.open{border-color:var(--ac);background:rgba(205,235,69,.08)}
.cur-pill svg{width:12px;height:12px;transition:transform .2s;flex-shrink:0}
.cur-pill.open svg{transform:rotate(180deg)}
.cur-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cur-detail{overflow:hidden;max-height:0;transition:max-height .2s ease-out,padding .2s ease-out;padding:0 14px;background:rgba(205,235,69,.06);border-left:3px solid var(--ac);border-radius:0 8px 8px 0;font-size:12.5px;color:#CDEB45;line-height:1.5;margin-top:0}
.cur-detail.open{max-height:300px;padding:10px 14px;margin-top:6px;transition:max-height .3s ease-in,padding .3s ease-in}
.cur-detail b{font-weight:700}
.cur-detail li{color:#DDD}

.bb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:var(--ac);color:#111;border:none;border-radius:16px;padding:18px 24px;font-family:inherit;font-size:17px;font-weight:700;text-decoration:none;cursor:pointer;width:100%;margin-top:24px;letter-spacing:-.3px;transition:transform .15s}
.bb:hover{transform:scale(1.01)}
.bb-sub{font-size:12px;font-weight:500;opacity:.6}

@media(max-width:480px){.hero-title{font-size:36px}.cc-name{font-size:22px}.cc-wm{font-size:80px}}

.atl-section{margin-top:16px}
.atl-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.atl-pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;border:2px solid var(--bd);background:var(--sf);color:var(--tx);transition:all .2s;user-select:none}
.atl-pill:hover{border-color:#F5A623;background:rgba(245,166,35,.05)}
.atl-pill.open{border-color:#F5A623;background:rgba(245,166,35,.08)}
.atl-pill svg{width:12px;height:12px;transition:transform .2s;flex-shrink:0}
.atl-pill.open svg{transform:rotate(180deg)}
.atl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.atl-detail{overflow:hidden;max-height:0;transition:max-height .2s ease-out,padding .2s ease-out;padding:0 14px;background:rgba(245,166,35,.06);border-left:3px solid #F5A623;border-radius:0 8px 8px 0;font-size:12.5px;color:#F5A623;line-height:1.5;margin-top:0}
.atl-detail.open{max-height:300px;padding:10px 14px;margin-top:6px;transition:max-height .3s ease-in,padding .3s ease-in}
.atl-detail b{font-weight:700}
.atl-detail li{color:#DDD;margin-bottom:4px}
.wds-section{margin-top:12px}
.wds-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.wds-pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;border:2px solid var(--bd);background:var(--sf);color:var(--tx);transition:all .2s;user-select:none}
.wds-pill:hover{border-color:#9333EA;background:rgba(147,51,234,.05)}
.wds-pill.open{border-color:#9333EA;background:rgba(147,51,234,.08)}
.wds-pill svg{width:12px;height:12px;transition:transform .2s;flex-shrink:0}
.wds-pill.open svg{transform:rotate(180deg)}
.wds-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.wds-detail{overflow:hidden;max-height:0;transition:max-height .2s ease-out,padding .2s ease-out;padding:0 14px;background:rgba(147,51,234,.06);border-left:3px solid #9333EA;border-radius:0 8px 8px 0;font-size:12.5px;color:#9333EA;line-height:1.5;margin-top:0}
.wds-detail.open{max-height:400px;padding:10px 14px;margin-top:6px;transition:max-height .3s ease-in,padding .3s ease-in}
.wds-detail b{font-weight:700}
.wds-detail li{color:#DDD;margin-bottom:4px}

.sg-tool a:hover{text-decoration-color:#FFF}

.sg-fb{display:flex;align-items:center;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--bd);flex-wrap:wrap}
.sg-fb-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:8px 18px;border-radius:99px;cursor:pointer;text-decoration:none;border:none;background:#333;color:#AAA;transition:all .15s;font-family:inherit}
.sg-fb-btn:hover{background:#444;color:#FFF}
.fb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.fb-overlay.open{opacity:1;pointer-events:all}
.fb-modal{background:#1A1A1A;border:2px solid #333;border-radius:20px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.fb-title{font-size:18px;font-weight:700;color:#FFF;margin-bottom:4px}
.fb-sub{font-size:12px;color:#888;margin-bottom:20px}
.fb-context{font-size:13px;color:#CDEB45;background:#CDEB4510;border:1px solid #CDEB4530;border-radius:10px;padding:10px 14px;margin-bottom:16px;line-height:1.5}
.fb-label{font-size:12px;font-weight:600;color:#AAA;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fb-textarea{width:100%;min-height:100px;background:#111;border:2px solid #333;border-radius:12px;color:#FFF;font-family:inherit;font-size:14px;padding:12px;resize:vertical;outline:none;transition:border-color .15s;box-sizing:border-box}
.fb-textarea:focus{border-color:#CDEB45}
.fb-textarea::placeholder{color:#555}
.fb-actions{display:flex;gap:10px;margin-top:16px}
.fb-submit{flex:1;padding:12px;border:none;border-radius:12px;background:#CDEB45;color:#111;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s}
.fb-submit:hover{background:#D8F050;transform:scale(1.01)}
.fb-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.fb-cancel{padding:12px 20px;border:2px solid #333;border-radius:12px;background:none;color:#888;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
.fb-cancel:hover{border-color:#555;color:#CCC}
.fb-success{text-align:center;padding:20px 0}
.fb-success-icon{font-size:48px;margin-bottom:12px}
.fb-success-msg{font-size:16px;font-weight:600;color:#CDEB45}
.fb-success-sub{font-size:13px;color:#888;margin-top:6px}

.sg-collapse{cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;padding:8px 0}
.sg-collapse:hover .sg-label{opacity:1}
.sg-collapse .sg-label{opacity:.7;transition:opacity .15s;margin:0}
.sg-collapse svg{width:14px;height:14px;color:#888;transition:transform .2s;flex-shrink:0}
.sg-collapse.open svg{transform:rotate(180deg)}
.sg-collapsible{overflow:hidden;max-height:0;transition:max-height .25s ease-out;padding:0}
.sg-collapsible.open{max-height:600px;padding:8px 0 0;transition:max-height .35s ease-in}

.sg-react{display:inline-flex;gap:8px;margin-left:auto}
.sg-react-btn{background:#FF6B6B20;border:none;border-radius:99px;padding:8px 14px;cursor:pointer;font-size:14px;transition:all .15s;color:#FF6B6B}
.sg-react-btn:hover{background:#FF6B6B35}
.sg-react-btn.voted{background:#FF6B6B;color:#111}
.sg-react-up{background:#22C55E20;color:#22C55E}
.sg-react-up:hover{background:#22C55E35}
.sg-react-up.voted{background:#22C55E;color:#111}

.planner-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.planner-overlay.open{opacity:1;pointer-events:all}
.planner-modal{background:#1A1A1A;border:2px solid #F5A623;border-radius:20px;padding:36px;width:100%;max-width:480px;text-align:center}
.planner-modal-icon{font-size:52px;margin-bottom:16px}
.planner-modal-title{font-size:20px;font-weight:700;color:#F5A623;margin-bottom:8px}
.planner-modal-sub{font-size:14px;line-height:1.6;color:#888;margin-bottom:20px}
.planner-modal-cta{display:inline-block;font-size:14px;font-weight:600;color:#CDEB45;background:#CDEB4515;padding:10px 22px;border-radius:99px;border:1px solid #CDEB4530;text-decoration:none;cursor:pointer;transition:all .15s;margin-bottom:10px;white-space:nowrap}
.planner-modal-cta:hover{background:#CDEB4530;color:#FFF}
.planner-modal-close{display:inline-block;font-size:13px;color:#666;cursor:pointer;padding:8px 16px;margin-top:8px;transition:color .15s}
.planner-modal-close:hover{color:#FFF}

.sg-howto{cursor:pointer;display:flex;align-items:center;gap:8px;padding:10px 0 4px;user-select:none;margin-top:8px;border-top:1px solid var(--bd)}
.sg-howto:hover .sg-howto-label{color:#CDEB45}
.sg-howto-label{font-size:12px;font-weight:600;color:#888;transition:color .15s;letter-spacing:.3px}
.sg-howto svg{width:13px;height:13px;color:#888;transition:transform .2s;flex-shrink:0}
.sg-howto.open svg{transform:rotate(180deg)}
.sg-howto-body{overflow:hidden;max-height:0;transition:max-height .25s ease-out;padding:0}
.sg-howto-body.open{max-height:800px;padding:10px 0 4px;transition:max-height .35s ease-in}
.sg-howto-steps{font-size:13px;color:#BBB;line-height:1.7;padding:8px 14px;background:rgba(205,235,69,.04);border-left:3px solid #CDEB4540;border-radius:0 8px 8px 0}
.sg-howto-steps ol{margin:0;padding:0 0 0 18px}
.sg-howto-steps li{margin-bottom:6px}
.sg-howto-steps li:last-child{margin-bottom:0}
.sg-howto-tip{font-size:12px;color:#F5A623;margin-top:8px;font-style:italic}

.sg-howto{margin-top:14px;border-top:1px solid var(--bd);padding-top:10px}
.sg-howto-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:#38BDF8;cursor:pointer;background:none;border:none;font-family:inherit;padding:4px 0;transition:opacity .15s}
.sg-howto-btn:hover{opacity:.8}
.sg-howto-btn svg{width:14px;height:14px;transition:transform .2s}
.sg-howto-btn.open svg{transform:rotate(180deg)}
.sg-howto-content{overflow:hidden;max-height:0;transition:max-height .25s ease-out;padding:0}
.sg-howto-content.open{max-height:800px;padding:12px 0 0;transition:max-height .35s ease-in}
.sg-howto-steps{font-size:13px;color:#BBB;line-height:1.7;padding:12px 16px;background:rgba(56,189,248,.05);border-left:3px solid #38BDF8;border-radius:0 10px 10px 0}
.sg-howto-steps ol{margin:0;padding:0 0 0 18px}
.sg-howto-steps li{margin-bottom:6px}
.sg-howto-steps li:last-child{margin-bottom:0}
.sg-howto-tip{margin-top:10px;font-size:12px;color:#F5A623;font-style:italic}

.howto-steps{list-style:none;padding:0;margin:8px 0 0;counter-reset:step}
.howto-steps li{position:relative;padding:6px 0 6px 32px;font-size:13px;color:#CCC;line-height:1.5;counter-increment:step}
.howto-steps li::before{content:counter(step);position:absolute;left:0;top:6px;width:22px;height:22px;background:#CDEB4520;color:#CDEB45;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}

.sg-extras{margin-top:16px;padding-top:14px;border-top:1px solid #333}

.sg-used{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:8px 18px;border-radius:99px;cursor:pointer;border:none;background:#22C55E;color:#111;transition:all .15s;font-family:inherit}
.sg-used:hover{background:#2AD264}
.sg-used.done{background:#22C55E;color:#111;cursor:default;opacity:.8}
.team-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.team-overlay.open{opacity:1;pointer-events:all}
.team-modal{background:#1A1A1A;border:2px solid #CDEB45;border-radius:20px;padding:32px;width:100%;max-width:400px;text-align:center}
.team-modal h2{font-size:18px;color:#CDEB45;margin:0 0 6px}
.team-modal p{font-size:13px;color:#888;margin:0 0 20px}
.team-select{width:100%;padding:12px;border-radius:12px;background:#111;border:2px solid #333;color:#FFF;font-size:14px;font-family:inherit;margin-bottom:12px;outline:none;cursor:pointer}
.team-select:focus{border-color:#CDEB45}
.team-go{width:100%;padding:12px;border:none;border-radius:12px;background:#CDEB45;color:#111;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .15s}
.team-go:hover{background:#D8F050}
.team-go:disabled{opacity:.4;cursor:not-allowed}
.lb-section{margin:60px 0 24px;padding-top:40px;border-top:1px solid #222}
.lb-campus{background:#1A1A1A;border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid #222}
.lb-campus-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.lb-row{display:flex;align-items:center;padding:8px 12px;border-radius:10px;margin-bottom:6px;font-size:13px}
.lb-row:nth-child(odd){background:#ffffff06}
.lb-rank{width:28px;font-weight:700;color:#888;flex-shrink:0}
.lb-rank.gold{color:#FFD700}
.lb-rank.silver{color:#C0C0C0}
.lb-rank.bronze{color:#CD7F32}
.lb-team{flex:1;font-weight:600;color:#EEE}
.lb-pts{font-weight:700;color:#CDEB45;font-size:14px}
.lb-streak{font-size:11px;color:#F5A623;margin-left:8px}
.lb-empty{color:#555;font-size:13px;font-style:italic;padding:8px 12px}
.lb-loading{color:#555;font-size:13px;text-align:center;padding:20px}

@keyframes confettiFall{0%{transform:translateY(-100px) rotate(0deg);opacity:1}100%{transform:translateY(400px) rotate(720deg);opacity:0}}
@keyframes pointPop{0%{transform:scale(0);opacity:0}40%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:1}}
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
.confetti{position:absolute;width:10px;height:10px;border-radius:2px;animation:confettiFall 1.5s ease-out forwards}
.point-popup{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);animation:pointPop .5s ease-out forwards}

.point-popup-btn{display:inline-block;margin-top:16px;padding:10px 24px;border:none;border-radius:99px;background:#CDEB45;color:#111;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .15s}
.point-popup-btn:hover{background:#D8F050}
.point-popup-inner{background:#111;border:3px solid #CDEB45;border-radius:24px;padding:24px 40px;text-align:center;box-shadow:0 0 60px rgba(205,235,69,.3)}
.point-popup-emoji{font-size:48px;margin-bottom:8px}
.point-popup-text{font-size:24px;font-weight:800;color:#CDEB45;font-family:"Space Grotesk",sans-serif}
.point-popup-sub{font-size:13px;color:#888;margin-top:4px}
</style></head><body><div id="app"></div>
<script>

const HT={
"Google Earth":"<ol><li>Open <b>earth.google.com</b> in Chrome.</li><li>Click <b>Projects → New Project</b>.</li><li>Search for locations and click <b>Add to project</b> to pin them.</li><li>For each pin, add a <b>title, description and images</b>.</li><li>Click the <b>microphone icon</b> to record voice narration at each stop.</li><li>Click <b>Present</b> to fly between locations with narration playing automatically.</li></ol><div class=\"sg-howto-tip\">Tip: Students can collaborate on a shared project by clicking the share icon.</div>",
"Scratch":"<ol><li>Open <b>scratch.mit.edu</b> and click <b>Create</b>.</li><li>Add <b>sprites</b> (characters) and <b>backdrops</b> (scenes) from the library or draw your own.</li><li>Use the <b>block-based code</b> to make sprites move, talk, sense and react.</li><li>Use <b>Events</b> blocks (green flag, key press, sprite click) to trigger actions.</li><li>Use <b>Control</b> blocks (if/then, repeat, wait) for game logic.</li><li>Click the <b>green flag</b> to test, then <b>Share</b> when ready.</li></ol><div class=\"sg-howto-tip\">Tip: Start with the Scratch tutorials (click Tutorials in the top bar) for step-by-step guided projects.</div>",
"Scratch Jr":"<ol><li>Open the <b>Scratch Jr app</b> on the iPad.</li><li>Tap <b>+</b> to start a new project.</li><li>Choose or draw <b>characters</b> and <b>backgrounds</b>.</li><li>Drag <b>coding blocks</b> together to make characters move, jump, grow, shrink and speak.</li><li>Tap the <b>green flag</b> to play the animation.</li><li>Add extra <b>pages</b> (like slides) to create a multi-scene story.</li></ol><div class=\"sg-howto-tip\">Tip: Use the paint editor to let students draw their own characters — great for younger learners.</div>",
"Seesaw":"<ol><li>Open <b>Seesaw</b> and go to the class journal.</li><li>Tap <b>Add</b> (+) to start a new post.</li><li>Choose the tool: <b>photo, video, drawing, voice recording, link or file</b>.</li><li>Students capture their work and <b>annotate</b> with labels, arrows and voice.</li><li>Tap the <b>green tick</b> to submit for teacher approval.</li></ol><div class=\"sg-howto-tip\">Tip: Create an Activity template with instructions so students know exactly what to do.</div>",
"Book Creator":"<ol><li>Open <b>bookcreator.com</b> and select your class library.</li><li>Click <b>New Book</b> and choose a template or blank page.</li><li>Add content: <b>text, images, drawings, audio recordings, videos and shapes</b>.</li><li>Use the <b>record button</b> for voice narration on any page.</li><li>Add more <b>pages</b> to build out the book.</li><li>Click <b>Publish</b> to share as a link or export as ePub/PDF.</li></ol><div class=\"sg-howto-tip\">Tip: Use the comic book template for visual storytelling or the blank template for information reports.</div>",
"Canva":"<ol><li>Open <b>canva.com</b> and click <b>Create a design</b>.</li><li>Choose a format: <b>poster, presentation, infographic, video</b> etc.</li><li>Use <b>templates</b> as a starting point or start from scratch.</li><li>Drag in <b>text, images, icons, shapes and charts</b> from the sidebar.</li><li>Upload your own <b>photos</b> using the Uploads tab.</li><li>Click <b>Share → Download</b> or <b>Share → Link</b> to publish.</li></ol><div class=\"sg-howto-tip\">Tip: Use Canva Education for free premium features and classroom integration.</div>",
"Padlet":"<ol><li>Open <b>padlet.com</b> and click <b>Make a padlet</b>.</li><li>Choose a format: <b>Wall, Canvas, Timeline, Map, Grid</b> or others.</li><li>Set a <b>title</b> and description.</li><li>Share the <b>link or QR code</b> with students.</li><li>Students tap <b>+</b> to add posts with <b>text, images, links, audio or video</b>.</li><li>Students can <b>comment and react</b> on each other's posts.</li></ol><div class=\"sg-howto-tip\">Tip: Use the Map format for geographic projects — students pin locations and add multimedia at each point.</div>",
"Mentimeter":"<ol><li>Open <b>mentimeter.com</b> and click <b>New presentation</b>.</li><li>Add a slide and choose the type: <b>word cloud, poll, quiz, scales, open-ended</b>.</li><li>Type your <b>question</b>.</li><li>Click <b>Present</b> and share the <b>join code</b> with students.</li><li>Students go to <b>menti.com</b>, enter the code and respond.</li><li>Results appear <b>live on screen</b> in real time.</li></ol><div class=\"sg-howto-tip\">Tip: Word clouds work brilliantly for tuning-in provocations — instant visual of the class's thinking.</div>",
"iMovie":"<ol><li>Open <b>iMovie</b> on iPad or Mac.</li><li>Tap <b>Create Project → Movie</b>.</li><li>Import <b>video clips and photos</b> from the camera roll.</li><li>Drag clips onto the <b>timeline</b> and trim them.</li><li>Add <b>titles, transitions and background music</b>.</li><li>Record a <b>voiceover</b> by tapping the microphone icon.</li><li>Tap <b>Share</b> to export the finished video.</li></ol><div class=\"sg-howto-tip\">Tip: Use the Trailer templates for polished-looking news reports and documentaries.</div>",
"GarageBand":"<ol><li>Open <b>GarageBand</b> on iPad or Mac.</li><li>Choose <b>Live Loops, Tracks or Drummer</b> to start.</li><li>Tap instruments to <b>play and record</b> — keyboard, guitar, drums, strings.</li><li>Use <b>Smart Instruments</b> for students who do not play an instrument.</li><li>Layer multiple <b>tracks</b> together to build a composition.</li><li>Tap <b>Share</b> to export as an audio file.</li></ol><div class=\"sg-howto-tip\">Tip: Use Live Loops for quick, fun music creation — students tap cells to build arrangements without needing to play notes.</div>",
"Microsoft Forms":"<ol><li>Open <b>forms.office.com</b> and click <b>New Form</b>.</li><li>Add questions: <b>choice, text, rating, date, ranking, Likert</b>.</li><li>Toggle <b>Required</b> for must-answer questions.</li><li>Click <b>Share</b> and copy the link or QR code.</li><li>Students open the link and submit responses.</li><li>Click <b>Responses</b> to see results in real time with auto-generated charts.</li></ol><div class=\"sg-howto-tip\">Tip: Use the Quiz mode for self-marking assessments with automatic scores and feedback.</div>",
"Kahoot":"<ol><li>Open <b>kahoot.com</b> and click <b>Create</b>.</li><li>Add <b>questions</b> with multiple choice answers and mark the correct one.</li><li>Set a <b>time limit</b> per question.</li><li>Click <b>Play</b> and choose <b>Classic</b> (individual) or <b>Team</b> mode.</li><li>Students join at <b>kahoot.it</b> with the game PIN.</li><li>Results show on the <b>leaderboard</b> after each question.</li></ol><div class=\"sg-howto-tip\">Tip: Use it as a diagnostic at the start of a unit to reveal what students already know and where misconceptions are.</div>",
"Adobe Express":"<ol><li>Open <b>express.adobe.com</b> and sign in with school account.</li><li>Click <b>Create new</b> and choose: <b>poster, video, webpage, social post</b>.</li><li>Use <b>templates</b> or start blank.</li><li>Add <b>text, images, icons, video clips and animations</b>.</li><li>Use <b>brand tools</b> to keep consistent colours and fonts.</li><li>Click <b>Download</b> or <b>Share link</b> to publish.</li></ol><div class=\"sg-howto-tip\">Tip: The video tool is great for animated explainer videos — students add voiceover and the visuals animate automatically.</div>",
"Micro:bit":"<ol><li>Open <b>makecode.microbit.org</b> and click <b>New Project</b>.</li><li>Drag <b>coding blocks</b> to program the micro:bit.</li><li>Use blocks for <b>LED display, buttons, sensors</b> (light, temperature, accelerometer, compass).</li><li>Click <b>Download</b> and drag the file onto the micro:bit (connected via USB).</li><li>The program runs on the <b>physical device</b> immediately.</li></ol><div class=\"sg-howto-tip\">Tip: Start with the LED display — students can show their name, an icon, or a scrolling message as their first program.</div>",
"Sphero":"<ol><li>Open the <b>Sphero Edu</b> app on iPad.</li><li>Connect to a <b>Sphero robot</b> via Bluetooth.</li><li>Choose <b>Draw, Block or Text</b> coding mode.</li><li>Draw a path or drag blocks to <b>control movement, lights, speed and sounds</b>.</li><li>Tap <b>Start</b> to run the program on the physical robot.</li><li>Iterate: observe, adjust code, try again.</li></ol><div class=\"sg-howto-tip\">Tip: Use Draw mode for younger students — they draw the path and the robot follows it.</div>",
"Beebots":"<ol><li>Place the <b>Beebot</b> on a mat or floor space.</li><li>Press the <b>arrow buttons</b> (forward, back, left turn, right turn) to enter a sequence.</li><li>Press <b>Go</b> and the Beebot follows the programmed path.</li><li>Press <b>X</b> (clear) to reset and try a new sequence.</li><li>Students <b>predict</b> where it will end up, then <b>test and adjust</b>.</li></ol><div class=\"sg-howto-tip\">Tip: Create custom mats using butcher paper — draw a grid of squares matching the Beebot step size (15cm).</div>",
"Cubetto":"<ol><li>Place <b>Cubetto</b> on a mat.</li><li>Slot the coloured <b>coding blocks</b> into the board (green=forward, red=right, yellow=left, blue=function).</li><li>Press the <b>blue button</b> to run the sequence.</li><li>Students watch Cubetto move and <b>debug</b> if it goes wrong.</li><li>Use the <b>function line</b> to create reusable sub-routines.</li></ol><div class=\"sg-howto-tip\">Tip: No screen needed — perfect for Prep and Year 1 as a tangible introduction to sequencing.</div>",
"Indi Robot":"<ol><li>Place <b>Indi</b> on a flat surface with the <b>colour tiles</b>.</li><li>Arrange tiles in a path — each <b>colour triggers a different action</b> (green=go, red=stop, purple=turn).</li><li>Press <b>Go</b> and Indi drives over the tiles, responding to each colour.</li><li>Students <b>rearrange tiles</b> to change the behaviour.</li><li>Challenge: create a path that solves a problem or tells a story.</li></ol><div class=\"sg-howto-tip\">Tip: Great for screen-free coding — students learn cause and effect through physical experimentation.</div>",
"CoDrone EDU":"<ol><li>Open the <b>Robolink Codrone</b> app or <b>Python IDE</b>.</li><li>Connect the <b>CoDrone EDU</b> via the smart controller.</li><li>Use <b>block coding</b> (Blockly) or <b>Python</b> to program flight paths.</li><li>Set <b>takeoff, movement, altitude, rotation and landing</b> commands.</li><li>Click <b>Run</b> and the drone executes the programmed flight.</li></ol><div class=\"sg-howto-tip\">Tip: Start with simple hover-and-land programs before progressing to flight paths. Always fly in a clear open space.</div>",
"Lego Spike":"<ol><li>Build a <b>Lego Spike</b> model using the instructions in the app.</li><li>Open the <b>Spike app</b> and connect the hub via Bluetooth.</li><li>Use <b>drag-and-drop blocks</b> to program motors, sensors and the LED matrix.</li><li>Test and <b>iterate</b> — adjust the build and the code together.</li><li>Use <b>sensors</b> (colour, distance, force) to make the robot respond to its environment.</li></ol><div class=\"sg-howto-tip\">Tip: The build-and-code cycle teaches computational thinking — students learn that hardware and software work together.</div>",
"Tinkercad":"<ol><li>Open <b>tinkercad.com</b> and sign in with class code.</li><li>Click <b>Create new design</b>.</li><li>Drag <b>3D shapes</b> onto the workplane — cubes, cylinders, spheres, text.</li><li>Use <b>resize, rotate, lift and group</b> to combine shapes.</li><li>Use <b>Hole</b> shapes to cut through other objects.</li><li>Export as <b>STL</b> for 3D printing or share the link.</li></ol><div class=\"sg-howto-tip\">Tip: Start with the built-in tutorials — the Starter lessons teach all the basic skills in 10 minutes.</div>",
"Pico VR":"<ol><li>Power on the <b>Pico VR headset</b> and put it on.</li><li>Use the <b>controller</b> to navigate menus.</li><li>Open pre-loaded <b>VR experiences</b> or launch a browser for web-based VR.</li><li>Students explore <b>360-degree environments</b> by looking around.</li><li>Use in <b>guided sessions</b> with teacher supervision.</li></ol><div class=\"sg-howto-tip\">Tip: Keep VR sessions to 10-15 minutes and have students seated. Pre-load the experiences before the lesson.</div>",
"Insta360":"<ol><li>Mount the <b>Insta360 camera</b> on a tripod or selfie stick.</li><li>Connect via the <b>Insta360 app</b> on a phone/iPad.</li><li>Tap <b>record</b> to capture 360-degree photos or video.</li><li>Use the app to <b>edit</b> — choose viewing angles, add effects, trim clips.</li><li>Export as a <b>standard video</b> or <b>interactive 360 file</b>.</li></ol><div class=\"sg-howto-tip\">Tip: Great for virtual tours — students film a location and classmates can look around in every direction.</div>",
"DJI Drone":"<ol><li><b>Teacher-operated only</b> — students direct but do not fly.</li><li>Open the <b>DJI app</b> and connect the drone.</li><li>Take off in a <b>clear, open outdoor space</b>.</li><li>Capture <b>aerial photos and video</b> of the school, local area or environment.</li><li>Students use the footage in their <b>projects, presentations and reports</b>.</li></ol><div class=\"sg-howto-tip\">Tip: Plan the flight path with students beforehand — they sketch what they want to capture and why.</div>",
"Delightex (CoSpaces)":"<ol><li>Open <b>cospaces.io</b> and click <b>Create new CoSpace</b>.</li><li>Choose a <b>3D or VR environment</b>.</li><li>Drag in <b>objects, characters and buildings</b> from the library.</li><li>Use <b>CoBlocks</b> (visual coding) to animate objects — movement, speech, triggers.</li><li>Click <b>Play</b> to test in 3D or <b>Share</b> for VR viewing.</li></ol><div class=\"sg-howto-tip\">Tip: Students can explore each others creations in VR using the Pico headsets for a fully immersive experience.</div>"
};
const D=[{"ca":"Glen Waverley","yl":"Prep","th":"Who We Are","ci":"Schools are organised to help students learn and work together","lo":"The organisation of the Junior School; Routines that allow developing independence; How to make the classroom and playground healthy and safe","s":[{"t":"Canva Video","d":"Students produce a 'Welcome to Our School' video tour — each small group films a section of the school (library, classroom, playground, office) with a student guide explaining the routines and rules that make that space work. The teacher edits the segments into one continuous tour with title cards and transitions, creating a real resource that could be shown to new Prep families at orientation — their work has genuine purpose beyond the classroom."},{"t":"Scratch Jr","d":"Students code a 'My School Day' animation in Scratch Jr showing the daily routine sequence — a character arrives at school, unpacks their bag, sits on the mat for morning circle, goes to the library, eats lunch, plays outside, packs up. Each scene demonstrates a routine that builds independence, and the animation plays automatically when the green flag is pressed — the student built a working model of their school day."},{"t":"Green Screen","d":"Students dress up as different school helpers (teacher, librarian, crossing guard, principal) and film themselves in front of the green screen explaining their role — with the green screen placing them in the actual school location where that person works. The class watches all the performances together, connecting each role to the routines that help the school community function."},{"t":"Indi Robot","d":"Students use colour-coded cards to program Indi Robot to follow the sequence of their daily school routines (pack bag → line up → enter classroom → morning circle), connecting the step-by-step coding to the independence skills and routines practised throughout the unit."},{"t":"Cubetto","d":"Students program Cubetto to navigate a floor map of the campus — visiting the library, classroom, office, and oval in a sequence they design themselves. Before programming, they plan their route with the physical coding blocks, predicting how many forward moves and turns they need. When Cubetto doesn't arrive where expected, students debug by identifying exactly which instruction went wrong. The process of planning, executing and correcting a physical journey maps directly to the unit's inquiry into how the school is organised and how systems and routines help people work together."}]},{"ca":"Glen Waverley","yl":"Prep","th":"Where We Are in Place and Time","ci":"Family histories shape who we are and what we value","lo":"What makes a family; The people in your family; Your family history; What is important to your family","s":[{"t":"Canva Video","d":"Students produce a 'My Family' mini documentary — filming their family tree artwork (created with autumn leaf rubbings), the special family item they brought from home, and a to-camera interview where they explain where their family comes from and what traditions matter most. The teacher adds family photos (sent by parents) as cutaway images, creating a personal family history film that becomes a treasured keepsake — shared at Student Led Conference."},{"t":"Green Screen","d":"Students film themselves in front of the green screen 'visiting' a place connected to their family history — their grandparents' country, the hospital where they were born, the first home their family lived in. They narrate the story of why this place matters to their family while the green screen transports them there, creating a personal family history documentary that brings distant places into the classroom."},{"t":"Scratch Jr","d":"Students code a 'My Family Timeline' animation in Scratch Jr showing key moments — grandparents' story, parents meeting, the student being born, starting school. Characters appear, backgrounds change between scenes, and the student records voice narration explaining each moment. The timeline plays automatically, creating a coded family story that the student built themselves — shared at Student Led Conference as proof of their learning."},{"t":"GarageBand","d":"Students record a short 'family story' podcast in GarageBand — retelling a favourite family memory shared by a parent or grandparent, adding background music that matches the mood of the story. The recordings are played during circle time, creating an oral history archive that connects to the unit's focus on how family histories shape who we are — audio storytelling that couldn't exist without recording and layering tools."},{"t":"Google Maps + Seesaw","d":"Students use Google Maps Street View to explore the streets around Glen Waverley — finding the school entrance, the local park, the shops on Kingsway — and take a screenshot of their favourite discovery. In Seesaw they annotate the screenshot with the drawing tool, marking places that matter to their family and recording a voice note explaining their family's connection to those locations. The map becomes a personalised artefact connecting the unit's inquiry into family histories and what families value to the actual place where students live."}]},{"ca":"Glen Waverley","yl":"Prep","th":"How We Express Ourselves","ci":"Emotions influence our wellbeing.","lo":"How our feelings and emotions affect us; How feelings and emotions are interpreted; How our emotions and behaviour affect relationships","s":[{"t":"Scratch Jr","d":"Students code a 'Colour Monster' interactive story in Scratch Jr where the Colour Monster character changes colour based on different scenarios — moving to a new school (yellow/worried), making a friend (pink/happy), losing a toy (blue/sad). Each scene includes a voice recording of the student explaining the management strategy for that emotion, connecting to the Zones of Regulation framework explored throughout the unit."},{"t":"GarageBand","d":"Students compose a 'Feelings Soundscape Suite' — four short GarageBand compositions, each representing one Zone of Regulation (blue=low energy, green=ready to learn, yellow=heightened, red=extremely heightened). They select instruments, tempo and volume to match each zone, then present the suite to the class who must guess which zone each piece represents — proving they understand how emotions can be expressed through music, not just words."},{"t":"Book Creator","d":"Students create a personal 'Emotions Dictionary' in Book Creator — one page per Colour Monster zone (yellow joy, blue sadness, red anger, black fear, green calm) with their own illustrations, a written description of what that feeling feels like in their body, and a voice recording describing a time they felt it. The multimodal dictionary (drawing + writing + voice) makes abstract emotional states concrete and revisable — a resource students return to throughout the unit and the year as they encounter new situations that activate each zone."},{"t":"Beebots","d":"Students program Beebots to travel to emotion stations around the classroom — at each stop, the child names the emotion on the card and acts it out, connecting physical movement and coding sequences to the emotional vocabulary explored through the Colour Monster story."},{"t":"Seesaw","d":"Students use the Seesaw drawing tool to illustrate the Colour Monster zone they're feeling right now — choosing colours, drawing their own monster face and recording a voice note explaining the emotion, what caused it, and one strategy for managing it. The multimodal entry (drawing + voice) makes abstract emotional states visible and gives the teacher a real-time snapshot of the class's wellbeing before deepening the inquiry into how our emotions affect ourselves and others."}]},{"ca":"Glen Waverley","yl":"Prep","th":"How the World Works","ci":"The properties of materials influence how objects move and their use.","lo":"Properties of materials; How objects move; How we use materials","s":[{"t":"Canva Video","d":"Students film their materials testing investigation and narrate their findings in a Canva Video — holding up each material, describing its properties (hard/soft, rough/smooth, heavy/light), and explaining what they discovered about how it affects movement. The finished video is their science report: a record of real observations presented with a title, simple transitions and their own voice as the scientist — connecting the physical testing of materials directly to the concept that properties determine use."},{"t":"iMovie","d":"Students produce a 'Materials Detectives' investigation video — filming themselves conducting the 'Design a Floater' challenge, capturing the moment their creation sinks or floats in slow motion, then explaining to camera which material properties made the difference. Each group tests a different material combination, and the videos are compiled into a class investigation reel showing the full range of results."},{"t":"Book Creator","d":"Students create an interactive 'Materials Museum' book where each page features a different material explored during the unit — with a photo of the material, an embedded voice recording of the student describing its properties using scientific vocabulary (rough, smooth, hard, soft, transparent, opaque), and a video clip of the material being tested on the ramp or in the float/sink investigation. The museum book is shared with parents as a digital exhibition."},{"t":"Indi Robot","d":"Students place colour cards along a path representing different material properties (hard, soft, rough, smooth), programming Indi Robot to follow the trail and stop at each station where they describe the material, connecting colour-coded sorting to the material classification activities from the mystery bag provocation."},{"t":"Beebots","d":"Students program Beebots to move across different material surfaces (carpet, tile, cardboard) placed along the path, predicting and observing how the material properties affect movement — connecting to the slide-and-roll investigation findings."}]},{"ca":"Glen Waverley","yl":"Prep","th":"How We Organise Ourselves","ci":"The products people use go through a process of change.","lo":"Where food comes from; How food can be changed for different purposes; An appreciation of food","s":[{"t":"iMovie","d":"Students produce a 'From Farm to Fork' mini documentary — each group films one food's journey using toy props and real food items as actors (a toy cow becomes milk, flour becomes bread, an egg becomes a cake). They use stop-motion for the transformation scenes and narrate the process using sequencing language (first, then, next, finally), creating a visual story of how products change that couldn't exist without video editing."},{"t":"Scratch Jr","d":"Students code a 'Food Journey' animation in Scratch Jr showing the step-by-step process of one food product changing from raw material to finished product — a wheat seed grows into a plant, gets harvested, ground into flour, mixed into dough, baked into bread, and eaten. Each stage is a new scene with characters that move and transform, building a coded model of the process of change that plays automatically."},{"t":"Green Screen","d":"Students film themselves as 'food reporters' in front of the green screen, transporting themselves to the different stages of the food journey — standing in a wheat field, inside a flour mill, in a bakery kitchen, at a supermarket. They narrate each stage of the process, explaining how the food changed and why, creating a news-style report that takes the audience on a journey through places they couldn't physically visit in one lesson."},{"t":"Insta360 Cam","d":"DLP captures 360° footage at the Chesterfield Farm excursion, students explore the immersive video back in class to revisit the farm-to-food journey and describe what they observed about where food comes from."},{"t":"Google Earth","d":"Students explore Chesterfield Farm on Google Earth satellite view before the excursion, spotting the paddocks, barns, and animal enclosures from above. They predict what food comes from which area of the farm, then compare their predictions with what they actually discover during the visit — building geographic awareness and connecting the 'bird's-eye view' to the real experience of where food comes from."}]},{"ca":"Glen Waverley","yl":"Year 1","th":"Who We Are","ci":"Emotions, values, and relationships guide how we connect and collaborate","lo":"The function of different parts of the brain; Situations that cause pleasant and unpleasant feelings; Actions that support wellbeing","s":[{"t":"Green Screen","d":"Students perform role-plays in front of the green screen showing how their thoughts, feelings and actions determine relationship quality — placed in realistic settings (playground, classroom, home) via the green screen. Each group demonstrates a different scenario: one shows exclusion and repair, another shows cooperation during a challenge, another shows resolving a disagreement — creating a library of relationship strategies the class can rewatch."},{"t":"iMovie","d":"Students produce a 'Wellbeing Warriors' documentary interviewing classmates about the States of Mind practices that help them most — filming on location at the places around school where they practise mindfulness, perseverance and emotional management. The documentary includes slow-motion footage of PE cooperative activities showing teamwork in action, with student narrators connecting the strategies to real moments."},{"t":"GarageBand","d":"Students create a 'Feelings Playlist' in GarageBand — composing four short pieces, each representing a different emotional state explored through the unit. They select instruments, tempo and dynamics to communicate each feeling, then present the playlist to the class who must identify which emotion each piece represents. The playlist becomes a class resource played during transitions and calm-down time."},{"t":"Scratch Jr","d":"Students code a simple two-scene Scratch Jr animation showing a relationship scenario — Scene 1: two characters are in conflict (not sharing, arguing), Scene 2: the characters use a strategy from the Colour Monster vocabulary (talk about feelings, take turns, walk away and breathe). The animation runs automatically, creating a visual model of how actions determine relationship quality."},{"t":"Book Creator","d":"Students add to their ongoing wellbeing book, documenting new strategies for managing emotions with drawings, photos of PE cooperative activities, and voice recordings explaining how their understanding of relationships has grown through the Boy by Phil Cummings discussions and States of Mind activities."}]},{"ca":"Glen Waverley","yl":"Year 1","th":"Where We Are in Place and Time","ci":"An understanding of history helps us to see how the past shapes the future.","lo":"Ways in which children's lives have changed over time; Reasons for changes to children's lives over time","s":[{"t":"iMovie","d":"Students produce a 'Then and Now Museum' video — each group sets up a table display with a toy from the past (from the incursion) next to its modern equivalent, then films a museum-guide-style walkthrough explaining the differences, when the change happened, and why. Slow-motion close-ups highlight the details (clockwork mechanism vs electronic chip, wooden blocks vs plastic Lego), and student guides deliver the verdict: 'the biggest change was...'"},{"t":"Green Screen","d":"Students become 'Time Travellers' using the green screen — transported to a 1950s classroom, a Victorian-era street, or a playground from their grandparents' childhood. Standing inside the historical scene, they narrate what they notice has changed and what has stayed the same, comparing the past environment with their own school experience. The impossible physical journey to another era becomes a lived perspective, making the abstract concept of historical change something students inhabit rather than just read about."},{"t":"Scratch Jr","d":"Students code a 'Toy Timeline' animation in Scratch Jr showing how a toy evolved through history — a wooden spinning top transforms into a wind-up toy, then into a battery-powered version, then into an iPad game. Each stage is a new scene with the toy changing shape and the background shifting from old-fashioned to modern, creating a coded model of change over time that plays automatically."},{"t":"GarageBand","d":"Students create 'Sounds of Then and Now' — recording pairs of sounds in GarageBand that represent past vs present versions of the same thing (a hand bell vs a phone ringtone, a music box vs a speaker playing Spotify, a typewriter clicking vs a keyboard tapping). The paired sounds become an audio provocation played during circle time, demonstrating change over time through a medium students can hear but not see."},{"t":"Google Maps + Seesaw","d":"Students find their home on Google Maps, screenshot the Street View, and annotate it in Seesaw — marking the route they walk to school, noting what has changed on their street compared to old photos (from Google Street View's historical imagery), and recording a voice note explaining what the place tells about their family's history. The comparison between Street View time periods gives students a data-driven way to observe how their own local place has changed, connecting personal geography to the unit's central idea that history shapes the present."}]},{"ca":"Glen Waverley","yl":"Year 1","th":"How We Express Ourselves","ci":"People use imagination and materials to express stories, ideas and culture through performance.","lo":"Different materials to make puppets; Types and uses of puppets by different cultures; Features and purposes of puppet performances","s":[{"t":"Scratch Jr","d":"Students code a digital puppet show in Scratch Jr — programming puppet characters to walk on stage, speak dialogue, interact with each other and take a bow. Unlike the physical puppet performance the class creates with handmade puppets, this version runs autonomously — the student wrote both the script AND the stage directions in code. Performing the same story through two completely different mediums reveals how the choice of form shapes meaning, connecting directly to the unit's exploration of how different cultures use puppets to tell stories and ideas."},{"t":"Green Screen","d":"Students film their puppet performance in front of the green screen, placing their handmade puppets (shadow puppets, popsicle stick puppets from French AIM Play, hand puppets) against culturally appropriate backdrops — a Balinese shadow puppet against a temple, a French puppet in a Parisian street, a sock puppet in a living room. The green screen transforms simple classroom puppets into world-travelling performers."},{"t":"Canva Video","d":"Students film their puppet performance using the puppets they constructed from various materials, adding titles and simple transitions to present their cultural story — building on vocabulary about features and purpose developed through watching puppet performances."},{"t":"GarageBand","d":"Students create a 30-second 'puppet soundtrack' in GarageBand — choosing instruments and sounds that match the personality of a puppet character they imagine (drums for a brave puppet, gentle chimes for a shy puppet, fast piano for a funny puppet). They play their soundtrack to a partner who draws what they think the puppet looks like — discovering that sound is another way to express character before the class explores puppets from different cultures."},{"t":"Insta360 Cam","d":"DLP captures 360° footage of the Year 1 puppet performance showcase, preserving the cultural puppet performances from multiple angles so students can revisit and reflect on how each group expressed their story. Students watch the immersive footage and compare how the same story feels different when performed by a shadow puppet, a hand puppet, and a popsicle stick puppet — directly connecting to the unit's inquiry into how different cultures use different materials and performance styles to express ideas and stories."}]},{"ca":"Glen Waverley","yl":"Year 1","th":"How the World Works","ci":"Movement is dependent on different forces.","lo":"Ways objects move; The influence different materials have on movement; How designs can be adapted and improved","s":[{"t":"Scratch Jr","d":"Students code a Scratch Jr simulation testing how different forces affect movement — programming a sprite to move slowly across a 'rough' background (representing friction) then fast across a 'smooth' one, or sending it rolling down a ramp backdrop and stopping at different points. They adjust speed and direction values to model push, pull and gravity, comparing their coded predictions with the physical ramp experiments they ran in class. The code makes the invisible force visible — a direct extension of the unit's inquiry into how different forces influence the way objects move."},{"t":"Lego Spike","d":"Students build a Lego Spike catapult launcher that flings a ball across the room, then modify the launch angle, arm length and rubber band tension to change how far and how high the ball travels — recording each test with labelled slow-motion video, graphing their distances, and presenting their 'best design' alongside a poster explaining which force variables made the biggest difference."},{"t":"iMovie","d":"Students produce a 'Mythbusters Junior' investigation video where they test a force-related claim from the unit (e.g., 'heavier objects always fall faster', 'smooth surfaces are always slippery'), filming their experiment with multiple camera angles, adding slow-motion replays of key moments, and delivering a verdict with evidence — connected to the ramp building and spinning tops that generated high engagement."},{"t":"Micro:bit","d":"Students use micro:bit accelerometers to measure the force of pushes and pulls during their ramp experiments, comparing readings when they change the angle or surface — collecting real data that connects their hands-on investigations to the scientific concepts of contact and non-contact forces."},{"t":"Google Earth","d":"Students use Google Earth to explore the habitats of invertebrates studied during the unit — navigating to coral reefs to find sea creatures, rainforest canopy for butterfly species, the school garden area from satellite, and polar regions for adaptations. At each location they identify features of the habitat that explain why specific invertebrates can survive there, connecting their structural features research to real geographic environments. The satellite perspective makes the unit's central idea about structure and survival in different environments visible at landscape scale."}]},{"ca":"Glen Waverley","yl":"Year 1","th":"How We Organise Ourselves","ci":"Communities work together by creating systems to help people live and learn.","lo":"The roles people play in a community; Systems and routines that help us stay organised; How communities work together to meet needs","s":[{"t":"Lego Spike","d":"Students build a Lego Spike community vehicle (postal van, fire truck, ambulance) with a working motor, then program it to follow a route on their class community map — stopping at locations where the service is needed. Each team presents their vehicle explaining what system it belongs to and what happens if it breaks down, connecting the engineering build to their investigation of how interdependent community systems help people."},{"t":"Canva Video","d":"Students produce a 'Day Without Systems' mockumentary — filming a comedy sketch showing what happens when one community system fails (the library has no borrowing rules so books disappear, the canteen has no queue system so lunch is chaos, the crossing has no guard so nobody can cross). The humour makes the learning memorable while demonstrating the central idea that communities need systems to function."},{"t":"Green Screen","d":"Students film themselves as different community workers in front of the green screen — placed inside a hospital, fire station, post office, school office. Each student explains their role and demonstrates how their system connects to other community systems ('I'm the librarian — I organise books so teachers can find resources for lessons'), creating an interconnected web of community roles visible in one video compilation."},{"t":"Scratch Jr","d":"Students code a 'Community Systems' animation in Scratch Jr showing what happens when a community worker does their job vs when they're absent — the postal worker delivers mail and people smile, then the scene replays without them and letters pile up, demonstrating how every role connects to the system."},{"t":"Google Maps","d":"Students explore the streets around Glen Waverley on Google Maps Street View, spotting community systems in action — the traffic lights controlling cars, the library building where books are shared, the fire station where help comes from. They screenshot three systems they find and the class discusses what would happen if each one disappeared — launching the inquiry into how communities work together."}]},{"ca":"Glen Waverley","yl":"Year 1","th":"Sharing the Planet","ci":"Invertebrates are essential to living things and the environment.","lo":"The characteristics of invertebrates; The interdependence of invertebrates and their environment; Life cycles of invertebrates","s":[{"t":"iMovie","d":"Students produce an 'Invertebrate Investigators' documentary — each group films their chosen invertebrate (if found in the school garden) or uses close-up photos and drawings as visual evidence, adding slow-motion footage of insects moving and narrating key facts about structural features, habitat and life cycle. The documentary uses the scientific vocabulary built throughout the unit and includes the 'key learning' that invertebrates have no backbone."},{"t":"Scratch Jr","d":"Students code a life cycle animation in Scratch Jr showing their chosen invertebrate transforming through each stage — egg to larva to pupa to adult for butterflies, or egg to nymph to adult for grasshoppers. Characters change shape, grow, and move to new backgrounds between scenes, creating a coded model of the life cycle that plays automatically and can be compared with the physical life cycle models built during science."},{"t":"Green Screen","d":"Students film themselves as 'garden reporters' in front of the green screen, transported inside the school garden ecosystem at macro scale — standing among giant leaves and towering flowers as if they were the size of an invertebrate. They report on the invertebrate they studied, explaining how its structural features help it survive in this environment, connecting the library focus on underwater invertebrates to the school garden investigations."},{"t":"Insta360 Cam","d":"DLP captures 360° footage of the school garden ecosystem, students explore the immersive video to spot invertebrates in their natural habitat and document observations about where plants and animals live."},{"t":"Seesaw","d":"Students photograph each stage of the broad bean growth experiment and use the Seesaw drawing tool to annotate their photos — labelling the structural features they observe (roots, stem, leaves, flowers) and recording a voice note explaining how each feature supports the plant's survival. The annotated photo series becomes a longitudinal science record tracking how structural features develop over the unit, connecting the hands-on observation work directly to the inquiry into how living things' structures allow them to survive in different environments."}]},{"ca":"Glen Waverley","yl":"Year 2","th":"Who We Are","ci":"Humans have a responsibility in their relationships to value the rights of others","lo":"The difference between needs and wants; Everybody has rights and responsibilities; What is a respectful relationship","s":[{"t":"Scratch Jr","d":"Students code an interactive 'Choose Your Response' scenario in Scratch Jr where a character faces a friendship dilemma (based on the Rainbow Fish discussion and role-play scenario cards), and the viewer taps to choose a respectful or disrespectful response — each choice triggers a different animated consequence showing how rights are upheld or broken."},{"t":"Lego Spike","d":"Students build a Lego Spike 'Needs vs Wants Sorting Machine' that uses the colour sensor to detect items placed in front of it and motor-drives them down two different paths (need or want), then present their programmed machine to the class explaining how the sorting rules connect to the brainstorm activity about rights, needs and wants."},{"t":"Green Screen","d":"Students film a green screen news broadcast where they role-play reporters visiting different communities to investigate how rights are being upheld, transporting themselves to locations like schools, playgrounds and homes — connecting the scenario card role-plays to a professional broadcast format that couldn't exist without the technology."},{"t":"Padlet","d":"Students post examples of respectful and disrespectful digital scenarios to a class Padlet — drawing on the cybersafety content explored during the unit and their own experiences navigating online spaces. Presented anonymously, the collection is analysed together: which behaviours appear most often? Which are hardest to recognise? The collaborative curation turns individual observations into shared data, and the discussion that follows — about what patterns the class sees — is more powerful than any single student's example alone."},{"t":"Book Creator","d":"Students create an 'All About Me' page featuring drawings and voice recordings about everybody has rights and responsibilities, starting a personal book they will add to throughout the unit as their understanding of humans have a responsibility in their relationships to value the rights of others grows."}]},{"ca":"Glen Waverley","yl":"Year 2","th":"Where We Are in Place and Time","ci":"Exploring the past helps us to understand the present.","lo":"Evidence and its significance in a place; Connections between the past and present within a place; Personal history shapes the present","s":[{"t":"iMovie","d":"Students produce an 'iMovie History Detectives' documentary combining footage from the Wonder Walk around Wesley Glen Waverley campus (plaques, statues, memorials, buildings) with photos from the Como House excursion, narrating what each piece of evidence reveals about the past — using slow-motion, zoom, and split-screen effects impossible without film production tools."},{"t":"Green Screen","d":"Students film a green screen time-travel report where they 'visit' the Wesley campus in the past using the Old Wesley Picture Provocation as their backdrop, then switch to the present-day campus — performing as history reporters who compare what changed and what stayed the same, bringing the before-and-after evidence to life."},{"t":"Scratch Jr","d":"Students code an animated 'Then and Now' timeline in Scratch Jr where tapping a landmark sprite transforms it from its historical version to its present-day appearance, narrating the changes with recorded voice — connecting their family tree exploration from Prep to a digital interactive that shows how personal histories shape the present."},{"t":"Google Maps + Seesaw","d":"Students use Google Maps Street View to explore Como House and the Glen Waverley area as it appears today, then compare it with historical photographs in Seesaw — annotating what has changed and what evidence of the past still exists in the built environment. The side-by-side comparison gives students a live archaeological lens: reading the present-day streetscape for traces of the past, connecting directly to the unit's inquiry into how evidence in a place helps us understand the connection between past and present."},{"t":"Google Earth","d":"Students use Google Earth to explore the Glen Waverley area and Como House virtually before their excursion — navigating the satellite view to identify the estate boundaries, compare the scale of the historic property against surrounding streets, and switch to Street View to walk the grounds in advance. The pre-visit virtual exploration sharpens their observation skills: students arrive at Como House already knowing the layout and carrying specific questions about the evidence of history they want to find in person, connecting directly to the unit's inquiry into how evidence in a place helps us understand connections between past and present."}]},{"ca":"Glen Waverley","yl":"Year 2","th":"How We Express Ourselves","ci":"Storytellers use different methods to convey meaning.","lo":"Mediums and techniques artists use; Connections between story and illustrations; How ideas and information are communicated","s":[{"t":"Green Screen","d":"Students film a green screen 'Story Museum' presentation where they transport themselves inside the settings of stories explored during the unit, performing as curators who demonstrate how the same story changes when told through different mediums (writing, illustration, drama, digital) — connecting to the author incursion with Sarah Allen about how books are created."},{"t":"Scratch Jr","d":"Students code an animated retelling of their Talk For Writing story in Scratch Jr — programming characters to move through settings with code-driven timing that makes characters appear, speak, and exit on cue. Every pause, entrance, and scene change is a deliberate decision that helps students understand how storytellers control timing and atmosphere. The code IS the storyboard, extending the lessons from the author incursion with Sarah Allen about how every story decision shapes meaning, and demonstrating that the same story told through a different medium creates a completely different experience."},{"t":"Canva Video","d":"Students produce a short film retelling a story using different media, incorporating illustrations inspired by Indigenous Australian artists (from Visual Art) showing how art is used to tell stories and preserve knowledge."},{"t":"GarageBand","d":"Students create a soundscape or audio story using music and narration to explore how sound conveys meaning, comparing this medium to the visual storytelling and illustration methods explored through the author visit."},{"t":"Padlet","d":"Students contribute to a class 'Storytelling Methods' Padlet — each group posts their Talk For Writing story told through a different medium (written, illustrated, Scratch Jr animated, performed, GarageBand soundscape) so the whole class can compare how the same story feels different across formats. Students comment on each other's entries noting which medium they found most powerful and why, generating the class's own evidence for the unit's central idea that storytellers use different methods to convey meaning."}]},{"ca":"Glen Waverley","yl":"Year 2","th":"How the World Works (Solar System)","ci":"Patterns in the sky help us understand our place in the universe.","lo":"Earth's place in the solar system; Observable patterns in the sky; Tools and methods we use to observe the sky","s":[{"t":"Scratch","d":"Students code an interactive solar system simulation in Scratch where planet sprites orbit the sun at different speeds and clicking each planet reveals facts from their Sky Journal observations, Moon Diary tracking, and learning about Aboriginal and Torres Strait Islander constellations like the Emu in the Sky — visitors control the simulation with arrow keys to zoom in and out."},{"t":"Beebots","d":"Students program Beebots to travel between planets on a scaled floor map of the solar system — entering the number of steps proportional to each planet's distance from the Sun. Mercury needs just a few presses; Neptune requires the maximum route. Students discover that the outer planets are vastly farther apart than they look in textbook diagrams, connecting the unit's inquiry into patterns in the sky with a physical, programmable experience of just how enormous the solar system is."},{"t":"Micro:bit","d":"Students build a micro:bit 'Sky Pattern Tracker' that uses the light sensor to detect day vs night and displays animated moon phase icons on the LED screen matching the current phase from their Moon Diary — presenting their working instrument at a class science fair alongside their pattern-mapping charts of moon phases and sun positions."},{"t":"Lego Spike","d":"Students build a motorised Lego Spike orrery with Earth and Moon models that rotate around a central sun, programming the speeds to demonstrate why the Moon takes a month to orbit Earth while Earth takes a year to orbit the Sun — connecting their Moon Diary observations to a physical working model."},{"t":"Google Earth","d":"Students use Google Earth to experience Earth from space — zooming out from their school to see all of Australia, then the whole planet, experiencing the shift in perspective from street level to orbital view. They compare what is visible at each zoom level (buildings, coastlines, cloud patterns, the curvature of the Earth) and connect this to how scientists use observation tools to understand our planet's place in the solar system. The experience makes abstract concepts of scale and perspective something students can navigate and control themselves."}]},{"ca":"Glen Waverley","yl":"Year 2","th":"How the World Works (Materials)","ci":"Changes to materials affect how we use and reuse them in daily life.","lo":"Understanding material properties; Reuse and recycling through physical change; Sustainably managing materials","s":[{"t":"iMovie","d":"Students produce an iMovie 'Mythbusters Junior: Materials Edition' episode where they test a claim about material properties (e.g. 'all paper tears the same way'), filming their bending, stretching, breaking and crumpling experiments with slow-motion replay and multiple camera angles, then deliver a verdict based on evidence from their sets of materials changed in different ways."},{"t":"Lego Spike","d":"Students build a Lego Spike automated material sorting machine that uses sensors to classify objects by properties (hard/soft, flexible/rigid), programming the motor to push items into labelled bins — connecting their 'odd one out' classification reasoning to an engineering solution and presenting how the machine's sorting rules mirror First Nations Australians' (WESMOB) deep knowledge of natural material properties."},{"t":"Micro:bit","d":"Students build a micro:bit 'Material Change Detector' that uses the temperature sensor to monitor heating experiments in real time, displaying rising/falling temperature readings on the LED screen and logging whether each change is reversible or irreversible — presenting their data at the art exhibit alongside sustainable reuse creations."},{"t":"Seesaw","d":"Students photograph and classify their material change experiments (crumpled, folded, torn paper; stretched, bent, heated materials), creating labelled before/after comparisons and recording voice explanations about whether each change is reversible or irreversible — connecting to First Nations Australians' (WESMOB) knowledge of natural materials."},{"t":"Google Earth","d":"Students explore Google Earth satellite views of landfill sites, recycling centres and natural material sources, comparing what sustainable and unsustainable material management looks like from above — sparking questions about why sustainably managing materials matters before investigations begin."}]},{"ca":"Glen Waverley","yl":"Year 2","th":"How We Organise Ourselves","ci":"A sequence of processes enables a system to function.","lo":"The systems in our lives; The purpose of various systems; How systems are made of many interdependent parts","s":[{"t":"iMovie","d":"Students produce an iMovie 'Systems Breakdown' documentary where they deliberately remove one step from a familiar system (the café lunch sequence, a marble run, their morning routine) and film what happens — using time-lapse and split-screen to show the working system vs the broken one, proving how a sequence of processes enables a system to function."},{"t":"Lego Spike","d":"Students build a Lego Spike automated production line where the motor, sensor and sequence of coded steps must work together to move an object from start to finish — if any part fails, the system stops, demonstrating how systems are made of many interdependent parts and connecting to the 'morning of chaos' provocation where classroom systems were removed."},{"t":"Scratch Jr","d":"Students code an interactive animation showing how a system works step-by-step (e.g. cow to milk, wheat to bread — the food production systems explored during the unit), demonstrating how a sequence of processes enables a system to function."},{"t":"Cubetto","d":"Students program Cubetto to follow the sequence of steps in the café lunch system (kitchen → preparation → serving → student), debugging when steps are out of order to understand how systems break down — connecting to the mini incursion to the school café exploring Gayle's daily systems."},{"t":"Seesaw","d":"Students use Seesaw to document the class's 'lunch system' investigation — photographing each step of the canteen process they observed, then recording a voice-over explanation of what happens at each stage and why that step is essential for the system to function. The sequenced photo essay, shared with the class, demonstrates that every step in the system has a purpose and removing any one step breaks the whole — connecting directly to the unit's central idea that a sequence of processes enables a system to function."}]},{"ca":"Glen Waverley","yl":"Year 2","th":"Sharing the Planet","ci":"Water is a limited resource that is essential to life.","lo":"Unequal access to water; Communities affected by water access; Transferral of water from source to use; Responsibility as global citizens","s":[{"t":"Green Screen + Google Earth","d":"Students film a green screen news broadcast as 'Water Watch Reporters' transporting themselves to drought-affected communities, water treatment plants and pristine water sources explored via Google Earth during the unit — delivering persuasive segments about water conservation responsibility as global citizens, referencing specific examples from their non-fiction reading and the curiosity board."},{"t":"Scratch","d":"Students code an interactive 'Water Cycle Journey' simulation in Scratch where a water droplet sprite travels through evaporation, condensation, precipitation and collection — users click to add pollution or conservation actions that visibly change the water quality, connecting the water cycle stages to their home learning water-saving posters and class discussion about machines that move water from rivers to homes."},{"t":"Padlet","d":"Students build a collaborative 'Water Around the World' Padlet — each group researching a different community and posting images, voice notes and written facts about their access to clean water. The class Padlet grows into a shared visual record of water inequality that students analyse together: which regions lack access, why, and what global citizens can do. The collaborative evidence base directly supports the unit's inquiry into unequal water access and responsibility as global citizens."},{"t":"Canva Video","d":"Students produce a short Canva Video documentary presenting their findings about how water travels from source to tap — narrating the journey through evaporation, condensation, precipitation and collection, incorporating diagrams and images gathered during the unit. The video becomes their summative explanation of the water cycle and the human systems that move water to homes, connecting the science content to the unit's focus on water as a limited resource and the global responsibility to manage it wisely."},{"t":"Micro:bit","d":"Students use micro:bit moisture sensors to collect data on wate
