evealing existing understanding and misconceptions to shape the inquiry direction.", "c": "beginning"}, {"t": "Canva", "d": "Students create a hypothesis poster in Canva predicting how how design processes are used to generate and test solutions (function) works, including a labelled diagram and three questions they want to investigate — setting up the scientific inquiry process.", "c": "beginning"}, {"t": "Micro:bit", "d": "Students use micro:bit accelerometers and sensors to test their earthquake-resistant structure prototypes during the Week 8 prototyping phase, collecting data on structural movement and stability to evaluate their designs against criteria like usability, empathy, and effectiveness.", "c": "middle"}, {"t": "Sphero", "d": "Students program Spheros to navigate through their earthquake-resistant structure prototypes, testing whether pathways remain passable after simulated shaking, adding a dynamic engineering challenge to the design thinking process used for their Operation Earth Action solutions.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the nature and impact of natural hazards (causation), building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Tinkercad", "d": "Students design a 3D prototype of an earthquake-resistant structure meeting the design constraints (36cm tall, must hold specific weight), applying the full design thinking cycle introduced through the UNICEF Workshop and iterating based on shake-table testing during Prototyping Week.", "c": "end"}, {"t": "Adobe Express (Video)", "d": "Students produce a persuasive pitch presentation explaining their Operation Earth Action design solution, using the persuasive pitch structure to communicate their process, purpose, and design decisions — connected to the school showcase and pitch presentations culminating activity.", "c": "end"}, {"t": "Delightex (CoSpaces)", "d": "Students build an interactive 3D disaster response scenario in CoSpaces showing their Operation Earth Action design solution in situ — visitors walk through the Lismore flood environment and interact with the earthquake-resistant structure, experiencing the ethical and practical considerations from multiple stakeholder perspectives explored during the empathic design interviews.", "c": "end"}, {"t": "Lego Spike", "d": "Students build a Lego Spike seismic alert system with sensors that detect vibrations and trigger a motor-driven warning mechanism, connecting engineering design to their earthquake research and the Lismore flood case study about community response to natural hazards.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 5", "th": "How We Organise Ourselves", "ci": "Entrepreneurs have a responsibility to develop, market and sell sustainable products and services.", "lo": "The power of giving back; How our environment is impacted by the products we create; Sustainable business practices", "s": [{"t": "Microsoft Forms", "d": "Students complete a quick class survey about their experience with the power of giving back — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students map out their current understanding of how our environment is impacted by the products we create as a simple flowchart or diagram in Canva, showing how they think the system works — the class then compares diagrams to identify gaps and assumptions to investigate.", "c": "beginning"}, {"t": "Kahoot", "d": "Students play a diagnostic Kahoot testing their assumptions about sustainable business practices — the results reveal what the class already knows and where the biggest knowledge gaps are, helping the teacher shape the inquiry direction.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore different environments and habitats using Google Earth satellite and Street View, observing how landscapes connected to the power of giving back look from above and ground level — comparing biomes across the globe.", "c": "beginning"}, {"t": "Microsoft Excel", "d": "Students create a spreadsheet tracking their product development data, market research results, and sustainability metrics, using formulas to analyse whether their business model is genuinely sustainable and giving back to the community.", "c": "middle"}, {"t": "Padlet", "d": "Students post product development updates throughout the design process, documenting how they ensured sustainability at each stage and gathering peer feedback about their marketing strategy and environmental impact.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build a Lego Spike prototype or automated production line for their sustainable product business, programming motors and sensors to demonstrate how their product could be manufactured responsibly, connecting engineering to their market research data tracked in Microsoft Excel.", "c": "middle"}, {"t": "Adobe Express (Website)", "d": "Students build a website for their sustainable product business, including product information, sustainability credentials, marketing materials, and data collected about community needs — connecting to the market stall activity where they developed, marketed and sold products.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a business pitch presentation for their sustainable product, incorporating market research data (collected and interpreted during Maths connections), sustainability analysis of environmental impact, and a 'giving back' component showing their product's community benefit.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a professional advertisement for their sustainable product, applying marketing and persuasive techniques while demonstrating responsible entrepreneurship — connecting to Dance & Drama exploration of myth's role in various cultures and storytelling for marketing.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 5", "th": "Sharing the Planet", "ci": "Finding peaceful solutions to conflict can make a difference in the world.", "lo": "Types of conflict; Causes and impacts of conflict; Conflict resolution", "s": [{"t": "Padlet", "d": "Students post an image, headline or question about types of conflict on a shared Padlet board, then read and comment on three classmates' posts — surfacing the range of perspectives and questions that will drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students design a 'What I Care About' poster in Canva showing their personal connection to causes and impacts of conflict — including images, facts they already know, and questions they want answered during the unit.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students respond to a series of true/false provocations about conflict resolution using Mentimeter live polls — the class sees results in real time, debates surprising answers, and identifies misconceptions to investigate during the unit.", "c": "beginning"}, {"t": "Padlet", "d": "Students create a collaborative conflict resolution strategies board, posting different approaches to peaceful conflict resolution explored during PE cooperative games, Drama improvisation, and class discussions about real-world conflicts.", "c": "middle"}, {"t": "Seesaw", "d": "Students record weekly reflections about conflict situations they observe or experience, analysing causes, impacts, and how peaceful solutions were (or could have been) applied, building a personal conflict resolution toolkit.", "c": "middle"}, {"t": "CoDrone EDU", "d": "Students investigate how drone technology is used in humanitarian aid and conflict zones (delivering medical supplies, mapping disaster areas), programming CoDrone EDU flight paths to simulate aid delivery routes and debating the ethical considerations, connecting to their research on peaceful solutions to real-world conflicts.", "c": "middle"}, {"t": "Freeform", "d": "Students use Freeform to build a collaborative conflict analysis map connecting types of conflict to their causes, impacts and potential peaceful resolutions explored during the unit — plotting how humanitarian drone technology, peacekeeping strategies and community action interconnect.", "c": "middle"}, {"t": "Adobe Express (Video)", "d": "Students create a conflict resolution documentary exploring a real-world conflict, analysing its causes and impacts, and proposing peaceful solutions — incorporating improvisation skills from Drama (exploring perspective and connection through collaborative creative work).", "c": "end"}, {"t": "Tinkercad", "d": "Students design a 3D model in Tinkercad of a 'Peace Hub' — a community space designed to facilitate conflict resolution, with labelled zones for mediation, cultural exchange, and humanitarian aid coordination — presenting their design alongside their Scratch conflict resolution simulation to show how peaceful solutions can be built into physical and digital environments.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Choose Your Own Adventure' conflict resolution simulation, where users navigate a conflict scenario making decisions that lead to peaceful or escalated outcomes — connecting to the concepts of perspective and connection explored through Drama improvisation.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 6", "th": "Who We Are", "ci": "Personal changes and influences contribute to our evolving sense of self.", "lo": "Physical, social, emotional and intellectual changes that occur throughout life; Influences that shape our identity; Developing a sense of self", "s": [{"t": "Adobe Express (Video)", "d": "Students create a personal documentary exploring how physical, social, emotional and intellectual changes have shaped their identity, incorporating reflections from music IMP instrumental groups about how personal actions affect relationships, and the owl symbol they designed to represent their learning and growth at Wesley.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Identity Influences Explorer' in Scratch where visitors click on influence sprites (family, culture, friendships, experiences, media) to see animated demonstrations of how each factor shaped a person's identity — connecting personal reflections from the Freeform concept map to an interactive experience that makes the abstract concept of evolving sense of self visible and navigable.", "c": "end"}, {"t": "Book Creator", "d": "Students create a reflective identity journal documenting their personal growth journey through Year 6, featuring their owl self-portrait design, genre exploration from Literature/Library provocation about selecting texts that are a 'good fit', and analysis of how changes and influences contributed to their evolving sense of self.", "c": "end"}, {"t": "Padlet", "d": "Students create a collaborative 'Influences on Identity' board exploring how different factors (family, culture, friendships, experiences, media) shape who we are, posting personal reflections and connecting to the Learner Profile attributes co-created at the start of the unit.", "c": "middle"}, {"t": "Seesaw", "d": "Students document their personal growth milestones throughout the unit, recording audio reflections about how physical, social, emotional and intellectual changes have contributed to their sense of self and preparing for their transition beyond primary school.", "c": "middle"}, {"t": "Mentimeter", "d": "Students use Mentimeter live polling and word clouds to anonymously share perspectives on identity influences, personal changes, and growth milestones, generating class-wide data visualisations that feed into their 'Sense of Self' analytical posters and personal documentary reflections.", "c": "middle"}, {"t": "Padlet", "d": "Students respond to the provocation 'Personal changes and influences contribute to our evolving sense of self.' by posting one image and one sentence showing what this looks like in their own life, creating a collaborative gallery that maps the class's diverse starting perspectives on physical, social, emotional and intellectual changes that occur throughout life.", "c": "beginning"}, {"t": "Canva", "d": "Students design a personal infographic mapping their own connection to influences that shape our identity — using icons, images and short text to visualise where they stand before the class explores different perspectives.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about developing a sense of self using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}, {"t": "Freeform", "d": "Students use Freeform to create a collaborative concept map exploring connections between physical, social, emotional and intellectual changes that occur throughout life and influences that shape our identity — using sticky notes for ideas, drawings for personal connections, and arrows to show how concepts link together, making their thinking visible to the whole group.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 6", "th": "Where We Are in Place and Time", "ci": "Significant events shape a place", "lo": "What is a significant event; Why these events occurred; Impact of significant events", "s": [{"t": "⏳ Planner Needed", "d": "Planner content not yet uploaded — specific suggestions pending. Please send the UOI planner for this unit to Nathan Benn on Teams to generate tailored technology integration suggestions.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 6", "th": "How the World Works", "ci": "Energy may be converted, transformed, and used to support human progress.", "lo": "Different forms of energy and how they are used; The impact of different energy sources on the planet; Sustainable energy practices", "s": [{"t": "Mentimeter", "d": "Students respond to 'What do you already know about different forms of energy and how they are used?' using a live word cloud, then the class discusses the most common responses — revealing existing understanding and misconceptions to shape the inquiry direction.", "c": "beginning"}, {"t": "Canva", "d": "Students create a hypothesis poster in Canva predicting how the impact of different energy sources on the planet works, including a labelled diagram and three questions they want to investigate — setting up the scientific inquiry process.", "c": "beginning"}, {"t": "Kahoot", "d": "Students play a diagnostic Kahoot quiz testing common assumptions about sustainable energy practices — wrong answers reveal misconceptions the class will investigate, and the teacher uses results to differentiate inquiry groups.", "c": "beginning"}, {"t": "Seesaw", "d": "Students document their electrical circuit experiments and Solar Buddy light construction process step-by-step, using the Explanation Game thinking routine to demonstrate understanding of energy transfer and transformation — connecting to science experiment report and procedural writing in English.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build and code a renewable energy model (wind turbine with motor or solar tracker) that demonstrates energy conversion from one form to another, collecting data on output and connecting their findings to the unit's investigation of sustainable energy practices and individual responsibilities for promoting them.", "c": "middle"}, {"t": "Micro:bit", "d": "Students program micro:bits to measure energy outputs during their electrical circuit and Solar Buddy experiments, collecting voltage and light data to demonstrate energy conversion and transformation, recording results as evidence in their science documentary and investigation journal.", "c": "middle"}, {"t": "CoDrone EDU", "d": "Students explore how drones convert battery energy into kinetic energy for flight, programming CoDrone EDU to perform controlled manoeuvres while discussing energy transformation chains (chemical → electrical → kinetic), connecting the hands-on experience to their broader research on how energy supports human progress.", "c": "middle"}, {"t": "Adobe Express (Video)", "d": "Students produce a science documentary explaining energy conversion and transformation, incorporating footage of their Solar Buddy light construction, electrical circuit experiments, and the Rube Goldberg machine chain reaction analysis — using the science experiment report writing skills developed during English.", "c": "end"}, {"t": "Tinkercad", "d": "Students design a 3D model in Tinkercad of their Solar Buddy light incorporating a custom housing that optimises solar energy capture, with labelled components showing how energy converts from solar to electrical to light — presenting their digital design alongside their working Solar Buddy device and micro:bit voltage data to demonstrate energy transformation in both virtual and physical form.", "c": "end"}, {"t": "Book Creator", "d": "Students create an 'Energy Transformation' investigation journal documenting their experiments with electrical circuits, dynamos (connecting William Kamkwamba's bicycle headlight dynamo story to modern generators), and Solar Buddy lights — including procedural writing, labelled diagrams, and evidence-based conclusions about sustainable energy practices.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 6", "th": "Sharing the Planet", "ci": "Communities interact with the environment in different ways.", "lo": "How community values shape the management of the natural environment; The need for sustainable practices; Taking action for environmental stewardship", "s": [{"t": "Padlet", "d": "Students post an image, headline or question about how community values shape the management of the natural environment on a shared Padlet board, then read and comment on three classmates' posts — surfacing the range of perspectives and questions that will drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students design a 'What I Care About' poster in Canva showing their personal connection to the need for sustainable practices — including images, facts they already know, and questions they want answered during the unit.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students respond to a series of true/false provocations about taking action for environmental stewardship using Mentimeter live polls — the class sees results in real time, debates surprising answers, and identifies misconceptions to investigate during the unit.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore and compare how different communities around the world interact with their natural environments, investigating examples of sustainable and unsustainable practices to inform their action project proposals.", "c": "middle"}, {"t": "Padlet", "d": "Students document their environmental action project development, posting research findings, design ideas, and reflections about how they can promote environmental stewardship in their school and local community.", "c": "middle"}, {"t": "DJI Drone (teacher-operated)", "d": "DLC captures aerial footage of the local Elsternwick environment and community green spaces, providing students with a bird's-eye perspective of how their community interacts with the natural environment, incorporating the footage into their iMovie environmental stewardship documentary and action project website.", "c": "middle"}, {"t": "Insta360 Cam", "d": "DLC captures 360° footage of local environmental sites and community spaces using the Insta360 camera, creating immersive reference material that students analyse to understand how different parts of their community interact with the environment and incorporate into their action project presentations.", "c": "middle"}, {"t": "Adobe Express (Website)", "d": "Students create an environmental stewardship project website presenting their action project (developed during the 'Finalize and share action projects' culminating activity), featuring their KWL chart journey from provocation images through to their final proposals for promoting environmental responsibility.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a documentary presenting their environmental stewardship project to peers or younger grades (as planned in the unit), incorporating research about how different communities interact with the environment, personal definitions of the central idea recorded at the start, and evidence of their action-taking.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Environmental Stewardship Dashboard' in Scratch where visitors click on community action sprites to see animated data visualisations of environmental impact — tracking metrics from their action project alongside drone and Insta360 footage documentation, demonstrating how community values translate into measurable environmental change.", "c": "end"}]}, {"ca": "St Kilda", "yl": "Prep", "th": "Who We Are", "ci": "To be healthy, people’s basic needs must be met.", "lo": "How our brain is growing and changing; How our emotions, behaviours and actions promote relationships; How we care for our bodies", "s": [{"t": "GarageBand", "d": "Students create a 'Brain Break' audio toolkit in GarageBand — each student records a guided breathing exercise or calm-down strategy over soothing background music (balloon breathing with gentle chimes, wall push with steady drums, calm counting with soft piano). The class compiles them into a playlist that the teacher plays during actual brain breaks, making the students' work a real classroom resource used every day — not just an assignment to be marked.", "c": "end"}, {"t": "Green Screen", "d": "Students perform their 'Healthy Choices' demonstration in front of the green screen — one student is transported inside a kitchen demonstrating healthy food choices, another is placed on a sports field showing active play, another is in a bedroom demonstrating sleep routines. Each performance demonstrates one of the seven Healthy Lifestyle Jigsaw elements in a real-world setting they couldn't physically visit during class.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code a 'Healthy Day' animation in Scratch Jr showing a character's routine from waking up to bedtime — eating brain food at recess (not sometimes foods), choosing active play at lunch, using a Zones of Regulation strategy when feeling frustrated, going to bed on time. The animation demonstrates the connection between daily choices and wellbeing, playing automatically when the green flag is pressed.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph their brain food recess choices and use drawing tools to sort foods into ‘always’ and ‘sometimes’ categories, recording voice explanations about why some foods fill our batteries and others could make them overflow — building on the Nude Foods vs Processed Foods sorting activity and the Cyber Safety lesson ‘Keeping the Balance’.", "c": "middle"}, {"t": "Indi Robot", "d": "Students build a ‘Healthy Choices’ colour-tile path where each colour represents one of the seven healthy lifestyle elements from the Jigsaw (green = exercise, blue = sleep, yellow = healthy food, purple = mind health), programming Indi to follow the path while explaining how each element meets a basic need for staying healthy.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw themselves and record a voice note answering the question: 'What does how our brain is growing and changing mean to you?' — creating a personal snapshot that the class can revisit at the end of the unit to see how thinking has changed.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create an 'All About Me' page featuring drawings and voice recordings about how our emotions, behaviours and actions promote relationships, starting a personal book they will add to throughout the unit as their understanding of to be healthy, people’s basic needs must be met grows.", "c": "beginning"}, {"t": "Padlet", "d": "Students post a photo of something they do every day to stay healthy (eating fruit, brushing teeth, sleeping, playing outside) to a shared Padlet wall with a voice recording explaining why it keeps them healthy. The class sees all 25 healthy habits at once and the teacher sorts them into the seven elements of the Healthy Lifestyle Jigsaw — revealing patterns about what the class already knows and what they need to investigate further.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about how our brain is growing and changing.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Prep", "th": "How We Express Ourselves", "ci": "People recognise important events through celebrations and traditions.", "lo": "The traditions of our families and communities; How and why people celebrate; The similarities and differences between celebrations", "s": [{"t": "Canva Video", "d": "Students produce a 'Celebrations Around the World' TV show — each group films a segment about a different celebration explored during the unit (Chinese New Year Lion Dancing, Hanukkah, Diwali, Mid-Autumn Festival), dressing in costumes, demonstrating the dances learned in class, and showing the cultural artefacts and food they explored. The segments are compiled into a class TV show with student hosts introducing each celebration.", "c": "end"}, {"t": "GarageBand", "d": "Students create a 'Celebration Sounds' composition in GarageBand that layers music and sounds from different cultural celebrations explored during the unit — drums for Chinese New Year, Simi Yadech rhythms, Mexican Hat Dance beats, Chimes of Dunkirk melody. The composition builds as each culture's sounds are added, demonstrating that celebrations share common elements (music, rhythm, joy) even when they sound different — a musical Venn diagram the class can hear.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code a 'Dance Around the World' interactive animation in Scratch Jr where a character travels to different countries and performs a cultural dance at each stop — moving to the Simi Yadech steps in one scene, the Mexican Hat Dance in another, the Chimes of Dunkirk in a third. Each scene has a different backdrop and the character's movements match the dance, creating a coded world tour of celebrations that plays automatically.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph and narrate the cultural artefacts and food explored during the unit (mooncakes made from clay/playdough for Mid-Autumn Festival, braided bread and dreidel game for Hanukkah with Pastor Fern, money envelopes for Chinese New Year), recording what each item represents and connecting to traditions carried down through families and communities.", "c": "middle"}, {"t": "Cubetto", "d": "Students program Cubetto to visit stations on a ‘Dance Around the World’ floor mat, stopping at each country to explain the cultural dance they learned — Simi Yadech, The Chimes of Dunkirk, Mexican Hat Dance — connecting coding sequences to the dance steps performed and added to their classroom ‘Dance Around the World’ board.", "c": "middle"}, {"t": "Seesaw", "d": "Students use the camera and drawing tools to create a 'Before I Knew' page showing what the traditions of our families and communities looks like to them right now — using pictures, labels and voice recording to capture their starting understanding.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page showing different ways they can express the idea of how and why people celebrate — through drawing, voice, photos and text — exploring which method feels most natural to them.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore locations connected to celebrations studied during the unit using Google Earth — flying to China for Chinese New Year, Israel for Hanukkah, India for Diwali — taking screenshots of landmarks, temples and streets decorated for festivals. The virtual travel creates a provocation that connects celebrations to real places around the world, building geographic context before the class compares how and why people celebrate.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about the traditions of our families and communities.", "c": "middle"}, {"t": "Padlet", "d": "Students pin locations on a shared Padlet Map where different cultural practices or traditions connected to the traditions of our families and communities take place, adding images, descriptions and personal reflections — creating a visual map of cultural diversity.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Prep", "th": "How We Organise Ourselves", "ci": "We all have roles and responsibilities in the community", "lo": "Roles people play; Responsibilities in the community; How working together helps everyone", "s": [{"t": "Canva Video", "d": "Students produce a 'Thank You Heroes' video — each student films a short message to a school community member whose role they investigated, explaining what they learned about that person's responsibilities and why their role matters. The teacher compiles the messages into a video that is actually delivered to the staff members, giving the students' work real purpose and demonstrating that understanding roles leads to appreciation and action.", "c": "end"}, {"t": "Green Screen", "d": "Students dress up in costumes representing different community roles (firefighter, librarian, doctor, teacher) and film themselves in front of the green screen placed in the relevant setting — a library, a fire station, a hospital, a classroom. Each student explains their responsibilities and why working together helps everyone, connecting to the Essential Agreement they created and the Firefighters' visit discussion.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code a 'Busy Community' animation in Scratch Jr showing different community helpers performing their roles in sequence — the teacher opens the classroom, the librarian shelves books, the crossing guard stops traffic, the gardener waters plants. When all helpers have performed, the school 'comes alive' with movement everywhere, demonstrating visually that a community only works when everyone plays their part.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph their morning jobs checklist in their locker and record voice explanations about each responsibility step, building independence and connecting to the roll sentence reflections about ‘How were you responsible in the classroom and the playground?’ — practised throughout the unit.", "c": "middle"}, {"t": "Beebots", "d": "Students program Beebots to navigate a school map visiting different staff members’ locations (classroom, library, office, playground), explaining each person’s role at every stop — building on the Year 4 buddy discussions about staff roles and the books about starting school (Starting School by Jane Godwin, Possum Goes to School, First Day by Andrew Daddo).", "c": "beginning"}, {"t": "Seesaw", "d": "Students draw or photograph an example of roles people play from their everyday life, then record a voice note explaining how it works — building a class collection of real-world connections before the inquiry begins.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph examples of responsibilities in the community around the school or home and create a Book Creator page sorting them into categories, with voice recordings explaining their grouping — practising the classification skills they will develop in the unit.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about roles people play.", "c": "middle"}, {"t": "GarageBand", "d": "Students record a 'Community Helpers' audio story in GarageBand — narrating a day in the life of the school from the perspective of a staff member they interviewed (the librarian's morning, the grounds crew's lunchtime routine, the office manager's afternoon). They add sound effects for each setting (books shelving, lawn mowers, phone ringing), creating an audio tour of the school's hidden systems that couldn't exist without layered audio production.", "c": "middle"}, {"t": "Padlet", "d": "Students pin significant locations on a shared Padlet Map connected to roles people play, adding photos, descriptions and personal connections — creating a collaborative class map that makes geographic learning visible.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Prep", "th": "Sharing the Planet", "ci": "Human actions change the environment.", "lo": "How people interact with different environments; The effect people have on the environment; Ways in which people can take action and care for the environment", "s": [{"t": "Indi Robot", "d": "Students build an ‘Environment Path’ using colour tiles representing different natural environments (blue = marine, yellow = desert, green = bushland), programming Indi to travel through each environment while explaining the living things found there and one human action that could help or harm it — connecting to the environment provocation bottles (sand/water, leaves/sticks).", "c": "beginning"}, {"t": "Seesaw", "d": "Students draw what how people interact with different environments means to them and record a voice note explaining their thinking — creating a 'Before' snapshot that will be compared with their 'After' understanding at the end of the unit.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph or draw something from nature connected to the effect people have on the environment and create a Book Creator page with labels and a voice note explaining why it matters — starting a personal inquiry book.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore different environments and habitats using Google Earth satellite and Street View, observing how landscapes connected to how people interact with different environments look from above and ground level — comparing biomes across the globe.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph their collaborative Prep Tunnel underwater exhibition and the ceramic, painted and drawn marine animals they created in Visual Arts, recording voice explanations about each sea creature’s features and why caring for the ocean environment matters — connecting to picture books Commotion in the Ocean and Ella’s Adventures in the Barrier Reef.", "c": "middle"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about how people interact with different environments.", "c": "middle"}, {"t": "Padlet", "d": "Students drop pins on a shared Padlet Map showing places where human actions are helping or harming the environment — the recycling bin at school (helping), litter on the beach from their Aquarium excursion discussions (harming), the school garden (helping). Each pin has a photo and voice recording explaining whether the action is positive or negative, building a class evidence map of human impact on the environment.", "c": "middle"}, {"t": "Green Screen", "d": "Students film a 'Save Our Oceans' news report using green screen — one reporter is 'underwater' at the Great Barrier Reef (healthy coral backdrop) explaining how the reef looks when it's cared for, then the background switches to bleached coral and the reporter explains what happens when humans don't take action. Students play both the reporters AND the sea creatures (with costumes from their Visual Arts marine animal project), creating a documentary that transports them inside the environment.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code a two-scene 'Before and After' animation in Scratch Jr — Scene 1 shows a healthy environment (animals moving, plants growing, sun shining), Scene 2 shows the same environment after harmful human actions (animals disappearing, plants wilting, rubbish appearing). A third scene shows the student's proposed action to fix it. The animation becomes a digital version of the 'before-and-after' thinking used throughout the unit, but one that moves, sounds and performs itself.", "c": "end"}, {"t": "iMovie", "d": "Students produce a 'Three Sea Creature Facts' video (connecting to their Student Led Conference preparation) but elevated — each student films their presentation with their ceramic/painted marine animal artwork as a prop, the teacher adds underwater footage and sound effects in iMovie, and slow-motion captures of the Prep Tunnel underwater exhibition bring the display to life on screen. The finished video becomes the actual SLC presentation resource parents watch.", "c": "end"}]}, {"ca": "St Kilda", "yl": "Year 1", "th": "Who We Are", "ci": "We learn about ourselves through the games we play.", "lo": "How to identify and manage emotions; How players' choices affect relationships; Our responsibilities when playing games", "s": [{"t": "Scratch Jr", "d": "Students code a simple game they designed in Scratch Jr — building in the rules, turns and scoring that demonstrate their understanding of fair play and responsibility. When a player breaks a rule, the game shows a consequence on screen (lose a point, go back to start). Comparing different students' games reveals that everyone designed different rules based on what they value — the games ARE reflections of who they are.", "c": "end"}, {"t": "iMovie", "d": "Students produce a 'Team Identity Reveal' video — each group films the unveiling of their sports team identity (mascot, colours, body language signals, scoring system, song) created during PE, presenting why each element was chosen and what it expresses about their team's values. Slow-motion captures of the team performing their song and signals create a cinematic reveal moment that celebrates identity and belonging.", "c": "end"}, {"t": "GarageBand", "d": "Students compose their team song in GarageBand — selecting instruments, tempo and lyrics that express their team's personality and values. The song is performed live alongside the team identity reveal video, creating a multi-tool culmination where the GarageBand composition IS the team's anthem, played at sports carnivals and team events throughout the year.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph their Essential Agreement display and record voice explanations about how the agreed rules help games be fair and fun, connecting to the Kimochi stories about emotions and the Cyber Safety lessons about positive online interactions when playing games.", "c": "middle"}, {"t": "Scratch Jr", "d": "Students code a simple game they designed, building in rules and consequences that demonstrate their understanding of how responsibility, perspective and fair play make games successful — reflecting on what they learned about themselves through the design process.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw themselves and record a voice note answering the question: 'What does how to identify and manage emotions mean to you?' — creating a personal snapshot that the class can revisit at the end of the unit to see how thinking has changed.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create an 'All About Me' page featuring drawings and voice recordings about how players' choices affect relationships, starting a personal book they will add to throughout the unit as their understanding of we learn about ourselves through the games we play grows.", "c": "beginning"}, {"t": "Padlet", "d": "Students post a photo or drawing of their favourite game to a shared Padlet wall with a voice recording explaining why they love it and how it makes them feel. The class sees 25 games at once — board games, sports, video games, playground games — and the teacher asks: 'What do all these games have in common? What do they teach us about ourselves?' — launching the inquiry into how games reveal who we are.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about how to identify and manage emotions.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 1", "th": "Where We Are in Place and Time", "ci": "History and culture connect the past, present and future.", "lo": "How technology has changed over time; The purpose and significance of artefacts; How the past connects to the present and future", "s": [{"t": "iMovie", "d": "Students produce a 'Then and Now' documentary — filming themselves demonstrating how an old technology artefact from the incursion works (winding up a music box, dialling a rotary phone, loading a cassette) alongside its modern equivalent (playing Spotify, tapping a smartphone, streaming music). Slow-motion and side-by-side editing reveal the transformation, and students narrate the reasons for the change.", "c": "end"}, {"t": "Seesaw", "d": "Students complete the final activity designing a future mobile device with any features they choose, making a sensible prediction about technology's future based on the evolution they traced from phone → mobile phone → Walkman → Discman → iPhone (Steve Jobs announcement video) throughout the unit.", "c": "end"}, {"t": "Green Screen", "d": "Students film themselves 'time travelling' using the green screen — standing in a 1950s kitchen with a record player, then jumping to a modern bedroom with wireless speakers, then leaping to a futuristic room they designed themselves. They narrate how technology changed at each jump, connecting past to present to their Seesaw prediction about what a future mobile device will look like.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph artefacts they brought from home (records, old phones, photos) and record voice explanations about what the artefact tells us about the past, connecting to the BTN 'Old School' clip discussions and parent conversations shared during SLC about what school and technology were like in the past.", "c": "middle"}, {"t": "Canva Video", "d": "Students create a short 'Then and Now' video comparing an old technology artefact with its modern equivalent, incorporating the Dance and Drama exploration where they compared dances from different decades and created a timeline of dance that stayed on the classroom wall all term.", "c": "middle"}, {"t": "Google Maps", "d": "Students explore their own home location on Google Maps and take a screenshot, then use Seesaw to record what they notice about the place where they live — connecting to the unit's focus on how technology has changed over time.", "c": "beginning"}, {"t": "Book Creator", "d": "Students start a 'Then and Now' book by drawing or photographing something from their life connected to the purpose and significance of artefacts, adding voice recordings explaining what they think it looked like in the past.", "c": "beginning"}, {"t": "Padlet", "d": "Students bring in or photograph an artefact from home (an old phone, a record, a photo album, a handwritten letter) and post it to a shared Padlet wall with a voice recording explaining what it is and how old they think it is. The class sees all the artefacts at once and tries to sort them from oldest to newest — launching the inquiry by immediately engaging with primary sources from their own families.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about how technology has changed over time.", "c": "middle"}, {"t": "Padlet", "d": "Students pin locations on a shared Padlet Map where different cultural practices or traditions connected to how technology has changed over time take place, adding images, descriptions and personal reflections — creating a visual map of cultural diversity.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 1", "th": "How We Express Ourselves", "ci": "People express their emotions through the way they communicate.", "lo": "Different ways to communicate emotions; How art, music and movement express feelings; Understanding others' expressions through body language and facial cues", "s": [{"t": "Book Creator", "d": "Students create an 'Expressing Emotions' portfolio featuring their Frida Kahlo portrait (recreating her nonchalant expression), their Emotion Exhibition photographs (sculpting partners to show emotions through body language and facial expression), and their sports team jumper design showing how colour, patterns and mascots communicate identity.", "c": "end"}, {"t": "Seesaw", "d": "Students complete the 'Thinking Thoughts and Feeling Feelings' assessment task from the We Thinkers! series, demonstrating their ability to recognise social cues and reframe situations to avoid uncomfortable feelings — building on the Kimochi Emotions vocabulary sheet and the Mona Lisa facial expression activity.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a short video showcasing their Emotion Exhibition (where they sculpted partners into emotion poses), adding narration explaining which emotions are being communicated through body language and facial expressions — with their Grow and Glow digital portfolio reflection.", "c": "end"}, {"t": "GarageBand", "d": "Students create a soundscape representing different weather-inspired emotions, connecting to the music listening activities where they analysed how composers use tempo, dynamics and instruments to communicate feelings (exploring works and reflecting on what feelings the music evoked).", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph their Frida Kahlo-inspired portrait and sports team jumper design, recording voice explanations about how colours, facial expressions and symbols communicate emotions and identity — connecting the Visual Art, PE and music strands of the unit.", "c": "middle"}, {"t": "Seesaw", "d": "Students use the camera and drawing tools to create a 'Before I Knew' page showing what different ways to communicate emotions looks like to them right now — using pictures, labels and voice recording to capture their starting understanding.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page showing different ways they can express the idea of how art, music and movement express feelings — through drawing, voice, photos and text — exploring which method feels most natural to them.", "c": "beginning"}, {"t": "GarageBand", "d": "Students listen to short musical clips and draw the emotion they hear — then compare drawings to discover that the same music makes different people feel different things. They create their own 30-second 'emotion sound' in GarageBand (angry drums, peaceful chimes, excited fast piano) and play it for a partner who draws what they feel — exploring how communication goes beyond words, connecting to the Kimochi Emotions vocabulary work.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about different ways to communicate emotions.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 1", "th": "How the World Works", "ci": "Weather affects our lives in different ways.", "lo": "Types of weather conditions; How weather impacts our lives (clothing, activities, food, feelings); Why weather changes (seasons, patterns)", "s": [{"t": "Canva Video", "d": "Students produce a professional weather forecast video — each group reports on a different season (including Kulin Nation seasons), using the daily weather graph data they collected as evidence, displaying their findings on a classroom weather map, and delivering forecasts with dramatic weather footage filmed around the school. The format transforms their data collection into a broadcast that uses scientific vocabulary and Chinese weather characters learned in class.", "c": "end"}, {"t": "Green Screen", "d": "Students perform their frozen tableaux representing seasonal activities in front of the green screen — placed in weather-appropriate environments (a snowfield for winter activities, a beach for summer, an autumn forest, a rainy day). Each group narrates how the weather affects clothing, food, activities and feelings in that season, creating an immersive seasonal experience that brings the tableau performance to life in ways costumes alone couldn't achieve.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code a 'Weather Wardrobe' game in Scratch Jr — a character wakes up and checks the weather (sun, rain, snow, wind), then the player must drag the right clothing and accessories onto the character before they go outside. Wrong choices lead to animated consequences (shivering in rain without a coat, sweating in snow gear on a sunny day), teaching weather-life connections through an interactive game the student coded themselves.", "c": "end"}, {"t": "Micro:bit", "d": "Students use micro:bit temperature and light sensors to collect daily weather data, building on the daily weather graph activity and connecting digital data collection to the Bureau of Meteorology research they conducted on iPads.", "c": "middle"}, {"t": "Green Screen + iMovie", "d": "Students perform their frozen tableaux representing seasonal activities in front of a green screen (as described in the planner), bringing the scene to life with weather-appropriate backgrounds and narrating how weather impacts the activities people choose in different seasons.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph or draw something from their environment connected to types of weather conditions and record a voice note explaining what they think is happening and why — capturing their scientific thinking before investigations begin.", "c": "beginning"}, {"t": "Book Creator", "d": "Students draw their prediction of what will happen when they explore how weather impacts our lives (clothing, activities, food, feelings) and record a voice note explaining their reasoning — creating a 'My Prediction' page to compare against results later.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore locations connected to the unit's focus using Google Earth satellite and street views, making initial observations and recording wonderings that will anchor their inquiry into types of weather conditions.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate types of weather conditions, building a visual portfolio of evidence throughout the unit.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 1", "th": "How We Organise Ourselves", "ci": "Systems are involved in preparing products for consumers.", "lo": "Where products come from; The systems products go through; How people choose their products", "s": [{"t": "iMovie", "d": "Students produce a 'From Farm to Fork' documentary using stop-motion animation — filming the transformation of a raw material into a finished product using real food items and toy props (a toy cow, flour, bread dough, a finished sandwich). Each step of the system is captured frame by frame, creating a visual production line that shows the entire journey from raw material to consumer product.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code a 'Product Journey' animation in Scratch Jr showing the system a product goes through — from farm to factory to truck to shop to home. Characters and backdrops change at each stage, the product transforms (wheat becomes flour becomes bread), and the student narrates the sequencing vocabulary (consume, process, transportation, storage) built throughout the unit. The system plays automatically, demonstrating the whole chain.", "c": "end"}, {"t": "Green Screen", "d": "Students film themselves as 'product reporters' transported via green screen to each stage of a product's journey — standing in a wheat field, inside a factory, on a delivery truck, at a supermarket shelf. They explain what happens at each stage using the vocabulary built throughout the unit, creating a news-style report that takes the audience on a journey through places they couldn't physically visit in one lesson.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph clothing labels to identify where products come from and the materials they're made of, recording voice explanations about the travel involved in production and distribution — connecting to the George the Farmer cotton video and the Clickview 'War on Waste' and 'Farm to Table' series.", "c": "middle"}, {"t": "Padlet", "d": "Students photograph clothing labels in the classroom to identify where products come from (Made in China, Made in Bangladesh, Made in Vietnam) and post each label to a shared Padlet Map, dropping pins on the country of origin. The class map reveals that their classroom is connected to factories around the world — a visual system map that shows the global journey products take before reaching consumers.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw or photograph an example of where products come from from their everyday life, then record a voice note explaining how it works — building a class collection of real-world connections before the inquiry begins.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph examples of the systems products go through around the school or home and create a Book Creator page sorting them into categories, with voice recordings explaining their grouping — practising the classification skills they will develop in the unit.", "c": "beginning"}, {"t": "Google Earth", "d": "Students use Google Earth to follow the journey of a t-shirt — zooming from a cotton farm in Queensland to a factory in China to a shop on Chapel Street. At each stop they screenshot the location and the teacher asks: 'What happens to the product here?' — building geographic understanding of the system that connects raw materials to the clothes they're wearing, before the class reads clothing labels to discover where their own clothes come from.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about where products come from.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 1", "th": "Sharing the Planet", "ci": "Living things have structures that allow them to survive in different environments.", "lo": "The physical structure of plants and bees; How features support survival in different environments; Human impact on living things", "s": [{"t": "iMovie", "d": "Students produce a 'Garden Investigators' documentary — filming close-up footage of the broad bean experiment at each growth stage (comparing beans grown in light, dark and varied water), the bee sculptures alongside their scientific mirror-image drawings, and the plants observed at the Royal Botanic Gardens. Slow-motion captures pollination in the school garden, and student narrators explain how structural features enable survival.", "c": "end"}, {"t": "Green Screen", "d": "Students film themselves 'shrunk to the size of a bee' using green screen — transported inside a giant flower where they can see pollen up close, then flying through the school garden at bee-level. They report on what a bee's day looks like, explaining pollination, the roles bees play within their community, and why flowers and plants support a healthy planet — an impossible perspective made possible by the tech.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code a 'Bee's Journey' animation in Scratch Jr showing a bee visiting three flowers, collecting pollen at each stop, then returning to the hive. The animation demonstrates pollination as a system — without the bee's journey, the flowers can't reproduce. Each scene shows the bee interacting with a different plant, connecting the coded sequence to the real pollination process observed during the unit's garden investigations.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph their broad bean diary entries (recording daily growth using IT skills) and annotate with drawing tools showing the parts of a bean plant, comparing how beans grew differently in the three experimental conditions (light levels and water) and drawing conclusions about plant needs.", "c": "middle"}, {"t": "Book Creator", "d": "Students create a 'Bee Scientist' page in Book Creator featuring a photo of their clay bee sculpture alongside their scientific mirror-image drawing, with labels identifying the body parts (3 sections, 6 legs, wings, antennae) and a voice recording explaining the roles bees play within their community — building the observation and documentation skills practised throughout the unit.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw what the physical structure of plants and bees means to them and record a voice note explaining their thinking — creating a 'Before' snapshot that will be compared with their 'After' understanding at the end of the unit.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph or draw something from nature connected to how features support survival in different environments and create a Book Creator page with labels and a voice note explaining why it matters — starting a personal inquiry book.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore locations connected to the unit's focus using Google Earth satellite and street views, making initial observations and recording wonderings that will anchor their inquiry into the physical structure of plants and bees.", "c": "beginning"}, {"t": "Micro:bit", "d": "Students use micro:bit light and moisture sensors to measure conditions in different parts of the school garden — comparing sunny spots with shady spots, dry soil with damp soil. They record readings on a class chart and connect the data to where they found the most living things, discovering that plants and insects thrive in specific conditions — science data collection that couldn't happen without the sensors.", "c": "middle"}, {"t": "Padlet", "d": "Students drop pins on a shared Padlet Map marking locations connected to the physical structure of plants and bees, adding photos, facts and reflections at each pin — building a collaborative geographic record of the class's environmental research.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 2", "th": "Who We Are", "ci": "The way we interact with others is influenced by who we are", "lo": "Personal identity and strengths; How self-regulation supports learning; Building resilience through knowledge of ourselves", "s": [{"t": "Scratch Jr", "d": "Students code an interactive 'Calm Palm Toolkit' in Scratch Jr where tapping different strategy sprites (deep breathing, counting, walking away, talking to someone) triggers animated demonstrations of each self-regulation technique from their Calm Palm template — creating a digital wellbeing resource they can share with younger students.", "c": "end"}, {"t": "Canva Video", "d": "Students produce an Canva Video 'Letter to my Year 3 Teacher' video combining their All About Me Selfie, self-portrait, Frames of Strength reflections and Mind Monsters drawings with narration about who they are, their strengths, and how UR STRONG Friendship Fires and Growth Mindset lessons built their resilience — a personalised documentary impossible without film production tools.", "c": "end"}, {"t": "GarageBand", "d": "Students compose a personal 'Strengths Soundtrack' in GarageBand where each instrument layer represents a different strength from their Frames of Strength activity — combining the tracks into a composition that expresses their identity through sound, then presenting why they chose each instrument to represent each strength and how the Essential Agreement connects them.", "c": "end"}, {"t": "Adobe Express (Podcast)", "d": "Students record a 'BOB it up' style podcast episode about their personal strengths and self-regulation strategies, building on the podcast listening activity and connecting to the Cyber Safety Incursion SAFE poster about responsible digital interaction.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph their Calm Palm template and Mind Monsters drawings, recording voice explanations about which strategies help them self-regulate in different situations — building their 'ready to learn' toolkit throughout the year.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw themselves and record a voice note answering the question: 'What does personal identity and strengths mean to you?' — creating a personal snapshot that the class can revisit at the end of the unit to see how thinking has changed.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create an 'All About Me' page featuring drawings and voice recordings about how self-regulation supports learning, starting a personal book they will add to throughout the unit as their understanding of the way we interact with others is influenced by who we are grows.", "c": "beginning"}, {"t": "Padlet", "d": "Students post examples of resilience strategies from their lives onto a class Padlet board, adding voice notes explaining how building resilience through knowledge of ourselves helps them bounce back — creating a provocation wall the teacher uses to form inquiry groups.", "c": "beginning"}, {"t": "Book Creator", "d": "Students add to their ongoing inquiry book, documenting new learning about personal identity and strengths with labelled diagrams, photographs and written reflections showing how their thinking is developing.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 2", "th": "Where We Are in Place and Time", "ci": "Journeys can lead to challenges and new understandings.", "lo": "Types of journeys (physical, learning, cultural); Challenges encountered on journeys; New understandings gained through journeys", "s": [{"t": "Canva Video", "d": "Students produce an Canva Video 'Family Journey Documentary' combining their home learning interview footage (using WWWWH question syntax), family photos, the wave template showing challenges, opportunities and growth, and connections to picture storybooks like 'I Am Sangoel' and 'The Snail and the Whale' — narrating their family's significant journey with titles, transitions and a soundtrack.", "c": "end"}, {"t": "Green Screen", "d": "Students film a green screen broadcast where they 'travel' to the locations from their family's journey story, reporting from each place about the challenges encountered and growth that resulted — transporting themselves into the settings of picture storybooks (Little Chelone's ocean, Sangoel's Sudan) to make physical, learning and cultural journeys visible.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code an animated journey map in Scratch Jr where a character sprite travels between location backdrops from the picture storybooks explored in the unit (The Snail & the Whale, Little Chelone, I Am Sangoel, Alfred's War), with recorded voice narrating what challenges and growth happened at each stop — connecting CSPACE summary skills to interactive storytelling.", "c": "end"}, {"t": "Seesaw", "d": "Students complete the Challenges, Opportunities and Growth reflection comparing their own learning journey through the unit to the family journey they researched, using the wave template format to show how journeys are not always smooth.", "c": "middle"}, {"t": "Padlet", "d": "Students post their family interview findings alongside a photo-sorted journey map, building a collaborative class display showing the diversity of family journeys (physical, learning, cultural) and connecting to the ROAR resilience framework.", "c": "middle"}, {"t": "Google Maps", "d": "Students explore their own home location on Google Maps and take a screenshot, then use Seesaw to record what they notice about the place where they live — connecting to the unit's focus on types of journeys (physical, learning, cultural).", "c": "beginning"}, {"t": "Book Creator", "d": "Students start a 'Then and Now' book by drawing or photographing something from their life connected to challenges encountered on journeys, adding voice recordings explaining what they think it looked like in the past.", "c": "beginning"}, {"t": "Seesaw", "d": "Students explore photos of places connected to new understandings gained through journeys and use Seesaw to record what surprised them — sparking curiosity about new understandings gained through journeys before the class investigation begins.", "c": "beginning"}, {"t": "Book Creator", "d": "Students add to their ongoing inquiry book, documenting new learning about types of journeys (physical, learning, cultural) with labelled diagrams, photographs and written reflections showing how their thinking is developing.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 2", "th": "How We Express Ourselves", "ci": "Artefacts provide a window into the beliefs and values of cultures.", "lo": "Beliefs and values contribute to a culture; The importance of rituals and traditions; How artefacts capture history and cultural expression", "s": [{"t": "Scratch", "d": "Students code an interactive 'Cultural Artefact Museum' in Scratch where clicking on artefact sprites triggers animations, recorded voice explanations from their SPO and WWWWH research, and cultural music samples from the Amanecer Andino Bolivian instruments exploration — visitors navigate between museum rooms to discover how artefacts provide windows into the beliefs and values of different cultures, connecting to Kaylea Fern's cultural artefact visit.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a short cultural documentary featuring their celebration dance (created during Dance expert groups where they researched cultural dances and shared findings with the class), connecting to the 'Why Do People Dance?' YouTube quiz provocation and the exploration of Bolivian music Amanecer Andino.", "c": "end"}, {"t": "Lego Spike", "d": "Students build a Lego Spike 'Artefact Display Turntable' that rotates their physical cultural artefact while the distance sensor detects when a visitor approaches and triggers the motor — presenting their Save the Last Word thinking routine responses alongside the automated display, connecting the Affirmation Beads values activity to an engineering showcase of how technology can preserve and present cultural stories.", "c": "end"}, {"t": "GarageBand", "d": "Students create a musical response inspired by the cultural music exploration (Amanecer Andino Bolivian instruments, Shenanigans Bush Dances, Bunjil Our Creator), comparing instrument choices and rhythms from different cultures to express cultural stories and traditions.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph their celebration tradition drawing from the Tune In provocation and record a voice explanation about what their family celebrates and why, building on the homework where they created questions about cultural connections and family sports links.", "c": "beginning"}, {"t": "Padlet", "d": "Students post photos of artefacts, traditions and cultural objects from their homes onto a class Padlet board, adding voice notes explaining what each item means to their family — building a shared provocation wall of beliefs and values contribute to a culture before the class investigation begins.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page showing different ways they can express the idea of the importance of rituals and traditions — through drawing, voice, photos and text — exploring which method feels most natural to them.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate beliefs and values contribute to a culture, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Book Creator", "d": "Students add to their ongoing inquiry book, documenting new learning about beliefs and values contribute to a culture with labelled diagrams, photographs and written reflections showing how their thinking is developing.", "c": "middle"}, {"t": "Padlet", "d": "Students pin locations on a shared Padlet Map where different cultural practices or traditions connected to beliefs and values contribute to a culture take place, adding images, descriptions and personal reflections — creating a visual map of cultural diversity.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 2", "th": "How the World Works", "ci": "People and the planet are reliant on different energy sources.", "lo": "Energy types (electricity, fossil fuels, solar); Energy helps us in daily life; Energy transformation; Responsibility to conserve energy and find sustainable sources", "s": [{"t": "Scratch", "d": "Students code an interactive 'Energy Sources Explorer' in Scratch where clicking on energy source sprites (solar panel, wind turbine, coal plant, battery) triggers animated demonstrations of how each transforms energy, with a dashboard showing sustainability ratings — connecting the bouncing ball, light switch, candle and paper airplane provocation to an interactive simulation visitors can explore and compare.", "c": "end"}, {"t": "Lego Spike", "d": "Students build a Lego Spike motorised circuit demonstration where the motor powers a fan, light or buzzer through a programmable sequence — deliberately breaking the circuit to show what happens when energy flow stops, then presenting their working model alongside their gist statements using the BUT conjunction about fossil fuels vs sustainable energy.", "c": "end"}, {"t": "Green Screen", "d": "Students film a green screen 'Energy Debate Show' where two teams transport themselves to fossil fuel and renewable energy locations, presenting both sides of the Tug of War provocation ('We need fossil fuels to power our lives') — incorporating their pros and cons reflections and delivering their final gist statement positions as broadcast debaters.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph each step of their circuit building experiment and use drawing tools to label the energy source, wires, switch and bulb, building scientific vocabulary about energy transfer within a closed circuit.", "c": "middle"}, {"t": "Micro:bit", "d": "Students use micro:bit light sensors to collect data comparing solar energy levels at different times of day, connecting to the solar energy writing exemplar ('Explain how solar energy works and why it is important') and the unit's investigation into sustainable energy alternatives.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph or draw something from their environment connected to energy types (electricity, fossil fuels, solar) and record a voice note explaining what they think is happening and why — capturing their scientific thinking before investigations begin.", "c": "beginning"}, {"t": "Book Creator", "d": "Students draw their prediction of what will happen when they explore energy helps us in daily life and record a voice note explaining their reasoning — creating a 'My Prediction' page to compare against results later.", "c": "beginning"}, {"t": "Padlet", "d": "Students post photos and drawings of energy transformation examples from around the school onto a class Padlet board — a light switch, a ball bouncing, a candle flame — adding voice notes explaining what energy change they think is happening, building a collaborative provocation wall of questions to investigate.", "c": "beginning"}, {"t": "Book Creator", "d": "Students add to their ongoing inquiry book, documenting new learning about energy types (electricity, fossil fuels, solar) with labelled diagrams, photographs and written reflections showing how their thinking is developing.", "c": "middle"}, {"t": "Padlet", "d": "Students drop pins on a shared Padlet Map marking locations connected to energy types (electricity, fossil fuels, solar), adding photos, facts and reflections at each pin — building a collaborative geographic record of the class's environmental research.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 2", "th": "How We Organise Ourselves", "ci": "Technology can influence the way ecosystems can survive.", "lo": "An ecosystem has animals, plants and microorganisms; Technology can cause ecosystems to adapt and evolve; Technology can help or hinder ecosystems", "s": [{"t": "Scratch", "d": "Students code an interactive ecosystem simulation in Scratch where players add or remove technology (satellites, robots, screens, farming equipment) and watch animated consequences on the animals, plants and microorganisms — connecting to The Wild Robot class novel where different character perspectives revealed technology's complex ethical impacts, and building on the 'Should robots replace teachers?' writing task.", "c": "end"}, {"t": "iMovie", "d": "Students produce an iMovie 'Technology on Trial' documentary presenting evidence for and against technology's impact on ecosystems, incorporating footage of their Robot Fact File research, the Screens & Satellites investigation (evolution of TV, before and after the internet), and their developing arguments — using split-screen to show ecosystems with and without technological intervention.", "c": "end"}, {"t": "Micro:bit", "d": "Students build a micro:bit 'Ecosystem Monitor' that uses the light and temperature sensors to track environmental conditions in the school garden, displaying a happy plant icon when conditions are good and a warning when they're not — presenting their working device as evidence of how technology can help ecosystems survive, connecting to their summative persuasive writing about ethical dilemmas.", "c": "end"}, {"t": "Scratch", "d": "Students code a simple interactive ecosystem simulation showing how adding or removing technology affects the balance between animals, plants and microorganisms — connecting the robot coding activities to the unit's exploration of how technology influences ecosystem survival.", "c": "middle"}, {"t": "Seesaw", "d": "Students create a comic strip (building on the Evolution of TV comic strip activity) showing Before Technology vs After Technology in an ecosystem, using the T-chart and Because/But/So sentence structures practised during the Screens & Satellites investigation.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw or photograph an example of an ecosystem has animals, plants and microorganisms from their everyday life, then record a voice note explaining how it works — building a class collection of real-world connections before the inquiry begins.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph examples of technology can cause ecosystems to adapt and evolve around the school or home and create a Book Creator page sorting them into categories, with voice recordings explaining their grouping — practising the classification skills they will develop in the unit.", "c": "beginning"}, {"t": "Google Earth", "d": "Students use Google Earth satellite view to explore visible ecosystems from above — coral reefs, rainforests, farms, urban parks — taking screenshots and recording what animals, plants and human-made technology they can spot interacting in each system, building curiosity about how technology can help or hinder ecosystems.", "c": "beginning"}, {"t": "Book Creator", "d": "Students add to their ongoing inquiry book, documenting new learning about an ecosystem has animals, plants and microorganisms with labelled diagrams, photographs and written reflections showing how their thinking is developing.", "c": "middle"}, {"t": "Padlet", "d": "Students drop pins on a shared Padlet Map marking locations connected to an ecosystem has animals, plants and microorganisms, adding photos, facts and reflections at each pin — building a collaborative geographic record of the class's environmental research.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 2", "th": "Sharing the Planet", "ci": "To sustain life, people and environments depend on one another.", "lo": "Interdependence of people and environments; How people's wants and needs affect the land; Responsibility to use sustainable resources; Connection between fossil fuels and environmental impact", "s": [{"t": "Padlet", "d": "Students post their pros and cons sticky note opinions about fossil fuel use and sustainable alternatives, building a class debate board that tracks how their thinking evolved from the initial Tug of War provocation through to their final informed positions on environmental responsibility.", "c": "beginning"}, {"t": "Seesaw", "d": "Students draw what interdependence of people and environments means to them and record a voice note explaining their thinking — creating a 'Before' snapshot that will be compared with their 'After' understanding at the end of the unit.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph or draw something from nature connected to how people's wants and needs affect the land and create a Book Creator page with labels and a voice note explaining why it matters — starting a personal inquiry book.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore different environments and habitats using Google Earth satellite and Street View, observing how landscapes connected to interdependence of people and environments look from above and ground level — comparing biomes across the globe.", "c": "beginning"}, {"t": "GarageBand", "d": "Students create a 'Sounds of the Seasons' composition connecting the Star Wars and Star Trek film music rhythm pattern activities to their Chinese language learning about seasons, exploring how music communicates ideas about nature and the planet across cultures.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate interdependence of people and environments, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Book Creator", "d": "Students add to their ongoing inquiry book, documenting new learning about interdependence of people and environments with labelled diagrams, photographs and written reflections showing how their thinking is developing.", "c": "middle"}, {"t": "Sphero", "d": "Students program Spheros to navigate a floor map showing the journey from fossil fuel extraction to environmental impact, with stops where the Sphero must complete actions (spin at solar panel = collect clean energy, flash red at pollution zone = sound alarm) — filming the programmed run and presenting how the coded sequence connects to their Tug of War debate positions and final gist statement votes.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Sustainable Planet' simulation in Scratch where players manage resources by choosing between fossil fuel and renewable energy options — each choice visibly affects the environment sprite (green and healthy vs brown and damaged), connecting their informational writing on fossil fuels to evidence about how Indigenous people look after the land sustainably.", "c": "end"}, {"t": "Green Screen", "d": "Students film a green screen 'Planet News' broadcast transporting themselves to environments explored during the unit (coral reefs, forests, solar farms, drought-affected areas), delivering info
