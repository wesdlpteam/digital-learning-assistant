rmational segments about sustainable vs finite resources — demonstrating vocabulary built across both HTWW and STP units while connecting to their inquiry about whether everyday devices could be charged by the sun.", "c": "end"}]}, {"ca": "St Kilda", "yl": "Year 3", "th": "Who We Are", "ci": "Health and wellbeing are impacted by the choices we make", "lo": "How our body systems connect and function; How our choices affect physical, emotional and mental wellbeing; Strategies to measure and maintain the health of the human body", "s": [{"t": "Delightex (CoSpaces)", "d": "Students build an interactive 3D 'Body Systems Explorer' in CoSpaces where visitors walk through a virtual human body, clicking on organs within their chosen body system (digestive, respiratory, circulatory, muscular, skeletal) to trigger explanations and animations showing how the system functions — presenting their virtual tour at a class health expo.", "c": "end"}, {"t": "Micro:bit", "d": "Students build a micro:bit 'Fitness Dashboard' that uses the accelerometer to track physical activity and displays real-time data on the LED screen, programming custom icons for different fitness components — presenting their device alongside their PE fitness testing results to demonstrate how choices about exercise affect health and wellbeing.", "c": "end"}, {"t": "Adobe Express Podcasting", "d": "Students produce a ‘Healthy Choices’ podcast episode discussing how choices affect physical and mental wellbeing, drawing on their PE fitness goal-setting (Term 1 baseline vs Term 4 retest to measure improvement), the Yoga Spin Game and Yoga Dice activities, and the Dance and Drama connection between movement and mental health — referencing the warm-up and cool-down routines students created and ran for the class.", "c": "end"}, {"t": "Micro:bit", "d": "Students use micro:bit step counters to track physical activity levels over a week, comparing data with their PE fitness testing results and connecting findings to the unit’s focus on how exercise choices impact both body and mind — building on the holiday exercise data-handling graph from Maths.", "c": "middle"}, {"t": "Seesaw", "d": "Students complete the Essential Agreement Reflection task and record weekly wellbeing check-ins connecting their behaviour choices to URStrong strategies (friendship fires vs mean on purpose) and Cyber Safety lessons about balancing online and offline activities — tracking how their choices impact relationships and personal wellbeing.", "c": "middle"}, {"t": "Padlet", "d": "Students respond to the provocation 'Health and wellbeing are impacted by the choices we make' by posting one image and one sentence showing what this looks like in their own life, creating a collaborative gallery that maps the class's diverse starting perspectives on how our body systems connect and function.", "c": "beginning"}, {"t": "Canva", "d": "Students design a personal infographic mapping their own connection to how our choices affect physical, emotional and mental wellbeing — using icons, images and short text to visualise where they stand before the class explores different perspectives.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about strategies to measure and maintain the health of the human body using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of how our body systems connect and function and building on each other's thinking through comments and questions.", "c": "middle"}, {"t": "Freeform", "d": "Students use Freeform to create a collaborative concept map exploring connections between how our body systems connect and function and how our choices affect physical, emotional and mental wellbeing — using sticky notes for ideas, drawings for personal connections, and arrows to show how concepts link together, making their thinking visible to the whole group.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 3", "th": "Where We Are in Place and Time", "ci": "Many factors shape the development of cities.", "lo": "The essential features of a city; The function of a city; The development of cities through time", "s": [{"t": "Canva Presentation", "d": "Students design a city comparison presentation featuring their Venn Diagram analysis of Mexico City vs Paris, research from the Mega Cities YouTube videos about Tokyo and New York, and insights from Mr Rory Hyde’s incursion (architect and University of Melbourne lecturer) about urban planning in Shepparton and flood-prone design — explaining how demographic, density and social factors shape city development.", "c": "end"}, {"t": "Delightex (CoSpaces)", "d": "Students build a 3D virtual version of the class city they collaboratively created, coding interactive elements showing where buildings were strategically placed (hospital, school, green spaces) and incorporating natural disaster-resistant features learned from the STP unit — with labels in Chinese for city facilities and transport as explored in the Chinese Travel Project.", "c": "end"}, {"t": "Book Creator", "d": "Students create a ‘Cities of the World’ comic/graphic book using research from their partner-drafted comic pages about different world cities, including the sounds they recorded as QR codes to bring the city alive, and the clay house designs they built in Visual Art showing structural features like brick, weatherboard and colourbond textures.", "c": "end"}, {"t": "Google Earth", "d": "Students explore the cities they researched (Tokyo, New York, Paris, Mexico City, Shepparton) using satellite and street views, comparing urban layouts, transport networks, green spaces and building density — connecting to the post-it note city-building provocation where they discovered what happens when a city has no planning.", "c": "beginning"}, {"t": "GarageBand", "d": "Students create a city soundscape inspired by Mussorgsky’s ‘Pictures at an Exhibition’, selecting instruments to represent different parts of their class city (traffic, markets, parks, construction) and connecting to the music listening activities where they described how composers are inspired by their surroundings to create works representing city scenes.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph and annotate features of cities from their own experience, recording voice reflections about what essential features of a city they notice in their neighbourhood — building a personal connection to the inquiry before the class investigation of cities like Tokyo, New York, Paris and Mexico City begins.", "c": "beginning"}, {"t": "Canva", "d": "Students create a 'What I Think I Know' timeline or mind map about the function of a city in Canva, visually organising their existing knowledge and marking questions with a '?' — establishing a baseline the class can test through research.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the essential features of a city, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of the essential features of a city and building on each other's thinking through comments and questions.", "c": "middle"}, {"t": "Freeform", "d": "Students build a visual timeline or journey map on a shared Freeform board, plotting key events, places and people connected to the essential features of a city — adding images, sketches and annotations that show how their understanding of the topic is developing.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 3", "th": "How We Express Ourselves", "ci": "Methods of communication have different features which impact their effectiveness", "lo": "The forms of verbal, non-verbal and visual communication; How the correct form enhances the effectiveness of a message; How people interpret messages and bring their own meaning to interactions", "s": [{"t": "Canva Video", "d": "Students produce their silent movie (planned, rehearsed and filmed with their group — choosing location, characters and costumes), demonstrating how non-verbal communication conveys meaning without words, then use the class-created success criteria for self and peer assessment of the final product — inspired by the Mr Bean clips (At the Dentist, The Hairdresser) that provoked discussion about body language and facial expressions.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Communication Through Time' game in Scratch where players must decode messages sent using different methods (smoke signals, morse code, telephone, text, emoji) — each level introduces a new form of communication and players discover how the correct form enhances the effectiveness of a message, connecting to their GarageBand dynamics exploration.", "c": "end"}, {"t": "Adobe Express Video Creator", "d": "Students create a ‘Communication Through Time’ video exploring how modes of communication have developed to meet specific needs, featuring their research into Morse code, Braille and Auslan from Library sessions, the Ancient Egyptian hieroglyphics explored in Visual Art, and music signs and symbols (dynamics, tempo, legato/staccato) that composers use to direct performances.", "c": "end"}, {"t": "Scratch", "d": "Students build a Scratch game where the player is a 'Communication Agent' who receives incoming messages (a friend is upset, a news story needs reporting, a business needs to contact an interstate client, a family member overseas wants to catch up) and must drag each message to the correct communication method (face-to-face, phone call, email, video call, letter, social media). Speed and accuracy earn points, but choosing the wrong method triggers an animated consequence — the friend feels ignored by a text, the business loses the deal because of a casual message — connecting to the Think-Pair-Share scenarios and the unit's focus on how the correct form enhances the effectiveness of a message.", "c": "middle"}, {"t": "GarageBand", "d": "Students compose a short piece using dynamics and articulation (legato/staccato) to communicate different emotions without words, connecting to the music focus on how composers use signs, symbols, tempo and dynamics to shape expression — and the role of the conductor in interpreting and communicating musical ideas.", "c": "middle"}, {"t": "Canva", "d": "Students create a quick visual poster in Canva responding to the provocation: 'How do you the forms of verbal, non-verbal and visual communication?' — using images, icons and text to express their current understanding before the inquiry deepens.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page experimenting with different ways to express how the correct form enhances the effectiveness of a message — through images, text, drawing and recorded voice — reflecting on which medium communicates their idea most effectively.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about how people interpret messages and bring their own meaning to interactions using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the forms of verbal, non-verbal and visual communication, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Freeform", "d": "Students use Freeform as a collaborative planning canvas, storyboarding their creative project about the forms of verbal, non-verbal and visual communication — sketching layouts, adding reference images, writing scripts and mapping the structure before they start building the final product.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 3", "th": "How the World Works", "ci": "Materials behave and interact in certain ways, which poses challenges and solutions", "lo": "The three states of matter and their properties; How matter changes states depending on particles, temperature and energy; Responsible and ethical use of materials like glass and plastic", "s": [{"t": "Lego Spike", "d": "Students build a Lego Spike 'State Change Detector' that uses the temperature sensor to monitor their ice cube melting experiment in real time, programming the motor to trigger a flag when the melting point is reached — presenting their automated experiment alongside measured data showing how adding variables (salt, sugar, sand) affected melting rates.", "c": "end"}, {"t": "Tinkercad", "d": "Students design a 3D model in Tinkercad of their chocolate-making flow chart as a physical production line with stations for each state change (solid cocoa → melted liquid → moulded solid), showing how responsible and ethical use of materials connects to understanding reversible and irreversible changes — a design that could be 3D printed as a teaching model.", "c": "end"}, {"t": "iMovie", "d": "Students produce an iMovie 'Materials Lab' episode where they film their best states of matter experiment with slow-motion capture of the state change moment, overlay particle behaviour animations from their Scratch simulation, and deliver scientific explanations using vocabulary from their Freeform thinking boards — creating a documentary that makes invisible particle behaviour visible.", "c": "end"}, {"t": "Micro:bit", "d": "Students use micro:bit temperature sensors to collect data during the ice cube melting experiment, measuring how adding heat changes matter from solid to liquid, recording readings at intervals and connecting findings to the engineering challenge about what happens when glaciers change from solid to liquid due to global warming.", "c": "middle"}, {"t": "Scratch", "d": "Students code an interactive animation showing how particles behave in each state of matter (tightly packed solids, flowing liquids, spreading gases), with buttons to add or remove heat and watch the state change — connecting to the class discussions about how soft plastic recycling and reusable containers represent responsible material choices students initiated.", "c": "middle"}, {"t": "Mentimeter", "d": "Students respond to 'What do you already know about the three states of matter and their properties?' using a live word cloud, then the class discusses the most common responses — revealing existing understanding and misconceptions to shape the inquiry direction.", "c": "beginning"}, {"t": "Canva", "d": "Students create a hypothesis poster in Canva predicting how how matter changes states depending on particles, temperature and energy works, including a labelled diagram and three questions they want to investigate — setting up the scientific inquiry process.", "c": "beginning"}, {"t": "Kahoot", "d": "Students play a diagnostic Kahoot quiz testing common assumptions about responsible and ethical use of materials like glass and plastic — wrong answers reveal misconceptions the class will investigate, and the teacher uses results to differentiate inquiry groups.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the three states of matter and their properties, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Freeform", "d": "Students create a scientific thinking board on Freeform, mapping their observations, hypotheses and evidence about the three states of matter and their properties — using sticky notes for questions, drawings for diagrams, and colour-coded zones for 'What we know', 'What we think' and 'What we need to find out'.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 3", "th": "How We Organise Ourselves", "ci": "Ethical decision making supports online choices.", "lo": "How choice of action and reaction affects others online; How informed choices can make a positive difference; Our right to feel safe online and the responsibility to make ethical decisions", "s": [{"t": "Scratch", "d": "Students code an interactive choose-your-own-adventure about online safety where choices lead to different ethical outcomes, building on the Cyber Safety Project lessons and the Timon and Pumbaa Safety Smart video — demonstrating understanding that things posted online are there forever and that informed choices can make a positive difference.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a digital citizenship guide showing the Online Essential Agreement they collaboratively created, with scenarios demonstrating ethical decision-making for different online situations — incorporating perspectives from the homework task where families discussed online usage and the class categorisation of apps/websites into communication, information and recreation.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a cyber safety awareness video demonstrating responsible online behaviour, using scenarios from the Cyber Safety Project lessons and real examples of ethical choices — connecting to the traffic light self-assessment where students evaluated how well they follow the Essential Agreement, and the student-initiated action of teaching siblings about being safe online.", "c": "end"}, {"t": "Kahoot", "d": "Students create an online safety quiz testing peers on ethical digital scenarios, incorporating questions about when to alert a teacher (like the student who reported a pop-up at home), how to evaluate trustworthy sources, and the difference between responsible and irresponsible online choices — used as a review tool connecting to the Principled Learner Profile focus.", "c": "middle"}, {"t": "Seesaw", "d": "Students document their iPad Essential Agreement reflections, recording examples of ethical online choices they’ve made at school and home — connecting to the unit’s discussion about how different family members use different platforms and why, and tracking how their understanding of responsible digital citizenship has grown through the Cyber Safety Project lessons.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students complete a quick class survey about their experience with how choice of action and reaction affects others online — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students map out their current understanding of how informed choices can make a positive difference as a simple flowchart or diagram in Canva, showing how they think the system works — the class then compares diagrams to identify gaps and assumptions to investigate.", "c": "beginning"}, {"t": "Kahoot", "d": "Students play a diagnostic Kahoot testing their assumptions about our right to feel safe online and the responsibility to make ethical decisions — the results reveal what the class already knows and where the biggest knowledge gaps are, helping the teacher shape the inquiry direction.", "c": "beginning"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of how choice of action and reaction affects others online and building on each other's thinking through comments and questions.", "c": "middle"}, {"t": "Freeform", "d": "Students use Freeform to collaboratively map how how choice of action and reaction affects others online works as a system, drawing flowcharts with inputs, processes and outputs — using sticky notes to label each part and arrows to show connections, then identifying what happens when one part changes.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 3", "th": "Sharing the Planet", "ci": "People can respond to natural disasters with resilience", "lo": "The causes and types of natural disasters (tectonic events, weather events); How natural disasters impact the environment and people; How humans respond with resilience and connection", "s": [{"t": "Padlet", "d": "Students post an image, headline or question about the causes and types of natural disasters (tectonic events, weather events) on a shared Padlet board, then read and comment on three classmates' posts — surfacing the range of perspectives and questions that will drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students design a 'What I Care About' poster in Canva showing their personal connection to how natural disasters impact the environment and people — including images, facts they already know, and questions they want answered during the unit.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students respond to a series of true/false provocations about how humans respond with resilience and connection using Mentimeter live polls — the class sees results in real time, debates surprising answers, and identifies misconceptions to investigate during the unit.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore different environments and habitats using Google Earth satellite and Street View, observing how landscapes connected to the causes and types of natural disasters (tectonic events, weather events) look from above and ground level — comparing biomes across the globe.", "c": "beginning"}, {"t": "Micro:bit", "d": "Students use micro:bit accelerometers to create a simple earthquake detection model, programming it to display an alert when shaking is detected above a threshold — connecting to their research about how Japan measures earthquakes and uses early warning systems, and the class discussion about whether natural disasters can be prevented.", "c": "middle"}, {"t": "Seesaw", "d": "Students document their volcano investigation experiment and natural disaster science experiments with step-by-step photos and annotations, recording their self-assessment reflections (‘What have I done well? What am I proud of? What could I improve?’) and sharing peer feedback on their newspaper articles and disaster-resistant building designs.", "c": "middle"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of the causes and types of natural disasters (tectonic events, weather events) and building on each other's thinking through comments and questions.", "c": "middle"}, {"t": "Canva Presentation", "d": "Students design a natural disaster newspaper-style report about a well-known event they researched (Cyclone Tracy, Boxing Day Tsunami, Christchurch earthquake), incorporating the SPO note-taking structure, their classification of disasters into tectonic events (earthquakes, volcanoes, tsunamis) and weather events (cyclones, tornadoes, floods, bushfires) — and how communities respond with resilience, drawing on the Japan case study about earthquake preparation.", "c": "end"}, {"t": "Book Creator", "d": "Students create a ‘Natural Disaster Survival Guide’ featuring their earthquake backpack sorting activity, the Japan earthquake preparation research (from Japanology videos and the PowerPoint), flood fact files, and their design comprehension work on building for disaster-prone environments — connecting to the student-initiated action of incorporating disaster-resistant features when designing buildings in the WWAIPAT city unit.", "c": "end"}, {"t": "iMovie", "d": "Students produce a news-style documentary report about their researched natural disaster using green screen to ‘report live’ from the location, incorporating behind-the-news style presentation of tectonic plates, the science of tsunamis, and how bushfire management connects to Indigenous cool burns vs European practices — referencing the BTN episodes and the poem ‘My Country’ by Dorothea Mackellar they learned.", "c": "end"}]}, {"ca": "St Kilda", "yl": "Year 4", "th": "Who We Are", "ci": "Leaders can help a group to function effectively", "lo": "Roles and responsibilities of effective leadership; Purpose of leadership; The strengths and qualities of a leader", "s": [{"t": "Canva Video", "d": "Students create a leadership portfolio application video pitching why they should be selected for their chosen leadership role, incorporating the attributes of an effective leader identified during the class brainstorm (displayed on the person outline), demonstrating how they embody the ROAR values developed in the Essential Agreement, and referencing what they learned from the staff portfolio presentations about each role's responsibilities.", "c": "end"}, {"t": "Delightex (CoSpaces)", "d": "Students build an interactive 3D 'Leadership Showcase' in CoSpaces where visitors walk through exhibit rooms for each leader from the 'Little People, Big Dreams' research, clicking on objects to trigger recorded presentations about leadership qualities, purpose, and impact — creating a virtual exhibition that brings their independent research to life.", "c": "end"}, {"t": "Canva", "d": "Students design a leadership attributes presentation showcasing the qualities identified through the collaborative brainstorm and Lucky Dip popsicle activity, explaining why each attribute is important for effective leadership with real examples from the Cross Campus Leadership Day, the Anthony Albanese provocation discussion, and their own experience fulfilling their portfolio role throughout the year.", "c": "end"}, {"t": "Seesaw", "d": "Students upload their collaborative work from each session including the partner brainstorm definitions of effective leadership, photographs of the attribute strips on the person outline, the ROAR Essential Agreement explanations written for Prep students, and their Little People Big Dreams research planner, building a portfolio of their developing leadership understanding across the unit.", "c": "beginning"}, {"t": "Padlet", "d": "Students create a collaborative reflection board documenting what they learn from each staff portfolio leader's presentation, listing the specific attributes required for each leadership role and connecting these to the class-generated attributes list, then using this resource to inform their personal portfolio applications and peer feedback sessions (two stars and a wish).", "c": "middle"}, {"t": "Padlet", "d": "Students respond to the provocation 'Leaders can help a group to function effectively' by posting one image and one sentence showing what this looks like in their own life, creating a collaborative gallery that maps the class's diverse starting perspectives on roles and responsibilities of effective leadership.", "c": "beginning"}, {"t": "Canva", "d": "Students design a personal infographic mapping their own connection to purpose of leadership — using icons, images and short text to visualise where they stand before the class explores different perspectives.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate roles and responsibilities of effective leadership, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students design and conduct a class survey to gather perspectives on roles and responsibilities of effective leadership, analysing the response data to identify patterns and inform their ongoing inquiry.", "c": "middle"}, {"t": "Freeform", "d": "Students use Freeform to create a collaborative concept map exploring connections between roles and responsibilities of effective leadership and purpose of leadership — using sticky notes for ideas, drawings for personal connections, and arrows to show how concepts link together, making their thinking visible to the whole group.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 4", "th": "Where We Are in Place and Time", "ci": "Exploration and discovery have led to changes that shape the world we live in", "lo": "The age of exploration and the reasons explorers set out on their journeys; How Australia changed through European arrival; Different perspectives on the consequences of exploration", "s": [{"t": "Google Earth", "d": "Students use Google Earth to explore locations connected to the age of exploration and the reasons explorers set out on their journeys, dropping pins and adding labels describing what they observe — building a visual map of existing knowledge before the class investigation begins.", "c": "beginning"}, {"t": "Canva", "d": "Students create a 'What I Think I Know' timeline or mind map about how australia changed through european arrival in Canva, visually organising their existing knowledge and marking questions with a '?' — establishing a baseline the class can test through research.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate images, artefacts or objects from the classroom exploration that connect to different perspectives on the consequences of exploration, recording voice reflections about what they think changed when Europeans arrived in Australia — building a provocation portfolio before the structured research begins.", "c": "beginning"}, {"t": "Seesaw", "d": "Students complete the structured explorer research task documenting the who/what/when/why information for each explorer investigated using the laminated cards, uploading photographs of their map work tracing explorer movements, and recording peer feedback from the structured feedback moments where partners swapped research to identify key elements.", "c": "middle"}, {"t": "Scratch", "d": "Students create an interactive timeline animation showing the Age of Exploration, programming explorer sprites to move along their routes with pop-up information cards displaying key facts gathered from the Inquisitive video and laminated card research, helping them visualise the sequence of discoveries and the connections between different explorers' journeys.", "c": "middle"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of the age of exploration and the reasons explorers set out on their journeys and building on each other's thinking through comments and questions.", "c": "middle"}, {"t": "Book Creator", "d": "Students create an 'Explorer Investigation' digital book presenting their independent research into a chosen explorer, structured around the who/what/when/why framework from the laminated card research task, including maps tracing the explorer's journey, key dates and discoveries, and their extended paragraph written from TWR note-taking, demonstrating their ability to turn research notes into clear, coherent writing.", "c": "end"}, {"t": "Canva", "d": "Students design a data chart presentation organising information gathered about multiple explorers during the Find Out phase, highlighting patterns and connections identified when sharing research with peers during Sort Out, and showing how Australia's landscape, demographics and identity changed significantly through European arrival, incorporating multiple perspectives on whether this was exploration or invasion.", "c": "end"}, {"t": "Google Earth", "d": "Students plot the journeys of the explorers they researched using the laminated cards, tracing routes from Europe to Australia and other destinations during the Age of Exploration (14th–16th century), adding location pins with key facts from their Seesaw research task, and comparing the historical maps they ordered from oldest to newest in the Tune In activity with modern satellite imagery of the same regions.", "c": "end"}, {"t": "CoDrone EDU", "d": "Students code a CoDrone EDU to navigate a floor map tracing the flight path from their researched country to Melbourne, calculating distance and direction — connecting geography, coding and spatial reasoning in a hands-on culminating task.", "c": "end"}]}, {"ca": "St Kilda", "yl": "Year 4", "th": "How We Express Ourselves", "ci": "The creative process involves understanding and applying artistic elements to communicate ideas and emotions across disciplines", "lo": "How colour, movement and music communicate character and mood; The creative process of making a multi-disciplinary presentation; The effort and commitment required to produce a live performance", "s": [{"t": "Canva Video", "d": "Students film and edit their Beijing Opera partnership vignette performance featuring their chosen character (clown, warrior, villain or female character), incorporating their hand-painted character mask, scripted backstory, exaggerated mime movements and body acting, and musical ensemble accompaniment, then adding a narrated reflection explaining how their colour choices express their character's personality traits as studied in Chinese class.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Beijing Opera Performance Guide' in Scratch where visitors click on character type sprites (clown, warrior, villain, scholar) to trigger animations showing how colour, movement and costume communicate character and mood — connecting their GarageBand musical compositions, mask designs and partnership vignette performances into one interactive experience.", "c": "end"}, {"t": "Canva", "d": "Students design a comparative presentation exploring the meaning of colours across different cultures studied in Chinese class, connecting their findings to the colour choices made for their Beijing Opera mask, and showing how the same colour can express different character traits and personalities depending on cultural context, drawing on the See-Think-Wonder observations about why Beijing Opera masks are so exaggerated.", "c": "end"}, {"t": "GarageBand", "d": "Students compose and record their musical ensemble piece for the Beijing Opera performance in partnership groups, experimenting with tempo and dynamics to create mood and introduce their character, building on Year 3 skills of using tempo and dynamics to create drama in music, and selecting instruments that match the tradition of Chinese opera as explored during the Find Out phase.", "c": "beginning"}, {"t": "Seesaw", "d": "Students upload their ongoing portfolio pieces to the shared Seesaw portfolio including the See-Think-Wonder response, character mask design with colour justification, script drafts incorporating peer feedback, rehearsal video reflections, and the final recorded performance, using the co-created success criteria to self-assess their story, film and reflection components.", "c": "beginning"}, {"t": "Pico VR", "d": "Students use Pico VR to experience immersive Beijing Opera performance footage as an extension of their See-Think-Wonder provocation, observing the colour meanings in character masks (clown, warrior, villain, female) up close before designing their own masks and rehearsing their vignette performances.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate how colour, movement and music communicate character and mood, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of how colour, movement and music communicate character and mood and building on each other's thinking through comments and questions.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students design and conduct a class survey to gather perspectives on how colour, movement and music communicate character and mood, analysing the response data to identify patterns and inform their ongoing inquiry.", "c": "middle"}, {"t": "Freeform", "d": "Students use Freeform as a collaborative planning canvas, storyboarding their creative project about how colour, movement and music communicate character and mood — sketching layouts, adding reference images, writing scripts and mapping the structure before they start building the final product.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 4", "th": "How the World Works", "ci": "Engineers design and build structures using specific features and materials to make them strong, stable and fit for purpose", "lo": "Different types of bridges and their design features; How materials and engineering principles contribute to structural strength and stability; Testing and refining designs through experimentation", "s": [{"t": "Mentimeter", "d": "Students respond to 'What do you already know about different types of bridges and their design features?' using a live word cloud, then the class discusses the most common responses — revealing existing understanding and misconceptions to shape the inquiry direction.", "c": "beginning"}, {"t": "Canva", "d": "Students create a hypothesis poster in Canva predicting how how materials and engineering principles contribute to structural strength and stability works, including a labelled diagram and three questions they want to investigate — setting up the scientific inquiry process.", "c": "beginning"}, {"t": "Kahoot", "d": "Students play a diagnostic Kahoot quiz testing common assumptions about testing and refining designs through experimentation — wrong answers reveal misconceptions the class will investigate, and the teacher uses results to differentiate inquiry groups.", "c": "beginning"}, {"t": "Seesaw", "d": "Students document their bridge-building process by uploading photographs at each stage of the Building Bridge Challenge, recording their design decisions and communication with their partner, reflecting on how they applied research findings about bridge stability when selecting features, and sharing their coin-testing results with the class through the collaborative discussion about what makes some bridges stronger.", "c": "middle"}, {"t": "Micro:bit", "d": "Students program a Micro:bit sensor to measure and digitally display the load placed on their bridge during testing, replacing the manual coin-counting method with digital data collection that records each addition, and comparing results across different bridge designs to identify which engineering features (beam, truss, suspension) contributed most to stability and load-bearing capacity.", "c": "middle"}, {"t": "Sphero", "d": "Students program Spheros to navigate across their bridge constructions during the Building Bridge Challenge, testing whether beam, truss, and suspension designs can support the rolling weight just as they tested with coins, adding a coding dimension to their partner engineering investigations.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build a motorised Lego Spike drawbridge or lifting mechanism as an extension of the Building Bridge Challenge, programming the motor to raise and lower while testing structural integrity, connecting to their Seesaw research on beam, truss, and suspension bridge types and the Tacoma Bridge Collapse analysis.", "c": "middle"}, {"t": "CoDrone EDU", "d": "Students program a CoDrone EDU to perform a controlled flyover inspection of all bridge designs displayed around the classroom, capturing aerial footage that reveals structural features from above — then present the drone footage alongside their micro:bit load data and Seesaw documentation, explaining how beam, truss and suspension designs distribute forces differently.", "c": "end"}, {"t": "Canva", "d": "Students design a bridge redesign presentation showing their See Think Wonder observations from the Tune In provocation, their Tacoma Bridge Collapse analysis identifying design flaws, their own bridge's coin-testing performance data, and annotated photographs explaining the engineering features they incorporated and the specific modifications they would make to improve load-bearing capacity based on what they observed during whole-class bridge testing.", "c": "end"}, {"t": "Tinkercad", "d": "Students create a 3D digital model of their bridge design, applying knowledge of beam, truss and suspension bridge features learned during the Seesaw research task, demonstrating how appropriate design features and materials ensure structural stability, and comparing their refined digital design with the physical bridge they constructed with their partner during the Building Bridge Challenge.", "c": "end"}]}, {"ca": "St Kilda", "yl": "Year 4", "th": "How We Organise Ourselves", "ci": "Not-for-profit organisations exist to respond to a variety of needs within our community", "lo": "The function and purpose of not-for-profit organisations; How not-for-profit organisations respond to community needs; Our responsibility to take action and make a difference", "s": [{"t": "Seesaw", "d": "Students document their NFP research process by recording their initial 'What do I think I know? What would I like to find out?' responses about wants and needs, then uploading photographs of their partner whiteboard research and group data charts showing the function, purpose and reach of each organisation investigated, using the Seesaw research task links provided to access NFP websites.", "c": "beginning"}, {"t": "Microsoft Forms", "d": "Students complete a quick class survey about their experience with the function and purpose of not-for-profit organisations — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students map out their current understanding of how not-for-profit organisations respond to community needs as a simple flowchart or diagram in Canva, showing how they think the system works — the class then compares diagrams to identify gaps and assumptions to investigate.", "c": "beginning"}, {"t": "Microsoft Forms", "d": "Students create a peer and self-assessment survey for their collaborative group work during the action planning phase, rating teamwork skills after each session and formulating individual and group goals for the next session as referenced in the planner's ongoing assessment, supporting growth in collaboration and self-management skills throughout the fundraising and collection drive experience.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the function and purpose of not-for-profit organisations, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of the function and purpose of not-for-profit organisations and building on each other's thinking through comments and questions.", "c": "middle"}, {"t": "Freeform", "d": "Students use Freeform to build a visual map connecting different not-for-profit organisations to the community needs they address, plotting how NFPs like OzHarvest, St Kilda Mums and Sacred Heart Mission respond to the big issues identified during group research.", "c": "middle"}, {"t": "Scratch", "d": "Students code an interactive 'NFP Impact Explorer' in Scratch where visitors click on organisation sprites to see animated demonstrations of how each not-for-profit responds to community needs — featuring data from their partner research into two NFP organisations and connecting to their group's community action journey.", "c": "end"}, {"t": "Canva", "d": "Students design promotional flyers and posters for their chosen community action (OzHarvest 50-cent meal donations, St Kilda Mums collection, Lions Club book drive, ARDOCH tinned food drive, or artwork sales with Prep students), incorporating the persuasive action slogans developed in class, formatted to contribute to the flyer quilt of actions displayed and distributed across the Junior School.", "c": "end"}, {"t": "Canva Video", "d": "Students create a short documentary showcasing their group's community action journey from identifying the big issue through to organising their contribution drive, including interviews with group members explaining why they chose their particular action, footage of their Junior School classroom visits promoting the different actions, and their Great Space display where contributions were collected, celebrating that the cohort raised over $1,500 plus 200 cans and 250 books.", "c": "end"}]}, {"ca": "St Kilda", "yl": "Year 4", "th": "Sharing the Planet", "ci": "First Nations people have a deep connection to Country, language and culture", "lo": "The diversity of language and culture across First Nations communities in Australia; The significance of connection to Country as custodial responsibility; Listening to and learning from Indigenous perspectives", "s": [{"t": "Padlet", "d": "Students post an image, headline or question about the diversity of language and culture across first nations communities in australia on a shared Padlet board, then read and comment on three classmates' posts — surfacing the range of perspectives and questions that will drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students design a 'What I Care About' poster in Canva showing their personal connection to the significance of connection to country as custodial responsibility — including images, facts they already know, and questions they want answered during the unit.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students respond to a series of true/false provocations about listening to and learning from indigenous perspectives using Mentimeter live polls — the class sees results in real time, debates surprising answers, and identifies misconceptions to investigate during the unit.", "c": "beginning"}, {"t": "Google Maps", "d": "Students explore locations connected to the diversity of language and culture across first nations communities in australia using Google Maps Street View, navigating through real places in 360 degrees and recording what they discover about the geography and culture.", "c": "beginning"}, {"t": "GarageBand", "d": "Students collaborate in groups to create their soundscape representing a page from 'Australia from Dawn to Dusk', experimenting with digital instruments and recorded sounds to evoke a specific time of day, Australian animals, scenery and location, building on the musical decision-making practised during Sort Out where groups chose how to represent the landscape and atmosphere of their assigned page.", "c": "middle"}, {"t": "Seesaw", "d": "Students document their ongoing inquiry by uploading notes from the desert people video (recording similarities and differences with their own lives), photographs and reflections from the Melbourne Museum excursion booklet, responses after the visit from the Wesley Indigenous Program, and their painting plan with detailed artwork storyline, tracking their developing understanding of diversity across First Nations communities.", "c": "middle"}, {"t": "DJI Drone (teacher-operated)", "d": "DLC captures aerial footage of the school grounds and local environment before and after the Melbourne Museum excursion, providing a bird's-eye perspective of Country that students compare with the Khatija Possum canvas painting style and the 'Australia from Dawn to Dusk' soundscape imagery studied during the unit.", "c": "middle"}, {"t": "Canva Video", "d": "Students create a documentary about their understanding of First Nations connection to Country, incorporating footage and reflections from the Melbourne Museum First Nations exhibition excursion, their soundscape performances representing pages from 'Australia from Dawn to Dusk' by Brentos, and narration explaining the concept of Country as custodial responsibility rather than ownership, as defined during the Tune In phase.", "c": "end"}, {"t": "Delightex (CoSpaces)", "d": "Students build an interactive 3D 'Connection to Country' virtual experience in CoSpaces where visitors walk through landscapes representing the indigenous countries they researched (such as the Arrernte and Boon Wurrung), clicking on elements to hear recorded explanations about connection to Country, language diversity, and cultural significance — incorporating their acrylic canvas painting and artist's statement.", "c": "end"}, {"t": "Canva", "d": "Students design a comparative presentation using their Venn diagram research comparing two indigenous countries (such as the Arrernte people), incorporating information gathered from the Seesaw research tasks about similarities and differences in language, culture, art, landscape, food and animals, and connecting to the concept that different First Nations countries across Australia are as diverse as countries across Europe.", "c": "end"}]}, {"ca": "St Kilda", "yl": "Year 5", "th": "Who We Are", "ci": "Values, beliefs and actions contribute to a diverse society", "lo": "How our values and beliefs shape our identity and interactions; Our responsibility to manage emotions and be safe online and in person; The importance of resilience, respect and positive relationships in a diverse community", "s": [{"t": "Canva", "d": "Students design a 'CyberSafety Golden Rule' infographic presenting the personal online safety rule they created during the Cyber Safety Project, incorporating strategies learned across the 16 CyberSafety lessons about responsible technology use, being an upstander, recognising online scams, and protecting personal information, with visual examples of how to apply their rule in real scenarios.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Digital Citizenship Simulator' in Scratch where players navigate online scenarios from the 16 CyberSafety lessons and must make ethical choices — each decision triggers animated consequences showing how values, beliefs and responsible digital actions contribute to a diverse and safe society, connecting to their URStrong and Grow Your Mind program learning.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a wellbeing strategies video demonstrating key concepts from the Grow Your Mind program (the animals in your brain) and URStrong friendship fire resolution techniques, role-playing scenarios that show the difference between social misunderstandings and purposeful hurtful behaviour, and explaining what resilience looks like in their own lives using examples from camp, the Future Thinkers' Forum and everyday school interactions.", "c": "end"}, {"t": "Seesaw", "d": "Students complete the structured portfolio tasks throughout the unit including the CyberSafety 'Create your own golden rule' response, the GYM 'Sharing problems' reflection on trusted adults, the unit evaluation, and ongoing goal-setting reflections, building a documented record of their developing understanding of responsible online behaviour and positive relationship strategies.", "c": "middle"}, {"t": "Kahoot", "d": "Students create interactive quizzes for their peers based on key concepts from the 16 CyberSafety lessons and 11 URStrong sessions, testing classmates' knowledge of online safety strategies, friendship fire resolution techniques, upstander behaviours, and the difference between values, beliefs and actions, reinforcing learning through peer-teaching during the Find Out phase.", "c": "middle"}, {"t": "Padlet", "d": "Students respond to the provocation 'Values, beliefs and actions contribute to a diverse society' by posting one image and one sentence showing what this looks like in their own life, creating a collaborative gallery that maps the class's diverse starting perspectives on how our values and beliefs shape our identity and interactions.", "c": "beginning"}, {"t": "Canva", "d": "Students design a personal infographic mapping their own connection to our responsibility to manage emotions and be safe online and in person — using icons, images and short text to visualise where they stand before the class explores different perspectives.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about the importance of resilience, respect and positive relationships in a diverse community using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of how our values and beliefs shape our identity and interactions and building on each other's thinking through comments and questions.", "c": "middle"}, {"t": "Freeform", "d": "Students use Freeform to create a collaborative concept map exploring connections between how our values and beliefs shape our identity and interactions and our responsibility to manage emotions and be safe online and in person — using sticky notes for ideas, drawings for personal connections, and arrows to show how concepts link together, making their thinking visible to the whole group.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 5", "th": "Where We Are in Place and Time", "ci": "Colonisation has had a lasting impact on different countries and their people", "lo": "The reasons, methods and impact of colonisation; How colonisation transformed society and culture; The responsibility of colonisers and the perspectives of those colonised", "s": [{"t": "Google Earth", "d": "Students use Google Earth to explore locations connected to the reasons, methods and impact of colonisation, dropping pins and adding labels describing what they observe — building a visual map of existing knowledge before the class investigation begins.", "c": "beginning"}, {"t": "Canva", "d": "Students create a 'What I Think I Know' timeline or mind map about how colonisation transformed society and culture in Canva, visually organising their existing knowledge and marking questions with a '?' — establishing a baseline the class can test through research.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate images, artefacts or historical sources connected to the responsibility of colonisers and the perspectives of colonised peoples, recording voice reflections about what they already know — building a provocation portfolio before the structured SAT research task deepens the inquiry.", "c": "beginning"}, {"t": "Seesaw", "d": "Students upload their SAT research task demonstrating understanding of the reasons, methods and impact of colonisation, including their personal perspective responses, their notes from the ClickView Terra Nullius and Colonising Australia videos, and peer assessment feedback received during their oral presentations to the class where classmates evaluated both content quality and presentation skills.", "c": "middle"}, {"t": "Google Earth", "d": "Students trace the routes and territories of colonial powers across the globe, comparing the British Empire's reach documented in their class mini SAT with other colonial territories, adding location pins with key dates and impacts at each colonised region, and connecting their Year 4 WWAIPAT knowledge about the Age of Exploration to the broader pattern of colonisation studied in this unit.", "c": "middle"}, {"t": "Pico VR", "d": "Students use Pico VR to explore historical sites and environments connected to British colonisation, virtually visiting locations referenced during the ClickView Terra Nullius viewing and the Convict Boy class novel, building contextual understanding before completing their British colonisation mini SAT and oral presentations with peer assessment.", "c": "middle"}, {"t": "Canva", "d": "Students design their colonisation research PowerPoint presentation for the oral assessment, structured around the SAT questions that allow them to show personal perspectives alongside research skills, incorporating information gathered from the ClickView videos on colonising Australia and Terra Nullius, their library research sessions, and connections to the class novel 'Convict Boy', with peer assessment feedback integrated into the final version.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Perspectives on Colonisation' simulation in Scratch where visitors click on different character sprites (coloniser, indigenous elder, settler, modern historian) to hear recorded perspectives on the same event — demonstrating how colonisation is understood differently depending on point of view, connecting to their note-taking and summarising research.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a documentary presenting their research into the colonisation of a chosen country, incorporating the note-taking and summarising skills developed during the Australian History video template activity, multiple perspectives on whether European arrival constituted exploration or invasion (building on Year 4 WWAIPAT learning), and reflections connecting to Tom Appleby's memories from the class novel 'Convict Boy'.", "c": "end"}, {"t": "CoDrone EDU", "d": "Students code a CoDrone EDU to navigate a floor map tracing the flight path from their researched country to Melbourne, calculating distance and direction — connecting geography, coding and spatial reasoning in a hands-on culminating task.", "c": "end"}]}, {"ca": "St Kilda", "yl": "Year 5", "th": "How We Express Ourselves", "ci": "Social norms and stereotypes can influence the way people express themselves", "lo": "How stereotypes and social norms form and persist in society; The impact of discrimination, prejudice and assumptions on individuals and communities; How people overcome stereotypes to express themselves and inspire change", "s": [{"t": "Padlet", "d": "Students build a collaborative class gallery of examples of stereotypes identified in everyday life and the classroom (connecting to the student-initiated action of spotting stereotypes around them), adding images, articles and reflections that extend the Gallery Walk provocation throughout the unit, and discussing how cultural trends and history have led to specific stereotypes forming.", "c": "beginning"}, {"t": "Canva", "d": "Students create a quick visual poster in Canva responding to the provocation: 'How do you how stereotypes and social norms form and persist in society?' — using images, icons and text to express their current understanding before the inquiry deepens.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page experimenting with different ways to express the impact of discrimination, prejudice and assumptions on individuals and communities — through images, text, drawing and recorded voice — reflecting on which medium communicates their idea most effectively.", "c": "beginning"}, {"t": "Seesaw", "d": "Students complete the structured rights activist research task, choosing a significant human or animal rights activist, documenting how that person's actions positively influenced society and connecting their story to the concept that people use expression to overcome stereotypes, then sharing their presentation with grouped peers for formal peer feedback using the Seesaw platform.", "c": "middle"}, {"t": "GarageBand", "d": "Students compose original soundtracks or jingles in GarageBand to accompany their awareness posters and slogans for the student action campaign against stereotypes, selecting instruments and moods that reinforce their message, inspired by the media techniques analysed during the Graffiti Article discussion and Famous People Infographics research.", "c": "middle"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of how stereotypes and social norms form and persist in society and building on each other's thinking through comments and questions.", "c": "middle"}, {"t": "Freeform", "d": "Students use Freeform to collaboratively map how stereotypes and social norms form and persist in society, connecting examples from their Gallery Walk See-Think-Wonder provocation, rights activist research, and student action campaign planning — building a visual analysis of how discrimination, prejudice and assumptions interconnect.", "c": "middle"}, {"t": "Canva", "d": "Students design their Famous People Infographic using the PowerPoint template structure, presenting research into a person who overcame a stereotype, prejudice, discrimination or social norm and paved the way for others, including key facts about what they faced, how they expressed themselves despite barriers, and their lasting impact on society, ready for sharing in mixed small groups during the peer feedback sessions.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Breaking Stereotypes' choose-your-own-adventure in Scratch where players encounter stereotype scenarios and must decide how to respond — each choice triggers animated consequences showing how challenging social norms creates positive change, connecting their rights activist research to an experience that puts players in the shoes of someone facing discrimination.", "c": "end"}, {"t": "Adobe Express Video Creator", "d": "Students create a short awareness video inspired by the student-initiated posters and slogans displayed in the classroom, presenting scenarios from the Stereotypes Scenarios activity and demonstrating how discrimination, prejudice and assumptions can be forms of disrespect, drawing on what they learned from the guest manga illustrator speaker about how art can convey powerful messages that challenge social norms.", "c": "end"}]}, {"ca": "St Kilda", "yl": "Year 5", "th": "How the World Works", "ci": "Inventions and initiatives are a response to the changing needs of society", "lo": "How inventions have changed over time to meet the demands of society; The UN Sustainable Development Goals and the global problems they address; Using the design thinking process to create innovations that respond to real-world needs", "s": [{"t": "Seesaw", "d": "Students document their science investigations by uploading observations and findings from the Light Boxes and Steam lab sessions with Stefan, recording their SDG ordering and grouping decisions with justifications for their priority rankings, and completing the final unit reflection task evaluating what they learned about the design process and how inventions respond to the changing needs of society.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students respond to 'What do you already know about how inventions have changed over time to meet the demands of society?' using a live word cloud, then the class discusses the most common responses — revealing existing understanding and misconceptions to shape the inquiry direction.", "c": "beginning"}, {"t": "Canva", "d": "Students create a hypothesis poster in Canva predicting how the un sustainable development goals and the global problems they address works, including a labelled diagram and three questions they want to investigate — setting up the scientific inquiry process.", "c": "beginning"}, {"t": "Microsoft Excel", "d": "Students create a data tracking spreadsheet to organise their SDG research from the T-Chart investigation (recording key facts and figures from the infographic posters for their three chosen goals), then use this structured data to identify which global problems their group feels most passionate about addressing, directly informing the Microsoft Forms preference survey used to form FTF invention groups.", "c": "middle"}, {"t": "CoDrone EDU", "d": "Students explore drone technology as a modern invention during the Changed Over Time decades research, programming CoDrone EDU flight paths to demonstrate how innovations build on each other as explored in 'Everything is a Remix', and investigating how drones connect to specific SDGs such as sustainable agriculture or disaster response.", "c": "middle"}, {"t": "Micro:bit", "d": "Students program micro:bit sensors to collect environmental data (temperature, light, sound) as part of their invention prototypes during the STEAM lab sessions with Stefan, connecting sensor technology to SDG solutions and presenting their data at the Future Thinkers' Forum alongside their design process booklets.", "c": "middle"}, {"t": "Canva", "d": "Students use Canva (including the AI image feature demonstrated by the DLP in the dedicated session) to create a digital prototype visualisation of their group's SDG-connected invention for the Future Thinkers' Forum, incorporating their design thinking journey from Empathise through to Test, with the image added to the back cover of their FTF booklet alongside the chosen SDG goal on the front for guest feedback on the night.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Changed Over Time' museum in Scratch where visitors click on invention category sprites (household, transport, communication, medicine) to see animated timelines showing how each invention evolved to meet changing societal demands — connecting their decades research T-Chart data to an interactive exhibition visitors can explore and compare across eras.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a Shark Tank-style invention pitch video presenting their group's SDG-connected invention to a panel, explaining which Sustainable Development Goal it addresses, how they followed the d:school design process (Empathise, Define, Ideate, Prototype, Test), what need in society it responds to, and how it works, incorporating feedback received from peers and families at the Future Thinkers' Forum stalls.", "c": "end"}, {"t": "Lego Spike", "d": "Students build motorised invention prototypes using Lego Spike during the Light Boxes and STEAM lab sessions with Stefan, applying the d:school design process (empathise, define, ideate, prototype, test) to create working models that address an SDG challenge identified during the SDG ordering, grouping, and T-chart activities.", "c": "end"}]}, {"ca": "St Kilda", "yl": "Year 5", "th": "How We Organise Ourselves", "ci": "Goods and services are exchanged within a marketplace", "lo": "The production of goods from raw materials through manufacturing to consumer; The exchange of currency for goods and services in a functioning economy; Ethics and responsible decision-making in the marketplace", "s": [{"t": "Microsoft Forms", "d": "Students complete a quick class survey about their experience with the production of goods from raw materials through manufacturing to consumer — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students map out their current understanding of the exchange of currency for goods and services in a functioning economy as a simple flowchart or diagram in Canva, showing how they think the system works — the class then compares diagrams to identify gaps and assumptions to investigate.", "c": "beginning"}, {"t": "Kahoot", "d": "Students play a diagnostic Kahoot testing their assumptions about ethics and responsible decision-making in the marketplace — the results reveal what the class already knows and where the biggest knowledge gaps are, helping the teacher shape the inquiry direction.", "c": "beginning"}, {"t": "Google Maps", "d": "Students use Google Maps Street View to virtually visit landmarks and places connected to the production of goods from raw materials through manufacturing to consumer, taking screenshots and recording observations about what they see — bringing distant locations into the classroom.", "c": "beginning"}, {"t": "Seesaw", "d": "Students complete the unit evaluation reflection task documenting what they learned about how supply and demand drive an economy, how ethics affect business success (referencing specific examples from their suburb trading experiences such as adjusting prices based on customer demand), and how managing a real budget with spreadsheets helped them understand the connection between consumer behaviour and the marketplace.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students design customer satisfaction surveys for their student-run businesses within the suburb simulation, gathering peer feedback on product quality, pricing fairness and ethical practices, then analysing the response data during city and suburb meetings to make evidence-based decisions about improving their goods and services and adjusting their business strategies for the next trading session.", "c": "middle"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of the production of goods from raw materials through manufacturing to consumer and building on each other's thinking through comments and questions.", "c": "middle"}, {"t": "Microsoft Excel", "d": "Students manage their suburb simulation personal budget using the pre-coded spreadsheet with formulas, tracking their startup bonus, role salary payments, fines, rent, utilities and business income/expenses, performing scheduled and surprise reconciliations of receipts against their spreadsheet entries, and analysing profit and loss to make informed decisions about pricing, supply and demand in their student-run businesses.", "c": "end"}, {"t": "Canva", "d": "Students design professional business proposal presentations for their student-created businesses within the suburb simulation, including their business name and logo, the goods or services offered, pricing strategy informed by supply and demand principles learned through Sam's Soccer Ball Factory activity, and their ethical business practices, ready for presentation at city meetings where peers evaluate and provide feedback.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Suburb Simulation' economics game in Scratch where players manage a business within a virtual marketplace — buying raw materials, manufacturing products, setting prices and serving customers — with supply and demand mechanics that dynamically change prices, connecting to their real suburb simulation experience and demonstrating how ethics and responsible decision-making affect marketplace success.", "c": "end"}]}, {"ca": "St Kilda", "yl": "Year 5", "th": "Sharing the Planet", "ci": "Communities interact with the environment in different ways", "lo": "How community values shape the management of the natural environment; The need for conservation and environmental stewardship; Ways in which First Nations land management practices can drive positive environmental change", "s": [{"t": "Padlet", "d": "Students post an image, headline or question about how community values shape the management of the natural environment on a shared Padlet board, then read and comment on three classmates' posts — surfacing the range of perspectives and questions that will drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students design a 'What I Care About' poster in Canva showing their personal connection to the need for conservation and environmental stewardship — including images, facts they already know, and questions they want answered during the unit.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students respond to a series of true/false provocations about ways in which first nations land management practices can drive positive environmental change using Mentimeter live polls — the class sees results in real time, debates surprising answers, and identifies misconceptions to investigate during the unit.", "c": "beginning"}, {"t": "Seesaw", "d": "Students complete the camp portfolio task documenting their Chum Creek and ECOSS learning experiences, uploading photographs and written reflections that connect to the three Lines of Inquiry about how community values shape environmental management, the need for conservation, and ways stewardship can drive change, including their responses to the prompt about identifying further actions needed after the camp experience.", "c": "middle"}, {"t": "Google Earth", "d": "Students explore and compare the world biomes mapped during the Find Out phase with satellite imagery, locating the specific environments studied in their Habitats of the World worksheets, then zooming into local areas including Wesley College campus, Chum Creek and the ECOSS site to examine how different communities interact with their environments at local, national and global scales, connecting to Indigenous perspectives on land management.", "c": "middle"}, {"t": "DJI Drone (teacher-operated)", "d": "DLC captures aerial footage of the WesMob native garden and the Chum Creek camp surroundings, providing a bird's-eye perspective of the habitats and conservation landscapes students study during the Indigenous Land Management lessons and the ECOSS visit, giving context for their stewardship vocabulary work.", "c": "middle"}, {"t": "Pico VR", "d": "Students use Pico VR to explore immersive habitat environments connecting to the Habitats of the World research, virtually visiting ecosystems that contrast with the local environments observed at Chum Creek camp and the ECOSS visit, deepening their understanding of conservation and stewardship concepts before writing their Melbourne Urban Forest tree emails.", "c": "middle"}, {"t": "Scratch", "d": "Students code an interactive 'Biome Explorer' in Scratch where visitors click on world biome sprites to see animated ecosystems showing how community values shape environmental management — incorporating satellite imagery comparisons from Google Earth, First Nations land management practices from the WesMob garden, and conservation data from the Chum Creek and ECOSS learning experiences.", "c": "end"}, {"t": "Canva", "d": "Students design an environmental stewardship action poster (connecting to the student-initiated poster creation) presenting a strong message about how we can look after the environment, incorporating what they learned about Indigenous land management practices from the two dedicated PPT lessons, the difference between management, conservation and stewardship vocabulary, and specific actions they could take at Wesley such as the garden bed designs students began creating for the Year 5 Rose Garden areas.", "c": "end"}, {"t": "Adobe Express Website", "d": "Students create a digital campaign page inspired by the Melbourne Urban Forest initiative, featuring the emails they wrote to trees around Wesley College during the Go Further phase, information about how city stewardship programs support environmental change, photographs from their ECOSS visit documenting the veggie garden, bee farm, worm farms and chickens, and their proposals for continued native planting around the school with the Environment Prefects.", "c": "end"}]}, {"ca": "St Kilda", "yl": "Year 6", "th": "Who We Are", "ci": "Understanding ourselves, our relationships and our wellbeing empowers us to thrive.", "lo": "The recognisable features of safe and healthy interactions (Form) • The connections between emotions, behaviour, learning, interactions and goals (Connection) • The tools and skills to stay safe online and in person (Safety) • The active role we play in achieving and maintaining our wellbeing (Wellbeing) • The strategies to achieve and maintain positive relationships (Relationships)", "s": [{"t": "Scratch", "d": "Students code an interactive 'Wellbeing Toolkit Navigator' in Scratch where visitors select a challenge scenario (friendship conflict, online safety dilemma, emotional regulation, goal-setting) and the program guides them through the ROAR approach strategies — connecting CyberSafety golden rules, URStrong friendship tools, and Grow Your Mind techniques into one interactive resource Year 5 students can use.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a Year 6 wellbeing documentary combining reflections from Camp Milana and the Canberra Tour with classroom learning, illustrating how the ROAR approach, Grow Your Mind weekly offerings (Wellbeing Wednesday, Tell Yourself Tuesday affirmations), URStrong inclusion and belonging activities, and CyberSafety lessons connect emotions, behaviour, learning and interactions across their final primary school year.", "c": "end"}, {"t": "Delightex (CoSpaces)", "d": "Students build an interactive 3D 'Who I Am at Wesley' virtual gallery in CoSpaces featuring their IB Learner Profile portrait drawing (half self-portrait, half strengths icons), their Camp Milana reflections, and their Canberra Tour learning — creating a walkable virtual exhibition where visitors experience how understanding ourselves empowers us to thrive.", "c": "end"}, {"t": "Seesaw", "d": "Students maintain ongoing reflections throughout the year documenting their ROAR fingerprint commitment, Essential Agreement contributions, Grow Your Mind weekly activities including the 'Inclusion and Belonging' task, Curiosity prompts, and the resilience journal from the 'You Can't Grow It Alone' podcast, plus executive functioning skills checklist progress and Awards Evening self and peer reflections.", "c": "middle"}, {"t": "Mentimeter", "d": "Students use live polling during URStrong and CyberSafety sessions to share anonymous responses about friendship scenarios, online safety strategies, and wellbeing check-ins, building class data on which strategies from the Grow Your Mind and CyberSafety programs students find most effective for managing emotions and staying safe.", "c": "middle"}, {"t": "Padlet", "d": "Students respond to the provocation 'Understanding ourselves, our relationships and our wellbeing empowers us to thrive.' by posting one image and one sentence showing what this looks like in their own life, creating a collaborative gallery that maps the class's diverse starting perspectives on the recognisable features of safe and healthy interactions (form) • the connections between emotions, behaviour, learning, interactions and goals (connection) • the tools and skills to stay safe online and in person (safety) • the active role we play in achieving and maintaining our wellbeing (wellbeing) • the strategies to achieve and maintain positive relationships (relationships).", "c": "beginning"}, {"t": "Canva", "d": "Students design a personal infographic mapping their own connection to the recognisable features of safe and healthy interactions (form) • the connections between emotions, behaviour, learning, interactions and goals (connection) • the tools and skills to stay safe online and in person (safety) • the active role we play in achieving and maintaining our wellbeing (wellbeing) • the strategies to achieve and maintain positive relationships (relationships) — using icons, images and short text to visualise where they stand before the class explores different perspectives.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about the recognisable features of safe and healthy interactions (form) • the connections between emotions, behaviour, learning, interactions and goals (connection) • the tools and skills to stay safe online and in person (safety) • the active role we play in achieving and maintaining our wellbeing (wellbeing) • the strategies to achieve and maintain positive relationships (relationships) using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple p
