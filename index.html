 "d": "Students create an original illustrated digital story applying the Talk For Writing process they enjoyed, demonstrating how text and images work together to convey meaning — extending the story structure they learned to orally retell.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a short film retelling a story using different media, incorporating illustrations inspired by Indigenous Australian artists (from Visual Art) showing how art is used to tell stories and preserve knowledge.", "c": "end"}, {"t": "Green Screen", "d": "Students film a green screen 'Story Museum' presentation where they transport themselves inside the settings of stories explored during the unit, performing as curators who demonstrate how the same story changes when told through different mediums (writing, illustration, drama, digital) — connecting to the author incursion with Sarah Allen about how books are created.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph and narrate their own illustrations explaining the storytelling techniques they chose, connecting to the exploration of how authors and illustrators like Sarah Allen plan and create their books.", "c": "middle"}, {"t": "GarageBand", "d": "Students create a soundscape or audio story using music and narration to explore how sound conveys meaning, comparing this medium to the visual storytelling and illustration methods explored through the author visit.", "c": "middle"}, {"t": "Scratch Jr", "d": "Students code an animated retelling of their Talk For Writing story in Scratch Jr, programming characters to move through scenes and speak dialogue, exploring how digital storytelling is another method that conveys meaning alongside their iMovie film, Book Creator story and GarageBand soundscape.", "c": "middle"}, {"t": "Seesaw", "d": "Students use the camera and drawing tools to create a 'Before I Knew' page showing what mediums and techniques artists use looks like to them right now — using pictures, labels and voice recording to capture their starting understanding.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page showing different ways they can express the idea of connections between story and illustrations — through drawing, voice, photos and text — exploring which method feels most natural to them.", "c": "beginning"}, {"t": "Padlet", "d": "Students post examples of how ideas and information are communicated from their everyday lives — a sign, a song, a painting, a gesture — onto a class Padlet wall, then the class groups the examples by medium to discover how many different methods storytellers use to convey meaning.", "c": "beginning"}]}, {"ca": "Glen Waverley", "yl": "Year 2", "th": "How the World Works (Solar System)", "ci": "Patterns in the sky help us understand our place in the universe.", "lo": "Earth's place in the solar system; Observable patterns in the sky; Tools and methods we use to observe the sky", "s": [{"t": "Scratch", "d": "Students code an interactive solar system simulation in Scratch where planet sprites orbit the sun at different speeds and clicking each planet reveals facts from their Sky Journal observations, Moon Diary tracking, and learning about Aboriginal and Torres Strait Islander constellations like the Emu in the Sky — visitors control the simulation with arrow keys to zoom in and out.", "c": "end"}, {"t": "Sphero", "d": "Students program Spheros to 'orbit' a model sun at scaled distances representing each planet's position, timing each orbit to demonstrate why outer planets take longer — filming the orbital paths from above and presenting their ranked distance data alongside the collaborative solar system model built during the unit.", "c": "end"}, {"t": "Micro:bit", "d": "Students build a micro:bit 'Sky Pattern Tracker' that uses the light sensor to detect day vs night and displays animated moon phase icons on the LED screen matching the current phase from their Moon Diary — presenting their working instrument at a class science fair alongside their pattern-mapping charts of moon phases and sun positions.", "c": "end"}, {"t": "Google Earth", "d": "Students explore satellite views of Earth to understand perspectives from space, connecting their Sky Journal observations to how scientists use tools and methods to observe patterns in the sky.", "c": "middle"}, {"t": "Micro:bit", "d": "Students program micro:bits to display moon phase icons cycling through the lunar sequence, connecting their Moon Diary observations to a digital model of sky patterns.", "c": "middle"}, {"t": "Seesaw", "d": "Students share what they already know about earth's place in the solar system using drawings and voice recordings, creating a visible starting point for the class inquiry.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a visual page exploring their current understanding of observable patterns in the sky, using drawings and voice recordings to map what they know and what they want to find out.", "c": "beginning"}, {"t": "Padlet", "d": "Students post photos and drawings of tools and methods we use to observe the sky onto a class Padlet, adding voice notes about what they've seen in the night sky — building a collaborative provocation wall that sparks questions for the inquiry.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate earth's place in the solar system, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Padlet", "d": "Students pin significant locations on a shared Padlet Map connected to earth's place in the solar system, adding photos, descriptions and personal connections — creating a collaborative class map that makes geographic learning visible.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Year 2", "th": "How the World Works (Materials)", "ci": "Changes to materials affect how we use and reuse them in daily life.", "lo": "Understanding material properties; Reuse and recycling through physical change; Sustainably managing materials", "s": [{"t": "iMovie", "d": "Students produce an iMovie 'Mythbusters Junior: Materials Edition' episode where they test a claim about material properties (e.g. 'all paper tears the same way'), filming their bending, stretching, breaking and crumpling experiments with slow-motion replay and multiple camera angles, then deliver a verdict based on evidence from their sets of materials changed in different ways.", "c": "end"}, {"t": "Lego Spike", "d": "Students build a Lego Spike automated material sorting machine that uses sensors to classify objects by properties (hard/soft, flexible/rigid), programming the motor to push items into labelled bins — connecting their 'odd one out' classification reasoning to an engineering solution and presenting how the machine's sorting rules mirror First Nations Australians' (WESMOB) deep knowledge of natural material properties.", "c": "end"}, {"t": "Micro:bit", "d": "Students build a micro:bit 'Material Change Detector' that uses the temperature sensor to monitor heating experiments in real time, displaying rising/falling temperature readings on the LED screen and logging whether each change is reversible or irreversible — presenting their data at the art exhibit alongside sustainable reuse creations.", "c": "end"}, {"t": "Micro:bit", "d": "Students use micro:bit temperature sensors to collect data on how heat affects different materials during experiments, recording readings and connecting findings to reversible and irreversible changes.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph and classify their material change experiments (crumpled, folded, torn paper; stretched, bent, heated materials), creating labelled before/after comparisons and explaining their reasoning about sustainable reuse.", "c": "middle"}, {"t": "Seesaw", "d": "Students share what they already know about understanding material properties using drawings and voice recordings, creating a visible starting point for the class inquiry.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a visual page exploring their current understanding of reuse and recycling through physical change, using drawings and voice recordings to map what they know and what they want to find out.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore Google Earth satellite views of landfill sites, recycling centres and natural material sources, comparing what sustainable and unsustainable material management looks like from above — sparking questions about why sustainably managing materials matters before investigations begin.", "c": "beginning"}, {"t": "Book Creator", "d": "Students add to their ongoing inquiry book, documenting new learning about understanding material properties with labelled diagrams, photographs and written reflections showing how their thinking is developing.", "c": "middle"}, {"t": "Padlet", "d": "Students drop pins on a shared Padlet Map marking locations connected to understanding material properties, adding photos, facts and reflections at each pin — building a collaborative geographic record of the class's environmental research.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Year 2", "th": "How We Organise Ourselves", "ci": "A sequence of processes enables a system to function.", "lo": "The systems in our lives; The purpose of various systems; How systems are made of many interdependent parts", "s": [{"t": "Scratch Jr", "d": "Students code an interactive animation showing how a system works step-by-step (e.g. cow to milk, wheat to bread — the food production systems explored during the unit), demonstrating how a sequence of processes enables a system to function.", "c": "end"}, {"t": "iMovie", "d": "Students produce an iMovie 'Systems Breakdown' documentary where they deliberately remove one step from a familiar system (the café lunch sequence, a marble run, their morning routine) and film what happens — using time-lapse and split-screen to show the working system vs the broken one, proving how a sequence of processes enables a system to function.", "c": "end"}, {"t": "Lego Spike", "d": "Students build a Lego Spike automated production line where the motor, sensor and sequence of coded steps must work together to move an object from start to finish — if any part fails, the system stops, demonstrating how systems are made of many interdependent parts and connecting to the 'morning of chaos' provocation where classroom systems were removed.", "c": "end"}, {"t": "Seesaw", "d": "Students document their system investigation, photographing picture prompts of different systems (toilet, water, dance routine, Scratch Jr, bread) and collaboratively mapping how each system's parts depend on each other.", "c": "middle"}, {"t": "Cubetto", "d": "Students program Cubetto to follow a sequence of steps representing a system process (e.g. the café lunch system from kitchen to student), debugging when steps are out of order to understand how systems break down — connecting to the mini incursion to the school café exploring Gayle's daily systems.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build a simple Lego Spike automated sorting machine demonstrating how a system follows a sequence of processes, programming the motor to move items along a conveyor and sort them, connecting the engineering model to the system investigations explored through the café lunch and marketplace examples.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw or photograph an example of the systems in our lives from their everyday life, then record a voice note explaining how it works — building a class collection of real-world connections before the inquiry begins.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph examples of the purpose of various systems around the school or home and create a Book Creator page sorting them into categories, with voice recordings explaining their grouping — practising the classification skills they will develop in the unit.", "c": "beginning"}, {"t": "Google Earth", "d": "Students use Google Earth to virtually explore systems visible from above — road networks, water systems, farm irrigation patterns — taking screenshots and recording what they notice about how systems are made of many interdependent parts that connect across large areas.", "c": "beginning"}]}, {"ca": "Glen Waverley", "yl": "Year 2", "th": "Sharing the Planet", "ci": "Water is a limited resource that is essential to life.", "lo": "Unequal access to water; Communities affected by water access; Transferral of water from source to use; Responsibility as global citizens", "s": [{"t": "Scratch", "d": "Students code an interactive 'Water Cycle Journey' simulation in Scratch where a water droplet sprite travels through evaporation, condensation, precipitation and collection — users click to add pollution or conservation actions that visibly change the water quality, connecting the water cycle stages to their home learning water-saving posters and class discussion about machines that move water from rivers to homes.", "c": "end"}, {"t": "Sphero", "d": "Students program Spheros to navigate a floor-map obstacle course representing the journey of water from source to tap, with checkpoints where they must 'clean' the water (spin action) or 'pump' it uphill (speed boost) — filming the run from above and presenting how the programmed sequence connects to the transferral of water and the data representation work about water usage patterns.", "c": "end"}, {"t": "Green Screen", "d": "Students film a green screen news broadcast as 'Water Watch Reporters' transporting themselves to drought-affected communities, water treatment plants and pristine water sources explored via Google Earth during the unit — delivering persuasive segments about water conservation responsibility as global citizens, referencing specific examples from their non-fiction reading and the curiosity board.", "c": "end"}, {"t": "Google Earth", "d": "Students explore satellite imagery of water sources, drought-affected areas and dams to understand water distribution globally, comparing communities with different levels of water access.", "c": "middle"}, {"t": "Micro:bit", "d": "Students use micro:bit moisture sensors to collect data on water usage in the school garden, tracking conservation efforts and connecting their findings to the unit's focus on responsible water management.", "c": "middle"}, {"t": "Sphero", "d": "Students program Spheros to follow the path of the water cycle on a floor mat (evaporation → condensation → precipitation → collection), connecting the coding sequence to the water cycle stages documented in their 'Water Matters' Book Creator report and observed during the satellite imagery exploration on Google Earth.", "c": "middle"}, {"t": "Padlet", "d": "Students post drawings and voice notes exploring what unequal access to water means to them on a class Padlet board, creating a 'Before' collection of thinking that the class will revisit at the end of the unit to see how understanding has deepened.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph or draw something from nature connected to communities affected by water access and create a Book Creator page with labels and a voice note explaining why it matters — starting a personal inquiry book.", "c": "beginning"}, {"t": "Seesaw", "d": "Students take photos of things around the school connected to transferral of water from source to use and add them to a shared class Seesaw activity, then the class sorts and discusses the collection — identifying patterns and questions to investigate.", "c": "beginning"}, {"t": "Padlet", "d": "Students drop pins on a shared Padlet Map marking locations connected to unequal access to water, adding photos, facts and reflections at each pin — building a collaborative geographic record of the class's environmental research.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Year 3", "th": "Who We Are", "ci": "The choices and actions we make contribute to our health and wellbeing.", "lo": "What it means to be healthy; Choices and their impact on health; Actions to maintain a healthy mind and body", "s": [{"t": "Padlet", "d": "Students respond to the provocation 'The choices and actions we make contribute to our health and wellbeing.' by posting one image and one sentence showing what this looks like in their own life, creating a collaborative gallery that maps the class's diverse starting perspectives on what it means to be healthy.", "c": "beginning"}, {"t": "Canva", "d": "Students design a personal infographic mapping their own connection to choices and their impact on health — using icons, images and short text to visualise where they stand before the class explores different perspectives.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about actions to maintain a healthy mind and body using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}, {"t": "Micro:bit", "d": "Students use micro:bits to collect step-count or activity-level data over a week during PE athletics activities, analysing patterns in physical activity choices and connecting findings to the unit's focus on how choices impact health.", "c": "middle"}, {"t": "Padlet", "d": "Students share healthy choice strategies on a collaborative board, categorising actions by mind and body health, and discussing mindful practices they identified and chose based on their personal needs.", "c": "middle"}, {"t": "GarageBand", "d": "Students compose a calming mindfulness soundscape in GarageBand exploring how music affects wellbeing, connecting audio creation to their investigation of how daily choices about mind and body health contribute to overall wellbeing, and sharing the composition as part of their healthy action strategies.", "c": "middle"}, {"t": "Mentimeter", "d": "Students use Mentimeter live polling to gather anonymous class data on health and wellbeing choices, creating real-time visualisations of how peers make decisions about physical activity, nutrition, and mental health, feeding the data into their persuasive speeches and wellbeing infographics.", "c": "middle"}, {"t": "Scratch", "d": "Students code an interactive 'Health Choices Simulator' in Scratch where players make daily decisions about food, exercise, sleep and screen time — each choice adjusts animated health meters for body and mind, demonstrating how the choices and actions we make contribute to our health and wellbeing through visible cause-and-effect feedback loops.", "c": "end"}, {"t": "Book Creator", "d": "Students create a personal 'Wellbeing Action Plan' book documenting healthy choices for mind and body, featuring their investigation findings from the two homework questions and one wondering they explored after the guest speaker presentations.", "c": "end"}, {"t": "Micro:bit", "d": "Students build a micro:bit 'Wellbeing Tracker' that uses the accelerometer to count steps and displays personalised activity targets on the LED screen, presenting their week-long PE athletics data alongside their device at a class health expo — demonstrating how technology can support actions to maintain a healthy mind and body.", "c": "end"}]}, {"ca": "Glen Waverley", "yl": "Year 3", "th": "Where We Are in Place and Time", "ci": "Land and place are represented and valued in different ways.", "lo": "How Australia and neighbouring regions define places; Australia's states/territories have unique identities; First Nations connections to Country", "s": [{"t": "Google Earth", "d": "Students use satellite and street views to explore Australia's states and territories, comparing how geography and culture shape each region's unique identity and dropping pins on significant First Nations and contemporary locations.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate objects, images or locations from their own lives that connect to how Australia and neighbouring regions define places, recording voice reflections about what these places mean to them — building a personal provocation portfolio before the inquiry begins.", "c": "beginning"}, {"t": "Canva", "d": "Students create a 'What I Think I Know' timeline or mind map about australia's states/territories have unique identities in Canva, visually organising their existing knowledge and marking questions with a '?' — establishing a baseline the class can test through research.", "c": "beginning"}, {"t": "Padlet", "d": "Students collaborate on a shared board collecting images and facts about how different cultures represent and value places, comparing First Nations perspectives with contemporary Australian state representations.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate how australia and neighbouring regions define places, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Book Creator", "d": "Students add to their ongoing inquiry book, documenting new learning about how australia and neighbouring regions define places with labelled diagrams, photographs and written reflections showing how their thinking is developing.", "c": "middle"}, {"t": "Canva Presentation", "d": "Students design a multi-page presentation comparing how Australia's states and territories express unique identities through symbols, landmarks and culture, incorporating their two-dimensional map representations created during the Maths spatial integration.", "c": "end"}, {"t": "Tinkercad", "d": "Students design a 3D model in Tinkercad of a significant Australian landmark or place that represents First Nations Australians' deep spiritual, cultural and custodial connection to the land — presenting their digital design alongside research explaining why this place matters to different people and how the land holds identity and story.", "c": "end"}, {"t": "Google Earth", "d": "Students create a narrated virtual tour exploring significant Australian places, comparing how they are valued by different communities and connecting to the curriculum focus on how countries/places represent different perspectives.", "c": "end"}, {"t": "Sphero", "d": "Students code a Sphero to navigate a floor map tracing the flight path from their researched country to Melbourne, calculating distance and direction — connecting geography, coding and spatial reasoning in a hands-on culminating task.", "c": "end"}]}, {"ca": "Glen Waverley", "yl": "Year 3", "th": "How We Express Ourselves", "ci": "Creativity allows people to express their understanding of the world.", "lo": "The ways people use technology to express creativity; How texts and images work together; How technology influences our creativity", "s": [{"t": "Canva", "d": "Students create a quick visual poster in Canva responding to the provocation: 'How do you the ways people use technology to express creativity?' — using images, icons and text to express their current understanding before the inquiry deepens.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page experimenting with different ways to express how texts and images work together — through images, text, drawing and recorded voice — reflecting on which medium communicates their idea most effectively.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about how technology influences our creativity using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}, {"t": "Scratch", "d": "Students build an interactive Scratch art gallery where the player walks a character through rooms, each containing a student-created digital artwork representing a different creative medium (painting, music, dance, digital). Clicking each artwork triggers an animation — a painting comes to life, a dancer moves across the stage, music notes float from instruments — and the player collects 'inspiration tokens' by answering how each medium expresses ideas differently, connecting to the unit's exploration of how technology expands creative possibilities beyond traditional media.", "c": "middle"}, {"t": "Adobe Express Video Creator", "d": "Students create a short video exploring how technology tools help people express ideas in new ways, documenting their Stop Motion creation process and reflecting on how technology influenced their creativity.", "c": "middle"}, {"t": "GarageBand", "d": "Students compose original soundtracks in GarageBand to accompany their Stop Motion animations in iMovie, exploring how music and sound effects enhance creative expression and convey meaning, connecting audio production to the multi-modal storytelling investigated throughout the unit.", "c": "middle"}, {"t": "Padlet", "d": "Students contribute to a shared Padlet Map by pinning locations connected to the ways people use technology to express creativity, adding images, research findings and questions — building a collaborative geographic resource the class can explore together.", "c": "middle"}, {"t": "iMovie", "d": "Students produce a Stop Motion animation expressing their understanding of a concept from the unit, building on the skills taught in class where students learned to create Stop Motion clips and then taught their parents the technique.", "c": "end"}, {"t": "Book Creator", "d": "Students design an interactive digital story where text and images work together to convey meaning, extending their Book Creator experience from Year 2 and reflecting on their creative process using media technologies.", "c": "end"}, {"t": "Canva Presentation", "d": "Students create a multimedia presentation combining text, images and design to express their creative understanding, applying the technical terms and graphical representations learned during design technology sessions.", "c": "end"}]}, {"ca": "Glen Waverley", "yl": "Year 3", "th": "How the World Works", "ci": "Observing how materials change helps us make sense of the physical world.", "lo": "Observable properties of solids and liquids; How heating and cooling change state; Scientific thinking helps solve everyday problems", "s": [{"t": "Mentimeter", "d": "Students respond to 'What do you already know about observable properties of solids and liquids?' using a live word cloud, then the class discusses the most common responses — revealing existing understanding and misconceptions to shape the inquiry direction.", "c": "beginning"}, {"t": "Canva", "d": "Students create a hypothesis poster in Canva predicting how how heating and cooling change state works, including a labelled diagram and three questions they want to investigate — setting up the scientific inquiry process.", "c": "beginning"}, {"t": "Kahoot", "d": "Students play a diagnostic Kahoot quiz testing common assumptions about scientific thinking helps solve everyday problems — wrong answers reveal misconceptions the class will investigate, and the teacher uses results to differentiate inquiry groups.", "c": "beginning"}, {"t": "Micro:bit", "d": "Students use micro:bit temperature sensors to collect data during heating/cooling experiments, recording readings at intervals and connecting their data to the observable property changes they documented.", "c": "middle"}, {"t": "Padlet", "d": "Students share and compare investigation results on a collaborative board, identifying patterns in how materials change state and discussing how scientific thinking helped them solve everyday problems.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build a Lego Spike stirring or mixing mechanism to use during their heating and cooling experiments, programming the motor speed to control variables and ensure fair testing as they observe how materials change state, connecting engineering to scientific investigation skills.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph and annotate each stage of their heating/cooling experiments, recording voice explanations about observable changes to solids and liquids — building a visual portfolio of scientific evidence throughout the unit.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build a Lego Spike automated heating/cooling experiment rig that uses the motor to stir a mixture and the temperature sensor to trigger an alert when a target temperature is reached — presenting their programmed experiment alongside data showing how heating and cooling change the state of materials.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'States of Matter Explorer' in Scratch where clicking on a material sprite and dragging a temperature slider causes animated particles to change behaviour (tightly packed → flowing → spreading apart), with a data display showing the temperature at each transition point — connecting their micro:bit experiment data to a visual model.", "c": "end"}, {"t": "iMovie", "d": "Students produce an iMovie 'Mythbusters: Materials Edition' episode where they test a claim about how materials change (e.g. 'chocolate melts faster than butter'), filming their experiment with slow-motion replay of the state change moment, overlaying temperature data from their micro:bit readings, and delivering a verdict based on evidence.", "c": "end"}]}, {"ca": "Glen Waverley", "yl": "Year 3", "th": "Sharing the Planet", "ci": "The diversity of soils, rocks, and minerals shapes the way people value and use Earth's resources.", "lo": "Observable properties of soils, rocks and minerals; Earth's resources are vital and must be used responsibly; First Nations knowledge of soils and rocks", "s": [{"t": "Padlet", "d": "Students post an image, headline or question about observable properties of soils, rocks and minerals on a shared Padlet board, then read and comment on three classmates' posts — surfacing the range of perspectives and questions that will drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students design a 'What I Care About' poster in Canva showing their personal connection to earth's resources are vital and must be used responsibly — including images, facts they already know, and questions they want answered during the unit.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students respond to a series of true/false provocations about first nations knowledge of soils and rocks using Mentimeter live polls — the class sees results in real time, debates surprising answers, and identifies misconceptions to investigate during the unit.", "c": "beginning"}, {"t": "Micro:bit", "d": "Students use micro:bits with light sensors to test rock properties (transparency/opacity) and collect data for their classification activities, recording findings digitally for comparison.", "c": "middle"}, {"t": "Google Earth", "d": "Students explore geological features of Australia, investigating how climate types impact landforms, soils and natural vegetation, and comparing how different communities value and use Earth's rock and mineral resources.", "c": "middle"}, {"t": "Sphero", "d": "Students program Spheros to navigate terrain courses made from different soil and rock samples, observing how surface texture and material properties affect movement, connecting the hands-on coding challenge to their rock classification investigations and geological feature research on Google Earth.", "c": "middle"}, {"t": "Padlet", "d": "Students drop pins on a shared Padlet Map marking locations connected to observable properties of soils, rocks and minerals, adding photos, facts and reflections at each pin — building a collaborative geographic record of the class's environmental research.", "c": "middle"}, {"t": "Tinkercad", "d": "Students design a 3D model in Tinkercad of a rock or mineral classification display stand with labelled compartments organised by observable properties (colour, texture, hardness, lustre), presenting their digital design as a museum-quality exhibit that could be 3D printed — connecting their hands-on investigation data to professional scientific presentation.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Rock Cycle Journey' simulation in Scratch where a rock sprite transforms through igneous, sedimentary and metamorphic stages based on player choices (add heat, add pressure, erode), with First Nations knowledge of soils and rocks woven into the narration at each stage — creating an educational game visitors can play.", "c": "end"}, {"t": "Canva Video", "d": "Students produce an Canva Video 'Earth's Resources' documentary featuring footage of their hands-on rock and soil investigations, Sphero terrain course experiments, and Google Earth geological explorations — delivering a persuasive argument about why Earth's resources must be used responsibly, with evidence from their classification data and First Nations perspectives.", "c": "end"}]}, {"ca": "Glen Waverley", "yl": "Year 4", "th": "Who We Are", "ci": "People's beliefs contribute to the diversity of human life.", "lo": "Spiritual or religious beliefs; Similarities and differences of spiritual beliefs; Contributions of different religions to human diversity", "s": [{"t": "Canva Presentation", "d": "Students design a comparative presentation exploring similarities and differences between religions studied during the unit, incorporating observations from the Uniting Church visit, the Bunjil art installation, and the chapel experience with Steven Langley's cello performance and meditation.", "c": "end"}, {"t": "Delightex (CoSpaces)", "d": "Students build an interactive 3D 'World Beliefs Museum' in CoSpaces where visitors walk through themed rooms for each religion studied, clicking on artefact and symbol objects to trigger recorded explanations about spiritual beliefs, traditions and contributions to human diversity — connecting their Think-Pair-Share research to an immersive virtual exhibition.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a documentary featuring their research into how beliefs contribute to diverse communities, incorporating footage and reflections from the gallery walk where they used yellow and pink post-it notes to record thoughts and questions.", "c": "end"}, {"t": "Padlet", "d": "Students contribute research findings about different religions to a collaborative comparison board, connecting to their Think-Pair-Share discussions about beliefs and values.", "c": "middle"}, {"t": "Google Earth", "d": "Students explore significant religious and spiritual sites worldwide (churches, mosques, temples, synagogues), connecting virtual visits to their excursion to the GW Uniting Church and the Bunjil art installation research.", "c": "middle"}, {"t": "Mentimeter", "d": "Students use Mentimeter live polling and word clouds to explore class perspectives on diversity, beliefs, and shared values, gathering anonymous data on attitudes that feeds into their comparative presentations and documentary about how beliefs contribute to diverse communities.", "c": "middle"}, {"t": "Padlet", "d": "Students respond to the provocation 'People's beliefs contribute to the diversity of human life.' by posting one image and one sentence showing what this looks like in their own life, creating a collaborative gallery that maps the class's diverse starting perspectives on spiritual or religious beliefs.", "c": "beginning"}, {"t": "Canva", "d": "Students design a personal infographic mapping their own connection to similarities and differences of spiritual beliefs — using icons, images and short text to visualise where they stand before the class explores different perspectives.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about contributions of different religions to human diversity using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}, {"t": "Freeform", "d": "Students use Freeform to create a collaborative concept map exploring connections between spiritual or religious beliefs and similarities and differences of spiritual beliefs — using sticky notes for ideas, drawings for personal connections, and arrows to show how concepts link together, making their thinking visible to the whole group.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Year 4", "th": "Where We Are in Place and Time", "ci": "Exploration leads to discoveries, opportunities and new understandings.", "lo": "Reasons for exploration; How people have explored over time; Consequences of exploration", "s": [{"t": "Google Earth", "d": "Students use Google Earth to explore locations connected to reasons for exploration, dropping pins and adding labels describing what they observe — building a visual map of existing knowledge before the class investigation begins.", "c": "beginning"}, {"t": "Canva", "d": "Students create a 'What I Think I Know' timeline or mind map about how people have explored over time in Canva, visually organising their existing knowledge and marking questions with a '?' — establishing a baseline the class can test through research.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate artefacts, images or objects connected to consequences of exploration from their own lives or the classroom, recording voice reflections about what exploration means to them — building a personal provocation portfolio before the CERES excursion deepens the inquiry.", "c": "beginning"}, {"t": "Google Earth", "d": "Students trace exploration routes on the globe, pinning key locations and annotating with erent artistic expressions can promote thinking.", "lo": "Ways forms of expression convey messages; Creative and critical thinking skills; The language used to respond to The Arts", "s": [{"t": "Canva Presentation", "d": "Students design an art response presentation analysing a chosen artwork using the consistent vocabulary developed during the unit (from the shared arts vocab folder), applying creative and critical thinking skills.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a video essay responding to different art forms encountered during the unit, including reflections from the Musica Viva incursion where they experienced live musical expression and explored how performance conveys messages.", "c": "end"}, {"t": "Adobe Express Video Creator", "d": "Students create a narrated slideshow comparing how different artistic expressions (visual art, music, drama, dance) convey messages, using the arts-specific language developed through the consistent vocabulary approach.", "c": "end"}, {"t": "Padlet", "d": "Students share responses to artworks on a collaborative board during gallery walks, practising arts vocabulary and demonstrating how responding to art promotes creative and critical thinking.", "c": "beginning"}, {"t": "GarageBand", "d": "Students compose a musical response to a visual artwork, exploring how different art forms convey similar messages — extending the musical understanding developed through the Musica Viva incursion experience.", "c": "middle"}, {"t": "Delightex (CoSpaces)", "d": "Students build a virtual 3D art gallery in CoSpaces displaying digital versions of the artworks studied during gallery walks, adding interactive annotations using the arts vocabulary developed throughout the unit, creating an immersive exhibition that extends their art response presentations.", "c": "beginning"}, {"t": "Canva", "d": "Students create a quick visual poster in Canva responding to the provocation: 'How do you ways forms of expression convey messages?' — using images, icons and text to express their current understanding before the inquiry deepens.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate ways forms of expression convey messages, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of ways forms of expression convey messages and building on each other's thinking through comments and questions.", "c": "middle"}, {"t": "Freeform", "d": "Students use Freeform as a collaborative planning canvas, storyboarding their creative project about ways forms of expression convey messages — sketching layouts, adding reference images, writing scripts and mapping the structure before they start building the final product.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Year 4", "th": "How the World Works", "ci": "The design and use of products can have an impact on the natural world.", "lo": "How material properties determine their use; Material solutions for a sustainable future; How research solves problems in the natural world", "s": [{"t": "Mentimeter", "d": "Students respond to 'What do you already know about how material properties determine their use?' using a live word cloud, then the class discusses the most common responses — revealing existing understanding and misconceptions to shape the inquiry direction.", "c": "beginning"}, {"t": "Canva", "d": "Students create a hypothesis poster in Canva predicting how material solutions for a sustainable future works, including a labelled diagram and three questions they want to investigate — setting up the scientific inquiry process.", "c": "beginning"}, {"t": "Kahoot", "d": "Students play a diagnostic Kahoot quiz testing common assumptions about how research solves problems in the natural world — wrong answers reveal misconceptions the class will investigate, and the teacher uses results to differentiate inquiry groups.", "c": "beginning"}, {"t": "Micro:bit", "d": "Students use micro:bits to collect environmental data (temperature, light levels) to inform their sustainable product design decisions, connecting sensor data to understanding how the natural world is affected by material choices.", "c": "middle"}, {"t": "Scratch", "d": "Students code an interactive simulation showing how different material and design choices affect the natural world over time, demonstrating the connection between product design and environmental impact.", "c": "middle"}, {"t": "Sphero", "d": "Students program Spheros to navigate an obstacle course representing environmental challenges, testing whether their sustainable product design creates a clear path or adds barriers, connecting the coding challenge to their investigation of how design and material choices impact the natural world.", "c": "middle"}, {"t": "Tinkercad", "d": "Students design a 3D prototype of a sustainable product that solves an environmental problem for an animal, considering which materials will be good for both the environment and the animal — connecting to the unit's sustainability focus on choosing responsible materials for prototypes.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a product sustainability report showing how their material choices impact the environment, comparing natural vs synthetic materials and proposing alternatives that support a sustainable future.", "c": "end"}, {"t": "CoDrone EDU", "d": "Students program a CoDrone EDU to perform an aerial survey of their sustainable product prototypes displayed around the classroom, capturing bird's-eye footage of each design — then present the drone footage alongside their Tinkercad 3D models and Lego Spike prototypes, explaining how their material choices solve an environmental problem for animals.", "c": "end"}, {"t": "Lego Spike", "d": "Students build a Lego Spike prototype of their sustainable product incorporating sensors and motors, testing the design against environmental criteria and comparing the engineering approach with their Tinkercad 3D digital prototype, connecting physical and digital design thinking.", "c": "end"}]}, {"ca": "Glen Waverley", "yl": "Year 4", "th": "How We Organise Ourselves", "ci": "Communities create rules, laws and services to help people live together fairly and safely.", "lo": "Effective and influential leadership; Strengths that help leaders guide others; How leadership impacts communities", "s": [{"t": "Seesaw", "d": "Students complete the leadership ranking activity comparison as a digital portfolio task, documenting how their understanding of effective leadership changed from the provocation through to the Cross Campus Leadership Day experiences.", "c": "beginning"}, {"t": "Microsoft Forms", "d": "Students complete a quick class survey about their experience with effective and influential leadership — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students map out their current understanding of strengths that help leaders guide others as a simple flowchart or diagram in Canva, showing how they think the system works — the class then compares diagrams to identify gaps and assumptions to investigate.", "c": "beginning"}, {"t": "Padlet", "d": "Students collaborate on a leadership qualities wall, sharing examples of effective leaders from the election discussion, guest speaker insights from UN Youth Ambassador Imogen Kane, and their own leadership experiences during team-building activities.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate effective and influential leadership, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students design and conduct a class survey to gather perspectives on effective and influential leadership, analysing the response data to identify patterns and inform their ongoing inquiry.", "c": "middle"}, {"t": "Freeform", "d": "Students use Freeform to build a visual concept map connecting different leadership examples explored during the unit — mapping how the election discussion, guest speaker visits and class observations reveal patterns in what makes leadership effective and influential.", "c": "middle"}, {"t": "Canva Presentation", "d": "Students design a leadership profile presentation featuring the leader they researched, incorporating the ranking activity comparison (initial vs final understanding), the Kid President video analysis of leadership strengths and weaknesses, and insights from the Imogen Kane UN Youth Ambassador guest speaker on Teams.", "c": "end"}, {"t": "Canva Video", "d": "Students create a 'Leadership in Action' video showcasing their leadership speech (a favourite activity mentioned by students), incorporating footage from the Cross Campus Leadership Day team-building activities and their Seesaw self-reflection rubric responses.", "c": "end"}, {"t": "Adobe Express Podcasting", "d": "Students produce a podcast interviewing peers about leadership qualities, connecting to the Visual Art exploration of art leaders Yayoi Kusama and Jean-Michel Basquiat and discussing how leadership exists in many fields.", "c": "end"}]}, {"ca": "Glen Waverley", "yl": "Year 4", "th": "Sharing the Planet", "ci": "Country, language and community are significant to the lives of First Nations people.", "lo": "Diversity of First Nations people; Importance of community, family and traditions; Importance of Country to First Nations people", "s": [{"t": "Google Earth", "d": "Students explore First Nations language group maps and significant Country locations, connecting virtual exploration to their camp experience and annotating locations with cultural information about community, family and traditions.", "c": "beginning"}, {"t": "Padlet", "d": "Students post an image, headline or question about diversity of first nations people on a shared Padlet board, then read and comment on three classmates' posts — surfacing the range of perspectives and questions that will drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students design a 'What I Care About' poster in Canva showing their personal connection to importance of community, family and traditions — including images, facts they already know, and questions they want answered during the unit.", "c": "beginning"}, {"t": "Padlet", "d": "Students curate and share approved resources and reflections about First Nations culture, building on the different discussion groupings used during the unit to explore diversity perspectives.", "c": "middle"}, {"t": "DJI Drone (teacher-operated)", "d": "DLC captures aerial footage of the camp location and local Glen Waverley environment, providing students with a bird's-eye view of Country that they compare with First Nations perspectives on the significance of land, connecting the aerial imagery to their Google Earth explorations of language group maps and significant locations.", "c": "middle"}, {"t": "Insta360 Cam", "d": "DLC captures 360° footage during the camp experience with the Indigenous elder, creating immersive reference material that students revisit in class to deepen their reflections in the iMovie documentary about how Country, language and community connect, preserving the camp experience for ongoing learning.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph and annotate artefacts, artworks and experiences from the camp with the Indigenous elder, recording voice reflections about how each connects to diversity of First Nations people and the importance of Country — building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Canva Presentation", "d": "Students design a respectful presentation exploring the significance of Country to First Nations people, incorporating learning from the Indigenous elder at camp who led a nature walk, played the didgeridoo and shared stories, and connecting to their continued study of native Australian animals.", "c": "end"}, {"t": "Book Creator", "d": "Students create a research book documenting the diversity of First Nations peoples and their connection to Country, integrating the pre-test visualisation activity where they drew their understanding of Aboriginal and Torres Strait Islander communities and researched the effects of First Fleet contact.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a reflective documentary connecting their camp experience with the Indigenous elder to their research about how Country, language and community are significant — incorporating the persuasive speeches they wrote as their taking-action assessment.", "c": "end"}]}, {"ca": "Glen Waverley", "yl": "Year 5", "th": "Who We Are", "ci": "Managing change requires acceptance, knowledge and strategies.", "lo": "Establishing, managing and maintaining relationships; Managing behaviours in digital situations; Managing changes associated with puberty", "s": [{"t": "Padlet", "d": "Students respond to the provocation 'Managing change requires acceptance, knowledge and strategies.' by posting one image and one sentence showing what this looks like in their own life, creating a collaborative gallery that maps the class's diverse starting perspectives on establishing, managing and maintaining relationships.", "c": "beginning"}, {"t": "Canva", "d": "Students design a personal infographic mapping their own connection to managing behaviours in digital situations — using icons, images and short text to visualise where they stand before the class explores different perspectives.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about managing changes associated with puberty using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}, {"t": "Scratch", "d": "Students code an interactive cyber safety scenario where users make choices and see consequences of digital behaviours, exploring how acceptance and knowledge lead to better strategies.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students design and conduct a class survey about change management strategies, analysing responses to identify common approaches and connecting findings to the presentation from Brett Borberly.", "c": "middle"}, {"t": "GarageBand", "d": "Students compose a calming audio toolkit in GarageBand with personalised soundscapes and guided breathing exercises, connecting music creation to the wellbeing and change management strategies explored during the relationship, cyber safety and resilience sessions throughout the unit.", "c": "middle"}, {"t": "Mentimeter", "d": "Students use Mentimeter live polling to gather anonymous class data on change management strategies that work best, creating real-time visualisations of peer perspectives on managing transitions, feeding the data into their wellbeing guide and podcast discussions.", "c": "middle"}, {"t": "Canva Presentation", "d": "Students design a comprehensive wellbeing guide covering relationship management, cyber safety strategies and puberty changes, incorporating insights from the Brett Borberly guest presentation about managing life changes.", "c": "end"}, {"t": "Adobe Express Podcasting", "d": "Students produce a podcast series discussing strategies for managing different life changes, drawing on the relationship-building and digital citizenship skills explored through class discussions and guest speaker sessions.", "c": "end"}, {"t": "Canva Video", "d": "Students create a cyber safety awareness video demonstrating responsible digital behaviour and strategies for managing online situations, connecting to the wellbeing focus on managing behaviours in digital contexts.", "c": "end"}]}, {"ca": "Glen Waverley", "yl": "Year 5", "th": "Where We Are in Place and Time", "ci": "The discovery of resources has impacted the growth and development of nations.", "lo": "Significance of resource discovery in development of societies; Impact of migration on cultural, social and economic growth; Exploration and settlement effects on Indigenous and colonial populations", "s": [{"t": "Google Earth", "d": "Students use Google Earth to explore locations connected to significance of resource discovery in development of societies, dropping pins and adding labels describing what they observe — building a visual map of existing knowledge before the class investigation begins.", "c": "beginning"}, {"t": "Canva", "d": "Students create a 'What I Think I Know' timeline or mind map about impact of migration on cultural, social and economic growth in Canva, visually organising their existing knowledge and marking questions with a '?' — establishing a baseline the class can test through research.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate objects, images or artefacts connected to exploration and settlement effects on indigenous and local populations, recording voice reflections about what they already know — building a personal provocation portfolio before the unit deepens.", "c": "beginning"}, {"t": "Google Earth", "d": "Students trace migration and settlement routes across Australia, annotating key locations including gold rush sites and colonial settlements with historical context about how resource discovery drove population movement and national development.", "c": "middle"}, {"t": "Microsoft Excel", "d": "Students create data tables and charts comparing migration patterns over time, analysing trends from the Gold Rush era to modern migration and connecting population data to resource discovery and economic growth.", "c": "middle"}, {"t": "Insta360 Cam", "d": "DLC captures 360° footage at Sovereign Hill or other Gold Rush heritage sites during excursions, creating immersive reference material that students analyse to understand the living and working conditions of the era, connecting the experience to their migration data analysis in Microsoft Excel.", "c": "middle"}, {"t": "Canva Presentation", "d": "Students design a research presentation analysing how the Gold Rush impacted Australia's development, incorporating cause-and-effect analysis from their Seesaw portfolio formative assessment and research from ClickView Gold Rush videos.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a documentary exploring the impact of migration on Australian society, weaving together the effects of British colonisation on First Nations Australians, convict experiences, and the development that followed resource discovery.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Migration Impact Timeline' in Scratch where clicking on era sprites (pre-colonial, Gold Rush, post-war, modern) triggers animated data visualisations showing how migration shaped Australian communities — connecting their Microsoft Excel data analysis to an interactive experience visitors can explore.", "c": "end"}, {"t": "Green Screen + iMovie", "d": "Students film first-person Gold Rush accounts using green screen with historical goldfields backgrounds, performing as characters from different migration waves to bring primary source stories to life, integrating the footage into their iMovie documentary about how resource discovery impacted Australia's growth.", "c": "end"}]}, {"ca": "Glen Waverley", "yl": "Year 5", "th": "How We Express Ourselves", "ci": "People design for purpose.", "lo": "How design thinking creates in various ways; Design thinking meets community needs; Effective ways to engage an audience", "s": [{"t": "Canva", "d": "Students create a quick visual poster in Canva responding to the provocation: 'How do you how design thinking creates in various ways?' — using images, icons and text to express their current understanding before the inquiry deepens.", "c": "beginning"}, {"t": "GarageBand", "d": "Students experiment with sounds and beats in GarageBand to create a 30-second 'mood piece' that expresses their first impression of design thinking meets community needs — exploring how expression works beyond words before the unit dives deeper.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about effective ways to engage an audience using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}, {"t": "Scratch", "d": "Students code a prototype or interactive model demonstrating their design thinking solution, showing how the digital creation process helps them meet community needs in new ways.", "c": "middle"}, {"t": "Micro:bit", "d": "Students integrate micro:bits into their design project as sensors or interactive elements, collecting data to inform design decisions and connecting technology to the ethical and practical considerations in their design process.", "c": "middle"}, {"t": "CoDrone EDU", "d": "Students explore drone technology as a design-for-purpose case study, programming CoDrone EDU to perform tasks that meet a specific community need (surveillance for safety, delivery for accessibility), connecting the drone's engineered purpose to their design thinking investigation of how products are designed to serve audiences.", "c": "middle"}, {"t": "Canva Presentation", "d": "Students present their design thinking project showing how they identified a community need and designed a purposeful solution, incorporating the prototyping and evaluation skills developed through stakeholder research and the social messages Visual Art focus.", "c": "en rosoft Excel", "d": "Students create a personal budget spreadsheet with formulas tracking income, expenses and savings goals, connecting to the Banqer simulation data and their understanding that wealth is more than money.", "c": "end"}, {"t": "Adobe Express Podcasting", "d": "Students produce a podcast episode discussing how economic systems work and responsible financial decision-making, drawing on their Banqer experience and class presentations about managing income.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive budget simulation where users make financial decisions and see consequences on their savings, modelling the economic choices they practised through the Banqer platform.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students design and conduct a survey about how classmates understand wealth beyond money, analysing data to present findings about economic literacy and connecting results to the structured assessment rubric.", "c": "middle"}, {"t": "Mentimeter", "d": "Students use Mentimeter live polling to explore class attitudes about wealth, spending priorities, and financial decision-making, generating real-time data visualisations that inform their podcast discussions about how economic systems affect daily life and responsible financial choices.", "c": "beginning"}, {"t": "Microsoft Forms", "d": "Students complete a quick class survey about their experience with wealth is more than money — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students map out their current understanding of responsibilities when managing income as a simple flowchart or diagram in Canva, showing how they think the system works — the class then compares diagrams to identify gaps and assumptions to investigate.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate wealth is more than money, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Freeform", "d": "Students use Freeform to collaboratively map how wealth is more than money works as a system, drawing flowcharts with inputs, processes and outputs — using sticky notes to label each part and arrows to show connections, then identifying what happens when one part changes.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Year 5", "th": "Sharing the Planet", "ci": "Communities interact with the environment in different ways.", "lo": "The need for conservation; Community values inform management of the natural environment; Ways environmental stewardship can drive change", "s": [{"t": "Padlet", "d": "Students post an image, headline or question about the need for conservation on a shared Padlet board, then read and comment on three classmates' posts — surfacing the range of perspectives and questions that will drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students design a 'What I Care About' poster in Canva showing their personal connection to community values inform management of the natural environment — including images, facts they already know, and questions they want answered during the unit.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students respond to a series of true/false provocations about ways environmental stewardship can drive change using Mentimeter live polls — the class sees results in real time, debates surprising answers, and identifies misconceptions to investigate during the unit.", "c": "beginning"}, {"t": "Google Earth", "d": "Students analyse satellite imagery to compare the Alex Wilkie Nature Reserve with surrounding urban development, investigating how community values shape environmental management decisions locally and globally.", "c": "middle"}, {"t": "Microsoft Excel", "d": "Students compile environmental data collected via micro:bits into graphs and charts, identifying trends in local environmental conditions and using the data to strengthen their conservation stewardship arguments.", "c": "middle"}, {"t": "DJI Drone (teacher-operated)", "d": "DLC captures aerial footage of the Alex Wilkie Nature Reserve and surrounding urban development, providing students with satellite-perspective imagery that they compare with Google Earth views and analyse alongside their micro:bit environmental data to understand how community interactions shape the local environment.", "c": "middle"}, {"t": "Insta360 Cam", "d": "DLC captures 360° footage at the Alex Wilkie Nature Reserve, creating an immersive record that students explore back in class to identify environmental features, compare biodiversity zones, and gather visual evidence for their conservation action plan presentations and iMovie environmental documentaries.", "c": "middle"}, {"t": "Canva Presentation", "d": "Students design a conservation action plan proposing how their community can improve environmental stewardship, incorporating evidence from their gallery walk presentations about responsible resource use and sustainability choices.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a persuasive environmental documentary connecting their research about sustainable resource patterns to the Alex Wilkie Nature Reserve excursion observations and the Monash Council visit about local environmental management.", "c": "end"}, {"t": "Micro:bit", "d": "Students program micro:bits to collect environmental data (temperature, light, moisture) around the school and at the Alex Wilkie Nature Reserve, using findings to support their conservation action proposals with evidence.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Prep", "th": "Who We Are", "ci": "Relationships impact our wellbeing.", "lo": "Developing relationships; How those around us impact our behaviours and interactions; Keeping ourselves healthy and safe", "s": [{"t": "Green Screen", "d": "Students perform a role-play in front of the green screen showing a 'friendship rescue' scenario — one child is feeling left out, and the others demonstrate strategies from the unit (kind words, inviting to play, asking 'are you OK?'). The green screen places them in playground, classroom and home settings, making the strategies feel real and applicable across different environments.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code a two-scene Scratch Jr animation showing a 'before and after' relationship story — Scene 1 shows characters in conflict (not sharing, excluding, using unkind words), Scene 2 shows the same characters using a strategy they learned to fix the relationship. The characters move, speak and change expression through code, creating an autonomous story that performs itself when the green flag is pressed.", "c": "end"}, {"t": "iMovie", "d": "Students film a 'Wellbeing News Report' where a student reporter interviews classmates about the relationship strategies that worked best during the unit — filmed around the school in the actual locations where friendships happen (playground, classroom, library). The reporter adds a verdict at the end: 'The number one thing that helps relationships is...' with slow-motion replays of friendship in action during PE cooperative activities.", "c": "end"}, {"t": "Seesaw", "d": "Weekly relationship reflection where students draw and narrate about a friendship moment from class, connecting to the Learner Profile focus on caring and open-mindedness explored through PE cooperation activities.", "c": "middle"}, {"t": "Beebots", "d": "Students program Beebots to navigate a 'Friendship Path' mat with stations representing positive relationship actions (sharing, taking turns, using kind words) discussed during read-aloud sessions and PE lessons.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw themselves and record a voice note answering the question: 'What does developing relationships mean to you?' — creating a personal snapshot that the class can revisit at the end of the unit to see how thinking has changed.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create an 'All About Me' page featuring drawings and voice recordings about how those around us impact our behaviours and interactions, starting a personal book they will add to throughout the unit as their understanding of relationships impact our wellbeing grows.", "c": "beginning"}, {"t": "Padlet", "d": "Students post a photo of someone who helps them feel safe and happy (a family member, friend, teacher, pet) to a shared Padlet wall with a voice recording explaining why that person matters. The class gathers around the screen and notices patterns — discovering that relationships are everywhere and come in many forms. The wall stays up all unit as a living display of the class's relationship network.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about developing relationships.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Prep", "th": "How We Express Ourselves", "ci": "Stories are shared in different ways.", "lo": "Imagining stories together; Ways stories are shared; Connecting with stories", "s": [{"t": "Green Screen", "d": "Students perform their original story in front of the green screen, transporting themselves inside the settings they imagined — a rainforest, a castle, outer space — with each student taking a role as narrator, character or sound effects creator, combining live performance with digital environments they chose from the mystery box costumes provocation.", "c": "end"}, {"t": "Book Creator", "d": "Students create an interactive 'Story Museum' book where each page is a different room showcasing a different way of sharing stories explored during the unit — one page has an embedded video of their puppet show, another has a voice-recorded oral retelling, another has photos of their playdough scene with labels — so the book itself demonstrates the central idea that stories are shared in different ways.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code a 3-4 page animated retelling of their story in Scratch Jr where characters walk, talk, grow, shrink and change backgrounds between scenes. The characters move and speak on their own when you press the green flag — the story performs itself. This is fundamentally different from a book or video because the student built a machine that tells the story autonomously.", "c": "end"}, {"t": "Seesaw", "d": "During weekly literacy lessons, students photograph their partner/group story creations (Lego, playdough, felt board) and add a voice recording explaining the beginning, middle and end of their story.", "c": "middle"}, {"t": "GarageBand", "d": "Students create a 30-second soundscape for their story using only sound effects and music (no words), then play it for a partner who has to guess what the story is about. This explores a completely different way stories are shared — through sound alone — and couldn't happen without audio layering tools. Connects directly to the central idea that stories are shared in different ways.", "c": "middle"}, {"t": "Seesaw", "d": "Students use the camera and drawing tools to create a 'Before I Knew' page showing what imagining stories together looks like to them right now — using pictures, labels and voice recording to capture their starting understanding.", "c": "beginning"}, {"t": "Book Creator", "d": "The teacher places QR codes around the room. Each code opens a Book Creator page with a story told in a completely different way — one is just audio narration, one is only photographs with no words, one is a drawn comic strip, one is a video of someone acting it out. Students scan and experience all four, then vote on which told the story best — discovering that the same story feels completely different depending on how it's shared.", "c": "beginning"}, {"t": "Padlet", "d": "Students post a photo or drawing of their favourite story (a book, a movie, a song, a game they play at home) to a shared Padlet wall with a voice recording explaining why it's a story. The class gathers around the screen and the teacher sorts the posts together — discovering that stories don't just live in books, they're in movies, songs, games, family memories and all around us. The wall stays up all unit as a living reference.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about imagining stories together.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Prep", "th": "How We Organise Ourselves", "ci": "Everyone has a role to play in the community.", "lo": "My communities; Contributing to the local community; Connections in my community", "s": [{"t": "Green Screen", "d": "Students dress up as different school community members (teacher, librarian, office staff, grounds crew) and film themselves in front of the green screen placed in the actual school locations where those people work — the library, the front office, the garden. Each student explains what their community role does and why it matters, creating a 'Meet Our School Heroes' video that could be played at the next school assembly or shown to new Prep families.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a 'Community Heroes' news report — filming interviews with real school staff members (the librarian, office manager, grounds crew) asking 'What is your role and why does it matter?', then editing the clips together with a student anchor introducing each segment. The finished news report is played at assembly, showcasing the community helpers they investigated during the Week 1 photo walk.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code a Scratch Jr animation showing 'A Day in Our Community' where different characters (teacher, crossing guard, librarian, parent helper) appear on screen and perform their role — the teacher opens a book, the crossing guard stops traffic, the librarian shelves books. When all characters have performed, a final screen says 'Everyone has a role to play!' — the central idea brought to life through code.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph community helpers during school activities and narrate how each person's role contributes to the community, building on the mind map of 'people we know in our school community'.", "c": "middle"}, {"t": "Beebots", "d": "Students program Beebots to visit different 'community role' stations on a class-made mat, explaining at each stop what that community member does and why their role matters.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw or photograph an example of my communities from their everyday life, then record a voice note explaining how it works — building a class collection of real-world connections before the inquiry begins.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph examples of contributing to the local community around the school or home and create a Book Creator page sorting them into categories, with voice recordings explaining their grouping — practising the classification skills they will develop in the unit.", "c": "beginning"}, {"t": "Google Maps", "d": "Students explore the streets around Elsternwick on Google Maps Street View, spotting community helpers and services (the fire station, the library, shops, the school). They take screenshots of places they recognise and the teacher builds a class collection on the board — discovering that their community is full of people playing roles they might not have noticed before.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about my communities.", "c": "middle"}, {"t": "Padlet", "d": "Students pin significant locations on a shared Padlet Map connected to my communities, adding photos, descriptions and personal connections — creating a collaborative class map that makes geographic learning visible.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Prep", "th": "How the World Works", "ci": "Scientists follow a method to discover new things.", "lo": "The scientific process; Observing my world; Drawing conclusions", "s": [{"t": "iMovie", "d": "Students produce a 'Junior Scientists' documentary where each group films themselves conducting one experiment from the unit (the ice cube melting test, the ramp surface test, the Nature Detective Walk observations) — using slow-motion to capture the moment of change, adding narration explaining their prediction vs what actually happened, and delivering a 'scientist's conclusion' to camera. The class watches all documentaries together as a mini film festival.", "c": "end"}, {"t": "Sphero", "d": "Students design a 'Sphero Science Lab' challenge — building obstacle courses from different materials (cardboard ramps, fabric tunnels, plastic bridges) and programming Sphero to roll through each section. They predict which materials will slow Sphero down the most, run the test, film it in slow motion, and compare predictions vs results — presenting their findings as a live demonstration where classmates can try the course themselves.", "c": "end"}, {"t": "GarageBand", "d": "Students create a 'Sounds of Science' audio guide for the class science display — recording narrated explanations of each experiment with sound effects (bubbling for the melting test, rolling sounds for the ramp, bird calls for the Nature Walk). The audio guide is played through a speaker as visitors explore the display, transforming a static poster exhibition into an immersive listening experience that couldn't exist without audio production tools.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph each step of the scientific process during hands-on investigations (predicting, testing, observing) and use drawing tools to label the sequence, connecting to their 'Chart of a Scientist' class display.", "c": "beginning"}, {"t": "Beebots", "d": "Students program Beebots to follow a sequenced path representing the scientific method steps (Question → Predict → Test → Observe → Conclude), mirroring the process practised during nature walk and ramp experiments.", "c": "beginning"}, {"t": "Sphero", "d": "Students roll Spheros across different ramp surfaces during their scientific investigations, observing how the ball's speed and direction change when they alter materials and angles, connecting the predict-test-observe steps of the scientific method explored throughout the unit.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the scientific process, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about the scientific process.", "c": "middle"}, {"t": "Micro:bit", "d": "Students use micro:bit temperature sensors to measure how warm or cold different materials feel (metal vs wood vs fabric vs plastic), displaying readings on the LED screen and comparing numbers — discovering that their sense of touch can be checked with a real scientific instrument, connecting to the unit's focus on observable properties of materials.", "c": "middle"}, {"t": "Padlet", "d": "Students contribute to a shared Padlet Map by pinning locations connected to the scientific process, adding images, research findings and questions — building a collaborative geographic resource the class can explore together.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 1", "th": "Who We Are", "ci": "The actions we take influence our safety and well
