ommunication conveys meaning without words, then use the class-created success criteria for self and peer assessment of the final product — inspired by the Mr Bean clips (At the Dentist, The Hairdresser) that provoked discussion about body language and facial expressions."},{"t":"Adobe Express Video Creator","d":"Students create a ‘Communication Through Time’ video exploring how modes of communication have developed to meet specific needs, featuring their research into Morse code, Braille and Auslan from Library sessions, the Ancient Egyptian hieroglyphics explored in Visual Art, and music signs and symbols (dynamics, tempo, legato/staccato) that composers use to direct performances."},{"t":"Micro:bit","d":"Students build a micro:bit 'Communication Signal Generator' — programming it to send coded messages (Morse code patterns using the LED matrix, or light flashes) to a partner's micro:bit using the radio feature. Partners decode the message without speaking, then discuss: how is this different from speaking? From writing? From a phone call? The hands-on experience of encoding and decoding a message builds the unit's central idea that different communication methods have different features — and that the method shapes how effectively a message is received."},{"t":"GarageBand","d":"Students compose a short piece using dynamics and articulation (legato/staccato) to communicate different emotions without words, connecting to the music focus on how composers use signs, symbols, tempo and dynamics to shape expression — and the role of the conductor in interpreting and communicating musical ideas."}]},{"ca":"St Kilda","yl":"Year 3","th":"How the World Works","ci":"Materials behave and interact in certain ways, which poses challenges and solutions","lo":"The three states of matter and their properties; How matter changes states depending on particles, temperature and energy; Responsible and ethical use of materials like glass and plastic","s":[{"t":"Microsoft Forms + Padlet","d":"Students conduct a class rubbish audit using Microsoft Forms to record waste by category — plastic, glass, paper, organic, metal — the exact materials the unit asks them to evaluate for responsible and ethical use. Forms auto-generates bar charts from the tally data instantly, making it visible which materials are most wasteful without needing manual graphing. Students compare findings across classes on Padlet, then connect the data to the unit's inquiry into responsible material use — proposing one realistic change the school could make. The audit turns an abstract ethical question into a school-specific, evidence-based argument.","docKey":"doc_rubbish_audit","ref":[{"label":"DT Hub: Rubbish Recording & Reduction lesson plan","url":"https://www.digitaltechnologieshub.edu.au/teach-and-assess/classroom-resources/lesson-ideas/rubbish-recording-and-reduction-part-1/"}]},{"t":"iMovie + Scratch + Freeform","d":"Students produce an iMovie 'Materials Lab' episode where they film their best states of matter experiment with slow-motion capture of the state change moment, overlay particle behaviour animations from their Scratch simulation, and deliver scientific explanations using vocabulary from their Freeform thinking boards — creating a documentary that makes invisible particle behaviour visible."},{"t":"Lego Spike","d":"Students build a Lego Spike 'State Change Detector' that uses the temperature sensor to monitor their ice cube melting experiment in real time, programming the motor to trigger a flag when the melting point is reached — presenting their automated experiment alongside measured data showing how adding variables (salt, sugar, sand) affected melting rates."},{"t":"Tinkercad","d":"Students design a 3D model in Tinkercad of their chocolate-making flow chart as a physical production line with stations for each state change (solid cocoa → melted liquid → moulded solid), showing how responsible and ethical use of materials connects to understanding reversible and irreversible changes — a design that could be 3D printed as a teaching model."},{"t":"Micro:bit","d":"Students use micro:bit temperature sensors to collect data during the ice cube melting experiment — tracking how quickly ice melts on different material surfaces (glass, metal, wood, plastic) and recording readings at one-minute intervals. The digital data makes the difference between materials' thermal conductivity measurable and comparable rather than just observable. Results across different groups are compiled into a class dataset, revealing patterns in how material properties affect heat transfer — connecting the hands-on experiment to the unit's inquiry into responsible use of glass and plastic."}]},{"ca":"St Kilda","yl":"Year 3","th":"How We Organise Ourselves","ci":"Ethical decision making supports online choices.","lo":"How choice of action and reaction affects others online; How informed choices can make a positive difference; Our right to feel safe online and the responsibility to make ethical decisions","s":[{"t":"Padlet","d":"Students create an anonymous 'dataselfie' on a class Padlet — posting 5 things they've searched online, 4 things they've liked, 3 videos they've watched, 2 places they've visited with a phone, and 1 person they've messaged. With names hidden, the class then tries to identify who each post belongs to based solely on the data. The moment students realise they can be identified from their digital habits — with no name attached — is the unit's most powerful ethical provocation: every online action leaves a trace, and informed choices about what we share directly affect our right to feel safe online.","ref":[{"label":"Hello Ruby: Dataselfie activity","url":"https://www.helloruby.com/play/27"}]},{"t":"Scratch","d":"Students code an interactive choose-your-own-adventure about online safety where choices lead to different ethical outcomes, building on the Cyber Safety Project lessons and the Timon and Pumbaa Safety Smart video — demonstrating understanding that things posted online are there forever and that informed choices can make a positive difference."},{"t":"Canva Video","d":"Students produce a cyber safety awareness video demonstrating responsible online behaviour, using scenarios from the Cyber Safety Project lessons and real examples of ethical choices — connecting to the traffic light self-assessment where students evaluated how well they follow the Essential Agreement, and the student-initiated action of teaching siblings about being safe online."},{"t":"Canva Presentation","d":"Students design a digital citizenship guide showing the Online Essential Agreement they collaboratively created, with scenarios demonstrating ethical decision-making for different online situations — incorporating perspectives from the homework task where families discussed online usage and the class categorisation of apps/websites into communication, information and recreation."},{"t":"Kahoot","d":"Students create an online safety quiz testing peers on ethical digital scenarios, incorporating questions about when to alert a teacher (like the student who reported a pop-up at home), how to evaluate trustworthy sources, and the difference between responsible and irresponsible online choices — used as a review tool connecting to the Principled Learner Profile focus."}]},{"ca":"St Kilda","yl":"Year 3","th":"Sharing the Planet","ci":"People can respond to natural disasters with resilience","lo":"The causes and types of natural disasters (tectonic events, weather events); How natural disasters impact the environment and people; How humans respond with resilience and connection","s":[{"t":"iMovie + Green Screen","d":"Students produce a news-style documentary report about their researched natural disaster using green screen to ‘report live’ from the location, incorporating behind-the-news style presentation of tectonic plates, the science of tsunamis, and how bushfire management connects to Indigenous cool burns vs European practices — referencing the BTN episodes and the poem ‘My Country’ by Dorothea Mackellar they learned."},{"t":"Micro:bit","d":"Students use micro:bit accelerometers to create a simple earthquake detection model, programming it to display an alert when shaking is detected above a threshold — connecting to their research about how Japan measures earthquakes and uses early warning systems, and the class discussion about whether natural disasters can be prevented."},{"t":"Canva Presentation","d":"Students design a natural disaster newspaper-style report about a well-known event they researched (Cyclone Tracy, Boxing Day Tsunami, Christchurch earthquake), incorporating the SPO note-taking structure, their classification of disasters into tectonic events (earthquakes, volcanoes, tsunamis) and weather events (cyclones, tornadoes, floods, bushfires) — and how communities respond with resilience, drawing on the Japan case study about earthquake preparation."},{"t":"Book Creator","d":"Students create a ‘Natural Disaster Survival Guide’ featuring their earthquake backpack sorting activity, the Japan earthquake preparation research (from Japanology videos and the PowerPoint), flood fact files, and their design comprehension work on building for disaster-prone environments — connecting to the student-initiated action of incorporating disaster-resistant features when designing buildings in the WWAIPAT city unit."},{"t":"Seesaw","d":"Students document their volcano investigation experiment and natural disaster science experiments with step-by-step photos and annotations, recording their self-assessment reflections (‘What have I done well? What am I proud of? What could I improve?’) and sharing peer feedback on their newspaper articles and disaster-resistant building designs."}]},{"ca":"St Kilda","yl":"Year 4","th":"Who We Are","ci":"Leaders can help a group to function effectively","lo":"Roles and responsibilities of effective leadership; Purpose of leadership; The strengths and qualities of a leader","s":[{"t":"Canva Video","d":"Students create a leadership portfolio application video pitching why they should be selected for their chosen leadership role, incorporating the attributes of an effective leader identified during the class brainstorm (displayed on the person outline), demonstrating how they embody the ROAR values developed in the Essential Agreement, and referencing what they learned from the staff portfolio presentations about each role's responsibilities."},{"t":"Delightex (CoSpaces)","d":"Students build an interactive 3D 'Leadership Showcase' in CoSpaces where visitors walk through exhibit rooms for each leader from the 'Little People, Big Dreams' research, clicking on objects to trigger recorded presentations about leadership qualities, purpose, and impact — creating a virtual exhibition that brings their independent research to life."},{"t":"Canva","d":"Students design a leadership attributes presentation showcasing the qualities identified through the collaborative brainstorm and Lucky Dip popsicle activity, explaining why each attribute is important for effective leadership with real examples from the Cross Campus Leadership Day, the Anthony Albanese provocation discussion, and their own experience fulfilling their portfolio role throughout the year."},{"t":"Freeform","d":"Students use Freeform to map how their Year 4 student leadership council connects to the real leadership structures studied during the unit — school captains, community leaders, historical figures. They identify which leadership qualities appear in their own council, which responsibilities match, and where the gaps are. The collaborative map becomes a mirror: students see their own leadership experience reflected against the unit's inquiry into roles, responsibilities and the purpose of leadership in communities."},{"t":"Microsoft Forms","d":"Students design and conduct a class survey in Microsoft Forms gathering perspectives on roles and responsibilities in leadership — asking classmates what qualities they value most in a leader, what responsibilities they think student leaders should have, and whether they feel represented by their school's leadership structures. After collecting and analysing responses, each student compares the class data with their research on historical and community leaders, identifying where their peers' expectations match and diverge from what effective leadership actually requires. The survey design process forces students to operationalise the unit's leadership concepts as measurable questions."}]},{"ca":"St Kilda","yl":"Year 4","th":"Where We Are in Place and Time","ci":"Exploration and discovery have led to changes that shape the world we live in","lo":"The age of exploration and the reasons explorers set out on their journeys; How Australia changed through European arrival; Different perspectives on the consequences of exploration","s":[{"t":"CoDrone EDU","d":"Students program a CoDrone EDU to navigate a floor map tracing the actual Age of Exploration routes — flying from Spain toward the Americas, rounding the Cape of Good Hope, or crossing the Pacific. At each waypoint they must recalculate and reprogram, experiencing firsthand why explorers had to plan meticulously, adapt to the unexpected, and navigate with incomplete information. The drone mission connects coding to the unit's inquiry into the reasons for exploration and the consequences of reaching new lands — including whose lands they were."},{"t":"Google Earth + Seesaw","d":"Students plot the journeys of the explorers they researched using the laminated cards, tracing routes from Europe to Australia and other destinations during the Age of Exploration (14th–16th century), adding location pins with key facts from their Seesaw research task, and comparing the historical maps they ordered from oldest to newest in the Tune In activity with modern satellite imagery of the same regions."},{"t":"Scratch","d":"Students create an interactive timeline animation showing the Age of Exploration, programming explorer sprites to move along their routes with pop-up information cards displaying key facts gathered from the Inquisitive video and laminated card research, helping them visualise the sequence of discoveries and the connections between different explorers' journeys."},{"t":"Book Creator","d":"Students create an 'Explorer Investigation' digital book presenting their independent research into a chosen explorer, structured around the who/what/when/why framework from the laminated card research task, including maps tracing the explorer's journey, key dates and discoveries, and their extended paragraph written from TWR note-taking, demonstrating their ability to turn research notes into clear, coherent writing."},{"t":"Adobe Express Character Animator","d":"Students choose a character in Adobe Express Character Animator to represent a historical figure from the Age of Exploration — an explorer, an Indigenous Australian at the time of first contact, or a settler — and record their first-person account. The character animates to their voice with a historically appropriate background, and students deliberately choose whose perspective to voice, then compare how the same events look completely different depending on the character chosen. The unit's key LO — different perspectives on the consequences of exploration — comes alive when students hear the same event voiced by opposite sides."}]},{"ca":"St Kilda","yl":"Year 4","th":"How We Express Ourselves","ci":"The creative process involves understanding and applying artistic elements to communicate ideas and emotions across disciplines","lo":"How colour, movement and music communicate character and mood; The creative process of making a multi-disciplinary presentation; The effort and commitment required to produce a live performance","s":[{"t":"Scratch + GarageBand","d":"Students code an interactive 'Beijing Opera Performance Guide' in Scratch where visitors click on character type sprites (clown, warrior, villain, scholar) to trigger animations showing how colour, movement and costume communicate character and mood — connecting their GarageBand musical compositions, mask designs and partnership vignette performances into one interactive experience."},{"t":"Canva Video","d":"Students film and edit their Beijing Opera partnership vignette performance featuring their chosen character (clown, warrior, villain or female character), incorporating their hand-painted character mask, scripted backstory, exaggerated mime movements and body acting, and musical ensemble accompaniment, then adding a narrated reflection explaining how their colour choices express their character's personality traits as studied in Chinese class."},{"t":"Canva","d":"Students design a comparative presentation exploring the meaning of colours across different cultures studied in Chinese class, connecting their findings to the colour choices made for their Beijing Opera mask, and showing how the same colour can express different character traits and personalities depending on cultural context, drawing on the See-Think-Wonder observations about why Beijing Opera masks are so exaggerated."},{"t":"GarageBand","d":"Students compose and record their musical ensemble piece for the Beijing Opera performance in partnership groups, experimenting with tempo and dynamics to create mood and introduce their character, building on Year 3 skills of using tempo and dynamics to create drama in music, and selecting instruments that match the tradition of Chinese opera as explored during the Find Out phase."},{"t":"Adobe Express Character Animator","d":"Students choose a character in Adobe Express Character Animator inspired by the Beijing Opera unit — selecting bold colours that communicate the character's role (red for loyalty, white for treachery, black for integrity) and recording their voice performing a short monologue in character. The animation syncs to their voice automatically; they add music and a stage background. The finished piece demonstrates the unit's central idea directly: that colour, movement and music work together to communicate character and mood, with every artistic choice deliberate and justifiable."}]},{"ca":"St Kilda","yl":"Year 4","th":"How the World Works","ci":"Engineers design and build structures using specific features and materials to make them strong, stable and fit for purpose","lo":"Different types of bridges and their design features; How materials and engineering principles contribute to structural strength and stability; Testing and refining designs through experimentation","s":[{"t":"CoDrone EDU + Micro:bit","d":"Students program a CoDrone EDU to perform a controlled flyover inspection of all bridge designs displayed around the classroom, capturing aerial footage that reveals structural features from above — arch shapes, truss triangulation, tower positioning. They then present the drone footage alongside micro:bit load-testing data, explaining how beam, truss and suspension designs distribute forces differently. The aerial perspective combined with real-time digital measurement creates a multi-modal engineering analysis that goes beyond what physical inspection alone can show."},{"t":"Tinkercad + Seesaw","d":"Students create a 3D digital model of their bridge design, applying knowledge of beam, truss and suspension bridge features learned during the Seesaw research task, demonstrating how appropriate design features and materials ensure structural stability, and comparing their refined digital design with the physical bridge they constructed with their partner during the Building Bridge Challenge."},{"t":"Lego Spike","d":"Students build a motorised Lego Spike drawbridge or lifting mechanism as an extension of the Building Bridge Challenge — programming the motor to raise and lower at specified intervals while testing structural integrity under load. The challenge introduces variables the physical bridge didn't have: timing, motor power, mechanical advantage. This prompts students to revisit how engineering features affect both stability and function, connecting directly to the Tacoma Bridge Collapse analysis where unanticipated variables caused catastrophic failure."},{"t":"Micro:bit","d":"Students program a Micro:bit sensor to measure and digitally display the load placed on their bridge during testing, replacing the manual coin-counting method with digital data collection that records each addition, and comparing results across different bridge designs to identify which engineering features (beam, truss, suspension) contributed most to stability and load-bearing capacity."},{"t":"Canva","d":"Students design a bridge redesign presentation showing their See Think Wonder observations from the Tune In provocation, their Tacoma Bridge Collapse analysis identifying design flaws, their own bridge's coin-testing performance data, and annotated photographs explaining the engineering features they incorporated and the specific modifications they would make to improve load-bearing capacity based on what they observed during whole-class bridge testing."}]},{"ca":"St Kilda","yl":"Year 4","th":"How We Organise Ourselves","ci":"Not-for-profit organisations exist to respond to a variety of needs within our community","lo":"The function and purpose of not-for-profit organisations; How not-for-profit organisations respond to community needs; Our responsibility to take action and make a difference","s":[{"t":"Scratch","d":"Students code an interactive 'NFP Impact Explorer' in Scratch where visitors click on organisation sprites to see animated demonstrations of how each not-for-profit responds to community needs — featuring data from their partner research into two NFP organisations and connecting to their group's community action journey."},{"t":"Canva Video","d":"Students create a short documentary showcasing their group's community action journey from identifying the big issue through to organising their contribution drive, including interviews with group members explaining why they chose their particular action, footage of their Junior School classroom visits promoting the different actions, and their Great Space display where contributions were collected, celebrating that the cohort raised over $1,500 plus 200 cans and 250 books."},{"t":"Canva","d":"Students design promotional flyers and posters for their chosen community action (OzHarvest 50-cent meal donations, St Kilda Mums collection, Lions Club book drive, ARDOCH tinned food drive, or artwork sales with Prep students), incorporating the persuasive action slogans developed in class, formatted to contribute to the flyer quilt of actions displayed and distributed across the Junior School."},{"t":"Microsoft Forms","d":"Students create a peer and self-assessment survey for their collaborative group work during the action planning phase, rating teamwork skills after each session and formulating individual and group goals for the next session as referenced in the planner's ongoing assessment, supporting growth in collaboration and self-management skills throughout the fundraising and collection drive experience."},{"t":"Freeform","d":"Students use Freeform to build a visual map connecting different not-for-profit organisations to the community needs they address, plotting how NFPs like OzHarvest, St Kilda Mums and Sacred Heart Mission respond to the big issues identified during group research."}]},{"ca":"St Kilda","yl":"Year 4","th":"Sharing the Planet","ci":"First Nations people have a deep connection to Country, language and culture","lo":"The diversity of language and culture across First Nations communities in Australia; The significance of connection to Country as custodial responsibility; Listening to and learning from Indigenous perspectives","s":[{"t":"Delightex (CoSpaces) + Canva","d":"Students build an interactive 3D 'Connection to Country' virtual experience in CoSpaces where visitors walk through landscapes representing the indigenous countries they researched (such as the Arrernte and Boon Wurrung), clicking on elements to hear recorded explanations about connection to Country, language diversity, and cultural significance — incorporating their acrylic canvas painting and artist's statement."},{"t":"Canva Video","d":"Students create a documentary about their understanding of First Nations connection to Country, incorporating footage and reflections from the Melbourne Museum First Nations exhibition excursion, their soundscape performances representing pages from 'Australia from Dawn to Dusk' by Brentos, and narration explaining the concept of Country as custodial responsibility rather than ownership, as defined during the Tune In phase."},{"t":"DJI Drone (teacher-operated) + Canva","d":"DLP captures aerial footage of the school grounds and local environment before and after the Melbourne Museum excursion, providing a bird's-eye perspective of Country that students compare with the Khatija Possum canvas painting style and the 'Australia from Dawn to Dusk' soundscape imagery studied during the unit."},{"t":"Seesaw","d":"Students use Seesaw to compile their Venn diagram research comparing three different First Nations communities — recording voice annotations explaining the connections and distinctions they found between communities' relationships to Country, language, and kinship structures. The voice recording layer is critical: students must articulate in their own words why the similarities and differences matter, moving beyond surface comparison to genuine understanding. The completed Seesaw entries become the formative assessment evidence for the unit's inquiry into the diversity of First Nations peoples across Australia."},{"t":"GarageBand","d":"Students collaborate in groups to create their soundscape representing a page from 'Australia from Dawn to Dusk', experimenting with digital instruments and recorded sounds to evoke a specific time of day, Australian animals, scenery and location, building on the musical decision-making practised during Sort Out where groups chose how to represent the landscape and atmosphere of their assigned page."}]},{"ca":"St Kilda","yl":"Year 5","th":"Who We Are","ci":"Values, beliefs and actions contribute to a diverse society","lo":"How our values and beliefs shape our identity and interactions; Our responsibility to manage emotions and be safe online and in person; The importance of resilience, respect and positive relationships in a diverse community","s":[{"t":"Scratch","d":"Students code an interactive 'Digital Citizenship Simulator' in Scratch where players navigate online scenarios from the 16 CyberSafety lessons and must make ethical choices — each decision triggers animated consequences showing how values, beliefs and responsible digital actions contribute to a diverse and safe society, connecting to their URStrong and Grow Your Mind program learning."},{"t":"Canva Video","d":"Students produce a wellbeing strategies video demonstrating key concepts from the Grow Your Mind program (the animals in your brain) and URStrong friendship fire resolution techniques, role-playing scenarios that show the difference between social misunderstandings and purposeful hurtful behaviour, and explaining what resilience looks like in their own lives using examples from camp, the Future Thinkers' Forum and everyday school interactions."},{"t":"Canva","d":"Students design a 'CyberSafety Golden Rule' infographic presenting the personal online safety rule they created during the Cyber Safety Project, incorporating strategies learned across the 16 CyberSafety lessons about responsible technology use, being an upstander, recognising online scams, and protecting personal information, with visual examples of how to apply their rule in real scenarios."},{"t":"Kahoot","d":"Students create interactive quizzes for their peers based on key concepts from the 16 CyberSafety lessons and 11 URStrong sessions, testing classmates' knowledge of online safety strategies, friendship fire resolution techniques, upstander behaviours, and the difference between values, beliefs and actions, reinforcing learning through peer-teaching during the Find Out phase."},{"t":"Freeform","d":"Students use Freeform to collaboratively map how stereotypes and social norms they've encountered — in media, at school, in the Famous People research — form, persist, and can be challenged. Each student adds branches connecting a stereotype they've studied to its origin, the groups it affects, and at least one example of someone who broke it. The collaborative canvas grows into a class-built critique of social pressure, grounding the unit's central inquiry in specific, named examples rather than abstract principles."}]},{"ca":"St Kilda","yl":"Year 5","th":"Where We Are in Place and Time","ci":"Colonisation has had a lasting impact on different countries and their people","lo":"The reasons, methods and impact of colonisation; How colonisation transformed society and culture; The responsibility of colonisers and the perspectives of those colonised","s":[{"t":"Scratch","d":"Students code an interactive 'Perspectives on Colonisation' simulation in Scratch where visitors click on different character sprites (coloniser, indigenous elder, settler, modern historian) to hear recorded perspectives on the same event — demonstrating how colonisation is understood differently depending on point of view, connecting to their note-taking and summarising research."},{"t":"Canva Video","d":"Students produce a documentary presenting their research into the colonisation of a chosen country, incorporating the note-taking and summarising skills developed during the Australian History video template activity, multiple perspectives on whether European arrival constituted exploration or invasion (building on Year 4 WWAIPAT learning), and reflections connecting to Tom Appleby's memories from the class novel 'Convict Boy'."},{"t":"CoDrone EDU","d":"Students program a CoDrone EDU to navigate a floor map tracing colonisation routes — from Britain to Australia, from Europe to Africa, from Spain to the Americas. At each waypoint they encounter a decision card: how did the colonisers treat the people already living here? What changed? Students reprogram the drone based on their decision, experiencing how colonisation was not a single inevitable event but a series of choices with lasting consequences — connecting the physical route to the unit's central idea about lasting impact."},{"t":"Pico VR","d":"Students use Pico VR to explore historical sites and environments connected to British colonisation, virtually visiting locations referenced during the ClickView Terra Nullius viewing and the Convict Boy class novel, building contextual understanding before completing their British colonisation mini SAT and oral presentations with peer assessment."},{"t":"Adobe Express Character Animator","d":"Students choose a character in Adobe Express Character Animator to voice a perspective on colonisation — an Indigenous Australian at the time of first contact, a coloniser, or a present-day descendant reflecting on lasting impact. Recording their first-person account with a historically grounded background, the animation syncs to their voice automatically. The class collection of animated perspectives — voiced by the same students, but from opposite sides — becomes a powerful demonstration of the unit's central idea: that colonisation transformed society and culture differently depending on whose story is being told."}]},{"ca":"St Kilda","yl":"Year 5","th":"How We Express Ourselves","ci":"Social norms and stereotypes can influence the way people express themselves","lo":"How stereotypes and social norms form and persist in society; The impact of discrimination, prejudice and assumptions on individuals and communities; How people overcome stereotypes to express themselves and inspire change","s":[{"t":"Scratch","d":"Students code an interactive 'Breaking Stereotypes' choose-your-own-adventure in Scratch where players encounter stereotype scenarios and must decide how to respond — each choice triggers animated consequences showing how challenging social norms creates positive change, connecting their rights activist research to an experience that puts players in the shoes of someone facing discrimination."},{"t":"Adobe Express Video Creator","d":"Students create a short awareness video inspired by the student-initiated posters and slogans displayed in the classroom, presenting scenarios from the Stereotypes Scenarios activity and demonstrating how discrimination, prejudice and assumptions can be forms of disrespect, drawing on what they learned from the guest manga illustrator speaker about how art can convey powerful messages that challenge social norms."},{"t":"GarageBand","d":"Students compose original soundtracks or jingles in GarageBand to accompany their awareness posters and slogans for the student action campaign against stereotypes, selecting instruments and moods that reinforce their message, inspired by the media techniques analysed during the Graffiti Article discussion and Famous People Infographics research."},{"t":"Canva","d":"Students design their Famous People Infographic using the PowerPoint template structure, presenting research into a person who overcame a stereotype, prejudice, discrimination or social norm and paved the way for others, including key facts about what they faced, how they expressed themselves despite barriers, and their lasting impact on society, ready for sharing in mixed small groups during the peer feedback sessions."},{"t":"Freeform","d":"Students use Freeform to collaboratively map how stereotypes and social norms form and persist in society, connecting examples from their Gallery Walk See-Think-Wonder provocation, rights activist research, and student action campaign planning — building a visual analysis of how discrimination, prejudice and assumptions interconnect."}]},{"ca":"St Kilda","yl":"Year 5","th":"How the World Works","ci":"Inventions and initiatives are a response to the changing needs of society","lo":"How inventions have changed over time to meet the demands of society; The UN Sustainable Development Goals and the global problems they address; Using the design thinking process to create innovations that respond to real-world needs","s":[{"t":"Scratch","d":"Students code an interactive 'Changed Over Time' museum in Scratch where visitors click on invention category sprites (household, transport, communication, medicine) to see animated timelines showing how each invention evolved to meet changing societal demands — connecting their decades research T-Chart data to an interactive exhibition visitors can explore and compare across eras."},{"t":"Canva Video","d":"Students produce a Shark Tank-style invention pitch video presenting their group's SDG-connected invention to a panel, explaining which Sustainable Development Goal it addresses, how they followed the d:school design process (Empathise, Define, Ideate, Prototype, Test), what need in society it responds to, and how it works, incorporating feedback received from peers and families at the Future Thinkers' Forum stalls."},{"t":"Lego Spike","d":"Students build motorised invention prototypes using Lego Spike during the Light Boxes and STEAM lab sessions with Stefan, applying the d:school design process (empathise, define, ideate, prototype, test) to create working models that address an SDG challenge identified during the SDG ordering, grouping, and T-chart activities."},{"t":"CoDrone EDU","d":"Students explore drone technology as a modern invention during the Changed Over Time decades research, programming CoDrone EDU flight paths to demonstrate how innovations build on each other as explored in 'Everything is a Remix', and investigating how drones connect to specific SDGs such as sustainable agriculture or disaster response."},{"t":"Micro:bit","d":"Students program micro:bit sensors to collect environmental data (temperature, light, sound) as part of their invention prototypes during the STEAM lab sessions with Stefan, connecting sensor technology to SDG solutions and presenting their data at the Future Thinkers' Forum alongside their design process booklets."}]},{"ca":"St Kilda","yl":"Year 5","th":"How We Organise Ourselves","ci":"Goods and services are exchanged within a marketplace","lo":"The production of goods from raw materials through manufacturing to consumer; The exchange of currency for goods and services in a functioning economy; Ethics and responsible decision-making in the marketplace","s":[{"t":"Scratch","d":"Students code an interactive 'Suburb Simulation' economics game in Scratch where players manage a business within a virtual marketplace — buying raw materials, manufacturing products, setting prices and serving customers — with supply and demand mechanics that dynamically change prices, connecting to their real suburb simulation experience and demonstrating how ethics and responsible decision-making affect marketplace success."},{"t":"Microsoft Excel","d":"Students manage their suburb simulation personal budget using the pre-coded spreadsheet with formulas, tracking their startup bonus, role salary payments, fines, rent, utilities and business income/expenses, performing scheduled and surprise reconciliations of receipts against their spreadsheet entries, and analysing profit and loss to make informed decisions about pricing, supply and demand in their student-run businesses."},{"t":"Canva","d":"Students design professional business proposal presentations for their student-created businesses within the suburb simulation, including their business name and logo, the goods or services offered, pricing strategy informed by supply and demand principles learned through Sam's Soccer Ball Factory activity, and their ethical business practices, ready for presentation at city meetings where peers evaluate and provide feedback."},{"t":"Microsoft Forms","d":"Students design customer satisfaction surveys for their student-run businesses within the suburb simulation, gathering peer feedback on product quality, pricing fairness and ethical practices, then analysing the response data during city and suburb meetings to make evidence-based decisions about improving their goods and services and adjusting their business strategies for the next trading session."},{"t":"Seesaw","d":"Students complete the unit evaluation reflection task documenting what they learned about how supply and demand drive an economy, how ethics affect business success (referencing specific examples from their suburb trading experiences such as adjusting prices based on customer demand), and how managing a real budget with spreadsheets helped them understand the connection between consumer behaviour and the marketplace."}]},{"ca":"St Kilda","yl":"Year 5","th":"Sharing the Planet","ci":"Communities interact with the environment in different ways","lo":"How community values shape the management of the natural environment; The need for conservation and environmental stewardship; Ways in which First Nations land management practices can drive positive environmental change","s":[{"t":"Micro:bit","d":"Students build a working soil moisture sensor for the WesMob kitchen garden or a classroom pot plant — programming a BBC micro:bit with two nails and crocodile clips to read soil conductivity and display a moisture level on the LED matrix. They set a threshold below which the micro:bit triggers an alert, warning the class the garden needs water. Students then investigate different planting zones around the school, collecting and comparing data to propose a sustainable watering schedule. The sensor makes the invisible visible — real conductivity data from real soil — connecting directly to the unit's inquiry into how community values shape environmental stewardship, and reflecting First Nations land management principles of caring for Country through close, attentive observation.","docKey":"doc_cser_microbit","ref":[{"label":"MakeCode: Plant Watering Tutorial","url":"https://makecode.microbit.org/projects/plant-watering"},{"label":"MakeCode: Soil Moisture Probe Tutorial","url":"https://makecode.microbit.org/projects/soil-moisture"}]},{"t":"Scratch + Google Earth","d":"Students code an interactive 'Biome Explorer' in Scratch where visitors click on world biome sprites to see animated ecosystems showing how community values shape environmental management — incorporating satellite imagery comparisons from Google Earth, First Nations land management practices from the WesMob garden, and conservation data from the Chum Creek and ECOSS learning experiences."},{"t":"Adobe Express Website","d":"Students create a digital campaign page inspired by the Melbourne Urban Forest initiative, featuring the emails they wrote to trees around Wesley College during the Go Further phase, information about how city stewardship programs support environmental change, photographs from their ECOSS visit documenting the veggie garden, bee farm, worm farms and chickens, and their proposals for continued native planting around the school with the Environment Prefects."},{"t":"DJI Drone (teacher-operated)","d":"DLP captures aerial footage of the WesMob native garden and the Chum Creek camp surroundings, providing a bird's-eye perspective of the habitats and conservation landscapes students study during the Indigenous Land Management lessons and the ECOSS visit, giving context for their stewardship vocabulary work."},{"t":"Pico VR","d":"Students use Pico VR to explore immersive habitat environments connecting to the Habitats of the World research, virtually visiting ecosystems that contrast with the local environments observed at Chum Creek camp and the ECOSS visit, deepening their understanding of conservation and stewardship concepts before writing their Melbourne Urban Forest tree emails."}]},{"ca":"St Kilda","yl":"Year 6","th":"Who We Are","ci":"Understanding ourselves, our relationships and our wellbeing empowers us to thrive.","lo":"The recognisable features of safe and healthy interactions (Form) • The connections between emotions, behaviour, learning, interactions and goals (Connection) • The tools and skills to stay safe online and in person (Safety) • The active role we play in achieving and maintaining our wellbeing (Wellbeing) • The strategies to achieve and maintain positive relationships (Relationships)","s":[{"t":"Scratch","d":"Students code an interactive 'Wellbeing Toolkit Navigator' in Scratch where visitors select a challenge scenario (friendship conflict, online safety dilemma, emotional regulation, goal-setting) and the program guides them through the ROAR approach strategies — connecting CyberSafety golden rules, URStrong friendship tools, and Grow Your Mind techniques into one interactive resource Year 5 students can use."},{"t":"Canva Video","d":"Students produce a Year 6 wellbeing documentary combining reflections from Camp Milana and the Canberra Tour with classroom learning, illustrating how the ROAR approach, Grow Your Mind weekly offerings (Wellbeing Wednesday, Tell Yourself Tuesday affirmations), URStrong inclusion and belonging activities, and CyberSafety lessons connect emotions, behaviour, learning and interactions across their final primary school year."},{"t":"Delightex (CoSpaces)","d":"Students build an interactive 3D 'Who I Am at Wesley' virtual gallery in CoSpaces featuring their IB Learner Profile portrait drawing (half self-portrait, half strengths icons), their Camp Milana reflections, and their Canberra Tour learning — creating a walkable virtual exhibition where visitors experience how understanding ourselves empowers us to thrive."},{"t":"Mentimeter","d":"Students use live polling during URStrong and CyberSafety sessions to share anonymous responses about friendship scenarios, online safety strategies, and wellbeing check-ins, building class data on which strategies from the Grow Your Mind and CyberSafety programs students find most effective for managing emotions and staying safe."},{"t":"Adobe Express Character Animator","d":"Students create an Adobe Express Character Animator piece voicing a scenario from the unit — choosing a character and recording a short monologue showing how they would handle a difficult online or in-person interaction, applying the wellbeing strategies and communication skills explored throughout the unit. The character animates automatically to their voice; they add a relevant background and music that reflects the emotional tone. Watching the class collection of animated scenarios creates a gallery of modelled safe and healthy interactions — far more memorable than a poster or written reflection."}]},{"ca":"St Kilda","yl":"Year 6","th":"Where We Are in Place and Time","ci":"Human migration is a response to challenges, risks and opportunities.","lo":"The causes for and consequences of migration (Causation) • The changes in societies as a result of migration (Change) • The impact of migration on the individual, both positive and negative (Impact) • Migration results in a more diverse society (Diversity)","s":[{"t":"Scratch","d":"Students code an interactive 'Migration Stories' experience in Scratch where visitors click on character sprites representing the migrants and refugees they interviewed to hear recorded excerpts from the 'This is Your Life' biography, with animated push and pull factor diagrams and journey maps — creating a digital exhibition that brings human migration stories to life through interactivity."},{"t":"Canva Video","d":"Students produce their Micro Lab migration story presentation as a video, combining their interview recording with visual elements including migration route maps, the push and pull factors graphic organiser, and connections drawn to Cuc Lam's Story, the Australian Immigration History infographic, and historical events such as the Gold Rush, World Wars, and government initiatives like the Ten Pound Pom and Snowy River schemes."},{"t":"CoDrone EDU","d":"Students program a CoDrone EDU to trace the migration route of the person they interviewed for the 'This is Your Life' biography — flying from the country of origin to Melbourne, navigating the waypoints of their journey (refugee camp, transit country, arrival port). The drone encodes the human geography of migration: students must calculate distances, plan stages and adapt when routes are blocked, making the abstract push-pull factors from the unit's research into a physical, programmable experience of what migration actually requires."},{"t":"Pico VR","d":"Students use Pico VR to virtually visit countries and regions connected to the migration stories studied during the unit — the settings of Hamid's Story, Ahn Do's journey from Vietnam, and the homelands of their interview subjects — building empathy and geographic understanding before completing their This is Your Life Micro Lab presentations."},{"t":"Canva Presentation","d":"Students design their 'This is Your Life' migration presentation for the Micro Lab format, incorporating interview responses sorted into concept headings (Causation, Change, Impact, Diversity), the Define-Connect-Extend thinking routine from the tuning-in phase, and comparative analysis of similarities and differences identified when watching the Fariba and Fatima refugee video."}]},{"ca":"St Kilda","yl":"Year 6","th":"How We Express Ourselves","ci":"Understanding global issues and using effective communication empowers us to raise awareness and inspire action.","lo":"Global issues are caused by interconnected factors that require collective solutions (Causation) • Presentations in the media can reflect the perspective of the author rather than the truth (Perspective) • We must make responsible choices when responding to and creating media (Responsibility) • Messages can be expressed through a range of mediums and elements can be adjusted to enhance effectiveness (Communication) • Design choices contribute to the effectiveness of a message (Influence)","s":[{"t":"Green Screen + iMovie","d":"Students produce their PYP Exhibition media campaign film using green screen technology, combining scripted live performances with researched content about their chosen global issue, incorporating iMovie transitions and music transfers learned during production, and presenting alongside their keynote display on Exhibition sharing day."},{"t":"Adobe Express Podcasting","d":"Students produce an Exhibition podcast episode investigating their chosen global issue, structured using the MISO research method, incorporating bibliography sources curated with Katherine from the library, and drawing on insights from guest speaker Ben Lilley's media campaign expertise and the DLP-led upskilling sessions on podcast audio editing."},{"t":"GarageBand + Green Screen + iMovie","d":"Students compose original backing tracks and sound effects in GarageBand for their Exhibition live performance scripts, selecting instruments and layering audio to match the tone of their campaign message, then transferring the music to their iMovie Green Screen films as practised during the production phase."},{"t":"Delightex (CoSpaces) + Canva","d":"Students build interactive 3D Exhibition displays in CoSpaces during the DLP upskilling sessions, creating virtual environments that present their global issue research and action plans using Canva AI vibe coding to generate interactive quizzes, games, or matching exercises that engage the Exhibition audience alongside their live performance component."},{"t":"Insta360 Cam + Green Screen","d":"DLP captures 360° footage of the PYP Exhibition displays and live performances using the Insta360 camera, creating an immersive virtual gallery that preserves each group's keynote presentation, logo, campaign materials, and Green Screen film for families and the school community to revisit after Exhibition day."}]},{"ca":"St Kilda","yl":"Year 6","th":"How the World Works","ci":"The relationships between the Earth, Moon and Sun create predictable patterns that shape life on our planet and are understood through both scientific and cultural perspectives.","lo":"The movement of the Earth, Moon and Sun causes predictable patterns such as day/night, moon phases, tides and seasons (Causation) • Different cultures, including Indigenous knowledge systems, interpret the night sky in unique and meaningful ways (Perspective) • The Earth, Moon and Sun have specific structures, positions and relationships that can be represented through models and simulations (Form)","s":[{"t":"Tinkercad + Lego Spike + Micro:bit","d":"Students design a 3D model in Tinkercad of their Moon phase tracking device incorporating a rotating display mechanism, with labelled sections showing each lunar phase from their Moon Diary observations — presenting their digital design alongside their micro:bit light sensor data and Lego Spike orrery to demonstrate how Earth, Moon and Sun relationships create predictable patterns."},{"t":"Adobe Express Podcasting","d":"Students produce a space science podcast selecting a topic from the free-choice board to research and investigate, modelling their episode on podcast features identified during the listening phase, covering concepts such as Earth's rotation causing day and night, the tilted axis creating seasons, Moon phases from their two-week Moon Diary, or Indigenous astronomy stories explored through the First Inventors resources."},{"t":"Scratch","d":"Students code an interactive space simulation in Scratch modelling how Earth's rotation causes day and night, how the tilted axis creates seasons across hemispheres, or how the Moon's orbit produces the sequence of phases tracked in their Moon Diary, building on the hands-on globe and flashlight experiments and Oreo cookie modelling completed during class lessons."},{"t":"Pico VR","d":"Students use Pico VR to explore immersive solar system environments, experiencing Earth's rotation, Moon phases tracked in their Moon Diary, and the scale of the Sun-Earth-Moon system up close, extending the hands-on globe and flashlight simulation into a 360° experience and connecting to the cultural astronomy perspectives from the First Inventors resources."},{"t":"Lego Spike","d":"Students build a motorised Lego Spike orrery demonstrating how Earth's rotation causes day and night and how the Moon orbits Earth to produce the phases they recorded in their Moon Diary, programming the motor speeds to show relative orbital periods and presenting their working model during the Lesson 8 gallery walk showcase."}]},{"ca":"St Kilda","yl":"Year 6","th":"How We Organise Ourselves","ci":"The way a country is governed impacts the lives of citizens.","lo":"The key institutions and functions of Australia's democratic system of government (Function) • How government decisions impact citizens at federal, state and local levels (Causation) • The rights and responsibilities of Australian citizens and their obligations as global citizens (Equality/Citizenship)","s":[{"t":"Canva Video","d":"Students produce a Canberra Tour documentary combining footage and reflections from visits to Parliament House, the High Court, Australian War Memorial, Museum of Australian Democracy, National Capital Exhibition, and the Embassy Tour, narrating how each institution connects to the three levels of government, the 4 Roles of Parliament, and the lines of inquiry explored throughout the unit."},{"t":"Adobe Express Podcasting","d":"Students produce a civics podcast episode debating a governance topic such as the Under-16 Social Media Ban, structured around the pros and cons brainstormed in table groups, incorporating vocabulary from the PEO 'What is Parliament?' video and the 4 Roles of Government lesson, and citizenship rights and responsibilities explored through the ClickView Australian Citizenship video and 'We Are Australian 2025' reading comprehension."},{"t":"CoDrone EDU","d":"Students investigate Australian drone regulations as a real-world civics case study, researching which level of government (federal CASA rules vs local council restrictions vs state laws) controls airspace, then programming CoDrone EDU flight paths within permitted boundaries, connecting to their exploration of how the three levels of government divide responsibilities and their Bill to Parliament planning."},{"t":"Canva Presentation","d":"Students design a 'Bill to Parliament' presentation outlining their proposed law inspired by issues they are passionate about, following the parliamentary process studied through the BTN 'Passing a Bill' video, including research evidence gathered using the Bill to Parliament PowerPoint planning template, and arguments structured from the pros and cons analysis practised during the Under-16 Social Media Ban debate."},{"t":"Microsoft Forms","d":"Students design and conduct a class referendum on a current issue using the Australian Electoral Commission resources explored during the unit, collecting and analysing peer votes to understand how democratic processes function, connecting to the Quick Think brainstorm about who makes the rules and the Federation map activity tracing how Australia's capital was chosen."}]},{"ca":"St Kilda","yl":"Year 6","th":"Sharing the Planet","ci":"Peoples' actions affect the balance of nature.","lo":"What the environment is comprised of and how ecosystems function (Form) • Our responsibility to care for and protect the natural world (Responsibility) • The interdependence between humans, animals and the environment (Interdependence) • The consequences of human actions on the balance of nature (Consequences)","s":[{"t":"Micro:bit","d":"Students build a prototype animal tracker using the micro:bit's accelerometer and radio features — mirroring the real technology conservation scientists use to monitor how animals like polar bears are being affected by climate change. Each student attaches a micro:bit to their wrist and programs it to transmit movement data via radio to a receiving micro:bit, detecting the difference between stillness and walking. They then discuss what a spike in readings might mean for a real tracked animal, and propose how the prototype could be adapted to monitor a locally threatened species — connecting the STEM Design Project's engineering lens to the unit's core inquiry into interdependence and the consequences of human actions on the balance of nature.","ref":[{"label":"micro:bit: Animal Tracker project","url":"https://microbit.org/projects/make-it-code-it/animaltracker"},{"label":"Tech for Good Resource Card — micro:bit Animal Tracker","url":"https://www.sds.co.uk/media/mcvlwdmf/tech-for-good-resource-cards-microbit.pdf"}]},{"t":"Scratch","d":"Students code an interactive 'Conservation Technology Showcase' in Scratch where visitors click on threatened species sprites to see animated demonstrations of how their STEM prototype addresses the threat — incorporating Dr Katherine Moseby's Plains Wanderer research data and the Borun and Tuk Dreamtime story connections to show how science and Indigenous knowledge work together for conservation."},{"t":"Canva Video","d":"Students produce a STEM Design Project documentary filming their prototype presentation and gallery walk, combining footage of their conservation technology model with narration explaining how the design addresses threats to their chosen species, referencing tracking and monitoring technologies observed at Melbourne Zoo and environmental observations from Camp Mallana and the Bairnsdale Keeping Place excursion."},{"t":"Lego Spike","d":"Students build a Lego Spike prototype of their conservation tracking or monitoring device for the STEM Design Thinking Challenge, programming sensors and motors to simulate how their technology would detect and track their chosen threatened species, presenting the working model alongside their research PowerPoint during the gallery walk with 6A, 6B, and 6C."},{"t":"DJI Drone (teacher-operated)","d":"DLP captures aerial footage of the Melbourne Zoo grounds and local conservation areas, providing a bird's-eye perspective of animal habitats and enclosures that students analyse alongside the Tracker Tech observations from their zoo excursion, adding spatial context to their STEM Design Project research on tracking and monitoring threatened species."}]},{"ca":"Elsternwick","yl":"Prep","th":"Sharing the Planet","ci":"Living things share our world and have an important role in nature","lo":"The different living things around us; The roles living things play in nature; How humans and other living things share space","s":[{"t":"⏳ Planner Needed","d":"Planner content not yet uploaded — specific suggestions pending. Please send the UOI planner for this unit to Nathan Benn on Teams to generate tailored technology integration suggestions.","c":"end"}]},{"ca":"Elsternwick","yl":"Year 3","th":"Where We Are in Place and Time","ci":"Exploration leads to new discoveries that can shape and change society.","lo":"The factors that motivate exploration (Causation); How people reflect on discoveries from the past to inform change (Change); How exploration brings about change and new understandings for people, places and society (Change)","s":[{"t":"Scratch","d":"Students code an interactive 'Explorer Timeline' in Scratch where clicking on explorer sprites along a timeline triggers animations of their voyages, push/pull factor explanations from the First Fleet BTN research, and recorded narration — creating a digital museum where visitors can explore how the factors that motivate exploration shaped society."},{"t":"Adobe Express (Video)","d":"Students produce a 'Mars Colony Pitch' video presenting their group's UN Mars colonisation project, explaining how they incorporated at least 3 UN Sustainable Development Goals into their colony design, researched Mars conditions using Epic and Kiddle, and connected exploration of the past to designing for the future."},{"t":"Sphero","d":"Students code a Sphero to navigate a floor map tracing the flight path from their researched country to Melbourne, calculating distance and direction — connecting geography, coding and spatial reasoning in a hands-on culminating task."},{"t":"Book Creator","d":"Students create a historical diary from the perspective of an explorer during the First Fleet, incorporating knowledge from the Drama Toolbox incursion role-play experience and BTN video research about conditions in Britain in the late 1780s, writing four diary entries using the planning template."},{"t":"Google Earth","d":"Students use Google Earth to trace the routes of the explorers studied during the unit — navigating Burke and Wills' inland journey, the route of the First Fleet, and early Pacific voyages. At each significant location they compare what the satellite imagery shows today with what the explorers would have encountered, discussing what motivated them and what consequences their arrival had for the people and environments already there. The real-world geography gives weight to the unit's inquiry into how exploration leads to discoveries that change society."}]},{"ca":"Elsternwick","yl":"Year 4","th":"Where We Are in Place and Time","ci":"Human migration is a response to challenges and opportunities","lo":"The reasons people migrate; Migration throughout history; Effects of migration on communities, cultures and individuals","s":[{"t":"⏳ Planner Needed","d":"Planner content not yet uploaded — specific suggestions pending. Please send the UOI planner for this unit to Nathan Benn on Teams to generate tailored technology integration suggestions.","c":"end"}]},{"ca":"Glen Waverley","yl":"Year 6","th":"How We Express Ourselves","ci":"The media engages its audience and invites a response","lo":"How media targets audiences; Techniques used to engage and persuade; Critical evaluation of media messages","s":[{"t":"⏳ Planner Needed","d":"Planner content not yet uploaded — specific suggestions pending. Please send the UOI planner for this unit to Nathan Benn on Teams to generate tailored technology integration suggestions.","c":"end"}]},{"ca":"Elsternwick","yl":"Year 6","th":"How We Organise Ourselves","ci":"Student-led exhibition (PYPEX) – Students develop and present their own units of inquiry.","lo":"Student-led transdisciplinary themes; Approaches to learning; Research and presentation skills","s":[{"t":"Scratch","d":"Students code an interactive PYPEX exhibition guide in Scratch where visitors navigate through their unit of inquiry — clicking on topic sprites to access research findings, transdisciplinary connections, and media elements — creating a digital companion experience to their physical exhibition that demonstrates research and presentation skills at their most ambitious."},{"t":"Adobe Express (Website)","d":"Students build a professional exhibition website for their PYPEX unit of inquiry, featuring their research findings, transdisciplinary connections displayed using the unit outline template, and a Venn diagram comparing their research topic in Australia and China (or their home country)."},{"t":"Canva Video","d":"Students produce a documentary showcasing their PYPEX inquiry journey from the Launch Day provocation through to their final presentation, demonstrating research and referencing skills, file management, and their ability to present findings to an audience of parents and community members."},{"t":"Adobe Express (Podcast)","d":"Students create a podcast series documenting their PYPEX research process, including interviews, reflections on their Essential Agreement creation, and discussion of their shared issue — building ICT media representation and critical evaluation skills."},{"t":"Green Screen + iMovie","d":"Students use green screen technology to film segments of their PYPEX documentary, placing themselves within contexts relevant to their unit of inquiry topic, combining the footage with their research presentations and interview recordings in the final exhibition showcase."}]},{"ca":"Glen Waverley","yl":"Year 6","th":"How the World Works","ci":"Scientists undertake experimentation to confirm, contest and create new theories.","lo":"The scientific method; How experiments lead to new understandings; The relationship between planets and the Sun; Energy transfer and transformation in circuits","s":[{"t":"Micro:bit","d":"Students use the micro:bit's light sensor to build an energy monitoring experiment — programming it to measure how long classroom lights are left on unnecessarily and logging that data over multiple sessions. They then interpret the data on a computer to identify patterns and calculate wasted energy, connecting the coding and sensor work directly to the unit's LO on energy transfer and transformation in circuits. The experiment applies the scientific method the unit centres on: forming a hypothesis about school energy habits, collecting real sensor data, analysing it for patterns, and presenting evidence-based recommendations — a genuine science investigation made possible only because the micro:bit can automate what a human observer couldn't sustain.","ref":[{"label":"micro:bit: Energy Light Timer project","url":"https://microbit.org/projects/make-it-code-it/energy-light-timer"},{"label":"Tech for Good Resource Card — micro:bit Energy Light Timer","url":"https://www.sds.co.uk/media/mcvlwdmf/tech-for-good-resource-cards-microbit.pdf"}]},{"t":"Tinkercad + CoSpaces","d":"Students design a 3D scale model of the solar system in Tinkercad using data from their playdough planet-modelling activity, with accurate relative sizes and labelled orbital paths — presenting their digital design alongside their CoSpaces virtual solar system to demonstrate the relationship between planets and the Sun from both engineering and immersive perspectives."},{"t":"Scratch","d":"Students code an interactive 'Squishy Circuits Lab' in Scratch where visitors build virtual circuits by dragging conductor and insulator sprites into a circuit diagram — the program tests whether the circuit is complete and demonstrates energy transfer with animated electron flow, connecting their hands-on playdough circuit investigations to a shareable digital simulation."},{"t":"Adobe Express (Video)","d":"Students produce a science documentary explaining their squishy circuits investigation (testing which materials are conductors or insulators), electrical circuit experiments, and the connection between experimentation and building new understanding about energy transfer and transformation."},{"t":"Delightex (CoSpaces)","d":"Students build an interactive 3D solar system in CoSpaces using data from their playdough scale planet models, creating a virtual space that visitors can explore with accurate planet sizes and distances, extending their science poster and investigation journal into an immersive digital experience."}]},{"ca":"Glen Waverley","yl":"Year 3","th":"How We Organise Ourselves","ci":"Needs can be met with digital systems.","lo":"What are digital systems; Ideas and information can be organised and shared in safe online environments; Being a responsible digital citizen","s":[{"t":"Delightex (CoSpaces)","d":"Students build an interactive 3D 'Digital Systems Tour' in CoSpaces where visitors walk through a virtual school and click on technology systems (library database, attendance system, communication tools) to see how digital systems meet community needs — presenting their virtual tour with narration explaining how ideas and information can be organised and shared in safe online environments."},{"t":"Scratch","d":"Students build a Scratch simulation of a school library system where the player takes on the role of librarian — scanning books in using a barcode reader (clicking sprites), sorting them into the correct genre sections (dragging to shelves), and helping student characters find the right book by searching a catalogue. The game tracks how many books are correctly shelved and returned, with a timer adding pressure, demonstrating how digital systems use input, processing and output to meet real-world needs and what happens when parts of the system break down."},{"t":"Tinkercad","d":"Students design a 3D model in Tinkercad of an innovative digital system that solves a school community need (automated book return, smart lunch ordering, digital lost-and-found), with labelled components showing how the system works — presenting their design alongside their research into how digital systems help meet community needs."},{"t":"Microsoft Forms","d":"Students complete a quick class survey about their experience with what are digital systems — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry."},{"t":"Kahoot","d":"Students play a diagnostic Kahoot testing their assumptions about being a responsible digital citizen — the results reveal what the class already knows and where the biggest knowledge gaps are, helping the teacher shape the inquiry direction."}]},{"ca":"Glen Waverley","yl":"Year 6","th":"Where We Are in Place and Time","ci":"Human needs drive the development of nations.","lo":"How human needs drive national development; Role of migration in nation building; Impacts of development on Indigenous and colonial populations","s":[{"t":"Canva Video + Seesaw","d":"Students produce a documentary about Australia's nation-building journey, incorporating perspectives from First Nations people before European migration, the Melbourne Museum excursion observations, and the Seesaw summative assessment showcasing three key concepts from the unit."},{"t":"Scratch","d":"Students code an interactive 'Nation Building Timeline' in Scratch where visitors click on era sprites (pre-colonial, early settlement, gold rush, federation, modern) to see animated demonstrations of how human needs drove development — featuring push-pull migration factors, Indigenous perspectives, and notable Australian voices from their research."},{"t":"Green Screen + iMovie","d":"Students film first-person historical accounts using green screen, performing as figures from different eras to demonstrate how human needs drove the development of nations, combining the footage with their research into an engaging documentary that brings history to life."},{"t":"GarageBand","d":"Students compose era-appropriate soundtracks in GarageBand for their historical documentaries, selecting instruments and styles that reflect different time periods and cultures studied during the unit, connecting music production to their research on how civilisations developed in response to human needs."},{"t":"Adobe Express Character Animator","d":"Students choose a character in Adobe Express Character Animator to represent a voice from the nation-building migrations studied during the unit — a post-war European migrant, a refugee, an economic migrant, or an Indigenous Australian reflecting on the changes brought by development. They record their first-person account with a historically appropriate background, the character animating automatically to their narration. The class collection of animated migration perspectives — voiced in first person across different roles and time periods — makes the human dimension of nation building visible in a way timelines and reports cannot."}]},{"ca":"Elsternwick","yl":"Prep","th":"Where We Are in Place and Time","ci":"Discovering our past helps us know more about ourselves today.","lo":"Our personal stories and histories; Reflecting on and recording our past; Our ancestry and families","s":[{"t":"⏳ Planner Needed","d":"Planner content not yet uploaded — specific suggestions pending. Please send the UOI planner for this unit to Nathan Benn on Teams to generate tailored technology integration suggestions.","c":"end"}]},{"ca":"Elsternwick","yl":"Year 1","th":"Sharing the Planet","ci":"Plants are a life sustaining resource.","lo":"Products derived from plants; Plants all around us; The interconnectedness of plants","s":[{"t":"⏳ Planner Needed","d":"Planner content not yet uploaded — specific suggestions pending. Please send the UOI planner for this unit to Nathan Benn on Teams to generate tailored technology integration suggestions.","c":"end"},{"t":"Micro:bit","d":"Students use micro:bit light and temperature sensors to collect data in the school garden environment, monitoring conditions that support the living things they are studying and connecting sensor readings to discussions about how sharing the planet means understanding what other species need.","c":"middle"}]},{"ca":"Elsternwick","yl":"Year 3","th":"Who We Are","ci":"An inquiry into the nature of the self; beliefs and values; personal, physical, mental, social and spiritual health; human relationships.","lo":"Lines of inquiry to be confirmed once planner is uploaded","s":[{"t":"⏳ Planner Needed","d":"Planner content not yet uploaded — specific suggestions pending. Please send the UOI planner for this unit to Nathan Benn on Teams to generate tailored technology integration suggestions.","c":"end"}]},{"ca":"Elsternwick","yl":"Year 6","th":"How We Express Ourselves","ci":"An inquiry into the ways in which we discover and express ideas, feelings, nature, culture, beliefs and values.","lo":"Lines of inquiry to be confirmed once planner is uploaded","s":[{"t":"⏳ Planner Needed","d":"Planner content not yet uploaded — specific suggestions pending. Please send the UOI planner for this unit to Nathan Benn on Teams to generate tailored technology integration suggestions.","c":"end"}]},{"ca":"Glen Waverley","yl":"Prep","th":"Sharing the Planet","ci":"An inquiry into rights and responsibilities in the struggle to share finite resources with other people and with other living things.","lo":"Lines of inquiry to be confirmed once planner is uploaded","s":[{"t":"⏳ Planner Needed","d":"Planner content not yet uploaded — specific suggestions pending. Please send the UOI planner for this unit to Nathan Benn on Teams to generate tailored technology integration suggestions.","c":"end"}]},{"ca":"Glen Waverley","yl":"Year 6","th":"Who We Are","ci":"An inquiry into the nature of the self; beliefs and values; personal, physical, mental, social and spiritual health; human relationships.","lo":"Lines of inquiry to be confirmed once planner is uploaded","s":[{"t":"⏳ Planner Needed","d":"Planner content not yet uploaded — specific suggestions pending. Please send the UOI planner for this unit to Nathan Benn on Teams to generate tailored technology integration suggestions.","c":"end"}]},{"ca":"Glen Waverley","yl":"Year 6","th":"How We Organise Ourselves","ci":"An inquiry into the interconnectedness of human-made systems and communities; the structure and function of organisations.","lo":"Lines of inquiry to be confirmed once planner is uploaded","s":[{"t":"⏳ Planner Needed","d":"Planner content not yet uploaded — specific suggestions pending. Please send the UOI planner for this unit to Nathan Benn on Teams to generate tailored technology integration suggestions.","c":"end"}]},{"ca":"Glen Waverley","yl":"Year 6","th":"Sharing the Planet","ci":"The influences on our consumer choices reveal the interdependence between human and natural systems and call for responsible action toward just and sustainable futures.","lo":"Influences on consumer choices (function); How consumer decisions impact living things and their habitats (causation); Alternative models of consumerism that honour a fair and sustainable future (perspective)","s":[{"t":"Scratch","d":"Students code an interactive 'Neuromarketing Simulator' in Scratch where the player scrolls through a simulated social media feed — product ads appear and the player must identify the specific technique being used before they can scroll past (colour psychology, scarcity language, celebrity endorsement, algorithm-driven repetition). Getting it wrong triggers the 'you've been influenced' animation and costs points. Building the simulator requires students to translate everything they learned from the Cadbury case study and the neuromarketing video into coded logic — they can only program a manipulation tactic once they genuinely understand how it works, making the analysis far more rigorous than a worksheet response."},{"t":"Microsoft Forms + Microsoft Excel","d":"Students design and distribute a school-wide consumer survey in Microsoft Forms investigating what actually drives purchasing decisions at GW — peer pressure, advertising, price, sustainability, brand loyalty, packaging. They collect responses across multiple year levels, then import the raw data into Excel to build charts comparing how different age groups are influenced. The patterns they find — whether Year 4s are more brand-loyal than Year 6s, whether sustainability matters more to older students — become the evidence base for their LOI 1 investigation and the data they're required to include in their multimodal persuasive presentation. The survey design process also forces students to operationalise the unit's key concepts as measurable questions."},{"t":"GarageBand","d":"Students compose and record their taking-action piece in GarageBand — a spoken word poem, rap or consumer manifesto delivered over a layered backing track they produce themselves. The literary devices the planner requires (metaphor, alliteration, simile, idiom) are woven into lyrics that use the same neuromarketing techniques they analysed in the Cadbury study, but now flipped to promote ethical consumption: tempo to create urgency, warm instrument choices to build trust, repetition to lodge the message. The deliberate use of manipulation tactics they've critiqued — now deployed for a just cause — is the unit's central tension made audible."},{"t":"Delightex (CoSpaces)","d":"Students build an interactive 3D 'Ethical Consumer Museum' in CoSpaces structured around The Story of Stuff framework — visitors walk through rooms representing each stage of their chosen product's supply chain (extraction, production, distribution, consumption, disposal), with clickable objects revealing the environmental and ethical data from their investigation. One room displays the advertising techniques they analysed; another houses the worker conditions research; a final room presents their sustainable alternative and the evidence supporting it. The museum IS the Part 1 group presentation — other classes and parents can be invited to explore it rather than watching a PowerPoint, giving the unit's research a genuine public audience."},{"t":"Adobe Express Character Animator","d":"Students choose a character from within their product's supply chain — a cocoa farmer in Ghana, a garment worker, a delivery driver, a coral reef species affected by packaging waste — and record their first-person account in Adobe Express Character Animator. The character animates to their voice with a contextually appropriate background; students add music that reflects the emotional tone of the testimony. The script draws directly on the ethics research they conducted, the child labour case study, and the Story of Stuff production-chain analysis. The class collection of animated supply chain voices — each connected to a different product — becomes a powerful exhibition piece demonstrating LOI 2 through embodied, first-person testimony that no report or poster can replicate."}]},{"ca":"St Kilda","yl":"Prep","th":"Where We Are in Place and Time","ci":"An inquiry into orientation in place and time; personal histories; the relationship between and the interconnectedness of individuals and civilisations.","lo":"Lines of inquiry to be confirmed once planner is uploaded","s":[{"t":"⏳ Planner Needed","d":"Planner content not yet uploaded — specific sugg
