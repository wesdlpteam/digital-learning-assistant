r usage in the school garden, tracking conservation efforts and connecting their findings to the unit's focus on responsible water management."}]},{"ca":"Glen Waverley","yl":"Year 3","th":"Who We Are","ci":"The choices and actions we make contribute to our health and wellbeing.","lo":"What it means to be healthy; Choices and their impact on health; Actions to maintain a healthy mind and body","s":[{"t":"Scratch","d":"Students code an interactive 'Health Choices Simulator' in Scratch where players make daily decisions about food, exercise, sleep and screen time — each choice adjusts animated health meters for body and mind, demonstrating how the choices and actions we make contribute to our health and wellbeing through visible cause-and-effect feedback loops."},{"t":"Micro:bit","d":"Students build a micro:bit 'Wellbeing Tracker' that uses the accelerometer to count steps and displays personalised activity targets on the LED screen, presenting their week-long PE athletics data alongside their device at a class health expo — demonstrating how technology can support actions to maintain a healthy mind and body."},{"t":"GarageBand","d":"Students compose a calming mindfulness soundscape in GarageBand exploring how music affects wellbeing, connecting audio creation to their investigation of how daily choices about mind and body health contribute to overall wellbeing, and sharing the composition as part of their healthy action strategies."},{"t":"Mentimeter","d":"Students use Mentimeter live polling to gather anonymous class data on health and wellbeing choices weekly, creating real-time visualisations that reveal patterns in how the class's choices connect to physical and mental wellbeing — using the data to inform their Health Choices Simulator design."},{"t":"Book Creator","d":"Students create a personal 'Wellbeing Action Plan' book documenting healthy choices for mind and body, featuring their investigation findings from the two homework questions and one wondering they explored after the guest speaker presentations."}]},{"ca":"Glen Waverley","yl":"Year 3","th":"Where We Are in Place and Time","ci":"Land and place are represented and valued in different ways.","lo":"How Australia and neighbouring regions define places; Australia's states/territories have unique identities; First Nations connections to Country","s":[{"t":"Canva","d":"Students design an annotated illustrated map in Canva of a place that holds meaning to them — their neighbourhood, a significant Australian location from the unit's inquiry, a First Nations Country, or a place from their own family history. Using Canva's design tools they add a title, compass rose, legend, and annotations explaining why each location on the map matters, applying the map conventions and spatial thinking explored throughout the unit. The five strongest class maps are submitted to the She Maps 'My Map, My World' national mapping competition (entries close 6 November) — giving the unit a real-world audience and purpose beyond the classroom.","ref":[{"label":"She Maps: My Map, My World competition","url":"https://shemaps.com/mapping-competition/"}]},{"t":"Tinkercad","d":"Students design a 3D model in Tinkercad of a significant Australian landmark or place that represents First Nations Australians' deep spiritual, cultural and custodial connection to the land — presenting their digital design alongside research explaining why this place matters to different people and how the land holds identity and story."},{"t":"Sphero + Google Earth","d":"Students program Spheros to navigate a floor map of Australia, travelling between states and territories while stopping at significant First Nations Country locations — at each stop they present what makes that place unique (geography, culture, Indigenous language group) using research from their Google Earth virtual tours, connecting coding and spatial reasoning to the unit's focus on how land and place are represented and valued in different ways."},{"t":"Google Earth","d":"Students create a narrated virtual tour of significant Australian places in Google Earth — dropping pins at locations representing different state identities, First Nations Country boundaries, and geographic features studied during the unit. At each pin they record a voice annotation explaining why the place is significant, drawing on their research into how different communities value and represent land. The tour becomes a student-curated atlas reflecting the unit's central idea that land and place are represented and valued in different ways."},{"t":"Canva Presentation","d":"Students design a multi-page presentation comparing how Australia's states and territories express unique identities through symbols, landmarks and culture, incorporating their two-dimensional map representations created during the Maths spatial integration."}]},{"ca":"Glen Waverley","yl":"Year 3","th":"How We Express Ourselves","ci":"Creativity allows people to express their understanding of the world.","lo":"The ways people use technology to express creativity; How texts and images work together; How technology influences our creativity","s":[{"t":"iMovie","d":"Students produce a Stop Motion animation expressing their understanding of a concept from the unit, building on the skills taught in class where students learned to create Stop Motion clips and then taught their parents the technique."},{"t":"GarageBand + iMovie","d":"Students compose original soundtracks in GarageBand to accompany their Stop Motion animations in iMovie, exploring how music and sound effects enhance creative expression and convey meaning, connecting audio production to the multi-modal storytelling investigated throughout the unit."},{"t":"Scratch","d":"Students build an interactive Scratch art gallery where the player walks a character through rooms, each containing a student-created digital artwork representing a different creative medium (painting, music, dance, digital). Clicking each artwork triggers an animation — a painting comes to life, a dancer moves across the stage, music notes float from instruments — and the player collects 'inspiration tokens' by answering how each medium expresses ideas differently, connecting to the unit's exploration of how technology expands creative possibilities beyond traditional media."},{"t":"Adobe Express Video Creator","d":"Students create a short video exploring how technology tools help people express ideas in new ways, documenting their Stop Motion creation process and reflecting on how technology influenced their creativity."},{"t":"Book Creator","d":"Students design an interactive digital story where text and images work together to convey meaning, extending their Book Creator experience from Year 2 and reflecting on their creative process using media technologies."}]},{"ca":"Glen Waverley","yl":"Year 3","th":"How the World Works","ci":"Observing how materials change helps us make sense of the physical world.","lo":"Observable properties of solids and liquids; How heating and cooling change state; Scientific thinking helps solve everyday problems","s":[{"t":"Scratch + Micro:bit","d":"Students code an interactive 'States of Matter Explorer' in Scratch where clicking on a material sprite and dragging a temperature slider causes animated particles to change behaviour (tightly packed → flowing → spreading apart), with a data display showing the temperature at each transition point — connecting their micro:bit experiment data to a visual model."},{"t":"iMovie + Micro:bit","d":"Students produce an iMovie 'Mythbusters: Materials Edition' episode where they test a claim about how materials change (e.g. 'chocolate melts faster than butter'), filming their experiment with slow-motion replay of the state change moment, overlaying temperature data from their micro:bit readings, and delivering a verdict based on evidence."},{"t":"Lego Spike","d":"Students build a Lego Spike automated heating/cooling experiment rig that uses the motor to stir a mixture and the temperature sensor to trigger an alert when a target temperature is reached — presenting their programmed experiment alongside data showing how heating and cooling change the state of materials."},{"t":"Micro:bit","d":"Students program micro:bit temperature sensors to monitor material state changes during the unit's heating and cooling experiments — placing probes in ice water, room-temperature water, and heated water to collect real-time digital data rather than estimating by touch. The sensor transforms a subjective observation ('it feels cold') into a precise, comparable number, teaching students that scientific data requires reliable measurement tools. Results are recorded over time and graphed as a class, connecting directly to the unit's inquiry into how scientific thinking helps solve everyday problems by making the invisible visible."},{"t":"Kahoot","d":"Students collaboratively create a Kahoot quiz testing their classmates on states of matter concepts — writing questions based on their experiment observations about how heating and cooling change materials, turning their scientific knowledge into an interactive class challenge."}]},{"ca":"Glen Waverley","yl":"Year 3","th":"Sharing the Planet","ci":"The diversity of soils, rocks, and minerals shapes the way people value and use Earth's resources.","lo":"Observable properties of soils, rocks and minerals; Earth's resources are vital and must be used responsibly; First Nations knowledge of soils and rocks","s":[{"t":"Canva Video + Sphero + Google Earth","d":"Students produce an Canva Video 'Earth's Resources' documentary featuring footage of their hands-on rock and soil investigations, Sphero terrain course experiments, and Google Earth geological explorations — delivering a persuasive argument about why Earth's resources must be used responsibly, with evidence from their classification data and First Nations perspectives."},{"t":"Tinkercad","d":"Students design a 3D model in Tinkercad of a rock or mineral classification display stand with labelled compartments organised by observable properties (colour, texture, hardness, lustre), presenting their digital design as a museum-quality exhibit that could be 3D printed — connecting their hands-on investigation data to professional scientific presentation."},{"t":"Scratch","d":"Students code an interactive 'Rock Cycle Journey' simulation in Scratch where a rock sprite transforms through igneous, sedimentary and metamorphic stages based on player choices (add heat, add pressure, erode), with First Nations knowledge of soils and rocks woven into the narration at each stage — creating an educational game visitors can play."},{"t":"Micro:bit","d":"Students program micro:bits with light sensors to test different rock and mineral samples — measuring how much light they reflect to investigate the concept of lustre. They compare readings across their sample collection (metallic minerals like pyrite vs dull minerals like chalk) and build a data table of results. The sensor turns an observation task into a data collection experiment: students generate real numerical evidence for how the physical properties of soils, rocks and minerals differ, connecting digital science tools to the unit's geology inquiry."},{"t":"GarageBand","d":"Students compose a 'Geological Soundscape' in GarageBand — layering sounds to represent each layer of the Earth (deep percussion for the core, rumbling bass for the mantle, lighter tones for the crust) or to sonically represent the properties of rocks they studied (hard crystalline minerals as sharp plucked sounds, soft sedimentary rocks as muted tones, volcanic rock as crashing percussion). The composition requires students to translate geological properties into sound decisions, deepening their understanding through a completely different sensory medium."}]},{"ca":"Glen Waverley","yl":"Year 4","th":"Who We Are","ci":"People's beliefs contribute to the diversity of human life.","lo":"Spiritual or religious beliefs; Similarities and differences of spiritual beliefs; Contributions of different religions to human diversity","s":[{"t":"Delightex (CoSpaces)","d":"Students build an interactive 3D 'World Beliefs Museum' in CoSpaces where visitors walk through themed rooms for each religion studied, clicking on artefact and symbol objects to trigger recorded explanations about spiritual beliefs, traditions and contributions to human diversity — connecting their Think-Pair-Share research to an immersive virtual exhibition."},{"t":"Canva Video","d":"Students produce a documentary featuring their research into how beliefs contribute to diverse communities, incorporating footage and reflections from the gallery walk where they used yellow and pink post-it notes to record thoughts and questions."},{"t":"Canva Presentation","d":"Students design a comparative presentation exploring similarities and differences between religions studied during the unit, incorporating observations from the Uniting Church visit, the Bunjil art installation, and the chapel experience with Steven Langley's cello performance and meditation."},{"t":"Freeform","d":"Students use Freeform to create an individual concept map exploring how their own values and spiritual or religious beliefs connect to those of people from different traditions studied during the unit. Starting with their own centre, they branch out to connect beliefs they share and beliefs that differ, mapping similarities across Christianity, Islam, Buddhism, Hinduism and First Nations spirituality. The visual comparison reveals that diversity of belief doesn't mean absence of common ground — directly interrogating the unit's central idea that beliefs contribute to the diversity of human life."},{"t":"Google Earth","d":"Students use Google Earth to take a virtual pilgrimage tour — navigating to significant religious and spiritual sites worldwide: the Vatican in Rome, Mecca in Saudi Arabia, the Ganges River in Varanasi, Uluru in Central Australia, and Buddhist temples in Japan. At each site they discuss what the architecture, location and surrounding landscape reveals about the belief system it belongs to, connecting geographical context to the unit's inquiry into how spiritual beliefs contribute to the diversity of human life."}]},{"ca":"Glen Waverley","yl":"Year 4","th":"Where We Are in Place and Time","ci":"Exploration leads to discoveries, opportunities and new understandings.","lo":"Reasons for exploration; How people have explored over time; Consequences of exploration","s":[{"t":"iMovie + Green Screen","d":"Students create a documentary about historical exploration using green screen, incorporating research about convicts and the First Fleet and reflections from the CERES excursion where they enjoyed diorama making and hands-on exploration activities."},{"t":"Delightex (CoSpaces)","d":"Students build an interactive 3D exploration scene in CoSpaces recreating a key moment from the Age of Exploration, adding historical details researched during library sessions and connecting the virtual environment to the physical dioramas created during CERES excursion activities."},{"t":"Canva Presentation","d":"Students design a multi-page presentation tracing a chosen explorer's journey, including motivations, discoveries and consequences — connecting to the historical narrative they wrote from a convict's point of view after researching convict experiences."},{"t":"Book Creator","d":"Students create an 'Age of Exploration' research book with chapters connecting the effects of First Fleet arrival on First Nations Australians' Countries/Places, incorporating insights from the Indigenous elder's nature walk, didgeridoo and storytelling during camp."},{"t":"Google Earth","d":"Students use Google Earth to trace the actual exploration routes studied during the unit — following Magellan's circumnavigation, Cook's Pacific voyage, and Burke and Wills' inland Australian route on the satellite globe. At each significant waypoint they drop a pin with an annotation explaining what the explorers discovered or encountered there and what consequence it had. Navigating the routes at true scale reveals what 'exploration' actually meant physically — months at sea, uncharted coastlines, and distances that are impossible to feel from a textbook map."}]},{"ca":"Glen Waverley","yl":"Year 4","th":"How We Express Ourselves","ci":"Responding to different artistic expressions can promote thinking.","lo":"Ways forms of expression convey messages; Creative and critical thinking skills; The language used to respond to The Arts","s":[{"t":"Canva Video","d":"Students produce a video essay responding to different art forms encountered during the unit, including reflections from the Musica Viva incursion where they experienced live musical expression and explored how performance conveys messages."},{"t":"Adobe Express Video Creator","d":"Students create a narrated slideshow in Adobe Express Video Creator comparing how different artistic expressions they encountered during the unit — the Melbourne Museum's digital interactive, the provocations from visual art, music and drama — convey mood and meaning through different choices. Each slide presents one artwork with the student's spoken analysis: what artistic elements were used, what response it triggered, and how the creative choices shaped that response. The spoken critique format builds the unit's key skill of using the language of artistic response."},{"t":"GarageBand","d":"Students compose a 60-second musical response to a visual artwork in GarageBand — choosing instruments, tempo and mood that reflect their interpretation of the piece. Two students composing responses to the same artwork will almost always produce completely different music, which becomes the class discussion: what did you see that I didn't? The activity demonstrates the unit's central idea that responding to artistic expression promotes thinking, and that creative and critical thinking skills are inseparable — you can't compose meaningfully without analysing what you're responding to."},{"t":"Canva Presentation","d":"Students design an art response presentation analysing a chosen artwork using the consistent vocabulary developed during the unit (from the shared arts vocab folder), applying creative and critical thinking skills."},{"t":"Delightex (CoSpaces)","d":"Students build a virtual 3D art gallery in CoSpaces displaying digital versions of the artworks studied during gallery walks, adding interactive annotations using the arts vocabulary developed throughout the unit, creating an immersive exhibition that extends their art response presentations."}]},{"ca":"Glen Waverley","yl":"Year 4","th":"How the World Works","ci":"The design and use of products can have an impact on the natural world.","lo":"How material properties determine their use; Material solutions for a sustainable future; How research solves problems in the natural world","s":[{"t":"Microsoft Excel + Padlet","d":"Students conduct a school-wide rubbish audit — surveying lunchboxes across year levels and recording waste by material type (plastic, glass, metal, paper, organic) in Microsoft Excel. They build bar and pie charts directly from their tally data, then share their graphs on a class Padlet so every group can compare results. The data becomes direct evidence for the unit's central idea: product design choices create measurable, categorisable waste. Students use their charts to identify which material types could be reduced through better design decisions — connecting real numbers to the 'material solutions for a sustainable future' line of inquiry.","docKey":"doc_rubbish_audit","ref":[{"label":"DT Hub: Rubbish Recording & Reduction lesson plan","url":"https://www.digitaltechnologieshub.edu.au/teach-and-assess/classroom-resources/lesson-ideas/rubbish-recording-and-reduction-part-1/"}]},{"t":"CoDrone EDU + Lego Spike + Tinkercad","d":"Students program a CoDrone EDU to perform an aerial survey of their sustainable product prototypes displayed around the classroom, capturing bird's-eye footage of each design — then present the drone footage alongside their Tinkercad 3D models and Lego Spike prototypes, explaining how their material choices solve an environmental problem for animals."},{"t":"Lego Spike + Tinkercad","d":"Students build a Lego Spike prototype of their sustainable product incorporating sensors and motors, testing the design against environmental criteria and comparing the engineering approach with their Tinkercad 3D digital prototype, connecting physical and digital design thinking."},{"t":"Scratch","d":"Students code an interactive 'Sustainable Material Choices' simulation in Scratch where users select a product's material (plastic, glass, metal, bamboo, recycled) and see the environmental consequences play out — landfill fills up, carbon meter rises or falls, ocean pollution increases. The simulation requires students to translate their material research into logical if-then consequences, making the unit's central idea — that design and material choices impact the natural world — into a system students have to model and prove through code."},{"t":"Micro:bit","d":"Students use micro:bits to collect environmental data (temperature, light levels) to inform their sustainable product design decisions, connecting sensor data to understanding how the natural world is affected by material choices."}]},{"ca":"Glen Waverley","yl":"Year 4","th":"How We Organise Ourselves","ci":"Communities create rules, laws and services to help people live together fairly and safely.","lo":"Effective and influential leadership; Strengths that help leaders guide others; How leadership impacts communities","s":[{"t":"Canva Video + Seesaw","d":"Students create a 'Leadership in Action' video showcasing their leadership speech (a favourite activity mentioned by students), incorporating footage from the Cross Campus Leadership Day team-building activities and their Seesaw self-reflection rubric responses."},{"t":"Adobe Express Podcasting","d":"Students produce a podcast interviewing peers about leadership qualities, connecting to the Visual Art exploration of art leaders Yayoi Kusama and Jean-Michel Basquiat and discussing how leadership exists in many fields."},{"t":"Canva Presentation","d":"Students design a leadership profile presentation featuring the leader they researched, incorporating the ranking activity comparison (initial vs final understanding), the Kid President video analysis of leadership strengths and weaknesses, and insights from the Imogen Kane UN Youth Ambassador guest speaker on Teams."},{"t":"Freeform","d":"Students use Freeform to build a visual concept map connecting different leadership examples explored during the unit — mapping how the election discussion, guest speaker visits and class observations reveal patterns in what makes leadership effective and influential."},{"t":"Microsoft Forms","d":"Students complete a quick class survey about their experience with effective and influential leadership — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry."}]},{"ca":"Glen Waverley","yl":"Year 4","th":"Sharing the Planet","ci":"Country, language and community are significant to the lives of First Nations people.","lo":"Diversity of First Nations people; Importance of community, family and traditions; Importance of Country to First Nations people","s":[{"t":"Canva Video","d":"Students produce a reflective documentary connecting their camp experience with the Indigenous elder to their research about how Country, language and community are significant — incorporating the persuasive speeches they wrote as their taking-action assessment."},{"t":"DJI Drone (teacher-operated) + Google Earth","d":"DLP captures aerial footage of the camp location and local Glen Waverley environment, providing students with a bird's-eye view of Country that they compare with First Nations perspectives on the significance of land, connecting the aerial imagery to their Google Earth explorations of language group maps and significant locations."},{"t":"Insta360 Cam","d":"DLP captures 360° footage during the camp experience with the Indigenous elder — the nature walk, didgeridoo performance, and story sharing. Back in class, students explore the immersive footage on-screen, pausing to identify specific teachings about Country, language and community connection that they heard firsthand. The 360° format preserves the full sensory context of the elder's knowledge sharing, allowing students to revisit and deepen their reflections long after the camp experience — turning a one-off visit into ongoing reference material."},{"t":"Book Creator","d":"Students create a research book documenting the diversity of First Nations peoples and their connection to Country, integrating the pre-test visualisation activity where they drew their understanding of Aboriginal and Torres Strait Islander communities and researched the effects of First Fleet contact."},{"t":"Canva Presentation","d":"Students design a respectful presentation exploring the significance of Country to First Nations people, incorporating learning from the Indigenous elder at camp who led a nature walk, played the didgeridoo and shared stories, and connecting to their continued study of native Australian animals."}]},{"ca":"Glen Waverley","yl":"Year 5","th":"Who We Are","ci":"Managing change requires acceptance, knowledge and strategies.","lo":"Establishing, managing and maintaining relationships; Managing behaviours in digital situations; Managing changes associated with puberty","s":[{"t":"Adobe Express Podcasting","d":"Students produce a podcast episode in Adobe Express discussing strategies for managing one of the three change areas explored during the unit — establishing and maintaining relationships, managing behaviours in digital situations, or navigating puberty. Each episode features a scenario, a 'what not to do' analysis, and evidence-based strategies drawn from the unit's health content. The podcast format requires students to be precise and persuasive rather than just informative, and the finished episodes become a class resource bank that younger students could genuinely use."},{"t":"Canva Video","d":"Students create a cyber safety awareness video in Canva Video demonstrating one responsible digital behaviour explored during the unit — managing online relationships, protecting personal information, or responding to cyberbullying. Each group chooses a real scenario from class discussion, scripts a 'what actually happens' version and a 'what you should do' version, and presents both as a split narrative. The contrast between the two versions makes the stakes of digital decision-making concrete, turning the unit's exploration of managing behaviours in digital situations into a student-produced teaching resource."},{"t":"GarageBand","d":"Students compose a calming audio toolkit in GarageBand with personalised soundscapes and guided breathing exercises, connecting music creation to the wellbeing and change management strategies explored during the relationship, cyber safety and resilience sessions throughout the unit."},{"t":"Canva Presentation","d":"Students design a comprehensive Canva Presentation wellbeing guide covering the three change areas explored during the unit — relationships, digital behaviour and puberty. Each section includes a real scenario, common misconceptions students identified during class discussions, evidence-based strategies, and local support resources. The guide is designed for a specific audience: Year 4 students preparing to transition. Designing for a known audience with real needs forces students to apply the unit's content with precision rather than generality, making it both a summative assessment and a genuinely useful artefact."},{"t":"Scratch","d":"Students code an interactive cyber safety scenario in Scratch where users navigate a social media situation — receiving a suspicious message, seeing a friend post something hurtful, or being asked to share personal information. Each choice branches to a consequence: safe choices lead to positive outcomes, risky choices show realistic impacts. The branching logic means students must anticipate consequences before coding them, which develops the exact reasoning process the unit aims to build: thinking ahead about the real-world effects of digital decisions."}]},{"ca":"Glen Waverley","yl":"Year 5","th":"Where We Are in Place and Time","ci":"The discovery of resources has impacted the growth and development of nations.","lo":"Significance of resource discovery in development of societies; Impact of migration on cultural, social and economic growth; Exploration and settlement effects on Indigenous and colonial populations","s":[{"t":"Scratch + Microsoft Excel","d":"Students code an interactive 'Migration Impact Timeline' in Scratch where clicking on era sprites (pre-colonial, Gold Rush, post-war, modern) triggers animated data visualisations showing how migration shaped Australian communities — connecting their Microsoft Excel data analysis to an interactive experience visitors can explore."},{"t":"Green Screen + iMovie","d":"Students film first-person Gold Rush accounts using green screen with historical goldfields backgrounds, performing as characters from different migration waves to bring primary source stories to life, integrating the footage into their iMovie documentary about how resource discovery impacted Australia's growth."},{"t":"Canva Video","d":"Students produce a documentary exploring the impact of migration on Australian society, weaving together the effects of British colonisation on First Nations Australians, convict experiences, and the development that followed resource discovery."},{"t":"Insta360 Cam","d":"DLP captures 360° footage at Sovereign Hill or a Gold Rush heritage site during the excursion, preserving the immersive historical environment for classroom revisitation. Students explore the footage back at school to gather visual evidence — identifying the physical layout of the goldfields, the diversity of people present, the tools and technology of the era — and annotate screenshots as primary source evidence for their research into how the discovery of resources impacted the growth and development of nations. The immersive footage turns a one-day excursion into an ongoing reference resource."},{"t":"Adobe Express Character Animator","d":"Students choose a historical character from the Gold Rush era — a Chinese miner, an Indigenous Australian whose land was disrupted, a ship passenger on the £10 Pom scheme, a Eureka Stockade participant — and record their first-person account in Adobe Express Character Animator. The character animates to their voice with a historically appropriate background, creating a perspective piece that goes beyond the written account and brings the impact of migration and resource discovery to life through embodied storytelling."}]},{"ca":"Glen Waverley","yl":"Year 5","th":"How We Express Ourselves","ci":"People design for purpose.","lo":"How design thinking creates in various ways; Design thinking meets community needs; Effective ways to engage an audience","s":[{"t":"Lego Spike + Scratch","d":"Students build a Lego Spike functional prototype of their design thinking product, programming it in Scratch to perform its core function — a mechanism that moves, sorts, measures or responds to input. The dual build tests whether their design actually works as intended, not just on paper. Students present the working prototype alongside their Scratch code, explaining how the programming decisions they made shaped the physical behaviour, connecting the unit's LO on how design thinking meets community needs to a real, testable outcome."},{"t":"Adobe Express Video Creator","d":"Students create a pitch video for their design explaining how it engages an audience and meets a community need, applying the persuasive presentation and sequencing skills from the literacy integration."},{"t":"Tinkercad","d":"Students design a 3D prototype of their product using the full design thinking process (empathise, define, ideate, prototype, test) to meet a specific community need, iterating based on peer feedback."},{"t":"CoDrone EDU","d":"Students explore drone technology as a design-for-purpose case study, programming CoDrone EDU to perform tasks that meet a specific community need (surveillance for safety, delivery for accessibility), connecting the drone's engineered purpose to their design thinking investigation of how products are designed to serve audiences."},{"t":"Micro:bit","d":"Students integrate micro:bits into their design project as sensors or interactive elements, collecting data to inform design decisions and connecting technology to the ethical and practical considerations in their design process."}]},{"ca":"Glen Waverley","yl":"Year 5","th":"How the World Works","ci":"The interactions between living things, materials, and light enable us to make decisions about the world","lo":"How structural features and adaptations help living things survive; How weathering and erosion cause change to Earth's surface; How light is used in science and technology","s":[{"t":"⏳ Planner Needed","d":"Planner content not yet uploaded — specific suggestions pending. Please send the UOI planner for this unit to Nathan Benn on Teams to generate tailored technology integration suggestions.","c":"end"}]},{"ca":"Glen Waverley","yl":"Year 5","th":"How We Organise Ourselves","ci":"Economic systems are an integral part of human society.","lo":"Wealth is more than money; Responsibilities when managing income; Income is earned and managed in many ways","s":[{"t":"Adobe Express Podcasting","d":"Students produce a podcast episode in Adobe Express discussing how economic systems work and responsible financial decision-making, drawing on their Banqer simulation experience and class presentations about managing income. Each episode focuses on a specific economic concept students genuinely wrestled with during Banqer — tax, unexpected expenses, income inequality — presenting what they learned through the simulation alongside their own analysis. The podcast format requires students to explain economic ideas to a general audience, consolidating understanding while practising the communication skills the unit demands."},{"t":"Microsoft Excel","d":"Students create a personal budget spreadsheet in Microsoft Excel using formulas to track income, expenses and savings goals — modelling the financial decisions they encountered in Banqer but with the added complexity of creating the tracking system from scratch. They enter realistic income scenarios from the unit's discussion about how income is earned and managed, then add unexpected expenses (medical costs, car repairs) to test whether their budget survives real-world pressure. The exercise makes the abstract concept of financial management tangible through the discipline of formula-driven data."},{"t":"Canva Presentation","d":"Students design an economic literacy guide explaining different forms of wealth and responsible income management, incorporating their experience managing money in Banqer where they applied for jobs, side hustles and made financial decisions."},{"t":"Scratch","d":"Students code an interactive budget simulation in Scratch where users make a series of financial decisions — choosing how to allocate income between needs, wants, savings and giving. Each decision triggers a consequence that updates a running balance on screen, and students must program the logic for both responsible and irresponsible financial choices. Building the simulation requires them to define exactly what a good financial decision is in code, which is a far more rigorous form of understanding than describing it in words."},{"t":"Microsoft Forms","d":"Students design and conduct a survey in Microsoft Forms investigating how classmates understand wealth beyond money — asking about what they value most, what 'enough' means to them, and whether they'd trade income for other things like time or purpose. After collecting responses, they analyse the auto-generated charts to identify patterns and compare their class data with the economic frameworks studied. The survey design process is as important as the data: students must translate abstract economic concepts into measurable questions, which demands genuine conceptual clarity."}]},{"ca":"Glen Waverley","yl":"Year 5","th":"Sharing the Planet","ci":"Communities interact with the environment in different ways.","lo":"The need for conservation; Community values inform management of the natural environment; Ways environmental stewardship can drive change","s":[{"t":"DJI Drone (teacher-operated) + Google Earth","d":"DLP captures aerial footage of the Alex Wilkie Nature Reserve and surrounding urban development, giving students a bird's-eye view of how community interactions physically shape the local environment. Students compare the drone footage with Google Earth satellite imagery to analyse green space patterns, development density and biodiversity zones — annotating printed aerial stills to identify conservation areas and development pressures. The dual aerial perspective builds the visual evidence base for their stewardship action proposals."},{"t":"Canva Video","d":"Students produce a persuasive environmental documentary connecting their research about sustainable resource patterns to the Alex Wilkie Nature Reserve excursion observations and the Monash Council visit about local environmental management."},{"t":"Micro:bit","d":"Students program micro:bits to collect environmental data (temperature, light, moisture) around the school and at the Alex Wilkie Nature Reserve, using findings to support their conservation action proposals with evidence."},{"t":"Insta360 Cam","d":"DLP captures 360° footage at the Alex Wilkie Nature Reserve during the excursion. Back in class, students explore the immersive footage on-screen to identify environmental features, locate evidence of human impact, and compare biodiversity between the reserve's natural zones and the surrounding urban development. The 360° perspective reveals landscape-scale connections — how green corridors link habitats, where development edges push against conservation land — providing visual evidence students cite directly in their environmental stewardship action plan presentations."},{"t":"Canva Presentation","d":"Students design a conservation action plan in Canva Presentation proposing specific, evidence-based changes their community could make to improve environmental stewardship of the Alex Wilkie Nature Reserve and local green spaces. The proposal draws on micro:bit sensor data collected during the excursion, drone footage comparisons from class, and the Monash Council visit findings. The audience for the presentation is specified: local council. Designing for a decision-making audience rather than just a classroom teacher changes the level of evidence and precision students bring to their claims."}]},{"ca":"Elsternwick","yl":"Prep","th":"Who We Are","ci":"Relationships impact our wellbeing.","lo":"Developing relationships; How those around us impact our behaviours and interactions; Keeping ourselves healthy and safe","s":[{"t":"Green Screen","d":"Students perform a role-play in front of the green screen showing a 'friendship rescue' scenario — one child is feeling left out, and the others demonstrate strategies from the unit (kind words, inviting to play, asking 'are you OK?'). The green screen places them in playground, classroom and home settings, making the strategies feel real and applicable across different environments."},{"t":"Scratch Jr","d":"Students code a two-scene Scratch Jr animation showing a 'before and after' relationship story — Scene 1 shows characters in conflict (not sharing, excluding, using unkind words), Scene 2 shows the same characters using a strategy they learned to fix the relationship. The characters move, speak and change expression through code, creating an autonomous story that performs itself when the green flag is pressed."},{"t":"iMovie","d":"Students film a 'Wellbeing News Report' where a student reporter interviews classmates about the relationship strategies that worked best during the unit — filmed around the school in the actual locations where friendships happen (playground, classroom, library). The reporter adds a verdict at the end: 'The number one thing that helps relationships is...' with slow-motion replays of friendship in action during PE cooperative activities."},{"t":"Beebots","d":"Students program Beebots to navigate a 'Friendship Path' mat with stations representing positive relationship behaviours — sharing, listening, helping, and including others. Before programming, each pair decides which stations their Beebot will visit and in what order, planning the route with physical coding blocks. When the Beebot reaches a station, students explain what the behaviour shown there looks like in real life and why it matters. The physical navigation gives abstract social concepts a tangible, sequential structure that Prep students can plan, predict and reflect on."},{"t":"Seesaw","d":"Students complete a weekly relationship reflection in Seesaw — drawing a person they connected with that week and recording a voice note explaining what made the interaction positive, what they did well, and what they'd do differently. Over the term the collection grows into a personal relationship journal that documents the unit's social-emotional learning in the student's own words. Reviewing the portfolio at the end of the unit gives students and teachers evidence of growth in both relationship skills and self-awareness — connecting directly to the unit's inquiry into how relationships impact our wellbeing."}]},{"ca":"Elsternwick","yl":"Prep","th":"How We Express Ourselves","ci":"Stories are shared in different ways.","lo":"Imagining stories together; Ways stories are shared; Connecting with stories","s":[{"t":"Green Screen","d":"Students perform their original story in front of the green screen, transporting themselves inside the settings they imagined — a rainforest, a castle, outer space — with each student taking a role as narrator, character or sound effects creator, combining live performance with digital environments they chose from the mystery box costumes provocation."},{"t":"Scratch Jr","d":"Students code a 3-4 page animated retelling of their story in Scratch Jr where characters walk, talk, grow, shrink and change backgrounds between scenes. The characters move and speak on their own when you press the green flag — the story performs itself. This is fundamentally different from a book or video because the student built a machine that tells the story autonomously."},{"t":"GarageBand","d":"Students create a 30-second soundscape for their story using only sound effects and music (no words), then play it for a partner who has to guess what the story is about. This explores a completely different way stories are shared — through sound alone — and couldn't happen without audio layering tools. Connects directly to the central idea that stories are shared in different ways."},{"t":"Book Creator","d":"Students create an interactive 'Story Museum' book where each page is a different room showcasing a different way of sharing stories explored during the unit — one page has an embedded video of their puppet show, another has a voice-recorded oral retelling, another has photos of their playdough scene with labels — so the book itself demonstrates the central idea that stories are shared in different ways."},{"t":"Padlet","d":"Students contribute to a class Padlet board where each child posts a photo of their favourite story moment from the unit alongside a voice recording retelling what happened — building a collaborative 'Story Wall' the class can revisit and discuss."}]},{"ca":"Elsternwick","yl":"Prep","th":"How We Organise Ourselves","ci":"Everyone has a role to play in the community.","lo":"My communities; Contributing to the local community; Connections in my community","s":[{"t":"Green Screen","d":"Students dress up as different school community members (teacher, librarian, office staff, grounds crew) and film themselves in front of the green screen placed in the actual school locations where those people work — the library, the front office, the garden. Each student explains what their community role does and why it matters, creating a 'Meet Our School Heroes' video that could be played at the next school assembly or shown to new Prep families."},{"t":"Canva Video","d":"Students produce a 'Community Heroes' news report — filming interviews with real school staff members (the librarian, office manager, grounds crew) asking 'What is your role and why does it matter?', then editing the clips together with a student anchor introducing each segment. The finished news report is played at assembly, showcasing the community helpers they investigated during the Week 1 photo walk."},{"t":"Scratch Jr","d":"Students code a Scratch Jr animation showing 'A Day in Our Community' where different characters (teacher, crossing guard, librarian, parent helper) appear on screen and perform their role — the teacher opens a book, the crossing guard stops traffic, the librarian shelves books. When all characters have performed, a final screen says 'Everyone has a role to play!' — the central idea brought to life through code."},{"t":"Google Maps","d":"Students explore the streets around Elsternwick on Google Maps Street View, spotting community helpers and services (the fire station, the library, shops, the school). They take screenshots of places they recognise and the teacher builds a class collection on the board — discovering that their community is full of people playing roles they might not have noticed before."},{"t":"Beebots","d":"Students program Beebots to visit different 'community role' stations on a class-made mat — post office, fire station, school, hospital, and shops — explaining at each stop what the people there do and how they help the community. Before programming, each pair plans the most logical route between stations, discovering that the order of visits matters and that their sequence tells a story about how community services connect. The planning and debugging process mirrors the unit's central idea that communities organise roles and systems to help people live and work together."}]},{"ca":"Elsternwick","yl":"Prep","th":"How the World Works","ci":"Scientists follow a method to discover new things.","lo":"The scientific process; Observing my world; Drawing conclusions","s":[{"t":"iMovie","d":"Students produce a 'Junior Scientists' documentary where each group films themselves conducting one experiment from the unit (the ice cube melting test, the ramp surface test, the Nature Detective Walk observations) — using slow-motion to capture the moment of change, adding narration explaining their prediction vs what actually happened, and delivering a 'scientist's conclusion' to camera. The class watches all documentaries together as a mini film festival."},{"t":"Scratch Jr","d":"Students code a simple Scratch Jr sequence that mirrors the scientific method they followed — a character walks to the experiment, a question mark appears (What will happen?), the character performs the test, then a tick or cross appears showing what they discovered. Each step in the code represents a step in the process: observe, predict, test, conclude. Programming the method as a sequence helps students understand that science — like code — follows deliberate steps in a specific order to reach a reliable result."},{"t":"GarageBand","d":"Students create a 'Sounds of Science' audio guide for the class science display — recording narrated explanations of each experiment with sound effects (bubbling for the melting test, rolling sounds for the ramp, bird calls for the Nature Walk). The audio guide is played through a speaker as visitors explore the display, transforming a static poster exhibition into an immersive listening experience that couldn't exist without audio production tools."},{"t":"Beebots","d":"Students program Beebots to follow a 'Scientific Method Path' — a mat with four stations labelled Observe, Predict, Test and Conclude. At each station they pause and record what a scientist does at that step. The act of programming each move deliberately (forward to Observe, turn to Predict, forward to Test) makes the sequence of scientific thinking physical and sequential — reinforcing that scientists follow steps in order just like a program follows instructions, connecting computational thinking to the scientific process explored throughout the unit."},{"t":"Seesaw","d":"Students photograph their science experiments and use Seesaw drawing tools to circle what they observed changing, recording a voice note explaining what happened when they tested different materials — building scientific documentation skills throughout the unit."}]},{"ca":"Elsternwick","yl":"Year 1","th":"Who We Are","ci":"The actions we take influence our safety and wellbeing.","lo":"Safe environments; How our actions affect ourselves and others; Keeping our body and mind healthy","s":[{"t":"iMovie","d":"Students produce a 'Safety Smart' news report — filming segments around the school showing safe vs unsafe actions in different environments (classroom, playground, swimming pool from the Intensive Swimming Program). Student reporters demonstrate the safe choice, then show the consequence of the unsafe choice in split-screen or slow-motion replay, delivering a verdict backed by what they learned about body parts and physical safety."},{"t":"Scratch Jr","d":"Students code a 'Choose the Safe Action' interactive animation in Scratch Jr — a character faces a scenario (crossing the road, using scissors, climbing the playground) and the player taps to choose the safe or unsafe response. Each choice leads to a different animated outcome showing the consequence, creating a cause-and-effect safety simulator that runs on code the student built."},{"t":"GarageBand","d":"Students create a 'Wellbeing Workout' audio guide in GarageBand — recording instructions for three physical activities from their PE lessons (stretching, balancing, breathing exercises) over calm background music. The audio guide is used during actual class wellbeing breaks, making the students' work a real tool that supports their peers' health every day — not just an assignment."},{"t":"Padlet","d":"Students post photos of safe and unsafe examples they spot around the school onto a class Padlet board, adding voice notes explaining why each is safe or unsafe — building a collaborative reference wall that the class uses to develop their understanding of safe environments."},{"t":"Google Earth","d":"Students use Google Earth to explore the diverse environments that the animals and living things studied during the unit call home — navigating from the Elsternwick school grounds to Arctic tundra, tropical rainforest, desert, and ocean. At each environment they identify the features that make it liveable for specific species, connecting the unit's inquiry into safe environments and the actions we take to care for living things to the real geography of where those living things exist."}]},{"ca":"Elsternwick","yl":"Year 1","th":"Where We Are in Place and Time","ci":"Homes reflect our culture and environment.","lo":"Different types of homes; Characteristics of a home; The importance of sustainable living spaces","s":[{"t":"Green Screen","d":"Students present their mini home building project in front of the green screen — placed inside the real environment their home was designed for (Arctic landscape for the igloo builder, Australian outback for the gunya hut builder, Scandinavian coast for the Viking turf home builder). They explain why their home looks the way it does, connecting materials and design to climate and culture in a way that couldn't happen without virtual travel."},{"t":"iMovie","d":"Students produce a 'Homes Around the World' travel show — each group films a segment introducing their researched home type (igloo, houseboat, gunya hut, apartment), using their mini home as a prop and demonstrating how the design solves a problem (igloos trap warmth, houseboats float on water, gunya huts use available materials). Stop-motion reveals how the mini home was built step by step."},{"t":"Scratch Jr","d":"Students code a 'Build-a-Home' animation in Scratch Jr showing a home being constructed piece by piece in its environment — blocks of ice stacking into an igloo against an Arctic backdrop, or sticks and bark forming a gunya hut in the Australian bush. The animation demonstrates the connection between materials, environment and culture through a coded construction sequence that plays automatically."},{"t":"Google Maps + Seesaw","d":"Students find their home on Google Maps, screenshot the Street View, and post it to Seesaw with a voice recording explaining what they notice about the place where they live — the materials their home is made from, what makes it suited to Elsternwick's environment, and how it compares to the diverse home types studied during the unit (Arctic igloos, Mongolian gers, Japanese machiya). The activity personalises the unit's central idea that homes reflect culture and environment by starting with the student's own front door."},{"t":"Google Earth","d":"Students explore different locations around the world where the homes they studied are found (Arctic for igloos, outback Australia for gunya huts), connecting geography to the home characteristics and sustainable living discussed in class."}]},{"ca":"Elsternwick","yl":"Year 1","th":"How We Express Ourselves","ci":"Emotions can be expressed in different ways.","lo":"Recognising our own and others' emotions; Responding to and interpreting our emotions; Different ways we express emotions","s":[{"t":"Green Screen","d":"Students perform their emotion masks in front of the green screen — each child holds up the mask they created and acts out the emotion in an environment that matches (the angry mask in a thunderstorm, the calm mask on a beach, the excited mask at a party). The green screen transforms their single mask into a full emotional scene, demonstrating that emotions are expressed through body language, colour, setting AND facial expression simultaneously."},{"t":"Scratch Jr","d":"Students code an 'Emotion Charades' game in Scratch Jr — a character's face and body change to show an emotion (jumping for excited, drooping for sad, shaking for angry, floating for calm), and the audience must guess which emotion is being expressed. Each student codes a different emotion, and the class plays each other's games — learning to read non-verbal expression cues through an interactive coded experience."},{"t":"GarageBand","d":"Students create a short soundscape to accompany an emotion (happy, sad, angry, calm), connecting to the music lessons where they explored expressing emotions through sound and created soundscapes to accompany different feelings."},{"t":"Padlet","d":"Students post photos of their colour-themed emotion artworks onto a class Padlet gallery, adding voice notes explaining which emotion they expressed and why they chose those colours and shapes — building a collaborative 'Feelings Exhibition' wall."},{"t":"Seesaw","d":"Students record a Seesaw video of themselves demonstrating one emotion through three different expression methods — first through body and facial expression (drama), then through a GarageBand sound they created, then through a drawing. Playing all three back, they explain which method communicated the emotion most clearly and why — building the metacognitive vocabulary (expression, medium, communicate) the unit develops while creating a multimodal portfolio that captures the full arc of the inquiry."}]},{"ca":"Elsternwick","yl":"Year 1","th":"How the World Works","ci":"Patterns help us to interpret the world around us.","lo":"Patterns and cycles in our lives; Different patterns around us; How patterns can be created, interpreted and extended","s":[{"t":"Scratch Jr","d":"Students code a life cycle animation in Scratch Jr showing the stages of the organism they researched on Epic — butterfly egg to caterpillar to chrysalis to butterfly, with each stage as a new scene where the character transforms. The animation loops automatically, demonstrating visually that life cycles ARE patterns that repeat — connecting coding loops to the biological concept explored throughout the unit."},{"t":"iMovie","d":"Students produce a 'Pattern Hunters' documentary — filming themselves finding patterns in three different locations around the school (brick patterns on walls, leaf patterns in the garden, daily routine patterns on the class timetable). Each pattern is captured in close-up and slow motion, then the student explains what would happen if the pattern broke — connecting the visual patterns to the lifecycle and seasonal patterns researched during the unit."},{"t":"Beebots","d":"Students program Beebots to travel a repeating pattern route — forward, turn, forward, turn — tracing geometric shapes on a large grid mat. They design their pattern sequence first on paper, then enter it into the Beebot and observe whether the robot follows their predicted path. When it doesn't, they debug and adjust, discovering that patterns in code — like patterns in nature — follow precise, repeatable rules. The physical movement of the robot makes the abstract concept of pattern sequencing concrete and testable."},{"t":"Micro:bit","d":"Students program micro:bits to display repeating pattern sequences on the LED screen (dot patterns cycling through shapes), comparing digital patterns with the natural patterns they discovered in living things — connecting coding logic to the mathematical patterns observed in nature."},{"t":"Seesaw","d":"Students use Seesaw to create a 'Pattern Spotter' record — photographing three patterns they find in the classroom, school garden, or their own clothing (stripes, spots, repeating shapes, colour sequences) and recording a voice note identifying the rule that makes each pattern repeat. Collecting patterns from the real environment and articulating the underlying rule builds the unit's key understanding: that patterns have structure, and recognising that structure is how we interpret and extend them — a skill that transfers to music, maths, coding and science."}]},{"ca":"Elsternwick","yl":"Year 1","th":"How We Organise Ourselves","ci":"Services are established to help the needs of people in the community.","lo":"Local services; Why we need local services in our community; How services meet personal and community needs","s":[{"t":"Canva Video","d":"Students produce a 'Community Service Spotlight' video — filming a real thank-you message to the community worker they wrote their appreciation letter for, then walking to the service location (library, fire station, local shop) to film an on-location report explaining what the service does and why the community needs it. The finished video is shared at assembly as a genuine act of appreciation."},{"t":"Scratch Jr","d":"Students code a 'Community Service Simulator' in Scratch Jr where a character visits different services throughout their day — going to the doctor when sick, visiting the library for a book, calling the fire brigade for an emergency. Each scene shows the service in action with characters moving and interacting, demonstrating how services meet different needs at different times — a coded model of community systems."},{"t":"Green Screen","d":"Students film themselves as community service workers in front of the green screen — placed inside a fire station, hospital, library, or school office. Each student explains their role, demonstrates what they do in an emergency or typical day, and explains why the community needs them — connecting to their Learner Profile focus on caring and the assembly presentation about community."},{"t":"Padlet","d":"Students post photos and drawings of community services they discovered during their local area investigation, adding voice notes explaining what each service does and why the community needs it — building a collaborative map of how services connect."},{"t":"Google Maps","d":"Students explore the streets around Elsternwick on Google Maps Street View, finding community services (fire station, library, medical centre, post office, school). They screenshot each one and the teacher asks: 'What would happen if this service disappeared?' — launching the inquiry into why communities need services and how they meet people's needs."}]},{"ca":"Elsternwick","yl":"Year 2","th":"Who We Are","ci":"Our relationships with others impact our lives.","lo":"Importance of relationships; Developing and maintaining healthy relationships; The impact of relationships on wellbeing","s":[{"t":"Green Screen + Padlet","d":"Students film a green screen 'Relationship Report' where they transport themselves to different social settings (playground, classroom, sports field, home) and perform scenarios demonstrating healthy relationship strategies — connecting the Padlet wonderwall examples to a broadcast format that brings the strategies to life in impossible locations."},{"t":"GarageBand","d":"Students compose a 'Relationships Soundscape' in GarageBand layering sounds that represent different relationship emotions explored during the unit — cooperation (harmonious instruments), conflict (clashing beats), resolution (melody returning) — performing their composition live while classmates guess which relationship scenario each section represents, connecting to PE teamwork reflections."},{"t":"Scratch Jr","d":"Students code an interactive 'Friendship Scenario' in Scratch Jr where animated characters face a relationship challenge (based on PE cooperation activities) and the viewer taps to choose a response — each choice triggers different consequences, showing how open-mindedness and balanced approaches affect wellbeing outcomes."},{"t":"Microsoft Forms","d":"Students design a short Microsoft Forms survey asking three questions about healthy relationships — 'What makes you feel safe with a friend?', 'What would you do if a friendship felt unkind?', 'What is one thing a good friend does?' — and collect responses anonymously from their class. Analysing the results together, they look for patterns in what their peers value in relationships, building a class-generated evidence base for the unit's central idea that our relationships with others impact our lives in ways both positive and challenging."},{"t":"Seesaw","d":"Students draw themselves and record a voice note answering 'What does a healthy relationship look like?' — creating a personal snapshot that the class revisits at the end of the unit to see how their understanding of relationships has grown."}]},{"ca":"Elsternwick","yl":"Year 2","th":"Where We Are in Place and Time","ci":"Landmarks and places of significance tell stories about our history.","lo":"The significance of places to different people and cultures; The connection between landmarks and identity; How landmarks and symbols represent our history","s":[{"t":"iMovie","d":"Students produce an iMovie 'Landmarks of Elsternwick' documentary combining walking excursion footage (MLC, Wesley, Cato Park, Prest Room artefacts) with narration explaining what each landmark tells us about the community's history — using transitions, titles and picture-in-picture to layer historical photos alongside present-day footage."},{"t":"Green Screen","d":"Students film a green screen time-travel broadcast where they 'visit' Elsternwick landmarks in their historical context using old photos as backdrops, reporting on the significance of each place to different people and cultures — connecting to the Possum Magic capital cities mapping and the Year 2 Purple Acknowledgement of Country."},{"t":"Scratch Jr","d":"Students code an interactive 'Elsternwick Map Tour' in Scratch Jr where tapping landmark sprites triggers animations and recorded voice explanations about each place's significance, how symbols represent landmarks, and connections between map-reading skills from Possum Magic and understanding significance of place for different cultures."},{"t":"Google Maps + Seesaw","d":"Students explore the streets around Elsternwick on Google Maps Street View — finding landmarks from the unit (the Astor Theatre, Rippon Lea, St Columbas) in their actual street context. They screenshot their finds and post to Seesaw with voice annotations explaining the landmark's significance and what story it tells about Elsternwick's history. Walking the streets virtually before visiting in person gives students geographic anchoring and sharpens their observation skills for the excursion."},{"t":"Google Earth","d":"Students use Google Earth to explore Elsternwick's landmarks from above and at street level — navigating to Rippon Lea Estate, the Astor Theatre, Balaclava's cultural precinct, and St Kilda Road's historical buildings. They compare the satellite view with historical photographs of the same sites, identifying what survives from the past and what has changed. The virtual exploration builds geographical familiarity with the unit's key locations before excursion visits, so students arrive knowing what to look for and carrying specific historical questions."}]},{"ca":"Elsternwick","yl":"Year 2","th":"How We Express Ourselves","ci":"Artistic appreciation and expressions inspire our imagination and creativity.","lo":"Forms of expression; Expressing thoughts and ideas; Understanding and appreciating art","s":[{"t":"iMovie","d":"Students produce an iMovie 'Art Gallery Opening' film where they walk viewers through their pet portrait artwork and creative process, using picture-in-picture to show their initial 'How am I creative?' self-reflection drawings beside the finished pieces — narrating their growth as risk-takers who embraced experimentation without fear of failure."},{"t":"Scratch Jr","d":"Students code an interactive 'Creativity Museum' in Scratch Jr where visitors tap on different room sprites (visual art, music, drama, Lego, recycled materials) to trigger animations showing the creative process for each form of expression explored during the unit — demonstrating how artistic appreciation inspires imagination through an interactive format impossible without coding."},{"t":"GarageBand","d":"Students create short soundscapes in GarageBand to accompany their art gallery exhibition, composing music that reflects the mood and style of the artistic expressions explored throughout the unit including their pet portrait artwork and creative process documentation."},{"t":"Book Creator","d":"Students create an 'Art Exploration' portfolio documenting the different forms of expression explored during the unit — including their 'How am I creative?' self-reflection drawings, Lego building without a plan, dance and drama pieces, and their pet portrait combining various art styles and skills."},{"t":"Seesaw","d":"Students photograph their creative process during art activities (Lego building, collage making, drawing) and record reflections about how expression makes them feel, connecting to the Learner Profile focus on being a risk-taker who 'embraces experimentation'."}]},{"ca":"Elsternwick","yl":"Year 2","th":"How the World Works","ci":"Forces and motion are all around us.","lo":"Forces around us; Scientific laws of motion; Innovations in technology","s":[{"t":"Lego Spike","d":"Students build a Lego Spike 'Force Testing Rig' that uses the motor to apply consistent push force and the distance sensor to measure how far objects travel across different surfaces — programming automated test runs, recording results, and presenting ranked friction data alongside their ramp experiment findings from the Maker Space."},{"t":"iMovie","d":"Students produce an iMovie 'Forces Lab' episode filming their best Maker Space experiment (ramps, magnets, or simple machines) with slow-motion replay of the key moment, scientific vocabulary labels overlaid on screen, and a conclusion delivered 'sounding like scientists' — using the class vocab wall terms for prediction, method and conclusion."},{"t":"Scratch","d":"Students code an interactive 'Inventions Through the Ages' simulation in Scratch where clicking on simple machine sprites (lever, ramp, pulley, wheel) triggers animations showing how forces make them work, then reveals the modern invention they evolved into — connecting the Twisted Science excursion provocation to a digital museum visitors can explore."},{"t":"Micro:bit","d":"Students use micro:bit accelerometers to measure the force of pushes during their ramp experiments, displaying readings on the LED screen and comparing how different forces and materials affect motion — connecting digital measurement to the scientific vocabulary from the class word wall."},{"t":"Canva Video","d":"Students produce a Canva Video science report presenting their forces and motion investigation — filming themselves demonstrating push, pull and gravity experiments, then narrating their findings with titles and annotations. Each group tests a different surface or ramp angle and presents their results as a short documentary, connecting their evidence to Newton's laws of motion explored during the unit. The video format requires students to explain their reasoning out loud, consolidating scientific vocabulary and the inquiry process."}]},{"ca":"Elsternwick","yl":"Year 2","th":"How We Organise Ourselves","ci":"Marketplaces reflect the needs and wants of communities.","lo":"Needs and wants; The changing needs of communities; The design process","s":[{"t":"Lego Spike","d":"Students build a Lego Spike prototype of their marketplace product that includes a motorised or sensor-based feature (e.g. an automatic dispensing mechanism), programming it to demonstrate how their design meets the community need identified during the Sacred Heart Mission Glen Huntly Road excursion — presenting at a class marketplace exhibition."},{"t":"iMovie","d":"Students produce an iMovie 'Shark Tank Junior' pitch video for their marketplace product, filming the design thinking journey (empathise, define, ideate, prototype, test) with time-lapse of their Maker Space creation process — delivering a persuasive pitch that demonstrates the difference between needs and wants learned from the sorting game provocation."},{"t":"Scratch Jr","d":"Students code a simple two-scene animation in Scratch Jr showing what happens when the design process works (need → idea → prototype → solution) vs when steps are skipped (need → random guess → failure) — exploring the concept before the Sacred Heart Mission excursion deepens their understanding of community needs."},{"t":"Padlet","d":"Students post their product designs at each stage of the design thinking process on a shared Padlet board, peer-reviewing each other's solutions and providing feedback on how well each product meets community needs identified during the Sacred Heart Mission excursion."},{"t":"Book Creator","d":"Students create a 'Community Services Guide' in Book Creator — one page per service investigated during the unit (doctor, fire station, library, post office, café), with a photo, a voice recording explaining what the service provides, and a drawing of who uses it and why. The completed guide becomes a real reference document for the classroom, giving the unit's key learning a genuine audience and purpose — demonstrating that services exist because people in a community have needs that require organised responses."}]},{"ca":"Elsternwick","yl":"Year 2","th":"Sharing the Planet","ci":"Taking care of our Earth starts with the choices we make.","lo":"Earth's resources; How our actions affect the environment; Ways we can care for our planet","s":[{"t":"Beebots","d":"Students program Beebots to navigate a 'Sustainable Choices' floor map — moving through green zones (responsible choices: recycling station, solar panels, community garden) while avoiding red zones (wasteful choices: single-use plastics, polluted waterways, deforestation). Students must plan their route before programming, deciding which sequence of responsible actions leads to a healthy planet. The physical act of guiding the robot through choices makes abstract environmental responsibility tangible and sequential — connecting directly to the unit's inquiry into how our actions affect the Earth."},{"t":"iMovie","d":"Students produce an iMovie 'Earth Care News Report' filming their school environment with narration about responsible and irresponsible resource use they documented throughout the unit, using split-screen to show 'what we do now' vs 'what we should do' — building on the persuasive speech skills and Athletics unit transdisciplinary thinking."},{"t":"Micro:bit","d":"Students build a micro:bit 'Planet Care Dashboard' that uses the light sensor to monitor classroom energy use and displays a happy or sad face depending on whether lights are being used responsibly — presenting their working environmental monitor alongside their action plan for how the school community can make better choices for the planet."},{"t":"Seesaw","d":"Students photograph examples of resource use around school and draw/annotate how each choice helps or harms the environment, building understanding of the connection between daily actions and planetary wellbeing — documenting evidence for their persuasive speeches."},{"t":"Google Earth","d":"Students use Google Earth to explore the ecosystems connected to the living things they studied — zooming into the Great Barrier Reef, the Amazon rainforest, Australian wetlands, and urban green spaces. At each location they compare satellite imagery of healthy versus degraded versions of that ecosystem, gathering visual evidence for the unit's inquiry into actions that benefit or harm ecosystems. The satellite perspective makes global environmental responsibility feel tangible: students can zoom from Elsternwick's own parklands to ecosystems under threat on the same tool."}]},{"ca":"Elsternwick","yl":"Year 3","th":"How We Express Ourselves","ci":"Celebrations and traditions shape the culture of a community.","lo":"The ways personal and cultural events are celebrated; Our appreciation of the diversity of cultures; How celebrations shape community identity","s":[{"t":"Scratch + GarageBand","d":"Students code an interactive 'Cultural Celebrations Museum' in Scratch where visitors click on celebration sprites (Chinese New Year, Diwali, Easter, NAIDOC) to trigger animations, music samples from their GarageBand compositions, and recorded voice explanations — creating a digital exhibition that celebrates the diversity of cultures and how celebrations shape community identity."},{"t":"Canva Video","d":"Students produce a short documentary about a celebration or tradition important to their family or culture, including interviews with family members and connections to the music provocation exploring Gurrumal's 'I Am Australian' and what it means to belong to a diverse Australian community."},{"t":"CoSpaces","d":"Students build a 3D 'Celebrations Museum' in CoSpaces — creating walkable exhibition rooms for each cultural celebration studied (Chinese New Year, Diwali, Easter, NAIDOC) with clickable objects that reveal the traditions, foods, symbols and community significance of each event. Other classes and parents can be invited to explore the virtual museum, giving the student research a real-world audience. The interactive format demonstrates how celebrations shape community identity by asking visitors to walk through and experience the cultural richness students have curated."},{"t":"Book Creator","d":"Students create a cultural research book documenting different celebrations and traditions explored during the unit, including representations of what the colours and symbols of the Australian flag represent, and personal family stories about how cultural events are celebrated."},{"t":"Adobe Express Character Animator","d":"Students choose a character in Adobe Express Character Animator to represent a cultural celebration they researched — dressing the scene with a culturally appropriate background and adding music. They record their voice as a community member explaining why the celebration matters to their culture and how it shapes their identity. The animated performance combines the unit's music, drama and inquiry strands into a single digital artefact — and the class collection becomes a multicultural showcase that celebrates the diversity of communities explored throughout the unit."}]},{"ca":"Elsternwick","yl":"Year 3","th":"How the World Works","ci":"Humans use their understanding of scientific principles to take action.","lo":"The work of scientists; The process of learning; How science brings about new understandings and changes","s":[{"t":"Scratch + Micro:bit","d":"Students code an interactive 'Science Principles in Action' simulation in Scratch where clicking on different experiment sprites triggers animated demonstrations of the scientific principles investigated during the unit, with data overlays from their micro:bit sensor investigations — creating a digital science museum visitors can explore."},{"t":"Tinkercad","d":"Students design a 3D model in Tinkercad of a scientific instrument or tool invented by the scientist they researched, with movable parts showing how the scientific principle works — presenting their digital design alongside their research profile explaining how this scientist's discoveries changed the world."},{"t":"Adobe Express (Video)","d":"Students produce a short documentary about their chosen scientist's impact on the world, incorporating research from guided and shared reading experiences, class videos of scientists, and discussions about how discoveries change society."},{"t":"Lego Spike","d":"Students build a Lego Spike mechanism demonstrating a scientific principle their chosen scientist discovered, programming the motor and sensors to create a working model that shows cause and effect, presenting the prototype alongside their research poster and documentary."},{"t":"Kahoot","d":"Students collaboratively build a Kahoot quiz about the scientific principles and scientists studied during the unit — each group is responsible for three questions about their assigned scientist's discovery, the principle it demonstrated, and how it changed scientific understanding. Playing the quiz tests the whole class's breadth of knowledge across multiple scientists and principles, and the discussion after each wrong answer deepens understanding. Building the quiz requires students to identify what is genuinely important to know — a higher-order task than answering questions."}]},{"ca":"Elsternwick","yl":"Year 3","th":"How We Organise Ourselves","ci":"The rights and responsibilities of citizens are determined by the rules and laws of a community.","lo":"The differences between rules and laws; People responsible for enforcing rules and laws; Rights and responsibilities of citizens; The consequences when rules, laws and rights are not met","s":[{"t":"Delightex (CoSpaces)","d":"Students build an interactive 3D courtroom in CoSpaces where visitors walk through scenarios involving rules vs laws — clicking on characters triggers explanations of who enforces the rule or law, what the consequence is, and how citizens' rights and responsibilities connect — creating an immersive experience that brings the card game provocation to life
