being.", "lo": "Safe environments; How our actions affect ourselves and others; Keeping our body and mind healthy", "s": [{"t": "Seesaw", "d": "Students draw themselves and record a voice note answering the question: 'What does safe environments mean to you?' — creating a personal snapshot that the class can revisit at the end of the unit to see how thinking has changed.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create an 'All About Me' page featuring drawings and voice recordings about how our actions affect ourselves and others, starting a personal book they will add to throughout the unit as their understanding of the actions we take influence our safety and wellbeing grows.", "c": "beginning"}, {"t": "Padlet", "d": "Students post a photo of somewhere they feel safe (their bedroom, grandma's house, the school library) to a shared Padlet wall with a voice recording explaining what makes that place feel safe. The class sees 25 safe places at once and the teacher draws out patterns — safe places have trusted people, clear rules, and routines. This launches the inquiry into how actions create safe environments.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore different environments and habitats using Google Earth satellite and Street View, observing how landscapes connected to safe environments look from above and ground level — comparing biomes across the globe.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph examples of safe and healthy actions during PE and class activities, using drawing tools to annotate how each action supports their body and mind, building vocabulary about body parts and health.", "c": "middle"}, {"t": "Scratch Jr", "d": "Students code a simple animation showing a character making safe choices in different environments (classroom, playground, swimming pool), connecting to the safety scenarios explored through the Intensive Swimming Program.", "c": "middle"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about safe environments.", "c": "middle"}, {"t": "iMovie", "d": "Students produce a 'Safety Smart' news report — filming segments around the school showing safe vs unsafe actions in different environments (classroom, playground, swimming pool from the Intensive Swimming Program). Student reporters demonstrate the safe choice, then show the consequence of the unsafe choice in split-screen or slow-motion replay, delivering a verdict backed by what they learned about body parts and physical safety.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code a 'Choose the Safe Action' interactive animation in Scratch Jr — a character faces a scenario (crossing the road, using scissors, climbing the playground) and the player taps to choose the safe or unsafe response. Each choice leads to a different animated outcome showing the consequence, creating a cause-and-effect safety simulator that runs on code the student built.", "c": "end"}, {"t": "GarageBand", "d": "Students create a 'Wellbeing Workout' audio guide in GarageBand — recording instructions for three physical activities from their PE lessons (stretching, balancing, breathing exercises) over calm background music. The audio guide is used during actual class wellbeing breaks, making the students' work a real tool that supports their peers' health every day — not just an assignment.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 1", "th": "Where We Are in Place and Time", "ci": "Homes reflect our culture and environment.", "lo": "Different types of homes; Characteristics of a home; The importance of sustainable living spaces", "s": [{"t": "Green Screen", "d": "Students present their mini home building project in front of the green screen — placed inside the real environment their home was designed for (Arctic landscape for the igloo builder, Australian outback for the gunya hut builder, Scandinavian coast for the Viking turf home builder). They explain why their home looks the way it does, connecting materials and design to climate and culture in a way that couldn't happen without virtual travel.", "c": "end"}, {"t": "iMovie", "d": "Students produce a 'Homes Around the World' travel show — each group films a segment introducing their researched home type (igloo, houseboat, gunya hut, apartment), using their mini home as a prop and demonstrating how the design solves a problem (igloos trap warmth, houseboats float on water, gunya huts use available materials). Stop-motion reveals how the mini home was built step by step.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code a 'Build-a-Home' animation in Scratch Jr showing a home being constructed piece by piece in its environment — blocks of ice stacking into an igloo against an Arctic backdrop, or sticks and bark forming a gunya hut in the Australian bush. The animation demonstrates the connection between materials, environment and culture through a coded construction sequence that plays automatically.", "c": "end"}, {"t": "Seesaw", "d": "Students use the drawing and photo tools to document their mini home building process step-by-step, recording voice explanations about why they chose certain materials and designs based on the culture and environment they studied.", "c": "middle"}, {"t": "Google Earth", "d": "Students explore different locations around the world where the homes they studied are found (Arctic for igloos, outback Australia for gunya huts), connecting geography to the home characteristics and sustainable living discussed in class.", "c": "middle"}, {"t": "Google Maps", "d": "Students explore their own home location on Google Maps and take a screenshot, then use Seesaw to record what they notice about the place where they live — connecting to the unit's focus on different types of homes.", "c": "beginning"}, {"t": "Book Creator", "d": "Students start a 'Then and Now' book by drawing or photographing something from their life connected to characteristics of a home, adding voice recordings explaining what they think it looked like in the past.", "c": "beginning"}, {"t": "Padlet", "d": "Students post a photo or drawing of their own home to a shared Padlet wall with a voice recording describing what makes it special — what it's made of, who lives there, their favourite room. The class sees 25 homes at once and notices that everyone's home is different. The teacher asks: 'Why are homes so different?' — launching the inquiry into how homes reflect culture and environment.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about different types of homes.", "c": "middle"}, {"t": "Padlet", "d": "Students drop pins on a shared Padlet Map marking locations connected to different types of homes, adding photos, facts and reflections at each pin — building a collaborative geographic record of the class's environmental research.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 1", "th": "How We Express Ourselves", "ci": "Emotions can be expressed in different ways.", "lo": "Recognising our own and others' emotions; Responding to and interpreting our emotions; Different ways we express emotions", "s": [{"t": "Book Creator", "d": "Students create an 'Emotions Art Gallery' book featuring photographs of their colour-themed emotion artworks (posters, collages, and masks), with voice recordings explaining which colours and facial features they chose to represent each emotion and why.", "c": "end"}, {"t": "Green Screen", "d": "Students perform their emotion masks in front of the green screen — each child holds up the mask they created and acts out the emotion in an environment that matches (the angry mask in a thunderstorm, the calm mask on a beach, the excited mask at a party). The green screen transforms their single mask into a full emotional scene, demonstrating that emotions are expressed through body language, colour, setting AND facial expression simultaneously.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code an 'Emotion Charades' game in Scratch Jr — a character's face and body change to show an emotion (jumping for excited, drooping for sad, shaking for angry, floating for calm), and the audience must guess which emotion is being expressed. Each student codes a different emotion, and the class plays each other's games — learning to read non-verbal expression cues through an interactive coded experience.", "c": "end"}, {"t": "GarageBand", "d": "Students create a short soundscape to accompany an emotion (happy, sad, angry, calm), connecting to the music lessons where they explored expressing emotions through sound and created soundscapes to accompany different feelings.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw and record a weekly 'emotion check-in' showing how they feel using the colour associations explored through The Colour Monster activities and their own colour-emotion artwork.", "c": "middle"}, {"t": "Seesaw", "d": "Students use the camera and drawing tools to create a 'Before I Knew' page showing what recognising our own and others' emotions looks like to them right now — using pictures, labels and voice recording to capture their starting understanding.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page showing different ways they can express the idea of responding to and interpreting our emotions — through drawing, voice, photos and text — exploring which method feels most natural to them.", "c": "beginning"}, {"t": "GarageBand", "d": "Students listen to four pre-made GarageBand clips — one fast and bright, one slow and low, one chaotic and loud, one gentle and flowing — and draw the face they imagine for each emotion on a whiteboard. The class compares drawings and discovers that music communicates emotions without words and that everyone interprets sounds differently, connecting to the unit's focus on how feelings are expressed and interpreted.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about recognising our own and others' emotions.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 1", "th": "How the World Works", "ci": "Patterns help us to interpret the world around us.", "lo": "Patterns and cycles in our lives; Different patterns around us; How patterns can be created, interpreted and extended", "s": [{"t": "Scratch Jr", "d": "Students code a life cycle animation in Scratch Jr showing the stages of the organism they researched on Epic — butterfly egg to caterpillar to chrysalis to butterfly, with each stage as a new scene where the character transforms. The animation loops automatically, demonstrating visually that life cycles ARE patterns that repeat — connecting coding loops to the biological concept explored throughout the unit.", "c": "end"}, {"t": "iMovie", "d": "Students produce a 'Pattern Hunters' documentary — filming themselves finding patterns in three different locations around the school (brick patterns on walls, leaf patterns in the garden, daily routine patterns on the class timetable). Each pattern is captured in close-up and slow motion, then the student explains what would happen if the pattern broke — connecting the visual patterns to the lifecycle and seasonal patterns researched during the unit.", "c": "end"}, {"t": "Sphero", "d": "Students program Spheros to draw repeating pattern shapes on butchers paper (using marker attachments or paint) — circles inside circles, zigzag lines, spirals — then compare their Sphero-drawn patterns with the natural patterns they photographed during the unit. The class discusses which patterns appear in both nature and code, discovering that mathematical patterns underpin everything from butterfly wings to coding loops.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph patterns they discover around the school (building bricks, nature patterns, classroom arrangements) and record observations about how patterns repeat and extend, building their observational research skills.", "c": "middle"}, {"t": "Beebots", "d": "Students program Beebots to follow repeating pattern sequences on a class-made grid, then extend the pattern — connecting to the mathematical concept of creating, interpreting and extending patterns explored across the unit.", "c": "middle"}, {"t": "Sphero", "d": "Students program Spheros to travel in repeating pattern sequences (circle, square, zigzag) on a classroom grid, connecting coding loops to the natural cycles and patterns observed in life cycles and seasonal changes investigated throughout the unit.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph or draw something from their environment connected to patterns and cycles in our lives and record a voice note explaining what they think is happening and why — capturing their scientific thinking before investigations begin.", "c": "beginning"}, {"t": "Book Creator", "d": "Students draw their prediction of what will happen when they explore different patterns around us and record a voice note explaining their reasoning — creating a 'My Prediction' page to compare against results later.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore locations connected to the unit's focus using Google Earth satellite and street views, making initial observations and recording wonderings that will anchor their inquiry into patterns and cycles in our lives.", "c": "beginning"}, {"t": "Padlet", "d": "Students contribute to a shared Padlet Map by pinning locations connected to patterns and cycles in our lives, adding images, research findings and questions — building a collaborative geographic resource the class can explore together.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 1", "th": "How We Organise Ourselves", "ci": "Services are established to help the needs of people in the community.", "lo": "Local services; Why we need local services in our community; How services meet personal and community needs", "s": [{"t": "Canva Video", "d": "Students produce a 'Community Service Spotlight' video — filming a real thank-you message to the community worker they wrote their appreciation letter for, then walking to the service location (library, fire station, local shop) to film an on-location report explaining what the service does and why the community needs it. The finished video is shared at assembly as a genuine act of appreciation.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code a 'Community Service Simulator' in Scratch Jr where a character visits different services throughout their day — going to the doctor when sick, visiting the library for a book, calling the fire brigade for an emergency. Each scene shows the service in action with characters moving and interacting, demonstrating how services meet different needs at different times — a coded model of community systems.", "c": "end"}, {"t": "Green Screen", "d": "Students film themselves as community service workers in front of the green screen — placed inside a fire station, hospital, library, or school office. Each student explains their role, demonstrates what they do in an emergency or typical day, and explains why the community needs them — connecting to their Learner Profile focus on caring and the assembly presentation about community.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph local services during community walks and use drawing tools to annotate how each one helps people, building towards their appreciation letter-writing activity for local community workers.", "c": "middle"}, {"t": "Scratch Jr", "d": "Students code a simple animation showing a day in the life of a community service worker (fire, police, hospital, library), demonstrating how the service meets community needs explored through class discussions.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw or photograph an example of local services from their everyday life, then record a voice note explaining how it works — building a class collection of real-world connections before the inquiry begins.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph examples of why we need local services in our community around the school or home and create a Book Creator page sorting them into categories, with voice recordings explaining their grouping — practising the classification skills they will develop in the unit.", "c": "beginning"}, {"t": "Google Maps", "d": "Students explore the streets around Elsternwick on Google Maps Street View, finding community services (fire station, library, medical centre, post office, school). They screenshot each one and the teacher asks: 'What would happen if this service disappeared?' — launching the inquiry into why communities need services and how they meet people's needs.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about local services.", "c": "middle"}, {"t": "Padlet", "d": "Students pin significant locations on a shared Padlet Map connected to local services, adding photos, descriptions and personal connections — creating a collaborative class map that makes geographic learning visible.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 2", "th": "Who We Are", "ci": "Our relationships with others impact our lives.", "lo": "Importance of relationships; Developing and maintaining healthy relationships; The impact of relationships on wellbeing", "s": [{"t": "GarageBand", "d": "Students compose a 'Relationships Soundscape' in GarageBand layering sounds that represent different relationship emotions explored during the unit — cooperation (harmonious instruments), conflict (clashing beats), resolution (melody returning) — performing their composition live while classmates guess which relationship scenario each section represents, connecting to PE teamwork reflections.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code an interactive 'Friendship Scenario' in Scratch Jr where animated characters face a relationship challenge (based on PE cooperation activities) and the viewer taps to choose a response — each choice triggers different consequences, showing how open-mindedness and balanced approaches affect wellbeing outcomes.", "c": "end"}, {"t": "Green Screen", "d": "Students film a green screen 'Relationship Report' where they transport themselves to different social settings (playground, classroom, sports field, home) and perform scenarios demonstrating healthy relationship strategies — connecting the Padlet wonderwall examples to a broadcast format that brings the strategies to life in impossible locations.", "c": "end"}, {"t": "Padlet", "d": "Students post weekly reflections about relationship moments at school, with photos and descriptions showing how their actions (voice, choice and ownership) impacted others — building a class wonderwall of positive relationship strategies.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph or draw examples of positive teamwork during PE and classroom activities, recording how cooperation and communication skills strengthen relationships.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw themselves and record a voice note answering the question: 'What does importance of relationships mean to you?' — creating a personal snapshot that the class can revisit at the end of the unit to see how thinking has changed.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create an 'All About Me' page featuring drawings and voice recordings about developing and maintaining healthy relationships, starting a personal book they will add to throughout the unit as their understanding of our relationships with others impact our lives grows.", "c": "beginning"}, {"t": "Book Creator", "d": "Students add to their ongoing inquiry book, documenting new learning about importance of relationships with labelled diagrams, photographs and written reflections showing how their thinking is developing.", "c": "middle"}, {"t": "Padlet", "d": "Students post weekly relationship reflections on a shared Padlet wall, adding photos and descriptions of moments where voice, choice and ownership impacted others — building a visible timeline of how their understanding of healthy relationships deepens throughout the unit.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 2", "th": "Where We Are in Place and Time", "ci": "Landmarks and places of significance tell stories about our history.", "lo": "The significance of places to different people and cultures; The connection between landmarks and identity; How landmarks and symbols represent our history", "s": [{"t": "iMovie", "d": "Students produce an iMovie 'Landmarks of Elsternwick' documentary combining walking excursion footage (MLC, Wesley, Cato Park, Prest Room artefacts) with narration explaining what each landmark tells us about the community's history — using transitions, titles and picture-in-picture to layer historical photos alongside present-day footage.", "c": "end"}, {"t": "Green Screen", "d": "Students film a green screen time-travel broadcast where they 'visit' Elsternwick landmarks in their historical context using old photos as backdrops, reporting on the significance of each place to different people and cultures — connecting to the Possum Magic capital cities mapping and the Year 2 Purple Acknowledgement of Country.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code an interactive 'Elsternwick Map Tour' in Scratch Jr where tapping landmark sprites triggers animations and recorded voice explanations about each place's significance, how symbols represent landmarks, and connections between map-reading skills from Possum Magic and understanding significance of place for different cultures.", "c": "end"}, {"t": "Google Earth", "d": "Students explore landmarks around Elsternwick and across Australia (connecting to Possum Magic capital cities mapping activity), comparing how different cultures value different places and discussing what stories these landmarks tell.", "c": "middle"}, {"t": "Seesaw", "d": "Students use photo prompts from the prior knowledge assessment to document landmarks during the Elsternwick walking excursion, annotating each photo with notes about the landmark's history and significance to the community.", "c": "beginning"}, {"t": "Google Maps", "d": "Students explore their own home location on Google Maps and take a screenshot, then use Seesaw to record what they notice about the place where they live — connecting to the unit's focus on the significance of places to different people and cultures.", "c": "beginning"}, {"t": "Book Creator", "d": "Students start a 'Then and Now' book by drawing or photographing something from their life connected to the connection between landmarks and identity, adding voice recordings explaining what they think it looked like in the past.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the significance of places to different people and cultures, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Book Creator", "d": "Students add to their ongoing inquiry book, documenting new learning about the significance of places to different people and cultures with labelled diagrams, photographs and written reflections showing how their thinking is developing.", "c": "middle"}, {"t": "Padlet", "d": "Students pin locations on a shared Padlet Map where different cultural practices or traditions connected to the significance of places to different people and cultures take place, adding images, descriptions and personal reflections — creating a visual map of cultural diversity.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 2", "th": "How We Express Ourselves", "ci": "Artistic appreciation and expressions inspire our imagination and creativity.", "lo": "Forms of expression; Expressing thoughts and ideas; Understanding and appreciating art", "s": [{"t": "Book Creator", "d": "Students create an 'Art Exploration' portfolio documenting the different forms of expression explored during the unit — including their 'How am I creative?' self-reflection drawings, Lego building without a plan, dance and drama pieces, and their pet portrait combining various art styles and skills.", "c": "end"}, {"t": "iMovie", "d": "Students produce an iMovie 'Art Gallery Opening' film where they walk viewers through their pet portrait artwork and creative process, using picture-in-picture to show their initial 'How am I creative?' self-reflection drawings beside the finished pieces — narrating their growth as risk-takers who embraced experimentation without fear of failure.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code an interactive 'Creativity Museum' in Scratch Jr where visitors tap on different room sprites (visual art, music, drama, Lego, recycled materials) to trigger animations showing the creative process for each form of expression explored during the unit — demonstrating how artistic appreciation inspires imagination through an interactive format impossible without coding.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph their creative process during art activities (Lego building, collage making, drawing) and record reflections about how expression makes them feel, connecting to the Learner Profile focus on being a risk-taker who 'embraces experimentation'.", "c": "middle"}, {"t": "Book Creator", "d": "Collaborative class 'Creativity Book' where each student contributes a page about a different form of creative expression they experienced, including photos and descriptions of their artwork.", "c": "middle"}, {"t": "GarageBand", "d": "Students create short soundscapes in GarageBand to accompany their art gallery exhibition, composing music that reflects the mood and style of the artistic expressions explored throughout the unit including their pet portrait artwork and creative process documentation.", "c": "middle"}, {"t": "Seesaw", "d": "Students use the camera and drawing tools to create a 'Before I Knew' page showing what forms of expression looks like to them right now — using pictures, labels and voice recording to capture their starting understanding.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page showing different ways they can express the idea of expressing thoughts and ideas — through drawing, voice, photos and text — exploring which method feels most natural to them.", "c": "beginning"}, {"t": "Padlet", "d": "Students post examples of art, music, drama, dance and design they find in their everyday lives onto a class Padlet board, adding voice notes explaining what makes each one creative — building a provocation wall that reveals the breadth of expression methods before the unit begins.", "c": "beginning"}]}, {"ca": "Elsternwick", "yl": "Year 2", "th": "How the World Works", "ci": "Forces and motion are all around us.", "lo": "Forces around us; Scientific laws of motion; Innovations in technology", "s": [{"t": "Lego Spike", "d": "Students build a Lego Spike 'Force Testing Rig' that uses the motor to apply consistent push force and the distance sensor to measure how far objects travel across different surfaces — programming automated test runs, recording results, and presenting ranked friction data alongside their ramp experiment findings from the Maker Space.", "c": "end"}, {"t": "iMovie", "d": "Students produce an iMovie 'Forces Lab' episode filming their best Maker Space experiment (ramps, magnets, or simple machines) with slow-motion replay of the key moment, scientific vocabulary labels overlaid on screen, and a conclusion delivered 'sounding like scientists' — using the class vocab wall terms for prediction, method and conclusion.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Inventions Through the Ages' simulation in Scratch where clicking on simple machine sprites (lever, ramp, pulley, wheel) triggers animations showing how forces make them work, then reveals the modern invention they evolved into — connecting the Twisted Science excursion provocation to a digital museum visitors can explore.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph each step of their force experiments (ramp angle changes, magnet tests, friction investigations) and use drawing tools to create labelled diagrams, practising the scientific documentation skills emphasised in the unit.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build and test simple machines (ramps, levers, pulleys) using Lego, measuring how different forces affect motion and connecting their findings to the scientific laws explored through hands-on investigations.", "c": "middle"}, {"t": "Sphero", "d": "Students program Spheros to roll at different speeds across various surfaces, measuring how far each travels to investigate friction, then compare results with their ramp experiments testing push, pull, and gravity forces documented in their investigation reports.", "c": "middle"}, {"t": "Micro:bit", "d": "Students use micro:bit accelerometers to measure the force of a push during their ramp experiments, displaying readings on the LED screen and recording data to compare how different forces and materials affect motion across their investigation activities.", "c": "middle"}, {"t": "Google Earth", "d": "Students explore Google Earth satellite imagery of amusement parks, bridges, construction sites and transport systems, observing where forces and motion are visible from above — screenshotting examples and recording what forces they think are acting on each structure before investigations begin.", "c": "beginning"}, {"t": "Book Creator", "d": "Students draw their prediction of what will happen when they explore scientific laws of motion and record a voice note explaining their reasoning — creating a 'My Prediction' page to compare against results later.", "c": "beginning"}, {"t": "Seesaw", "d": "Students take photos of things around the school connected to innovations in technology and add them to a shared class Seesaw activity, then the class sorts and discusses the collection — identifying patterns and questions to investigate.", "c": "beginning"}]}, {"ca": "Elsternwick", "yl": "Year 2", "th": "How We Organise Ourselves", "ci": "Marketplaces reflect the needs and wants of communities.", "lo": "Needs and wants; The changing needs of communities; The design process", "s": [{"t": "Seesaw", "d": "Students draw or photograph an example of needs and wants from their everyday life, then record a voice note explaining how it works — building a class collection of real-world connections before the inquiry begins.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph examples of the changing needs of communities around the school or home and create a Book Creator page sorting them into categories, with voice recordings explaining their grouping — practising the classification skills they will develop in the unit.", "c": "beginning"}, {"t": "Scratch Jr", "d": "Students code a simple two-scene animation in Scratch Jr showing what happens when the design process works (need → idea → prototype → solution) vs when steps are skipped (need → random guess → failure) — exploring the concept before the Sacred Heart Mission excursion deepens their understanding of community needs.", "c": "beginning"}, {"t": "Google Maps", "d": "Students use Google Maps Street View to virtually visit landmarks and places connected to needs and wants, taking screenshots and recording observations about what they see — bringing distant locations into the classroom.", "c": "beginning"}, {"t": "Scratch Jr", "d": "Students code a simple animation advertising their marketplace product, showing the need-want distinction and demonstrating how their design thinking solution helps the community — connected to the Sacred Heart Mission excursion learning.", "c": "middle"}, {"t": "Padlet", "d": "Students post their product designs at each stage of the design thinking process and peer-review each other's solutions, providing feedback on how well each product meets community needs.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate needs and wants, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Canva Presentation", "d": "Students design a product pitch presentation for the item they created using the design thinking process (empathise, define, ideate, prototype, test), explaining how their product meets a specific community need identified through the Sacred Heart Mission Glen Huntly Road excursion.", "c": "end"}, {"t": "Lego Spike", "d": "Students build a Lego Spike prototype of their marketplace product that includes a motorised or sensor-based feature (e.g. an automatic dispensing mechanism), programming it to demonstrate how their design meets the community need identified during the Sacred Heart Mission Glen Huntly Road excursion — presenting at a class marketplace exhibition.", "c": "end"}, {"t": "iMovie", "d": "Students produce an iMovie 'Shark Tank Junior' pitch video for their marketplace product, filming the design thinking journey (empathise, define, ideate, prototype, test) with time-lapse of their Maker Space creation process — delivering a persuasive pitch that demonstrates the difference between needs and wants learned from the sorting game provocation.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 2", "th": "Sharing the Planet", "ci": "Taking care of our Earth starts with the choices we make.", "lo": "Earth's resources; How our actions affect the environment; Ways we can care for our planet", "s": [{"t": "Padlet", "d": "Students post examples of environmental choices they observe at school and home, building a class wonderwall showing before/after impacts of responsible decisions on the environment.", "c": "beginning"}, {"t": "Seesaw", "d": "Students draw what earth's resources means to them and record a voice note explaining their thinking — creating a 'Before' snapshot that will be compared with their 'After' understanding at the end of the unit.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph or draw something from nature connected to how our actions affect the environment and create a Book Creator page with labels and a voice note explaining why it matters — starting a personal inquiry book.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore different environments and habitats using Google Earth satellite and Street View, observing how landscapes connected to earth's resources look from above and ground level — comparing biomes across the globe.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph examples of resource use around school and draw/annotate how each choice helps or harms the environment, building understanding of the connection between daily actions and planetary wellbeing.", "c": "middle"}, {"t": "Micro:bit", "d": "Students use micro:bit sensors to monitor environmental conditions around the school (light levels, temperature), collecting data to support their persuasive arguments about everyday choices that impact the Earth, adding evidence to their 'Earth Care' posters and action plans.", "c": "middle"}, {"t": "Book Creator", "d": "Students add to their ongoing inquiry book, documenting new learning about earth's resources with labelled diagrams, photographs and written reflections showing how their thinking is developing.", "c": "middle"}, {"t": "Sphero", "d": "Students program Spheros to navigate a 'Sustainable Choices' obstacle course where green zones (responsible choices) trigger celebration spins and red zones (harmful choices) require backing up and choosing again — filming the runs and presenting how each programmed path connects to the persuasive speech skills practised during the unit's communication focus.", "c": "end"}, {"t": "iMovie", "d": "Students produce an iMovie 'Earth Care News Report' filming their school environment with narration about responsible and irresponsible resource use they documented throughout the unit, using split-screen to show 'what we do now' vs 'what we should do' — building on the persuasive speech skills and Athletics unit transdisciplinary thinking.", "c": "end"}, {"t": "Micro:bit", "d": "Students build a micro:bit 'Planet Care Dashboard' that uses the light sensor to monitor classroom energy use and displays a happy or sad face depending on whether lights are being used responsibly — presenting their working environmental monitor alongside their action plan for how the school community can make better choices for the planet.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 3", "th": "How We Express Ourselves", "ci": "Celebrations and traditions shape the culture of a community.", "lo": "The ways personal and cultural events are celebrated; Our appreciation of the diversity of cultures; How celebrations shape community identity", "s": [{"t": "Canva", "d": "Students create a quick visual poster in Canva responding to the provocation: 'How do you the ways personal and cultural events are celebrated?' — using images, icons and text to express their current understanding before the inquiry deepens.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page experimenting with different ways to express our appreciation of the diversity of cultures — through images, text, drawing and recorded voice — reflecting on which medium communicates their idea most effectively.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about how celebrations shape community identity using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}, {"t": "Google Maps", "d": "Students take a virtual field trip using Google Maps Street View to explore a location connected to the ways personal and cultural events are celebrated, navigating through streets, landmarks and landscapes in 360 degrees — recording first impressions and questions that will drive their inquiry.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate cultural celebration artefacts, food, or decorations brought to class, recording voice explanations about what each item represents and how the celebration shapes their family's cultural identity.", "c": "middle"}, {"t": "Padlet", "d": "Students create a collaborative 'Celebrations Around the World' board where each student posts about a different cultural event, asking questions and making connections between traditions across cultures.", "c": "middle"}, {"t": "GarageBand", "d": "Students compose or arrange music in GarageBand representing the cultural celebrations and traditions they researched, selecting instruments and rhythms that reflect the heritage of the community being studied and embedding the audio into their iMovie documentary or Book Creator research project.", "c": "middle"}, {"t": "Scratch", "d": "Students code an interactive 'Cultural Celebrations Museum' in Scratch where visitors click on celebration sprites (Chinese New Year, Diwali, Easter, NAIDOC) to trigger animations, music samples from their GarageBand compositions, and recorded voice explanations — creating a digital exhibition that celebrates the diversity of cultures and how celebrations shape community identity.", "c": "end"}, {"t": "Book Creator", "d": "Students create a cultural research book documenting different celebrations and traditions explored during the unit, including representations of what the colours and symbols of the Australian flag represent, and personal family stories about how cultural events are celebrated.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a short documentary about a celebration or tradition important to their family or culture, including interviews with family members and connections to the music provocation exploring Gurrumal's 'I Am Australian' and what it means to belong to a diverse Australian community.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 3", "th": "How the World Works", "ci": "Humans use their understanding of scientific principles to take action.", "lo": "The work of scientists; The process of learning; How science brings about new understandings and changes", "s": [{"t": "Scratch", "d": "Students build a Scratch science lab simulator where the player is a scientist who must complete an experiment — selecting the right equipment, dragging variables into place (e.g. choosing a heat source, setting a timer, picking a container), then running the experiment and observing animated state changes (ice melting, water boiling, steam rising). Wrong choices trigger a 'Try Again' with feedback explaining why the method matters, reinforcing the scientific process of prediction, testing and observation explored throughout the unit.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students respond to 'What do you already know about the work of scientists?' using a live word cloud, then the class discusses the most common responses — revealing existing understanding and misconceptions to shape the inquiry direction.", "c": "beginning"}, {"t": "Canva", "d": "Students create a hypothesis poster in Canva predicting how the process of learning works, including a labelled diagram and three questions they want to investigate — setting up the scientific inquiry process.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate each stage of their scientific investigations, using the 'What is a scientist?' mind map vocabulary to explain observations and building their science communication skills through labelled diagrams.", "c": "middle"}, {"t": "Micro:bit", "d": "Students use micro:bit sensors to collect data during their scientific investigations, programming the LED display to show temperature readings or light levels as evidence of scientific principles in action, connecting hands-on data collection to their scientist research profiles.", "c": "middle"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of the work of scientists and building on each other's thinking through comments and questions.", "c": "middle"}, {"t": "Tinkercad", "d": "Students design a 3D model in Tinkercad of a scientific instrument or tool invented by the scientist they researched, with movable parts showing how the scientific principle works — presenting their digital design alongside their research profile explaining how this scientist's discoveries changed the world.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Science Principles in Action' simulation in Scratch where clicking on different experiment sprites triggers animated demonstrations of the scientific principles investigated during the unit, with data overlays from their micro:bit sensor investigations — creating a digital science museum visitors can explore.", "c": "end"}, {"t": "Adobe Express (Video)", "d": "Students produce a short documentary about their chosen scientist's impact on the world, incorporating research from guided and shared reading experiences, class videos of scientists, and discussions about how discoveries change society.", "c": "end"}, {"t": "Lego Spike", "d": "Students build a Lego Spike mechanism demonstrating a scientific principle their chosen scientist discovered, programming the motor and sensors to create a working model that shows cause and effect, presenting the prototype alongside their research poster and documentary.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 3", "th": "How We Organise Ourselves", "ci": "The rights and responsibilities of citizens are determined by the rules and laws of a community.", "lo": "The differences between rules and laws; People responsible for enforcing rules and laws; Rights and responsibilities of citizens; The consequences when rules, laws and rights are not met", "s": [{"t": "Seesaw", "d": "Students document their exploration of rules and laws through the card game provocation, recording reflections about what happened when groups created different rules and what they learned about fairness, perspective, and responsibility.", "c": "beginning"}, {"t": "Microsoft Forms", "d": "Students complete a quick class survey about their experience with the differences between rules and laws — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students map out their current understanding of people responsible for enforcing rules and laws as a simple flowchart or diagram in Canva, showing how they think the system works — the class then compares diagrams to identify gaps and assumptions to investigate.", "c": "beginning"}, {"t": "Kahoot", "d": "Students collaboratively create quiz questions about rules vs laws, rights vs responsibilities, and the role of different people in enforcing them — used as a review tool connecting to the Principled Learner Profile focus on accepting consequences of actions.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the differences between rules and laws, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of the differences between rules and laws and building on each other's thinking through comments and questions.", "c": "middle"}, {"t": "Freeform", "d": "Students use Freeform to collaboratively map how rules and laws work as interconnected systems — plotting the differences between rules and laws, who enforces them, and how rights and responsibilities connect, building a visual concept map throughout the unit.", "c": "middle"}, {"t": "Delightex (CoSpaces)", "d": "Students build an interactive 3D courtroom in CoSpaces where visitors walk through scenarios involving rules vs laws — clicking on characters triggers explanations of who enforces the rule or law, what the consequence is, and how citizens' rights and responsibilities connect — creating an immersive experience that brings the card game provocation to life in a virtual world.", "c": "end"}, {"t": "Adobe Express (Video)", "d": "Students create a short public service announcement explaining citizens' rights and responsibilities, using scenarios from class discussions about consequences when rules and laws are not met, and connecting to the concept that all citizens need to abide by rules for the safety and wellbeing of the community.", "c": "end"}, {"t": "Scratch", "d": "Students design and code a Scratch game where the player takes on the role of a community law enforcement officer responding to different scenarios — a shopkeeper reports stolen goods, a neighbour complains about loud noise, a cyclist rides without a helmet. For each scenario, the player must choose the correct response (warning, fine, referral to court) based on whether the situation involves a broken rule or a broken law, earning points for correct decisions and receiving feedback explaining the consequences when rules and laws are not met.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 3", "th": "Sharing the Planet", "ci": "Adaptation and sustainability ensure the survival of living things in changing environments.", "lo": "Adaptations and structural features of living things; Roles of living things in an ecosystem; Actions that benefit or harm ecosystems", "s": [{"t": "Padlet", "d": "Students post an image, headline or question about adaptations and structural features of living things on a shared Padlet board, then read and comment on three classmates' posts — surfacing the range of perspectives and questions that will drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students design a 'What I Care About' poster in Canva showing their personal connection to roles of living things in an ecosystem — including images, facts they already know, and questions they want answered during the unit.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students respond to a series of true/false provocations about actions that benefit or harm ecosystems using Mentimeter live polls — the class sees results in real time, debates surprising answers, and identifies misconceptions to investigate during the unit.", "c": "beginning"}, {"t": "Seesaw", "d": "Students document observations from the Melbourne Aquarium excursion, photographing animals and annotating their physical adaptations, recording how each feature helps the animal survive in its specific ecosystem.", "c": "middle"}, {"t": "Google Earth", "d": "Students explore the habitats of animals they researched, comparing different ecosystems around the world and investigating how environmental changes threaten species survival, connecting to the unit's focus on sustainability and conservation responsibility.", "c": "middle"}, {"t": "Sphero", "d": "Students program Spheros to navigate obstacle courses representing different ecosystems, simulating how animals must adapt their movement to survive in changing environments, connecting coding challenges to the adaptation research documented in their animal investigation books.", "c": "middle"}, {"t": "Padlet", "d": "Students drop pins on a shared Padlet Map marking locations connected to adaptations and structural features of living things, adding photos, facts and reflections at each pin — building a collaborative geographic record of the class's environmental research.", "c": "middle"}, {"t": "Book Creator", "d": "Students create an animal adaptation research book documenting the species they investigated, explaining physical and behavioural adaptations, the animal's role in its ecosystem, and connecting to observations from the Melbourne Aquarium excursion about how living things are adapted to their environments.", "c": "end"}, {"t": "iMovie/Green Screen", "d": "Students film themselves 'reporting live' from an ecosystem (using green screen), presenting their research on how adaptations ensure survival, incorporating findings from the Melbourne Aquarium excursion and class discussions about the positive and negative impact humans have on habitats.", "c": "end"}, {"t": "Adobe Express (Podcast)", "d": "Students produce a 'Planet Protectors' podcast episode discussing actions that benefit or harm ecosystems, featuring their research on animal adaptations and sustainability, and proposing actions their school community could take to protect local ecosystems.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 4", "th": "Who We Are", "ci": "Leaders shape communities.", "lo": "Roles and responsibilities of effective leadership; The purpose of leadership in communities; Qualities of influential leaders", "s": [{"t": "Scratch", "d": "Students code an interactive 'Leadership in Action' simulation in Scratch where players face community challenges and must choose different leadership approaches — each choice triggers animated consequences showing how leadership qualities like communication, empathy and decision-making shape community outcomes, connecting to the Learner Profile exploration.", "c": "end"}, {"t": "Adobe Express (Video)", "d": "Students create a short documentary about their chosen leader's impact, incorporating research from guided reading (including Maro Molina questions), their painted portrait, and analysis of the common roles and responsibilities all leaders share.", "c": "end"}, {"t": "Delightex (CoSpaces)", "d": "Students build an interactive 3D 'Leadership Hall of Fame' in CoSpaces where visitors walk through exhibit rooms for each leader studied during library sessions, clicking on portrait objects to trigger research findings about their leadership qualities, impact, and how form (recognisable structure) enhances understanding — creating a virtual museum they can share.", "c": "end"}, {"t": "Padlet", "d": "Students post their leader research findings including key facts, leadership qualities, and impact evidence, creating a collaborative class gallery that shows the diversity of leadership explored through library research sessions and Seesaw documentation.", "c": "middle"}, {"t": "Seesaw", "d": "Students record weekly reflections on leadership moments observed in class, school, or current events, connecting to the Learner Profile focus on being principled and the PE exploration of how systems function through team-based sports.", "c": "middle"}, {"t": "Mentimeter", "d": "Students use Mentimeter live polling to rank leadership qualities, vote on the most impactful leaders studied during library research sessions, and gather class data on what makes an effective leader, building evidence for their leadership profile posters and documentaries.", "c": "middle"}, {"t": "Padlet", "d": "Students respond to the provocation 'Leaders shape communities.' by posting one image and one sentence showing what this looks like in their own life, creating a collaborative gallery that maps the class's diverse starting perspectives on roles and responsibilities of effective leadership.", "c": "beginning"}, {"t": "Canva", "d": "Students design a personal infographic mapping their own connection to the purpose of leadership in communities — using icons, images and short text to visualise where they stand before the class explores different perspectives.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about qualities of influential leaders using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}, {"t": "Freeform", "d": "Students use Freeform to create a collaborative concept map exploring connections between roles and responsibilities of effective leadership and the purpose of leadership in communities — using sticky notes for ideas, drawings for personal connections, and arrows to show how concepts link together, making their thinking visible to the whole group.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 4", "th": "How We Express Ourselves", "ci": "Technology transforms how we create and share ideas.", "lo": "How technology expands creative possibilities; The evolution of communication tools; The impact of technology on expression", "s": [{"t": "Canva", "d": "Students create a quick visual poster in Canva responding to the provocation: 'How do you how technology expands creative possibilities?' — using images, icons and text to express their current understanding before the inquiry deepens.", "c": "beginning"}, {"t": "GarageBand", "d": "Students experiment with sounds and beats in GarageBand to create a 30-second 'mood piece' that expresses their first impression of the evolution of communication tools — exploring how expression works beyond words before the unit dives deeper.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about the impact of technology on expression using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}, {"t": "Microsoft Forms", "d": "Students create a survey about how people in their school community use technology to create and share ideas, collecting and analysing data to present findings about the impact of technology on expression.", "c": "middle"}, {"t": "Padlet", "d": "Students document their technology exploration journey by posting examples of creative work made with different tools, reflecting on how each technology expanded their creative possibilities and sharing their journal entries about what they care about when using technology.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build and code a Lego Spike automated message delivery system, demonstrating how technology has transformed communication from manual to automated processes, connecting their engineering prototype to the evolution of communication tools mapped in their timeline infographic.", "c": "middle"}, {"t": "Adobe Express (Website)", "d": "Students create a digital portfolio website showcasing how technology has transformed creative expression, featuring their KWL chart journey, family interview findings about how technology/communication has changed, and examples of their own technology-enhanced creations from the unit.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a 'Then and Now' documentary comparing historical communication tools with modern technology, incorporating family interview responses about technological change and their personal 'top wonder' about technology's future impact on creative expression.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Communication Timeline' in Scratch where visitors click on era sprites (ancient, industrial, digital) to see animated demonstrations of how communication tools evolved — each era reveals how technology transformed creative expression, connecting to the KWL chart journey and family interviews about technology changes.", "c": "end"}, {"t": "Green Screen + iMovie", "d": "Students use green screen to film themselves presenting from inside a historical setting, demonstrating the contrast between old and new communication tools explored in their 'Then and Now' documentary, showing firsthand how technology has transformed creative expression.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 4", "th": "How the World Works", "ci": "Changes to the Earth impact environment and communities.", "lo": "The causes of geological change over time; How extreme environments cause natural disasters; The impact of natural events on communities", "s": [{"t": "Seesaw", "d": "Students document their natural disaster research using the Explanation Text structure, photographing and annotating diagrams showing cause-and-effect relationships between geological changes and community impacts, building on the prior knowledge assessment.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students respond to 'What do you already know about the causes of geological change over time?' using a live word cloud, then the class discusses the most common responses — revealing existing understanding and misconceptions to shape the inquiry direction.", "c": "beginning"}, {"t": "Canva", "d": "Students create a hypothesis poster in Canva predicting how how extreme environments cause natural disasters works, including a labelled diagram and three questions they want to investigate — setting up the scientific inquiry process.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore locations around the world affected by natural disasters (bushfire zones, earthquake fault lines, volcanic regions), investigating how geological changes over time have shaped these environments and communities.", "c": "middle"}, {"t": "Micro:bit", "d": "Students program micro:bit accelerometers to simulate seismograph readings during their natural disaster research, shaking the sensor at different intensities to model earthquake measurements, connecting the data to their explanation texts about geological changes and community impacts.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build a Lego Spike earthquake-resistant structure incorporating sensors and motors, testing whether their design withstands shaking to connect engineering solutions to their Tinkercad emergency shelter prototype and natural disaster research.", "c": "middle"}, {"t": "Padlet", "d": "Students drop pins on a shared Padlet Map marking locations connected to the causes of geological change over time, adding photos, facts and reflections at each pin — building a collaborative geographic record of the class's environmental research.", "c": "middle"}, {"t": "Delightex (CoSpaces)", "d": "Students build an interactive 3D disaster response scene in CoSpaces showing the before, during and after of their chosen natural disaster (bushfires, earthquakes, cyclones, tsunamis), with clickable elements triggering explanations of geological causes, community impacts and the explanation text structure practised during the unit.", "c": "end"}, {"t": "Adobe Express (Video)", "d": "Students create an explanation video about geological changes and natural disasters, using the explanation text type practised during English (Seesaw Explanation Text activities) and incorporating research from digital and print text comparisons about environmental impacts on communities.", "c": "end"}, {"t": "Tinkercad", "d": "Students design a 3D model of an emergency shelter or community response structure for their chosen natural disaster, applying understanding of how extreme environments impact communities and connecting to the causes of geological change explored through mentor texts.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 4", "th": "How We Organise Ourselves", "ci": "Systems connect us.", "lo": "Human systems; The interconnections that exist within and across systems; The influence of systems on communities", "s": [{"t": "Microsoft Forms", "d": "Students complete a quick class survey about their experience with human systems — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students map out their current understanding of the interconnections that exist within and across systems as a simple flowchart or diagram in Canva, showing how they think the system works — the class then compares diagrams to identify gaps and assumptions to investigate.", "c": "beginning"}, {"t": "Kahoot", "d": "Students play a diagnostic Kahoot testing their assumptions about the influence of systems on communities — the results reveal what the class already knows and where the biggest knowledge gaps are, helping the teacher shape the inquiry direction.", "c": "beginning"}, {"t": "Padlet", "d": "Students collaboratively build a systems thinking board mapping the different systems they investigated during the unit, posting observations, diagrams, and reflections about how systems connect people and communities.", "c": "middle"}, {"t": "Seesaw", "d": "Students document system examples they discover in daily life (school timetable, lunch ordering, sports teams), using drawing tools to annotate how each system's parts are interconnected and influence the community.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students design and conduct a class survey to gather perspectives on human systems, analysing the response data to identify patterns and inform their ongoing inquiry.", "c": "middle"}, {"t": "Tinkercad", "d": "Students design a 3D model in Tinkercad of an innovative system component that solves a real school community problem (automated lunch ordering, smart timetable display, resource sharing station), with labelled parts showing how interconnections within the system enable it to function — presenting their design alongside their Scratch simulation.", "c": "end"}, {"t": "Adobe Express (Video)", "d": "Students produce a short documentary exploring how a human system functions, connecting to PE investigations of team-based sports (basketball, netball, European handball) where they experienced how systems work through roles, rules, and interconnections.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive simulation demonstrating how a system works, showing what happens when one part changes or breaks down — connecting to the concept that the influence of systems on communities depends on interconnections.", "c": "end"}, {"t": "Lego Spike", "d": "Students build a Lego Spike automated sorting or delivery system demonstrating how interconnected components work together, programming sensors and motors to show what happens when one part of the system fails, connecting to their investigation of how human systems function and PE body systems research.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 4", "th": "Sharing the Planet", "ci": "Country, language and community are significant to the lives of First Nations people.", "lo": "The diversity of First Nations people; The importance of community, family and kinship; The importance of Country to First Nations people", "s": [{"t": "Padlet", "d": "Students post an image, headline or question about the diversity of first nations people on a shared Padlet board, then read and comment on three classmates' posts — surfacing the range of perspectives and questions that will drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students design a 'What I Care About' poster in Canva showing their personal connection to the importance of community, family and kinship — including images, facts they already know, and questions they want answered during the unit.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students respond to a series of true/false provocations about the importance of country to first nations people using Mentimeter live polls — the class sees results in real time, debates surprising answers, and identifies misconceptions to investigate during the unit.", "c": "beginning"}, {"t": "Google Maps", "d": "Students explore locations connected to the diversity of first nations people using Google Maps Street View, navigating through real places in 360 degrees and recording what they discover about the geography and culture.", "c": "beginning"}, {"t": "Padlet", "d": "Students share research findings about different First Nations groups, posting one fact per lesson to build a collaborative knowledge base (printed and used for the inquiry space), showing empathy, compassion and respect for different Indigenous perspectives.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph and reflect on their clay totem creation process, explaining the symbols they chose to represent themselves and connecting to the study of how totems hold meaning and purpose in First Nations cultures.", "c": "middle"}, {"t": "DJI Drone (teacher-operated)", "d": "DLC captures aerial footage of the local Elsternwick area and surrounding green spaces, providing a bird's-eye perspective of the land that students compare with First Nations understandings of Country, language groups, and connections to place explored throughout the unit.", "c": "middle"}, {"t": "Delightex (CoSpaces)", "d": "Students build an interactive 3D 'Connection to Country' virtual experience in CoSpaces where visitors walk through landscapes representing different First Nations communities, clicking on elements to hear recorded explanations about the diversity of people, importance of kinship, and significance of Country — incorporating their clay totem symbols and research findings.", "c": "end"}, {"t": "Adobe Express (Podcast)", "d": "Students produce a respectful audio documentary exploring the importance of Country, language and community to First Nations people, incorporating stories shared through class provocations, research from Padlet reflections, and connections between First Nations perspectives and the concept of sharing the planet.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive map of Australia in Scratch where clicking on different regions reveals First Nations language groups, cultural practices and connection to Country — users can compare communities and discover the diversity that exists, connecting to the research findings shared on their collaborative Padlet board.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 5", "th": "Who We Are", "ci": "People's choices are influenced by their beliefs and values and can impact others.", "lo": "How values and beliefs impact choices; How people's choices and actions impact others; Responsible decision-making", "s": [{"t": "Adobe Express (Video)", "d": "Students produce a short documentary exploring how values and beliefs influence decision-making, featuring personal reflections from PE lessons where they experienced how responsible choices in team activities affected others, and connecting to music lessons about how personal actions impact group performance.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Values Dilemma Simulator' in Scratch where players face ethical scenarios and must choose actions based on different belief systems — each choice triggers animated consequences showing how values and beliefs influence decisions and impact others, connecting to PE team outcome reflections and the Freeform concept map exploration.", "c": "end"}, {"t": "Delightex (CoSpaces)", "d": "Students build an interactive 3D 'Perspectives Gallery' in CoSpaces where visitors walk through rooms representing different scenarios where values and beliefs led to different decisions, clicking on character objects to hear recorded analyses of causes, impacts and responsible decision-making approaches — creating a virtual ethical reasoning exhibition.", "c": "end"}, {"t": "Padlet", "d": "Students post weekly reflections about choices they observed or made that were influenced by values/beliefs, building a class discussion board exploring different perspectives on how actions impact the school community.", "c": "middle"}, {"t": "Seesaw", "d": "Students record reflections connecting PE experiences (where responsible decision-making affected team outcomes) to the broader concept of how beliefs and values shape our choices and their consequences for others.", "c": "middle"}, {"t": "Mentimeter", "d": "Students use Mentimeter word clouds and live polling to gather anonymous class responses about values dilemmas and belief scenarios, building real-time data on how perspectives differ across the group and using the visualisations as evidence in their analytical posters mapping beliefs to choices and impacts.", "c": "middle"}, {"t": "Padlet", "d": "Students respond to the provocation 'People's choices are influenced by their beliefs and values and can impact others.' by posting one image and one sentence showing what this looks like in their own life, creating a collaborative gallery that maps the class's diverse starting perspectives on how values and beliefs impact choices.", "c": "beginning"}, {"t": "Canva", "d": "Students design a personal infographic mapping their own connection to how people's choices and actions impact others — using icons, images and short text to visualise where they stand before the class explores different perspectives.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about responsible decision-making using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}, {"t": "Freeform", "d": "Students use Freeform to create a collaborative concept map exploring connections between how values and beliefs impact choices and how people's choices and actions impact others — using sticky notes for ideas, drawings for personal connections, and arrows to show how concepts link together, making their thinking visible to the whole group.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 5", "th": "Where We Are in Place and Time", "ci": "Colonisation has shaped society.", "lo": "The impact of colonisation; Colonisation stories; The effects of colonisation — past, present and future", "s": [{"t": "Google Earth", "d": "Students use Google Earth to explore locations connected to the impact of colonisation, dropping pins and adding labels describing what they observe — building a visual map of existing knowledge before the class investigation begins.", "c": "beginning"}, {"t": "Canva", "d": "Students create a 'What I Think I Know' timeline or mind map about colonisation stories in Canva, visually organising their existing knowledge and marking questions with a '?' — establishing a baseline the class can test through research.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate images, artefacts or objects connected to the effects of colonisation — past, present and future, recording voice reflections about what they already know and want to find out — building a provocation portfolio before the 'Unsettled' exploration deepens understanding.", "c": "beginning"}, {"t": "Padlet", "d": "Students build a collaborative timeline of colonisation events and their effects (past, present, future), posting research findings and reflections that incorporate multiple perspectives including First Nations voices and connections to geography and place.", "c": "middle"}, {"t": "Google Earth", "d": "Students create a virtual tour of significant colonisation sites, mapping the geographic spread and impact using compass directions and geography vocabulary learned in Chinese language lessons, connecting physical places to colonisation stories.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the impact of colonisation, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Adobe Express (Website)", "d": "Students create a research website examining the impact of colonisation on a specific region, incorporating perspectives from the 'Unsettled' resource (exploring 'How do we read the signs around us?'), Chinese language geography vocabulary, and analysis of how colonisation's effects continue into the present and future.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a documentary exploring colonisation stories, featuring primary sources, the carved spotted gum from bushfire-ravaged Country (from the Australian Museum 'Signal Fires' resource), and multiple perspectives on how colonisation has shaped modern Australian society.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Colonisation: Past, Present, Future' timeline in Scratch where clicking on era sprites triggers animated sequences showing the impact on specific communities — incorporating primary and secondary sources from their research and perspectives from the 'Unsettled' exhibition and carved spotted gum investigation.", "c": "end"}, {"t": "Green Screen + iMovie", "d": "Students film first-person historical accounts using green screen with period-appropriate backgrounds, performing as characters from colonisation eras to bring primary sources to life, incorporating the footage into their iMovie documentary alongside research from the carved canoe investigation and Colonisation: Past, Present, Future book.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 5", "th": "How We Express Ourselves", "ci": "People can create or manipulate messages to target specific audiences.", "lo": "The devices used to target audiences; Critical evaluation of messages; How we know we have been influenced", "s": [{"t": "Canva", "d": "Students create a quick visual poster in Canva responding to the provocation: 'How do you the devices used to target audiences?' — using images, icons and text to express their current understanding before the inquiry deepens.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page experimenting with different ways to express critical evaluation of messages — through images, text, drawing and recorded voice — reflecting on which medium communicates their idea most effectively.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about how we know we have been influenced using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}, {"t": "Adobe Express (Podcast)", "d": "Students produce a media literacy podcast episode critically evaluating a message aimed at their age group, applying the persuasive analysis skills practised through class activities and connecting to the ethical use of media/information focus.", "c": "middle"}, {"t": "Seesaw", "d": "Students document and annotate examples of persuasive media they encounter daily (ads, posters, social media), identifying the devices used to target specific audiences and sharing their critical evaluations on a class discussion board.", "c": "middle"}, {"t": "Green Screen + iMovie", "d": "Students use green screen to produce their persuasive advertisement, demonstrating firsthand how media creators manipulate settings, backgrounds, and visual context to target specific audiences, connecting the production experience to their critical analysis of media manipulation techniques.", "c": "middle"}, {"t": "GarageBand", "d": "Students compose original jingles or soundtracks in GarageBand for their persuasive advertisements, exploring how audio elements are used to manipulate audience emotions and target demographics, connecting music production to their media literacy analysis of how messages are crafted to influence.", "c": "middle"}, {"t": "Adobe Express (Video)", "d": "Students create a persuasive advertisement targeting a specific audience, demonstrating the media manipulation techniques explored during the unit, and then create a companion 'behind-the-scenes' analysis video explaining the persuasive devices used — connecting to the Lume Museum visit exploring Van Gogh's visual storytelling techniques.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Ad Deconstructor' in Scratch where users drag persuasive devices (colour manipulation, emotional music, celebrity endorsement, urgency language) onto an advertisement template and watch in real time how each device changes the message's impact — demonstrating firsthand how media creators manipulate audiences, connecting to their GarageBand jingle composition and green screen ad production.", "c": "end"}, {"t": "Canva Video", "d": "Students produce a short film demonstrating how messages can be manipulated to influence audiences, featuring before/after versions of the same content presented differently — connected to the unit's focus on understanding media representations and modes of presentation.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 5", "th": "How the World Works", "ci": "Design processes enable people to respond creatively to challenges in the natural world.", "lo": "The nature and impact of natural hazards (Causation); How design processes are used to generate and test solutions (Function); The ethical and practical considerations in human responses to natural challenges (Responsibility)", "s": [{"t": "Seesaw", "d": "Students document each stage of the design thinking cycle (empathise, define, ideate, prototype, test) during their natural hazards response project, photographing prototypes and recording reflections on the 'Nature doesn't need people, people need nature' provocation and Wonder Wall questions.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students respond to 'What do you already know about the nature and impact of natural hazards (causation)?' using a live word cloud, then the class discusses the most common responses — r
